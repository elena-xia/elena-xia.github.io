ical facts. Taxation and recruitment are not merely tasks; they can be abstracted as extraction."},{"kind":"p","text":"Almond’s framework helps explain governmental process. Many political behaviors can be read through interest articulation, while policy-making can be read through aggregation."},{"kind":"p","text":"The theory expands the object of political science from the state to the political system, including both state and society."},{"kind":"p","text":"Its limits are the limits of functionalism: it can describe a system in great detail without explaining conflict, change, and causality."},{"kind":"personal","text":"The notes say Almond mattered for Chinese political-institutional reform because the idea of structural and functional mismatch traveled well in China."}]},{"id":"postbehav","x":0,"y":6.0,"era":"1969–","title":{"zh":"后行为主义","en":"Post-Behavioralism"},"tag":{"zh":"价值回归 · 方法分流","en":"return of value · methodological split"},"core":{"zh":["后行为主义并不是取消经验研究，而是反对把方法本身当成政治学目的。民权运动、反战运动和学生运动爆发时，行为主义政治学没有预见，也很难给出规范回应；罗尔斯《正义论》则从政治哲学方向冲击了行为主义的价值祛除。","1969 年伊斯顿提出后行为主义口号，要求政治研究重新面对现实问题和价值判断。此后美国政治学分化为几条路：理性选择与政治经济学、政治社会学与历史社会学、批判理论与政治哲学，以及后来重新重视制度的新制度主义。","【课后补充】笔记还提到一种欧洲理论分类：本体规范理论（阿伦特、施特劳斯、沃格林）、辩证批判理论（法兰克福学派、存在主义、结构主义、马克思主义）与经验分析理论（美国政治科学）。这有助于理解后行为主义之后，政治学为何分化为政治经济学、政治社会学和政治哲学三条路线。"],"en":["Post-behavioralism did not abolish empirical research. It rejected the idea that method itself should become the purpose of political science. When civil-rights movements, antiwar movements, and student protests erupted, behavioral political science neither foresaw them nor offered a normative response. Rawls’s A Theory of Justice challenged value-free political science from political philosophy.","In 1969 Easton called for post-behavioralism, asking political inquiry to face real problems and value judgments again. American political science then split into several paths: rational choice and political economy, political sociology and historical sociology, critical theory and political philosophy, and later a renewed institutionalism.","Post-class supplement: The notes also mention a European classification: ontological-normative theory (Arendt, Strauss, Voegelin), dialectical-critical theory (the Frankfurt School, existentialism, structuralism, Marxism), and empirical-analytic theory (American political science). This helps explain why, after post-behavioralism, the field split into political economy, political sociology, and political philosophy."]},"relation":{"zh":"这是全图的分叉点：行为主义的精确化成就被保留，但它的价值盲点和制度盲点被持续反击。","en":"This is the branching point of the map: behavioralism’s precision remains, but its blindness to value and institutions is continually attacked."},"works":{"zh":["Easton 的 1969 年 APSA 主席演说","Rawls，《A Theory of Justice》"],"en":["Easton’s 1969 APSA presidential address","Rawls, A Theory of Justice"]},"strengths":{"zh":["让政治学重新面对重大现实问题。","打开方法多元化局面。"],"en":["Reoriented political science toward major real-world problems.","Opened methodological pluralism."]},"limits":{"zh":["不同路径之间共同语言不足。","政治学开始碎片化。"],"en":["The different paths lacked a shared language.","The field became fragmented."]},"personal":{"zh":["后行为主义真正提出的问题是：一个政治学如果不能解释战争、革命、社会运动和制度崩溃，它的“科学性”到底服务于什么。"],"en":["The real post-behavioral question is: if a political science cannot explain war, revolution, social movements, and institutional collapse, what does its “scientific” character serve?"]},"noteSection":"第一讲 导论：西方（美国）政治科学的沿革","keywords":["后行为主义","背景","研究方法的分化","研究对象的分流","学科领域的分庭抗礼"],"noteLimit":24,"noteBlocks":[{"kind":"p","text":"很多对行为主义的批评都来自行为主义学者内部。1969年伊斯顿的批评；1961年达尔就开始预言行为主义的失败（虽然达尔的《谁统治》是杰出的行为主义研究）。理查德罗蒂就是从分析哲学内部批评分析哲学，美国华工的悲惨生活。"},{"kind":"p","text":"4、后行为主义（以理性选择为主的研究）"},{"kind":"p","text":"（1）背景"},{"kind":"p","text":"西方社会爆发大规模民权运动和反战运动，学者没有预见也无法发声；罗尔斯《正义论》问世。"},{"kind":"p","text":"1969年戴维·伊斯顿提出后行为主义的口号，重新结合价值理念"},{"kind":"personal","text":"1991年是对美国政治学的第二次重大打击，因为没有预见苏联的解体"},{"kind":"personal","text":"第三次是特朗普上台，没有预见"},{"kind":"p","text":"（2）研究方法的分化"},{"kind":"p","text":"行为主义走向新行为主义；结合理性选择理论形成公共选择理论，最后融合新制度主义经济学形成理性选择的制度主义；结合历史社会学形成历史学的新制度主义；结合文化人类学形成社会学的新制度主义"},{"kind":"p","text":"（3）研究对象的分流"},{"kind":"p","text":"一方面让国家回归；另一方面从组织化政治研究走向微观、个体政治研究，研究人的偏好；从研究国家、到政治的社会基础到社会本身。"},{"kind":"p","text":"（4）学科领域的分庭抗礼"},{"kind":"p","text":"形成政治的经济学（理性选择）、政治社会学和以批判理论和后现代理论为主的政治哲学的三足鼎立。理性选择理论比较接近自由民主政体，而政治社会学更接近泛政治社会：批判理论和后现代理论则是对现代性的反思。马克思主义就是对现代性的批评"}],"noteBlocksEn":[{"kind":"p","text":"Many critiques of behavioralism came from within behavioralism itself. Easton criticized it in 1969, and Dahl had already predicted its failure in 1961."},{"kind":"p","text":"The immediate background was the civil-rights movement, antiwar movement, and Rawls’s Theory of Justice. Political science had not answered major political conflict and moral questions."},{"kind":"p","text":"Easton’s post-behavioral slogan called for value to return to political inquiry. The point was not to reject empiricism, but to insist on relevance and responsibility."},{"kind":"personal","text":"The notes call the failure to foresee the Soviet collapse in 1991 a second major blow to American political science, and the failure to foresee Trump a third. These are personal judgments about disciplinary failure."},{"kind":"p","text":"The period produces branching: behavioralism becomes neo-behavioralism; rational choice becomes public choice and rational-choice institutionalism; historical sociology becomes historical institutionalism; cultural anthropology becomes sociological institutionalism."},{"kind":"p","text":"Research objects also split. One direction brings the state back; another moves toward micro-level preference and choice."},{"kind":"p","text":"The discipline becomes three-sided: political economics, political sociology, and political philosophy centered on critical and postmodern theory."},{"kind":"personal","text":"The notes treat Marxism as a critique of modernity, closer to critical theory than to behavioral political science."}]},{"id":"ratchoice","x":-2.2,"y":6.9,"era":"1960s–","title":{"zh":"理性选择理论","en":"Rational Choice Theory"},"tag":{"zh":"经济人 · 偏好排序 · 博弈","en":"economic actor · preference ordering · games"},"core":{"zh":["理性选择把个体当作追求自身利益最大化的行动者，以个体选择解释集体决策。它的基本前提包括：行动者有偏好，偏好可以排序，排序具有传递性；行动者会比较成本与收益；政治过程可以被理解为一种交易和博弈。","这不是说现实中的人都完全理性，而是说理性人是一种形式模型。模型的价值在于推演清楚、前提透明、能穷尽策略可能性。它的危险在于把模型当现实，尤其在行为者众多、信息不完备、压力极端、文化语境强烈的情况下，理性选择会失真。","【课后补充】罗切斯特学派（赖克、奥德舒克）把理性选择与数理模型结合，自称“实证政治理论”。这里的“实证”不是普通经验归纳，而是形式化、演绎式模型。理性选择模型应被当作分析参照，不能直接替代历史和经验解释。"],"en":["Rational choice treats individuals as actors seeking to maximize their own interests, explaining collective decisions from individual choices. Its basic premises are: actors have preferences, preferences can be ordered, ordered preferences are transitive, actors compare costs and benefits, and political process can be understood as exchange and game.","This does not mean real people are always rational. The rational actor is a formal model. Its value is clear deduction, transparent premises, and the ability to exhaust strategic possibilities. Its danger is treating the model as reality, especially when actors are many, information incomplete, pressure extreme, or cultural context strong.","Post-class supplement: The Rochester School, especially Riker and Ordeshook, joined rational choice to mathematical models and called it positive political theory. Here positive does not mean ordinary empirical induction; it means formal and deductive modeling. A rational-choice model should be an analytic benchmark, not a substitute for historical and empirical explanation."]},"relation":{"zh":"它继承行为主义的科学化欲望，却用演绎模型而非调查归纳来追求精确。","en":"It inherits behavioralism’s desire for science, but pursues precision through deductive models rather than survey induction."},"works":{"zh":["Downs，《An Economic Theory of Democracy》","Olson，《The Logic of Collective Action》","Riker，《The Theory of Political Coalitions》","Riker 与 Ordeshook，《An Introduction to Positive Political Theory》"],"en":["Downs, An Economic Theory of Democracy","Olson, The Logic of Collective Action","Riker, The Theory of Political Coalitions","Riker and Ordeshook, An Introduction to Positive Political Theory"]},"strengths":{"zh":["推理清楚，前提透明。","能把微观行动与制度规则连接起来。","特别适合分析投票、联盟、立法、国际谈判。"],"en":["Clear reasoning and transparent assumptions.","Connects micro-action to institutional rules.","Especially useful for voting, coalitions, legislatures, and international bargaining."]},"limits":{"zh":["信息完备和偏好稳定经常不成立。","行动者越多，结论越不精确。","对文化、身份、情感和危机情境解释不足。"],"en":["Complete information and stable preferences often fail.","The more actors there are, the less precise the conclusion.","It under-explains culture, identity, emotion, and crisis situations."]},"personal":{"zh":["理性选择最好被当作参照模型，而不是现实描述。它告诉我们在极端简化条件下会发生什么，再让我们看现实为什么偏离。"],"en":["Rational choice is best treated as a reference model, not a description of reality. It tells us what would happen under extreme simplification, then lets us see why reality deviates."]},"noteSection":"04 理性选择理论","keywords":["基本假设","经济人假设","政治市场假设","投票还是不投票","博弈论","理性选择理论的缺陷"],"noteLimit":38,"noteBlocks":[{"kind":"p","text":"理性选择是演绎而不是实证研究的归纳，是形式理论(formal)，一般性而普遍化，不需要进行稳健性检验或控制变量，不考虑文化背景的特殊条件，放之四海而皆准"},{"kind":"p","text":"方法论：定性+定量+博弈论"},{"kind":"p","text":"基本假设"},{"kind":"p","text":"1、经济人假设"},{"kind":"p","text":"经济人假设：在政治学中把个人看作是理性的利己主义者，追求自身利益的最大化。这是方法论的个人主义，将作为微观经济分析出发点的个人同样作为集体行动的出发点，将个人的选择或决策当作公共选择的基础。"},{"kind":"p","text":"偏好是连续的（连续性假设），不同的偏好之间可以进行排序，而不是相互排斥的（喜欢A而不喜欢B），这样才能公式推演。可以排序但不能量化，排序就会有可传递性，A>B,B>C,可以推导出A>C。"},{"kind":"personal","text":"理性选择上，偏好是不能量化和衡量的"},{"kind":"p","text":"2、政治市场假设"},{"kind":"p","text":"政治市场假设：用经济学的交易理论来研究政治过程，认为政治过程是利益交换的结果。政治市场由供求双方组成的，需求者是选民和纳税人，供给者是政治家和政府官员。无论是选民还是政治家，在进行选择时都要进行成本-利益分析，只有一项政策给个人的收益大于所需负担的实际成本时，他才会支持这项政策"},{"kind":"p","text":"经济学的交易成本和外部性等概念都可以运用理性选择之中，行动的前提是收益大于成本。理性选择理论没有活雷锋"},{"kind":"p","text":"三、应用举例"},{"kind":"p","text":"1、投票还是不投票"},{"kind":"p","text":"实证研究的方法是抽样统计，问卷调查，再建立解释。"},{"kind":"p","text":"空气和草地等公共产品都被奥斯特罗姆称作Common pool，被翻译成公共池塘，现在被翻译成公共财，但最初的草地本身没有产权（财含有产权的意思），其实common pool是赌场中的赌池。最直接的翻译可以是公共池。"},{"kind":"p","text":"四、理性选择理论的缺陷"},{"kind":"p","text":"理性选择理论垄断了政治学的杂志和教职，所以历史社会学等学者写公开信反对，以戴维·米勒和米尔斯·海默为代表，都是做规范理论的，他们想让斯科特来做美国政治学会主席。但质性研究和规范研究（甚至实证研究）的学者的反抗活动却完全没有引起理性选择学者的注意，依旧我行我素。"},{"kind":"p","text":"④理性选择的范围有限，组织化的才可以理性推测，人类学领域理性选择就是无效的。适中压力下从容不迫的才是理性的，急迫情况下难以作出理性选择的。"},{"kind":"p","text":"五、博弈论"},{"kind":"p","text":"博弈论是理性选择理论中的一种，不是所有的理性选择理论都用到博弈论模型。"},{"kind":"p","text":"1、博弈的条件"},{"kind":"p","text":"3、两性战争"},{"kind":"p","text":"欧亨利《麦琪的礼物》就是两性战争。有学者认为，政治学本质就是博弈论，所有的政治都是人和人之间的互动，而解释人与人互动的最好理论就是博弈论。"},{"kind":"p","text":"结婚周年纪念的时候，丈夫想看拳击，太太想看芭蕾。最坏的结果就是麦琪的礼物。均衡点是什么？这与囚徒困境不一样，囚徒困境只有一个均衡点，而两性战争有两个均衡点，要么一起看拳击，要么一起看芭蕾。"},{"kind":"p","text":"政变往往是少数派发起的，但需要得到多数派的支持，而多数派往往不会直接表态，少数派只能猜测多数派的心理，而多数派往往会给一些暗示。比如少数派的谭嗣同和多数派的袁世凯。多数派支持少数派一起干政，以及多数派和少数派都不干政，就会最佳均衡。而单方行动则较少发生。"},{"kind":"personal","text":"博弈论突破、提出新的模型，需要等待数学上的突破，解出方程，堪称政治学上的范式，而推翻范式是需要甚至几百年的"},{"kind":"p","text":"四、理性选择主义——罗切斯特学派：代表人物包括威廉·赖克、奥德舒克等，强调用数理统计和形式模型研究政治学，自称“实证政治理论”。需要注意的是，这是演绎模型，而不是直接的现实研究；很多研究混淆了模型与经验解释。"}],"noteBlocksEn":[{"kind":"p","text":"Rational choice is deductive rather than inductive. It begins from assumptions and derives general propositions."},{"kind":"p","text":"Its basic assumption is the economic actor: individuals are rational egoists who seek to maximize their interests. This is methodological individualism."},{"kind":"p","text":"Preferences must be continuous, rankable, and transitive. They can be ordered, but they are not directly measurable quantities."},{"kind":"personal","text":"The note is precise: in rational choice, preferences are not measured like physical quantities; they are ordered for formal derivation."},{"kind":"p","text":"The political market assumption treats politics as exchange. Voters and taxpayers demand policies; politicians and officials supply them. Actors support a policy when expected benefit exceeds expected cost."},{"kind":"p","text":"The model uses transaction costs, externalities, and cost-benefit logic. The course states bluntly that rational choice theory has no built-in altruist."},{"kind":"p","text":"Examples include voting, campaign imitation, and village rules in Tokugawa Japan. Institutional rules can produce behavior that looks moral even when actors respond to incentives."},{"kind":"p","text":"Game theory is one subset of rational choice. A game needs players, strategy sets, ordered preferences, and payoffs."},{"kind":"p","text":"The Battle of the Sexes explains coordination with two equilibria; coup models explain how minorities infer majority support."},{"kind":"p","text":"The limits are severe: precision declines as actor numbers rise, bargaining conditions are rarely complete, and much political life is unequal, urgent, non-organized, or culturally embedded."},{"kind":"personal","text":"The notes stress that rational choice is a model, not reality itself."},{"kind":"p","text":"The Rochester School of rational choice includes William Riker and Peter Ordeshook. It uses mathematical and formal models and calls itself positive political theory. The key caution is that this is a deductive model, not direct empirical research; many studies confuse the model with empirical explanation."}]},{"id":"collective","x":-3.4,"y":7.5,"era":"1965–1990","title":{"zh":"集体行动、公共选择与公共池","en":"Collective Action, Public Choice, and Common Pools"},"tag":{"zh":"搭便车 · 选择性激励 · 合作治理","en":"free riding · selective incentives · self-governance"},"core":{"zh":["奥尔森指出，拥有共同利益的人不会自然组织起来，因为公共物品具有非排他性，个人可以搭便车。集体行动更可能发生在小集团中，或在存在选择性激励时发生。公共选择理论进一步把官僚、选民和政客也当作有自身利益的行动者，分析投票悖论、寻租和政府失败。","奥斯特罗姆则反对“只能国家或市场二选一”的公共资源治理想象。许多公共池资源可以通过地方共同体的规则、监测、惩罚、边界和冲突解决机制来治理。她的意义在于把制度从外部强加的规则，重新理解为行动者在反复互动中共同创造的秩序。","【课后补充】公共选择理论的需求侧包括孔多塞循环、阿罗不可能定理、中位选民或政策居中；供给侧包括寻租、官僚预算最大化和政府失败。布坎南与塔洛克把民主决策放进成本收益与规则选择框架。勒庞的群体心理学与奥尔森形成对照：前者从整体论、情感传染和匿名性出发，后者从方法论个人主义、搭便车和选择性激励出发。"],"en":["Olson argued that people with common interests do not naturally organize, because public goods are non-excludable and individuals can free ride. Collective action is more likely in small groups or where selective incentives exist. Public choice then treats bureaucrats, voters, and politicians as self-interested actors, analyzing voting paradoxes, rent-seeking, and government failure.","Ostrom rejects the idea that common resources must be governed only by either state or market. Many common-pool resources can be governed by local rules, monitoring, sanctions, boundaries, and conflict-resolution mechanisms. Her significance is to understand institutions not as externally imposed rules but as orders co-created by actors through repeated interaction.","Post-class supplement: On the demand side, public choice includes the Condorcet cycle, Arrow’s impossibility theorem, and the median-voter or policy-convergence result. On the supply side, it studies rent seeking, bureaucratic budget maximization, and government failure. Buchanan and Tullock place democratic decision-making inside a cost-benefit and rule-choice framework. Le Bon contrasts with Olson: Le Bon starts from group psychology, emotional contagion, and anonymity; Olson starts from methodological individualism, free riding, and selective incentives."]},"relation":{"zh":"这一支把理性选择推进到制度研究：规则不是背景，而是合作能否形成的核心。","en":"This branch pushes rational choice into institutional analysis: rules are not background; they determine whether cooperation is possible."},"works":{"zh":["Olson，《The Logic of Collective Action》","Buchanan 与 Tullock，《The Calculus of Consent》","Ostrom，《Governing the Commons》","Arrow，《Social Choice and Individual Values》","Le Bon，《The Crowd》"],"en":["Olson, The Logic of Collective Action","Buchanan and Tullock, The Calculus of Consent","Ostrom, Governing the Commons","Arrow, Social Choice and Individual Values","Le Bon, The Crowd"]},"strengths":{"zh":["解释搭便车、寻租和政府失败。","说明地方共同体也能产生有效制度。"],"en":["Explains free riding, rent seeking, and government failure.","Shows that local communities can create effective institutions."]},"limits":{"zh":["若资源与收益并不均等，集体行动困境会被弱化。","公共选择容易把所有公共行动都还原为自利。"],"en":["If resources and payoffs are unequal, the collective-action dilemma is weakened.","Public choice can reduce all public action to self-interest."]},"personal":{"zh":["“集体行动困境基本上不存在”是一个很强的课堂判断。更稳妥的说法是：现实中的资源差异、身份收益和选择性激励经常改变奥尔森模型的极端前提，因此集体行动比模型预期更常发生。"],"en":["The classroom claim that “the collective-action dilemma basically does not exist” is too strong. A safer formulation is that real-world resource inequality, identity payoffs, and selective incentives often change Olson’s extreme premises, so collective action occurs more often than the model predicts."]},"noteSection":"04 理性选择理论","keywords":["集体行动的逻辑","选择性激励","集体行动的四种类型","公共事务的治理之道","公共池"],"noteLimit":34,"noteBlocks":[{"kind":"personal","text":"理性选择就是冲突解决机制，人的行为就是为了解决冲突，所以理性选择理论回答的是根本的问题"},{"kind":"p","text":"4、集体行动的逻辑"},{"kind":"p","text":"奥尔森的《集体行动的逻辑》是社会科学引用量最高的书籍。"},{"kind":"p","text":"阿玛蒂亚森是总和引用量最高的社会科学学者，第二是阿玛蒂亚森的太太纳尔斯鲍姆（政治哲学学者，诗化哲学，Metoo运动的领军人物）。"},{"kind":"p","text":"利己主义者不愿意为公共物品作出任何贡献，精致的利己主义者还会为自己的行为找出冠冕堂皇的理由，站在道德高地上搭便车。"},{"kind":"p","text":"集体行动的条件：①人数小，小集团：单人作用提高，个人向集体行动的成本降低②选择性激励，小的占大的便宜，比如北约中欧洲跟着美国搭便车"},{"kind":"p","text":"集体行动中的出头鸟（one for all），一劳永逸地解决问题（Once for all），一个人代表所有人（愿意做出头鸟也是因为选择性激励）。还有替死鬼理论，让别人冲锋在先。用于社区研究中，多数人对于社区事务是非常冷漠的，但为什么楼组长或疫情中的团长愿意参与公共事务？原因就在于选择性激励。"},{"kind":"p","text":"3、奥尔森理论的不足"},{"kind":"personal","text":"这是一个极端情况。正如亚当·斯密“看不见的手”，如果完全发挥作用就不会有企业了，都是各自交易"},{"kind":"p","text":"4、集体行动的四种类型（概括了人类行动的所有可能性，基层治理案例分析中屡试不爽）："},{"kind":"p","text":"成本分散，收益分散。比如集资建房（共同筹资做某事）"},{"kind":"p","text":"成本集中，收益分散。集体行动的困境，公共物品的非排他性，需要选择性激励（额外收益）"},{"kind":"p","text":"案例：补偿机制。长江禁渔，补偿渔民，消费者利益受损（鱼类品质下降），但旅游业被带动，渔民可以在那一时间集中收益"},{"kind":"p","text":"→ 沙盘推演：禁枪，就会变成黑市交易，枪支交易就会不公平，百姓会没有枪而黑帮（有资源有办法的人）仍能得到；双减，有门路的人才能找到校外培训，培训成本会成倍上升（必须覆盖老师承担的风险），教育会更加不公平，因此应从高考中考招生政策入手（清北自招应当被砍掉，但却不敢动他们几百个人的利益）；春风化雨导师为什么是抽签，避免很多学生集中选一个老师"},{"kind":"p","text":"成本集中，收益集中。选择性激励"},{"kind":"p","text":"成本分散，收益集中。形象工程等，税收由所有人承担，好处由领导获得。选举中也是，候选人立人设，好处是自己的，成本由别人承担。"},{"kind":"personal","text":"所以集体行动的困境基本上不存在，基于成本收益不同条件，集体行动每天都在发生"},{"kind":"p","text":"5、奥斯特罗姆《公共事务的治理之道》合作治理理论"},{"kind":"p","text":"一块没有界定产权的草地，任何一个理性的人都会在此放牧，这块草地很快就荒芜了，因此必须要形成一种牧民的合作机制，确保草地的可持续发展。牧民间形成的协议就是一种合作治理，产权就是这样产生的。"},{"kind":"p","text":"其实这是由科斯发现的。渔民出海为了保证安全，携带无线电，通过空气（公共资源）有家人保持联系，所有渔民都这样的话电波就会相互干扰，因此建立一个公共电台，这就是合作治理和产权界定，形成了一定的公共权力中心。"},{"kind":"p","text":"空气和草地等公共产品都被奥斯特罗姆称作Common pool，被翻译成公共池塘，现在被翻译成公共财，但最初的草地本身没有产权（财含有产权的意思），其实common pool是赌场中的赌池。最直接的翻译可以是公共池。"},{"kind":"p","text":"四、理性选择理论的缺陷"},{"kind":"p","text":"六、公共选择理论——弗吉尼亚学派：代表人物是布坎南和塔洛克。需求理论包括孔多塞循环、阿罗不可能定理和政策居中；供给理论包括寻租理论、官僚预算最大化和政府失败理论。"},{"kind":"p","text":"勒庞与奥尔森的集体行动理论差异，根本上来自方法论区别：勒庞主张社会整体论或有机体论，强调匿名性、责任消失和情感传染；奥尔森则持方法论个人主义，强调公共物品、搭便车和选择性激励。"}],"noteBlocksEn":[{"kind":"personal","text":"The notes describe rational choice as a theory of conflict resolution."},{"kind":"p","text":"Olson asks why people with common interests often fail to act together. Public goods are non-excludable, so rational egoists prefer to free-ride."},{"kind":"p","text":"Collective action becomes easier in small groups and where selective incentives reward contributors."},{"kind":"p","text":"NATO illustrates how small members can benefit from the large provider while contributing less."},{"kind":"p","text":"Community examples ask why building heads or pandemic group leaders participate when most residents remain indifferent. The answer is selective incentives, status, access, or concrete benefits."},{"kind":"p","text":"The lecture classifies collective action by the distribution of costs and benefits: dispersed-dispersed, concentrated-dispersed, concentrated-concentrated, and dispersed-concentrated."},{"kind":"personal","text":"The notes push back against treating collective-action dilemmas as universal. In real life, costs and benefits are rarely equal, so collective action happens constantly."},{"kind":"p","text":"Ostrom answers the tragedy of the commons. Herders using an open pasture can create rules for sustainable use. Agreements create cooperative governance and may define property rights."},{"kind":"p","text":"The notes connect this to Coase through fishermen using radio communication: shared airwaves can lead to a public station and a local authority."},{"kind":"p","text":"The translation of common pool is discussed. The notes prefer understanding it as a shared pool before property rights are fully defined."},{"kind":"p","text":"Public choice, associated with the Virginia School, is represented by Buchanan and Tullock. On the demand side it includes the Condorcet cycle, Arrow’s impossibility theorem, and policy convergence. On the supply side it includes rent seeking, bureaucratic budget maximization, and government failure."},{"kind":"p","text":"The difference between Le Bon and Olson comes from method. Le Bon uses a holistic or organic view of society, stressing anonymity, the loss of responsibility, and emotional contagion. Olson uses methodological individualism, stressing public goods, free riding, and selective incentives."}]},{"id":"politecon","x":-4.3,"y":8.5,"era":"1980s–","title":{"zh":"政治经济学","en":"Political Economy"},"tag":{"zh":"市场—制度互塑 · 经济学帝国主义","en":"market-institution co-constitution · economics imperialism"},"core":{"zh":["政治经济学研究政治与经济如何相互塑造。它既有古典政治经济学和马克思主义传统，也有凯恩斯以来的政府经济学、公共经济学、福利经济学，还有以理性选择为核心的美国政治经济学。它的基本假设是：经济活动离不开制度结构，政府不是市场外部的旁观者，而是最大、最重要的市场塑造者之一。","在美国政治学中，政治经济学之所以成为主流，一是因为美国社会的市民社会和市场关系特别强，政治关系常能被还原为利益与资源结构；二是因为经济学工具给政治学提供了标准化、形式化、可比较的研究语言。问题在于，它容易产生“经济学帝国主义”，把不能量化的权力、文化和伦理问题排除掉。","【课后补充】笔记还包括三条政治经济学旁支：发展经济学、依附论和世界体系理论弥补政治发展理论的不足；芝加哥自由主义以弗里德曼为代表，强调反政府干预和货币政策；“经济学帝国主义”则用成本收益和一般均衡去解释司法、腐败、生物行为和公共政策等领域。"],"en":["Political economy studies how politics and economics shape each other. It includes classical political economy and the Marxist tradition, Keynesian government economics, public economics, welfare economics, and American political economy centered on rational choice. Its basic assumption is that economic activity never exists outside institutional structure; government is not an outsider to markets but one of their largest and most consequential makers.","In American political science, political economy became dominant for two reasons. First, American civil society and market relations are strong, so political relations can often be translated into interests and resources. Second, economics gives political science a standardized, formal, comparable language. Its danger is “economics imperialism”: excluding power, culture, and ethics when they cannot be quantified.","Post-class supplement: The notes add three related strands. Development economics, dependency theory, and world-systems theory filled gaps left by political development theory. Chicago liberalism, represented by Friedman, stressed limits on government intervention and the priority of monetary policy. Economic imperialism uses cost-benefit analysis and general equilibrium to explain law, corruption, biological behavior, and public policy."]},"relation":{"zh":"它把理性选择、公共选择和制度主义经济学汇合起来，是后行为主义之后美国政治学的一条主干。","en":"It fuses rational choice, public choice, and new institutional economics, becoming one main trunk of post-behavioral American political science."},"works":{"zh":["Lindblom，《Politics and Markets》","Beard，《An Economic Interpretation of the Constitution》","Acemoglu 与 Robinson，《Why Nations Fail》","Friedman，《Capitalism and Freedom》","Wallerstein，《The Modern World-System》"],"en":["Lindblom, Politics and Markets","Beard, An Economic Interpretation of the Constitution","Acemoglu and Robinson, Why Nations Fail","Friedman, Capitalism and Freedom","Wallerstein, The Modern World-System"]},"strengths":{"zh":["适合研究福利、财政、铁路、能源、金融等政治经济高度融合领域。","方法标准化，便于比较和积累。"],"en":["Strong for welfare, fiscal policy, railways, energy, finance, and other fields where politics and economics fuse.","Standardized method supports comparison and accumulation."]},"limits":{"zh":["不适合解释原始部落、仪式、身份和强文化语境中的行为。","容易把人抽象成市民社会中的经济人。"],"en":["Poor at explaining tribal society, ritual, identity, and behavior in strong cultural contexts.","Easily abstracts people into economic actors of civil society."]},"personal":{"zh":["政治经济学不是把政治变成经济学，而是追问：市场本身依靠哪些政治前提、产权安排、财政能力和合法性秩序而存在。"],"en":["Political economy should not turn politics into economics. It should ask what political premises, property arrangements, fiscal capacities, and legitimacy orders make markets possible."]},"noteSection":"05 政治经济学","keywords":["政治经济学的缘起","市场活动与制度结构相互形塑","政治经济学成为主流","经济学帝国主义","局限"],"noteLimit":42,"noteBlocks":[{"kind":"p","text":"很多人说政治经济学实际上是在说理性选择理论，是一回事。"},{"kind":"p","text":"一、政治经济学的缘起"},{"kind":"p","text":"1、从亚当斯密到马克思、列宁的政治经济学"},{"kind":"personal","text":"传统经济学不太在意政府的作用，假设有一个高度均衡的市场"},{"kind":"p","text":"2、市场活动与制度结构相互形塑"},{"kind":"p","text":"传统自由主义认为政治不能干预经济，但政治经济学认为应该要更加关注制度的作用，所有的经济现象都是在制度背景下产生的行为，制度不仅仅是变量或是机会成本，而是影响人们行为的基本结构。例如取中位数和平均数的不同，平均数诱导人们说谎，而中位数则每个人都认为自己会成为中位数。政治经济学的对象就是政治生活的经济基础，和与政治相关的内容对经济的影响。"},{"kind":"p","text":"生活最基本的就是政治与经济的互动；没有统计就没有现代国家"},{"kind":"p","text":"政治经济学成为主流"},{"kind":"p","text":"政治经济学的重要性在于政府的重要职能是制定经济政策，但现在复旦没有任何学者研究政治经济学。复旦国政系刚建系的时候课程比较杂，很多经济学课程，但现在没有了。复旦政治学发展的短板就是政治经济学。"},{"kind":"p","text":"美国政治经济学的开山之作是亚当彼尔德的《美国宪法的经济分析》（《美国宪法的经济观》），书中认为美国宪法要从立法者的身份加以理解，以理解美国宪法的本质含义。美国的立国者的商人身份对联邦宪法起草的影响。很多立法者是债权人，所以美国宪法最关心的不是天赋人权，而是欠债还钱的原则。英国债务人的赖账是爆发美国独立战争的重要原因。从此之后，政治经济学逐渐成为美国政治学的主流，其两个主要原因在于："},{"kind":"p","text":"①政治经济学对美国的市民社会有解释力：美国的经济生活成为社会的中心，市民社会占主导，所以一切政治关系都可以还原为经济关系加以考察。自然状态和绝对个体的假说本身就是市民社会的产物，因此绝对个体不是起点而是逻辑的重点。政治经济学成为主流与美国的市民社会密切相关。"},{"kind":"p","text":"②帮助政治学的科学化：在方法论意义上，政治经济学的方法论是标准化、科学化的，这符合政治学对科学化的追求。"},{"kind":"p","text":"三、政治经济学的前景"},{"kind":"p","text":"“经济学帝国主义”"},{"kind":"p","text":"政治经济学的发展显示了经济学帝国主义，政治经济学体现了西方经济学的霸权，即用古典、新古典主义的研究方法来研究政治现象。一是成本收益分析，二是一般均衡论。用这两个方法，西方经济学可以研究一整套政治现象。"},{"kind":"p","text":"法学也不例外，波斯纳《正义的经济学》也是用成本收益分析、福利最大化来分析司法，以此判断审判是否公正。桑德尔的伦理学也有很多经济分析。经济学还可以解释很多非理性的人类现象，比如纹身和抽烟，贝克的《人类行为的经济分析》，这被认为是经济学帝国主义的鼻祖，抽烟的参照群体，纹身还是抽烟是社会博弈的结果：你身边两个人都在抽烟，你抽不抽烟？你身边的人都在腐败，你腐败不腐败？腐败就是纳什均衡；怎么去解释人的非理性行为？《“错误”的行为》，沉没成本"},{"kind":"p","text":"列维特的《魔鬼经济学》是继贝克后经济学帝国主义的著作，但成为了畅销书，列维特是美国经济学界最聪明的头脑，用经济学方法解决一切公共政策问题，只有第一卷和第二卷可读。纽约治安的改善不是因为零容忍政策，而是18岁人口的减少，这与18年前纽约州的堕胎法案有关。城市污染不是汽车造成的，汽车正是为了替代马车，减少焚烧马粪的污染。经济学帝国主义甚至开始插足生物学，用理性选择理论来研究生物进化。蜜蜂筑巢选址的星际穿越（找到落脚点还需要能够回程），必须计算体力，在体力范围内寻找落脚点。一次派出十几次蜜蜂，找到回来后辩论演说，蜂后判断决定或者蜂群投票。经济学者认为蜜蜂行为可以通过理性选择理论来分析。鲸鱼的家庭分工，爷爷奶奶在家照看小鲸鱼，爸爸妈妈出去觅食，理性选择理论的解释是所有的哺乳动物都有隔代不亲的问题，爸爸妈妈担心爷爷奶奶对小鲸鱼不好，觅食就三心二意，所以要爷爷奶奶通过绝经来断了念想。"},{"kind":"p","text":"经济学通过科学方法使得社会科学精准化、规范化，为衡量学术成果提供了一种客观衡量标准，不必看作者声望。但另一个角度，政治经济学有很强的排斥性（将所有的“不科学”一棍子打死），但其实政治学领域也有很多东西是不能用数字衡量的。"},{"kind":"p","text":"现在只要是研究政治、经济相关"},{"kind":"p","text":"政治经济学的局限："},{"kind":"p","text":"1、研究对象上，政治经济学只适合政治和经济高度融合的领域，比如福利分配，以及与经济制高点相关的研究。列宁认为国家控制经济的制高点（commanding point）是社会主义与资本主义（市场控制经济制高点）最大的不同，经济制高点包括铁路、能源、金融、矿产。所以政治经济学最得心应手的研究领域是铁路、能源等。比如研究京九线的决策以及之后的执行。"},{"kind":"p","text":"五、自由主义——芝加哥学派：代表人物是弗里德曼，主要观点是反对政府过度干预，认为货币政策比财政政策更符合市场原则。货币政策既能调控经济，也较少直接干预市场。"}],"noteBlocksEn":[{"kind":"p","text":"Political economy has several lineages: Adam Smith to Marx and Lenin, Keynes to public economics and welfare economics, and rational choice to public choice."},{"kind":"p","text":"Marxist political economy is treated as a critique of Western political economy. Lenin’s Imperialism is presented as basic for international political economy."},{"kind":"p","text":"Traditional economics often assumes a balanced market and neglects government. Political economy starts from the premise that economic interaction cannot be separated from government."},{"kind":"p","text":"Market activity and institutional structure shape each other. Institutions are not merely variables; they form behavior."},{"kind":"p","text":"The lecture presents political economy as one of Fudan political science’s weak points. Without fiscal, market, and institutional analysis, many political problems cannot be explained."},{"kind":"p","text":"Beard’s economic interpretation of the United States Constitution is treated as a founding work because it reads constitutional design through creditors, property, and commercial interests."},{"kind":"p","text":"Political economy becomes mainstream because it explains American civil society and helps political science become standardized and scientific."},{"kind":"p","text":"Economics imperialism means using cost-benefit analysis and general equilibrium to explain politics, law, ethics, and even biology."},{"kind":"personal","text":"Examples such as tattoos, smoking, corruption, bees, and whales are provocative illustrations of the reach of economic explanation, not settled biological claims."},{"kind":"p","text":"Political economy is strongest where politics and economics fuse: welfare, redistribution, railways, energy, finance, minerals, and the commanding heights."},{"kind":"p","text":"It is weaker for tribal societies or ritual life, where anthropology is often more appropriate."},{"kind":"p","text":"Chicago liberalism is represented by Milton Friedman. Its main claim is opposition to excessive government intervention and the view that monetary policy fits market principles better than fiscal policy. Monetary policy can regulate the economy while intervening less directly in markets."}]},{"id":"anthro","x":1.7,"y":7.0,"era":"1970s–","title":{"zh":"政治人类学","en":"Political Anthropology"},"tag":{"zh":"田野 · 权力显形 · 制度的文化含义","en":"fieldwork · visible power · cultural meaning of institutions"},"core":{"zh":["政治人类学不是只研究原始部落，而是用民族志方法研究权力在具体关系中的运行。它的前提是：权力并不只存在于国家机构，也弥散在日常交往、仪式、身体、空间、语言和分类体系中。权力平时可能是无形的，只有在实施时留下痕迹。","它与政治经济学不同。政治经济学问制度是否降低交易成本、提高效率；政治人类学问制度如何获得合法性、如何成为文化、如何塑造人的身份与偏好。因此一些无效率的制度也可能长期存在，因为它们已经成为社会认可的仪式和身份结构。","【课后补充】萧凤霞的华南民族志说明，国家正统话语并不只是自上而下压入地方。疍民为了获得承认会主动编造族谱、靠近国家分类；地方权贵也会利用同一套话语排斥疍民。帝国符号由此通过地方人的自我提升与身份竞争渗入边缘社会。"],"en":["Political anthropology does not only study primitive tribes; it uses ethnographic method to study how power operates in concrete relations. Its premise is that power is not only located in state institutions. It is diffused through everyday interaction, ritual, bodies, space, language, and classification. Power may be invisible in ordinary times, but it leaves traces when exercised.","It differs from political economy. Political economy asks whether institutions reduce transaction costs and increase efficiency. Political anthropology asks how institutions gain legitimacy, become culture, and shape identity and preference. Inefficient institutions may persist because they have become socially recognized rituals and identity structures.","Post-class supplement: Helen Siu’s South China ethnography shows that orthodox state discourse is not only imposed from above. The Tanka tried to gain recognition by reshaping genealogy and moving closer to state categories, while local elites used the same discourse to exclude them. Imperial symbols therefore entered frontier society through local self-advancement and status competition."]},"relation":{"zh":"它反对行为主义和政治经济学的抽象化，要求回到具体生活世界中看权力如何被人体验。","en":"It rejects the abstraction of behavioralism and political economy, returning to concrete lifeworlds to see how power is experienced."},"works":{"zh":["Geertz，《The Interpretation of Cultures》","Scott，《Weapons of the Weak》","Helen Siu 的华南民族志研究","萧凤霞，华南社会与国家正统话语研究"],"en":["Geertz, The Interpretation of Cultures","Scott, Weapons of the Weak","Helen Siu’s South China ethnography","Helen Siu, South China ethnography and orthodox state discourse"]},"strengths":{"zh":["能揭示制度背后的文化意义。","能研究不可量化的权力、身份和实践知识。"],"en":["Reveals the cultural meaning behind institutions.","Can study power, identity, and practical knowledge that are not quantifiable."]},"limits":{"zh":["可重复性与可检验性弱。","容易把描述性概念泛化成万用词。"],"en":["Weak replicability and testability.","Descriptive concepts can become all-purpose labels."]},"personal":{"zh":["政治人类学的价值不在于反科学，而在于提醒我们：很多政治事实在统计表里看不见，只能在具体场景、身体经验和语言细节中显形。"],"en":["Political anthropology is not anti-science. Its value is to remind us that many political facts are invisible in tables and become visible only in scenes, bodily experience, and linguistic detail."]},"noteSection":"06 政治人类学","keywords":["研究方法","理论前提","理论意义","权力是弥散","制度的文化含义"],"noteLimit":36,"noteBlocks":[{"kind":"p","text":"人类学很长时间被结构功能主义支配。回到田野里去"},{"kind":"p","text":"我们看到的现代政治形式实际上都是一种变形，原初的用人类学去发掘，异化使我们不得不从各种概念去看现象，直达现象本身（胡塞尔），受福柯影响很大，权力是弥散的、被遮蔽了"},{"kind":"p","text":"恩格斯《家庭、私有制与国家起源》人类学提出历史演进的基本动力：两性关系的演进"},{"kind":"p","text":"人类学和政治人类学最大的区别，政治学是由特定的议题规定的，经济学由其方法来规定（用了game theory就是经济学，研究国家就是政治学，用game theory研究国家就是政治经济学），关注原始的权力结构及其运作，而人类学关注的议题更加广泛。"},{"kind":"p","text":"1、研究方法"},{"kind":"p","text":"人类学方法，或者说是民族志研究。通过对原始部落或者族群的田野调查，去考察政治权力的发源、过程和表现形式。现代的政治已经是变体了，必须找到其最初的根源。用默顿的中层理论为田野调查找到直接的理论范畴，不能在大的民族国家的范围里做人类学，要在具体的村落或里弄（比如在香港的重庆大厦）中寻找直接的因果机制。"},{"kind":"personal","text":"早期人类学被诟病的一点就是套路太多，大量讨论新约旧约的文字，基本与讨论问题无关，但讨论这些代表人原始的对文本的理解；而现在人类学已经成为一种方法，做田野就可以被称为人类学；那么历史人类学？过去历史学靠的是文献，现在认为历史资料不仅是文献，去田野中找到的遗址或旧物也是。所有的人类学都是文化研究"},{"kind":"p","text":"2、理论前提"},{"kind":"p","text":"权力是弥散在具体的社会关系和人类行为之中的。权力不仅仅是一种强制力，权力还体现为一种文化。"},{"kind":"p","text":"福柯认为权力是无形的，但权力在实施过程中就会留下痕迹。因此要在权力在基层运行的过程中进行研究。权力在平常时期只是一种仪式（格尔兹），而权力从无形变为有形就是在你身上实施的时候，要抓住权力显形的时刻，并描述出来。中世纪的皇帝为了彰显自己的权力，就在罪犯身上留下酷刑的痕迹（而不是直接杀掉），以让其他的人看见权力，刑就是形，莫言的《檀香刑》。"},{"kind":"p","text":"人类学的方法关注的就是权力在基层实施中的显现，展现人类日常交往过程背后深刻的文化含义。权力不仅是政治学普遍认同的强制力特征，更体现为一种文化。文化是政治人类学中的核心概念，但在政治科学中文化只是一无是处的遁词。"},{"kind":"p","text":"3、理论意义"},{"kind":"p","text":"政治人类学打破了制度和文化概念之间的隔阂，强调制度的文化含义。政治人类学不注重研究制度的效用（政治经济学认为制度能够为行为提供稳定的预期），而认为制度的意义在于对合法性的追求。某种制度之所以被采纳是因为在特定的社会文化环境中得到了正面的评价和认可。"},{"kind":"personal","text":"制度经过运作之后就会内化，变成文化；没有效率的制度为何存在，居委会没干什么事而只是让人获得一定权力，人类学解释是因为居委会已经成为一种文化"},{"kind":"p","text":"人类学不是照相机，也不是昆虫学（没办法与昆虫共情，因此只能依靠自己的想象），这些都是浅描。何伟的《江城》就是一种与中国人共情的素描，军装和保安服饰很相似。潘毅的《中国女工》就是一种浅描，始终没有办法摆脱潜意识里的学者的眼光。《我的凉山兄弟》也只是介于厚薄之间，没有完全摆脱外来者的眼光。中国的人类学者喜欢探究本土文化，这样相对容易以文化持有者的眼光来看待该文化，但相应也难以学术地描述这一文化。而国外的人类学者喜欢理解异域文化。学术上也有歪风邪气用现代的理论去解释历史，比如用族群冲突理论解释宋辽之争。"},{"kind":"p","text":"地方性知识：行为背后的深层原因，社会事实并不是表面的，而是具有理论意义的（砍柴是为了健身）"},{"kind":"p","text":"地方性知识被誉为一种“后现代”理论，也就是现代理性思维的一种反叛。现代理性坚持普遍主义和宏大叙事。“地方性知识”就是所谓“求同存异”，要重新找回地方性的实践知识"},{"kind":"p","text":"四、萧凤霞的民族志研究：她解释汉民与疍民、民与盗贼这样的二元分类标签如何形成。疍民为了摆脱原有身份，会杜撰族谱以符合国家正统话语；地方权贵则利用同一套话语强化疍民标签并排斥疍民。帝国权威的隐喻不是只靠自上而下的法令渗透边疆，而是通过本地人自下而上的身份提升动力实现。"}],"noteBlocksEn":[{"kind":"p","text":"Political anthropology returns to fieldwork. Modern political forms are transformed; anthropology tries to find more original forms of power before modern concepts conceal them."},{"kind":"p","text":"The lecture links this impulse to Husserl and Foucault: return to phenomena themselves and notice that power is diffuse and hidden in everyday practice."},{"kind":"p","text":"Engels’s Origin of the Family, Private Property and the State is used as an early anthropological account of historical development through gender, family, property, and state."},{"kind":"p","text":"Political anthropology differs from general anthropology by its object: original power structures and their operation."},{"kind":"p","text":"Its method is ethnography. It studies power in tribes, villages, ethnic groups, alleys, or urban micro-spaces, using a middle-range unit where mechanisms can be seen."},{"kind":"personal","text":"The notes observe that anthropology has become a method: doing fieldwork often gives a study an anthropological orientation."},{"kind":"p","text":"Power is dispersed in concrete social relations and practices. It is not only coercion; it is also culture."},{"kind":"p","text":"Foucault’s point is rendered vividly: power is normally invisible, but punishment, torture, and bodily inscription make it visible."},{"kind":"p","text":"Political anthropology reveals the cultural meaning of institutions. Inefficient institutions may persist because they are internalized as culture and confer legitimacy."},{"kind":"personal","text":"Neighborhood committees are used as an example of an institution that may persist because it has become a cultural form of authority."},{"kind":"p","text":"Helen Siu’s ethnography explains how binary labels such as Han and Tanka, people and bandits, were formed. The Tanka tried to escape their old status by inventing genealogies that matched orthodox state discourse; local elites used the same discourse to reinforce the Tanka label and exclude them. The metaphor of imperial authority entered the frontier not only through top-down law, but through local people’s upward drive for recognition."}]},{"id":"geertz","x":0.8,"y":8.0,"era":"1973–1983","title":{"zh":"格尔兹：深描与地方性知识","en":"Geertz: Thick Description and Local Knowledge"},"tag":{"zh":"解释人类学 · 剧场国家","en":"interpretive anthropology · theatre state"},"core":{"zh":["格尔兹的“深描”是一种解释学态度。行为的意义不是由外部观察者直接读出，而是存在于行动者和接受者共享的意义世界中。人类学不能只是照相机式记录，也不能像昆虫学那样把对象当不可理解之物，而要解释文化符号如何被内部成员理解。","“地方性知识”反对现代社会科学的过度普遍主义。它要求重新理解地方实践的理性，而不是用一套抽象理论抹平差异。格尔兹的“剧场国家”还把国家理解为象征与仪式的秩序：国家不仅靠强制，也靠神话、建筑、典礼和审美距离塑造合法性。","【课后补充】格尔兹的“深描”来自赖尔对“眨眼”和“挤眼”的区分，核心不是材料越多越好，而是说明行动者共享的意义结构。巴厘“剧场国家”的重点也不是说国家只有象征，而是说明强制、资源和合法性可以通过仪式与审美秩序被组织起来。"],"en":["Geertz’s “thick description” is a hermeneutic attitude. The meaning of action is not directly read by an outside observer; it exists within a shared world of meaning between actor and audience. Anthropology cannot merely photograph behavior, nor treat its subjects like insects. It must explain how cultural symbols are understood by insiders.","“Local knowledge” resists excessive universalism in modern social science. It asks us to understand the rationality of local practice rather than flatten difference under abstract theory. Geertz’s “theatre state” also understands the state as an order of symbol and ritual: the state rules not only by coercion, but by myth, architecture, ceremony, and aesthetic distance.","Post-class supplement: Geertz’s thick description comes from Ryle’s distinction between a twitch and a wink. The point is not simply to have more material, but to explain the shared structure of meaning. The Balinese theatre state does not mean that the state is only symbol; it means that coercion, resources, and legitimacy can be organized through ritual and aesthetic order."]},"relation":{"zh":"格尔兹把政治学中的国家从“暴力机器”重新打开为合法性、象征和仪式问题。","en":"Geertz reopens the political concept of the state from a “violence machine” into a question of legitimacy, symbol, and ritual."},"works":{"zh":["《The Interpretation of Cultures》","《Local Knowledge》","《Negara》"],"en":["The Interpretation of Cultures","Local Knowledge","Negara"]},"strengths":{"zh":["使文化研究摆脱殖民式俯视。","为质性研究提出材料厚度和解释厚度标准。"],"en":["Helps cultural study escape colonial condescension.","Gives qualitative research a standard of material and interpretive thickness."]},"limits":{"zh":["共情与解释之间的边界不易把握。","象征解释可能弱化资源、强制和组织问题。"],"en":["The boundary between empathy and interpretation is hard to control.","Symbolic explanation can underplay resources, coercion, and organization."]},"personal":{"zh":["“厚描”作为中文再诠释有启发性，但学术上更稳妥的译名仍是“深描”；重点不是厚市场，而是赖尔式的意义区分和格尔兹的解释人类学。"],"en":["In English, Geertz’s standard term is “thick description.” In Chinese it is usually translated as “深描”. The note’s useful point is that strong qualitative work needs dense evidence and a fully worked interpretation, not a thin fit between theory and case."]},"noteSection":"06 政治人类学","keywords":["格尔兹","深描","地方性知识","巴厘剧场国家","剧场国家"],"noteLimit":34,"noteBlocks":[{"kind":"p","text":"权力是弥散在具体的社会关系和人类行为之中的。权力不仅仅是一种强制力，权力还体现为一种文化。"},{"kind":"p","text":"福柯认为权力是无形的，但权力在实施过程中就会留下痕迹。因此要在权力在基层运行的过程中进行研究。权力在平常时期只是一种仪式（格尔兹），而权力从无形变为有形就是在你身上实施的时候，要抓住权力显形的时刻，并描述出来。中世纪的皇帝为了彰显自己的权力，就在罪犯身上留下酷刑的痕迹（而不是直接杀掉），以让其他的人看见权力，刑就是形，莫言的《檀香刑》。"},{"kind":"p","text":"人类学的方法关注的就是权力在基层实施中的显现，展现人类日常交往过程背后深刻的文化含义。权力不仅是政治学普遍认同的强制力特征，更体现为一种文化。文化是政治人类学中的核心概念，但在政治科学中文化只是一无是处的遁词。"},{"kind":"p","text":"制度不仅仅是政治经济学认为的行为选择的变量或机会成本，政治人类学认为制度本身就塑造了个体的基本偏好和认同，个体能够通过对制度的不断演练而形成一种习惯和仪式感（最初可能是理性选择和成本收益分析，但后来渐渐成为无需思考的习惯），习惯一旦养成，就会慢慢形成对制度的认可。比如西方在演练了几百年的选举后已经不断强化了对选举文化的认可。政治人类学就是要挖掘制度的这种文化含义。再比如家庭制度，演练中形成对家庭制度的习惯和认可。"},{"kind":"p","text":"二、克利福德·格尔兹的“地方性知识”"},{"kind":"p","text":"列维·斯特劳斯等传统的人类学研究学者所经历的信任危机，其他人不可能再去马林·诺夫斯基调查的孤岛进行调查，质疑其研究的成果可能是造假的。巴利《小泥屋笔记》。而且这些人类学研究还有殖民主义的心态，即让原始部落维持现状。因此人类学在二战后面临重大的学术危机，在此之际格尔兹挺身而出。"},{"kind":"p","text":"格尔兹的很多代表作都与政治学有关，比如《旧社会与新国家》《商贩与王子》《尼加拉巴厘剧场国家》《文化的解释》《地方性知识》。"},{"kind":"p","text":"“深描”（thick description）：深描是一种解释学的态度。任何一个行为，要想有意义，前提条件就是“公共性”，也就是说，行为者和接受行为的人之间，存在对这种行为的意义的共同理解。人类学不是照相机，不是昆虫学，这些都是浅描，深描是要解释这种行为的意义（如眨眼）。对文化符号的研究，就成为“深描”的主要旨趣。"},{"kind":"p","text":"所谓深描也就是以“文化持有者的眼光”来看待地方文化，最好能钻到土著的脑中去理解其行为。格尔兹的勇气在于，他不是居高临下地去理解异域文化，而是承认自己的描述与被描述的对象一样，也是一个符号体系。"},{"kind":"p","text":"格尔兹最著名的就是深描理论。Thick theory不能翻译成深描，而应该翻译成厚描（素描-立体而真实），而传统人类学的浅描则是白描。理论研究要扎实（thick），而不能太单薄。这来自经济学理论的厚市场，厚市场就是交易量大而稳定，交易成本很低；而新兴市场的薄市场其交易量就很低且不稳定，交易成本很高。逻辑的周延和材料的详实是定性研究的厚理论的要求，比如米尔斯海默的《大国政治的悲剧》。薄理论的理论和案例则很容易是分离的，案例没有办法支撑理论。而量化研究则不讲究厚薄。"},{"kind":"p","text":"任何一个行为，要想有意义，前提条件就是“公共性”（共通、共感，common sense），即行为者和接受者之间存在对这种行为的意义的共同理解。比如“斗鸡”等赌博的文化含义，以高高在上的道德优越感加以评价只是一种浅描，必须要共情地理解其行为。"},{"kind":"p","text":"人类学不是照相机，也不是昆虫学（没办法与昆虫共情，因此只能依靠自己的想象），这些都是浅描。何伟的《江城》就是一种与中国人共情的素描，军装和保安服饰很相似。潘毅的《中国女工》就是一种浅描，始终没有办法摆脱潜意识里的学者的眼光。《我的凉山兄弟》也只是介于厚薄之间，没有完全摆脱外来者的眼光。中国的人类学者喜欢探究本土文化，这样相对容易以文化持有者的眼光来看待该文化，但相应也难以学术地描述这一文化。而国外的人类学者喜欢理解异域文化。学术上也有歪风邪气用现代的理论去解释历史，比如用族群冲突理论解释宋辽之争。"},{"kind":"p","text":"地方性知识：行为背后的深层原因，社会事实并不是表面的，而是具有理论意义的（砍柴是为了健身）"},{"kind":"p","text":"地方性知识被誉为一种“后现代”理论，也就是现代理性思维的一种反叛。现代理性坚持普遍主义和宏大叙事。“地方性知识”就是所谓“求同存异”，要重新找回地方性的实践知识"},{"kind":"p","text":"真正意义上的“地方”"},{"kind":"p","text":"地方性知识就是要寻找异质性。全球化的程度越高，地方性的需求就越大（贝克《风险社会》），因此地方性是对现代性的反叛。"},{"kind":"p","text":"巴厘剧场国家"},{"kind":"p","text":"格尔兹的国家完全不同于历史社会学的国家，格尔兹批评了历史社会学的国家概念，他认为国家不仅是个暴力机器，也是一个合法性的象征。马克思在德意志意识形态中所说的《虚幻的共同体》与这里有异曲同工之妙。国家像是一个“剧场”，国家机构建在山上，百姓的聚落则在山下，民众仰视国家，国家权力中心远离民众的喧嚣以保持权力的威严，这也因此产生了福柯的问题（用刑罚使权力留下痕迹）。国家远离民众，因此不会轻易干涉民众生活，也因此演化成了一种象征。这种象征的竞争不是暴力的，而是一种竞争性夸耀。比如强化奢靡的建筑、典礼等。因此领土就变成了风俗共同体，国家庆典成为国家活动的中心，国家仪式的奢侈性成为国王权威的衡量标准。古代帝王越接近意象化权力，越类似一种符号，成为一种合法性象征，而远离了实际控制权力的机制。政治的特征是神话、仪式、象征、静态秩序，而不是传统理解的权力运作机制。"},{"kind":"p","text":"格尔兹通过对尼加拉的研究，发现这里的国家是一个“剧场国家”，也就是说，国家不完全是一个暴力机器，也是一种象征。国家的意义不仅仅在于强制，也是一种合法性。国家的力量，体现在其典范意义上，国家通过神话、仪式、典礼、艺术和建筑，而塑造出一种权威。古代巴厘的“权力斗争”也被转换为一种竞争性夸耀不断扩张的过程。于是，领土变成了风俗共同体，国家庆典成为国家活动的中心，国家仪式的奢侈性成为国王权威的衡量标准。"},{"kind":"p","text":"愈向底层，就愈是实务性的，愈是向上，就愈趋于审美性，愈趋于“精致”。一个人愈是接近意象化权力，他也就愈使自己远离了实际控制权力的机制。"},{"kind":"p","text":"这样，格尔兹就对政治做了这样一个定义：这种政治是在一种从神话、仪式和政治幻梦的普泛化象征世界中浮现出来的静态秩序的惯制之中运行的。"},{"kind":"p","text":"三、詹姆斯·斯科特的三部曲"}],"noteBlocksEn":[{"kind":"p","text":"Geertz appears after the postwar crisis of traditional anthropology, where fieldwork was hard to verify and often carried colonial assumptions."},{"kind":"p","text":"His works important for politics include The Interpretation of Cultures, Local Knowledge, Old Societies and New States, Peddlers and Princes, and Negara."},{"kind":"p","text":"Thick description is interpretive. A gesture becomes meaningful only when actor and audience share a public understanding."},{"kind":"p","text":"Anthropology is not photography or insect-collecting. It must interpret what a wink, cockfight, or ritual means within a symbol system."},{"kind":"p","text":"Geertz treats his own description as a symbol system rather than a view from nowhere."},{"kind":"p","text":"The lecture adds that good qualitative theory needs thickness: logical completeness and rich material. Thin theory separates theory from case."},{"kind":"p","text":"Local knowledge means the deep practical reasons behind behavior. A person cutting wood may be exercising, not merely producing fuel."},{"kind":"p","text":"Local knowledge is a critique of universal reason and grand narrative. Globalization intensifies the demand for locality."},{"kind":"p","text":"In Negara, the state is not only a violence machine; it is also a symbol of legitimacy produced through ritual, ceremony, architecture, art, and myth."},{"kind":"p","text":"The higher one moves in the political order, the more aesthetic power becomes; the lower one moves, the more practical it becomes."}]},{"id":"scott","x":2.6,"y":8.2,"era":"1976–1998","title":{"zh":"斯科特：道义经济与国家的视角","en":"Scott: Moral Economy and Seeing Like a State"},"tag":{"zh":"安全原则 · 日常反抗 · 明晰性","en":"safety first · everyday resistance · legibility"},"core":{"zh":["斯科特从农民政治出发，反对把农民直接理解为资产者式的理性经济人。《农民的道义经济学》强调安全原则：农民首先问的是“我还能留下多少”，而不是“我最多能赚多少”。当生存伦理和庇护关系被破坏，反抗才更可能爆发。","《弱者的武器》把政治反抗从大规模起义转向日常实践：怠工、偷懒、装傻、偷漏税、谣言都可能是弱者消耗统治资源的方式。《支配与反抗的艺术》进一步提出公开文本与隐蔽文本。《国家的视角》则批判现代国家追求标准化、明晰性和极端现代主义，破坏地方实践知识。","【课后补充】斯科特早期《比较政治腐败》批判文化决定论，认为腐败需要放在政治发展、社会凝聚力、法治和历史阶段中解释。波普金《理性的小农》则与斯科特形成经典争论：农民未必抵制市场，有时是被村庄领袖或地主阻隔在市场之外。"],"en":["Scott begins from peasant politics and resists treating peasants as bourgeois rational economic actors. The Moral Economy of the Peasant emphasizes “safety first”: peasants ask first “how much can I keep,” not “how much can I gain.” Revolt becomes more likely when subsistence ethics and patronage relations are violated.","Weapons of the Weak shifts resistance from large uprisings to everyday practice: foot-dragging, feigned ignorance, theft, tax evasion, and rumor can all drain ruling resources. Domination and the Arts of Resistance develops the distinction between public and hidden transcripts. Seeing Like a State criticizes the modern state’s pursuit of standardization, legibility, and high modernism, which destroys local practical knowledge.","Post-class supplement: Scott’s early Comparative Political Corruption criticizes cultural determinism. It explains corruption through political development, social cohesion, law, and historical stage. Popkin’s Rational Peasant forms the classic debate with Scott: peasants do not always resist the market; sometimes village leaders or landlords block them from market access."]},"relation":{"zh":"斯科特是质性研究反抗理性选择霸权的重要象征，也与波普金《理性的小农》构成经典争论。","en":"Scott became a major symbol of qualitative research resisting rational-choice dominance, and stands in classic debate with Popkin’s Rational Peasant."},"works":{"zh":["《The Moral Economy of the Peasant》","《Weapons of the Weak》","《Domination and the Arts of Resistance》","《Seeing Like a State》"],"en":["The Moral Economy of the Peasant","Weapons of the Weak","Domination and the Arts of Resistance","Seeing Like a State"]},"strengths":{"zh":["把抵抗从公开革命扩展到日常生活。","揭示国家标准化背后的权力。"],"en":["Extends resistance from public revolution to everyday life.","Reveals the power behind state standardization."]},"limits":{"zh":["“弱者的武器”描述力强，分析力有限。","概念容易被泛化到任何弱者身份。"],"en":["“Weapons of the weak” is descriptively strong but analytically limited.","The concept can be generalized into any weak identity."]},"personal":{"zh":["斯科特的四本书应分开读：《道义经济学》的田野是缅甸与越南，《弱者的武器》的田野才是马来西亚。把它们混在一起，会误解他从生存伦理到日常反抗的理论推进。"],"en":["Scott’s books should be separated: The Moral Economy of the Peasant draws on Burma and Vietnam, while Weapons of the Weak is based on Malaysian fieldwork. Mixing them obscures his move from subsistence ethics to everyday resistance."]},"noteSection":"06 政治人类学","keywords":["詹姆斯·斯科特","农民的道义经济学","弱者的武器","支配与反抗的艺术","国家的视角"],"noteLimit":42,"noteBlocks":[{"kind":"p","text":"这样，格尔兹就对政治做了这样一个定义：这种政治是在一种从神话、仪式和政治幻梦的普泛化象征世界中浮现出来的静态秩序的惯制之中运行的。"},{"kind":"p","text":"三、詹姆斯·斯科特的三部曲"},{"kind":"p","text":"耶鲁大学政治系和人类学系教授，斯科特做的是人类学研究，但自认为是个政治学者。美国政治学发展史上质性研究对理性选择的反抗，两个核心人物是米尔斯海默和戴维米勒，对理性选择学派的公开信，他们的目的是让斯科特做美国政治学会的主席，其实斯科特没有参与这个活动。近期斯科特承认自己在马来西亚做田野调查时将马来西亚左派人士的名单交给了中情局，但斯科特并不以此为耻。"},{"kind":"p","text":"斯科特的成名作是《比较政治腐败》，其主要内容是批判文化决定论（人类学恰恰主张文化决定论），这与他后期的人类学研究是完全不同的。他主要批判了以下观点：泰国腐败比英国腐败严重是因为泰国文化上是助长腐败的，欧洲在绝对主义国家时期是非常腐败的，美国在进步主义时代是世界上最腐败的国家，因此腐败研究要进行历时性分析，欧洲比第三世界腐败更少是因为处于不同的政治发展阶段，腐败是因为缺少政治凝聚力（“腐败的政治机器”产生于社会凝聚力的匮乏，越没有凝聚力就越没有安全感、人就用金钱和人际网络寻求社会保护，它们就成了法律的替代品），并不是说绝对的权力绝对地导致腐败，垄断权力往往更清廉，放开权力与市场结合则更可能腐败。一个有强凝聚力的社会的腐败可能性很小，缺少凝聚力的团体成员更可能中饱私囊，构筑腐败的人际关系网络加强自己的安全感和庇护以替代法律，因此法治可以抑制腐败，健全法律才能给人提供安全感（这与法学理论的逻辑是不同的），另外经济的发展也可以遏制腐败，生活水平的提高使得用钱购买效忠的代价越来越大，有能力行贿的人将大量减少，没有行贿能力的人则有动力去遏制有能力行贿的人的行贿行为。"},{"kind":"p","text":"1、《农民的道义经济学》（马来西亚的农民）"},{"kind":"p","text":"Moral economic不是传统的成本收益分析（做成本收益分析的市民，利益最大化也是风险最大化，这是投资者的心态），农民不完全是理性的经济人、不是资产阶级意义上的经纪人，农民不会仅仅因为贫困而反抗，一般都会选择忍气吞声，只有在他的道义受到侵犯时才会忍无可忍地反抗。农民的生存策略和理性的资产者的策略是不同的，理性的资产者是风险原则，问的是我能得到多少；农民则是安全原则，只问我还留下多少。农民的底线是生存，只要他觉得还能继续生存，不管被抢夺了多少，都不会反抗，因为反抗的生命风险是很大的。"},{"kind":"p","text":"真正建立了一套理论诠释的模式"},{"kind":"p","text":"2、《弱者的武器》（各地的农民）"},{"kind":"p","text":"斯科特指出，农民不搞大规模、公开的反抗，并不意味着农民不反抗，农民采取的是一种“日常反抗”，这种“日常反抗”就是“弱者的武器”。为了保护自己，弱者通常会采取一种隐蔽的、间接的方式来进行反抗，比如怠工、偷懒、撒谎、偷税漏税等，他们会考虑如何最大限度地违反规则但又不至于遭到惩罚。这种微妙的抗争有效地消耗了统治者的资源。"},{"kind":"p","text":"大规模的反抗会招致大规模的镇压，因此农民的反抗是一种日常反抗，微妙的抗争以消耗统治者的资源。抗争是弥散而无处不在的，反抗的形式是多样化的。但正是因为“弱者的武器”这个概念是描述性而非分析性的，因此得到了很多质性研究学者的反对。（对比“路径依赖”，能建立一套方法论）社会资本就是典型的分析性概念，有横向纵向社会资本、结构洞等理论衍生，而弱者的武器只是一种现象描述，而不是一种方法，而且变成了什么都能装的“框”，不能提供新的知识反而会制造新的混乱。后来者不能在此基础上产生新的学术价值。"},{"kind":"p","text":"中国社会抗争研究曾经大量使用“弱者的武器”，但不是日常化抗争实践，而是作为“弱者”的身份、象征"},{"kind":"p","text":"做QCA定性比较分析最多是社会抗争研究（某事件的最大公约数是什么）；比如：斯诺，资源动员理论，爆发社会运动需要在城市中；农民没有资源因而不能抗争，只能采用“弱者的武器”，因而计时工资与计件工资相比给了工人更多自由"},{"kind":"p","text":"3、《支配与反抗的艺术》（各地的各种人）"},{"kind":"p","text":"统治者未必相信对自己权力合法性的“公开文本”，只是将其工具化使用。被统治者也只是为了保护自己而在表面上相信“公开文本”，比如依法抗争，统治者塑造的理想的意识形态和真实状态之间的张力就是反抗的来源，因此被统治者会创造出一套“隐蔽文本”，以笑话、歌谣、切口的形式出现。当权者不知道这些黑话的含义，但无权者可以心领神会。"},{"kind":"p","text":"斯科特将“弱者的武器”中的“日常反抗”延伸到了“各地的各种人”，并且比较集中地提出了“公开文本”和“隐蔽文本”的概念。所谓“公开文本”，就是指统治者对自己的权力合法性的公开解释。统治者可能不相信这种话语，但是表面上却要维护之，这就为反抗创造了机会。被统治者表面上相信这套公开文本，因为这样比较安全，同时他们也会利用公开文本去实现自己的利益。相对于“公开文本”，无权者会创造出一套“隐蔽文本”来，以笑话、歌谣、切口的形式出现，当权者不会知道其意思，但是无权者可以心领神会。这种文本通常是隐蔽的，但是在政治骚动中可以突发出来，成为流通的话语。也就是说，无权者也拥有自己的斗争资源。"},{"kind":"p","text":"4、《国家的视角》"},{"kind":"p","text":"现代国家是追求标准化和明晰性的宏大叙事的，这就会破坏了地方的实践知识，这就是极端现代主义。我们日常生活中的很多知识都渗透着国家权力，我们忽略了其中的技术理性的统治特征，比如百家姓意味着编户齐名的统一管理，棋盘式的城市规划。学者的使命就在于挖掘这些地方性实践，在大街小巷去做田野调查。比如《长乐路》《虹镇老街》还有上海的火车站旁边的弄堂。"},{"kind":"p","text":"现代国家追求“明晰性”，创造出一套标准化的理性体系，对社会进行改造，破坏了地方的实践知识。国家往往是提出宏大的改善人的生活的计划，到头来却走向失败，从根本上破坏了人们的美好生活。斯科特将其概括为“极端现代主义”作祟。"},{"kind":"p","text":"隐藏在我们日常生活中的许多知识，其实背后都渗透着国家权力，它是如此隐蔽以至于我们都忽略了其中的统治特征，如百家姓、城市规划、公共卫生等。所以我们要从国家的视角去看，才能发现权力的存在。这是一场国家与社会在社会知识中的权力角逐。国家力图去破坏地方的实践知识，代之以国家的现代科学知识。"},{"kind":"p","text":"中国建国后统一使用公制，就是一种理性化改造；自然生长的规则、城市（斯科特推崇有些似乎毫无规划、很乱的城市，自然生长的城市，这样的城市不是现代军队能开进的）"}],"noteBlocksEn":[{"kind":"p","text":"Scott is presented as both political scientist and anthropologist, and as a symbol of qualitative resistance to rational choice dominance."},{"kind":"p","text":"His early work on comparative corruption criticizes cultural determinism. Corruption should be explained historically through development, social cohesion, legal protection, and security needs."},{"kind":"p","text":"The Moral Economy of the Peasant argues that peasants rebel when their moral economy is violated. They follow a safety-first principle: the question is how much remains for survival."},{"kind":"p","text":"Popkin’s Rational Peasant debates Scott by arguing that peasants may seek entry into the market rather than resistance to it."},{"kind":"p","text":"Weapons of the Weak shifts attention from rebellion to everyday resistance: foot-dragging, small theft, evasion, lying, and calculated rule-breaking."},{"kind":"personal","text":"The notes criticize “weapons of the weak” as descriptive rather than analytical, especially in some Chinese contention studies."},{"kind":"p","text":"Domination and the Arts of Resistance generalizes the idea through public transcripts and hidden transcripts."},{"kind":"p","text":"Seeing Like a State criticizes high modernism: the modern state seeks legibility, standardization, measurement, and simplification, often destroying local knowledge."},{"kind":"p","text":"Examples include surnames, urban planning, public health, metric standardization, and naturally grown cities."},{"kind":"p","text":"Helen Siu’s ethnography shows local groups using imperial symbols and orthodox discourse to gain recognition from below."}]},{"id":"histsoc","x":4.1,"y":6.9,"era":"1960s–","title":{"zh":"比较历史社会学","en":"Comparative Historical Sociology"},"tag":{"zh":"长时段 · 社会结构 · 国家形成","en":"long duration · social structure · state formation"},"core":{"zh":["比较历史社会学用社会结构解释政治行为，并用历史比较解释为什么某一结果发生在特定时间和地点。它的理论渊源包括马克思、托克维尔、韦伯和涂尔干。与行为主义不同，它不追求大样本测量，而是通过少数案例的历史比较来解释资本主义、革命、民主、国家形成等大问题。","它既接近历史学，也接近政治学。历史学者常批评它使用二手史料太多；政治学者重视它，是因为它把国家、战争、阶级、财政和社会结构重新带回政治解释。","【课后补充】笔记还把亨廷顿、福山、米格达尔纳入历史比较谱系：亨廷顿在行为主义盛行时坚持历史比较并强调政治秩序；福山从“历史终结”转向国家建设；米格达尔以“强社会、弱国家”解释国家能力。反思性历史社会学（埃利亚斯、沃格林、Szakolczai）则强调阈限、文明进程和价值体系崩塌后的反思。"],"en":["Comparative historical sociology explains political behavior through social structure and uses historical comparison to explain why an outcome occurred at a particular time and place. Its sources include Marx, Tocqueville, Weber, and Durkheim. Unlike behavioralism, it does not seek large-N measurement. It explains big questions such as capitalism, revolution, democracy, and state formation through historical comparison among a small number of cases.","It is close to both history and political science. Historians often criticize it for relying too much on secondary sources. Political scientists value it because it brings the state, war, class, fiscal capacity, and social structure back into political explanation.","Post-class supplement: The notes also place Huntington, Fukuyama, and Migdal in the historical-comparative line. Huntington kept using historical comparison during the behavioral age and stressed political order. Fukuyama moved from the end of history to state-building. Migdal used strong societies and weak states to explain state capacity. Reflexive historical sociology (Elias, Voegelin, Szakolczai) stresses liminality, civilizing processes, and reflection after a value order breaks down."]},"relation":{"zh":"它是新制度主义和找回国家学派的重要来源。","en":"It is a major source for new institutionalism and the “bringing the state back in” school."},"works":{"zh":["Moore，《Social Origins of Dictatorship and Democracy》","Tilly，《Coercion, Capital, and European States》","Skocpol，《States and Social Revolutions》","Huntington，《Political Order in Changing Societies》","Fukuyama，《State-Building》","Migdal，《Strong Societies and Weak States》"],"en":["Moore, Social Origins of Dictatorship and Democracy","Tilly, Coercion, Capital, and European States","Skocpol, States and Social Revolutions","Huntington, Political Order in Changing Societies","Fukuyama, State-Building","Migdal, Strong Societies and Weak States"]},"strengths":{"zh":["能处理政治学中的大问题。","重视时间、结构和因果机制。"],"en":["Can address the large questions of political science.","Takes time, structure, and causal mechanism seriously."]},"limits":{"zh":["史料质量和案例选择容易受质疑。","决定论倾向较强。"],"en":["Source quality and case selection are often contested.","Often leans toward determinism."]},"personal":{"zh":["历史比较研究的关键不是把历史材料堆在一起，而是找到真正改变路径的时间点、事件次序和机制交叉点。"],"en":["The key to historical comparison is not piling up historical material, but finding the timing, sequence, and intersection of mechanisms that change a path."]},"noteSection":"07 比较历史社会学","keywords":["比较历史社会学","理论渊源","理论特征","巴林顿·摩尔学派","历史比较"],"noteLimit":34,"noteBlocks":[{"kind":"p","text":"07 比较历史社会学"},{"kind":"p","text":"一、比较历史社会学的兴起"},{"kind":"p","text":"社会学、经济学、历史学所共享的；历史学有能力编辑碎片化资料"},{"kind":"p","text":"但这些历史社会学的学者是不被历史学者所承认的，因为觉得历史社会学所用史料的质量是不合格的。这并不是歧视，而是事实，很多历史社会学都是二手或者三手的资料，比如拉克曼。人大提出的历史政治学等类似概念需要慎用，其实是学术界不太合法的概念，从学理上和逻辑上都讲不通。吴成明（中国经济史学者）对量化史学提出了非常中肯的批评，希克斯《经济史理论》。"},{"kind":"p","text":"历史社会学认为一切历史都是当代史，历史社会学得出的结论在当下也可以得到检验。解释路径是用社会结构来解释政治行为，将确定的行为和结果回溯、还原到社会结构之中。还可以采用历史比较来解释时空问题。资本主义为什么只发生在欧洲？这种比较比研究当下的传统社会学更加可靠。"},{"kind":"p","text":"但历史社会学并没有真正影响到社会学，因为历史社会学很多时候讨论的都是政治问题，以民族国家的产生为重点研究对象，因此变成了政治学问题，政治学学者也因此对此投入了较大关注。"},{"kind":"p","text":"1、理论渊源：马克思、托克维尔、马克斯·韦伯、涂尔干等（Tilly将马克思韦伯冲突社会学与涂尔干团结社会学糅合在一起）"},{"kind":"p","text":"2、理论特征："},{"kind":"p","text":"让社会学找回历史，相信当下的行动取决于某个历史上的社会结构"},{"kind":"p","text":"一种解释路径：用社会结构解释政治行为（制度）；通过历史比较解释时空问题（即为什么在特定时间、特定地点发生，在别的地方没有发生）"},{"kind":"p","text":"二、巴林顿·摩尔学派"},{"kind":"p","text":"1、代表人物"},{"kind":"p","text":"从经济史研究延伸到自然史、环境史、灾难史等"},{"kind":"p","text":"四、历史比较：亨廷顿、福山与米格达尔"},{"kind":"p","text":"亨廷顿在行为主义政治学大行其道时，坚持用历史比较的研究方法。《变动社会中的政治秩序》。"},{"kind":"p","text":"强调历史比较，第三波和变动社会的政治秩序很典型"},{"kind":"p","text":"严重的保守主义和权威主义倾向，福山在《十字路口的美国》中描述的新保守主义的乔治城学派，并宣告对新保守主义告别，转向国家建设研究；亨廷顿《文明的冲突》凸显了保守主义倾向；在变动中强调国家权威的作用，被打上新权威主义的烙印，之后在第三波、文明冲突则转变为新保守主义（异质化），福山在《终结》延续了新保守主义（终结到民主制）。"},{"kind":"p","text":"五、反思性历史社会学：Szakolczai 的反思性历史社会学、埃利亚斯《文明的进程》和沃格林《政治学的新科学》都强调，当既有价值体系或生活世界遭遇阈限与崩塌时，人们才会反思自身社会，并产生新的符号和理论。"}],"noteBlocksEn":[{"kind":"p","text":"Comparative historical sociology is shared by sociology, economics, and history, but it is often closer to history than to predictive social science."},{"kind":"p","text":"It adds explanation to older historical work, though historians often criticize its use of secondary and third-hand materials."},{"kind":"p","text":"Its premise is that historical conclusions illuminate present structures. It traces outcomes back to social structures."},{"kind":"p","text":"The explanatory path is to use social structure to explain political behavior or institutions, and to compare why an event occurs in one time and place rather than another."},{"kind":"p","text":"The rise of capitalism in Europe is a model problem for historical comparison."},{"kind":"p","text":"Because much of this work studies state formation, revolution, war, and state power, it becomes a political science problem."},{"kind":"p","text":"The theoretical sources are Marx, Tocqueville, Weber, and Durkheim. Tilly is read as combining conflict sociology and solidarity sociology."},{"kind":"p","text":"Major figures include Moore, Skocpol, Tilly, Goldstone, Goodwin, Lachmann, and Gorski."},{"kind":"personal","text":"The notes treat labels such as historical politics as academically contested rather than self-evident."},{"kind":"p","text":"Reflexive historical sociology includes Szakolczai, Elias’s The Civilizing Process, and Voegelin’s The New Science of Politics. It stresses that when a value order or life-world meets a liminal crisis and breaks down, people begin to reflect on their society and produce new symbols and theories."}]},{"id":"moore","x":5.4,"y":7.7,"era":"1966","title":{"zh":"巴林顿·摩尔","en":"Barrington Moore"},"tag":{"zh":"农业商品化 · 阶级结盟","en":"commercial agriculture · class coalitions"},"core":{"zh":["摩尔用比较历史方法解释民主、法西斯和共产主义道路。他把农业商品化和阶级结盟当作关键机制：地主是否变成资本家，农民是否变成工人，资产阶级、地主、农民和国家如何结盟，会影响现代政治道路。","他的经典命题是“没有资产阶级，就没有民主”。后来的批评指出，资产阶级并不总是民主动力，很多时候工人和下层社会动员才推动民主，资产阶级常常保守或骑墙。中国案例也有争议，因为中国农业商品化程度并不低。","【课后补充】摩尔的比较策略接近密尔的求同法和求异法：以英国经验列出政治、经济、社会、阶级结盟和革命等变量，再比较其他国家。它的长处是把机制图式化；弱点是容易把复杂史料压进预设框架。佩里·安德森关于绝对主义国家的研究也属于这一历史社会学谱系，它把绝对主义国家理解为重新部署的封建统治机器，而不是资产阶级战胜贵族的直接工具。"],"en":["Moore used comparative history to explain democratic, fascist, and communist paths. He treated agricultural commercialization and class coalition as key mechanisms: whether landlords become capitalists, whether peasants become workers, and how bourgeoisie, landlords, peasants, and state ally affect modern political paths.","His classic claim is “no bourgeoisie, no democracy.” Later critics argue that the bourgeoisie is not always the democratic force; workers and lower-class mobilization often push democratization, while bourgeois actors can be conservative or ambivalent. The China case is also disputed because Chinese agriculture was not simply non-commercialized.","Post-class supplement: Moore’s comparative strategy is close to Mill’s methods of agreement and difference. It starts from the English case, lists political, economic, social, class-alliance, and revolutionary variables, and then compares other countries. Its strength is to make mechanisms visible; its weakness is that complex history can be pressed into a preset grid. Perry Anderson’s work on the absolutist state also belongs to this historical-sociological line. It treats absolutism as a redeployed feudal ruling machine, not as a direct instrument of bourgeois victory over the nobility."]},"relation":{"zh":"摩尔开创了“少数大案例 + 历史比较 + 机制归纳”的社会科学写法。","en":"Moore pioneered the style of “few large cases + historical comparison + mechanism induction.”"},"works":{"zh":["《Social Origins of Dictatorship and Democracy》","Perry Anderson，《Lineages of the Absolutist State》"],"en":["Social Origins of Dictatorship and Democracy","Perry Anderson, Lineages of the Absolutist State"]},"strengths":{"zh":["把经济结构、阶级关系和政治制度连接起来。","建立比较历史社会学的经典模板。"],"en":["Connects economic structure, class relations, and political regime.","Established the classic template for comparative historical sociology."]},"limits":{"zh":["阶级解释容易过度简化。","中国、日本等案例的历史判断争议较大。"],"en":["Class explanation can over-simplify.","The historical judgment of cases such as China and Japan is disputed."]},"personal":{"zh":["与其问“为什么中国没有走向资本主义”，不如问摩尔的农业商品化变量是否足以解释政治后果。若中国商品化很高却未走向相同道路，变量就需要被重构。"],"en":["Rather than ask why China did not develop capitalism, ask whether Moore’s commercialization variable can actually explain political outcomes. If China was highly commercialized yet took a different path, the variable must be reconstructed."]},"noteSection":"07 比较历史社会学","keywords":["民主与专制的社会起源","农业商品化","阶级结盟","中国的案例"],"noteLimit":30,"noteBlocks":[{"kind":"p","text":"格德斯通父母曾在二战时被上海犹太难民救助馆收留过，因此格德斯通在《为什么是欧洲》中对早期中国有溢美之词。目前历史社会学的领军人物是戈尔斯基"},{"kind":"p","text":"2、《民主与专制的社会起源》"},{"kind":"p","text":"巴林顿·摩尔自费在哈佛教书。用的是约翰·密尔的研究方法，寻找最小公倍数。社会转型的五种解释因素（纵向）：政治因素、经济因素、社会因素、机制问题（结盟会阻碍变迁）、爆发革命。这五个因素是从英国的经历中总结出来的，再看其它六个国家具备哪些要素。发现革命和农业商品化相对应，而其它因素都不重要。"},{"kind":"p","text":"决定性条件：农业商品化"},{"kind":"p","text":"英法：农业商品化→地主变成资本家，农民变成工人→民主化"},{"kind":"p","text":"德日：农业半商品化→地主变成资本家，农民还是农民→法西斯主义（资本家抛弃道义经济那一套而压榨剩余价值，为了镇压反抗的农民，走向法西斯主义）"},{"kind":"p","text":"①典型的马克思主义分析方法，经济基础决定上层建筑"},{"kind":"p","text":"②经济和阶级的角度入手之后，摩尔提出了一个机制，即阶级结盟的问题。地主、资本阶级、农民、工人、中产阶级等阶级结盟的不同结果。后来者都对此提出了批评，摩尔认为资产阶级是民主的动力，但后来者都批判说工人才是民主化的动力，资产阶级一般是保守的而最多是骑墙派。"},{"kind":"p","text":"但摩尔理论最大的问题是中国的案例，摩尔认为中国没有农业商品化，而实际上中国的农业商品化程度非常高，中国很多土地是用来种植经济作物、进行商品交换的，最大的经济作物就是甘蔗"},{"kind":"p","text":"决定民主和专制的不是农业商品化，而是国家进入现代化之前有没有一套完整的宪制"},{"kind":"p","text":"2、蒂利：资本集中与强制集中《强制、资本与欧洲国家》《欧洲的抗争与民主》"},{"kind":"p","text":"但在寻找资料的时候，珥特曼发现英国（官僚制代表）和波兰（世袭制代表）都不符合这个假设。因此提出了一个新的变量，认为议会产生的时间会影响官僚制的产生，但这个解释很牵强。"},{"kind":"p","text":"不过珥特曼的理论是用政治因素来解释政治变迁，在此之前都是用经济因素（农业商品化等）的角度来解释政治变迁的，把国家这个独立的变量细化到议会这一政治机构上，所以在学术史上青史留名。"},{"kind":"p","text":"5、布莱恩·唐宁：《军事变革与政治变迁》"},{"kind":"p","text":"写完这本书之后唐宁就离开了学术界，现在是美国脱口秀的主持人。他的研究比珥特曼的质量高很多。"},{"kind":"p","text":"为什么在国家转型过程中，有的国家走向独裁，而有的国家走向了代议制。与巴林顿·摩尔不同，唐宁认为宪政体的成熟程度比农业商品化程度更重要。"},{"kind":"p","text":"在这个过程中，决定性因素是军事变革。那些不需要调动庞大国内资源来应付战争的国家，容易形成代议制；那些需要调动庞大国内资源应付战争的则向军事官僚制方向发展。"},{"kind":"p","text":"他认为农业商品化到专制独裁或民主之间的因果机制链条太长了，因此要看宪政体本身的成熟程度，而决定性的因素是军事变革。军事动员程度适中的话，就会形成代议制，而动员程度过大、国家形成战争机器的话，就会走向军事官僚制。"},{"kind":"p","text":"瑞典没有像波兰那样丧失主权，因为波兰在地缘上不如瑞典在北欧具有优势。1648年前英国忽略不计的话，整体的战争水平都比较高。"}],"noteBlocksEn":[{"kind":"p","text":"Moore’s Social Origins is treated as foundational. It uses comparative logic to identify common factors behind different modern political paths."},{"kind":"p","text":"The lecture summarizes five factors: political, economic, social, mechanisms such as class alliance, and revolution."},{"kind":"p","text":"The decisive condition is agricultural commercialization. England and France move from commercialization to capitalist landlords, workers, and democracy."},{"kind":"p","text":"Germany and Japan show partial commercialization: capitalist landlords and remaining peasants generate repression and a fascist path."},{"kind":"p","text":"China and Russia are presented through non-commercialization, leading to crisis and a communist path."},{"kind":"p","text":"The method is Marxist in spirit, but the mechanism is class alliance among landlords, capitalists, peasants, workers, and middle classes."},{"kind":"p","text":"Later critics argue that workers, not the bourgeoisie, may be the stronger democratizing force."},{"kind":"p","text":"The lecture’s strongest critique concerns China: Chinese agriculture was highly commercialized, so Moore’s China case is questionable."},{"kind":"personal","text":"The notes propose that the decisive difference may be whether a constitutional order existed before modernization."}]},{"id":"statewar","x":6.5,"y":8.4,"era":"1970s–1990s","title":{"zh":"战争、军事变革与国家形成","en":"War, Military Change, and State Formation"},"tag":{"zh":"强制 · 资本 · 官僚化","en":"coercion · capital · bureaucratization"},"core":{"zh":["蒂利把欧洲国家形成解释为战争和备战的结果。战争需要税收、信贷、军队和行政组织，国家在筹措战争资源时不断扩大强制能力。强制集中、资本集中、资本化强制三条道路，分别对应不同国家形态。","唐宁、费纳和珥特曼进一步把军事变革、军事权力分配、议会出现的时间等变量引入国家形成研究。这一支的重要性在于：它用政治和军事因素解释政治变迁，而不是把政治结果完全还原为经济基础。","【课后补充】这一支不只有蒂利。费纳强调军事权力分配和宫廷、教会、贵族、论坛四个维度；珥特曼强调地缘竞争发生时间和议会时机；戈德斯通用人口压力解释革命；拉克曼用精英斗争解释国家形成的或然结果；戈尔斯基则以“规训革命”挑战战争驱动论，强调臣民被驯化后国家才稳定。"],"en":["Tilly explained European state formation as the result of war-making and preparation for war. War required taxation, credit, armies, and administrative organization; states expanded coercive capacity while extracting war resources. Coercion-intensive, capital-intensive, and capitalized-coercion paths produced different state forms.","Downing, Finer, and Ertman brought in military change, distribution of military power, and the timing of parliaments. This branch matters because it explains political change with political and military factors, rather than reducing political outcomes entirely to economic foundations.","Post-class supplement: This branch is not only Tilly. Finer stresses the distribution of military power and four dimensions: palace, church, nobility, and forum. Ertman stresses the timing of geopolitical competition and parliaments. Goldstone explains revolutions through population pressure. Lachmann explains state formation through contingent elite conflict. Gorski challenges the war-making thesis through the disciplinary revolution, arguing that states stabilized when subjects were disciplined into obedience."]},"relation":{"zh":"它反对摩尔过长的经济因果链，转向国家、战争和组织能力。","en":"It reacts against Moore’s long economic causal chain and turns to the state, war, and organizational capacity."},"works":{"zh":["Tilly，《Coercion, Capital, and European States》","Downing，《The Military Revolution and Political Change》","Finer，《The History of Government》","Ertman，《Birth of the Leviathan》","Goldstone，《Revolution and Rebellion in the Early Modern World》","Lachmann，《Capitalists in Spite of Themselves》","Gorski，《The Disciplinary Revolution》"],"en":["Tilly, Coercion, Capital, and European States","Downing, The Military Revolution and Political Change","Finer, The History of Government","Ertman, Birth of the Leviathan","Goldstone, Revolution and Rebellion in the Early Modern World","Lachmann, Capitalists in Spite of Themselves","Gorski, The Disciplinary Revolution"]},"strengths":{"zh":["解释国家财政、军队和官僚制的联动。","使国家能力成为比较政治的核心变量。"],"en":["Explains the link among fiscal capacity, armies, and bureaucracy.","Makes state capacity a central variable in comparative politics."]},"limits":{"zh":["容易把欧洲经验普遍化。","对殖民、帝国和非欧洲国家的路径解释不足。"],"en":["Can universalize the European experience.","Often under-explains colonial, imperial, and non-European paths."]},"personal":{"zh":["“战争塑造国家”是强命题，但不能变成欧洲中心论。中国、奥斯曼、清帝国的国家能力与公共品供给，并不能简单套入欧洲封建—战争模型。"],"en":["“War makes the state” is a strong thesis, but it should not become Eurocentrism. China, the Ottoman Empire, and the Qing cannot be forced into the European feudal-war model."]},"noteSection":"07 比较历史社会学","keywords":["蒂利","强制集中","资本集中","费纳","唐宁","珥特曼"],"noteLimit":38,"noteBlocks":[{"kind":"p","text":"1、代表人物"},{"kind":"p","text":"巴林顿·摩尔、斯考切波、查尔斯·蒂利、戈德斯通、古德温、拉什曼、戈尔斯基"},{"kind":"p","text":"格德斯通父母曾在二战时被上海犹太难民救助馆收留过，因此格德斯通在《为什么是欧洲》中对早期中国有溢美之词。目前历史社会学的领军人物是戈尔斯基"},{"kind":"p","text":"决定民主和专制的不是农业商品化，而是国家进入现代化之前有没有一套完整的宪制"},{"kind":"p","text":"2、蒂利：资本集中与强制集中《强制、资本与欧洲国家》《欧洲的抗争与民主》"},{"kind":"p","text":"《西欧民族国家的形成》编译在复旦政治学评论上。"},{"kind":"p","text":"《强制、资本与欧洲国家》的理论其实没有新意，《共产党宣言》在开头就提出了资本集中和政治集中的说法，梯利只是把后者聚焦在强制集中上。"},{"kind":"p","text":"蒂利长期以来喜欢研究国家和暴力，强调暴力机器的形成（迈克尔曼在《社会权力的来源》中讲过这个问题）。因此他认为资本集中和强制集中是资本主义现代变迁的关键。过去战争依靠日常资源产生军事技术，现代常备军战争则依靠长期的税收，故战争和战争的准备形成了现代国家的三种道路。这三种道路和理性选择理论一样需要穷尽所有可能性。"},{"kind":"p","text":"国家形成主要是由于战争性质的变化，即从骑士战争—雇佣军战争—常备军战争"},{"kind":"p","text":"资本化强制道路：通过财税体系将资本家及其资本纳入国家之中，如英、法"},{"kind":"p","text":"强制集中是人多钱少的道路，战争缺乏经费，就只能依靠人力"},{"kind":"p","text":"资本集中是钱多人少的道路，依靠雇佣军"},{"kind":"p","text":"上述两条道路都不是长久之计，最后的强制集中和资本集中相结合的道路才能有持续性。"},{"kind":"p","text":"3、费纳：政府史"},{"kind":"p","text":"费纳是从历史角度研究美国政治的代表学者，著作《行政行为》划分民主、威权、极权政体"},{"kind":"p","text":"费纳的另一著作《政府史》气势磅礴，字字珠玑，集中体现了比较历史研究的深厚功力，但中译本没有准确表达作者的观点。"},{"kind":"p","text":"军事组织在政权建立中具有中心地位；"},{"kind":"p","text":"军事技术变迁与社会和经济有关，但它可以从外部进口，所以是独立变量，对于上述几个方面具有决定性意义。"},{"kind":"p","text":"费纳只关注军事在国家建设中的作用，战争驱动的主要学者是费纳而不是梯利。威权、民主或极权的政体形式取决于军事权力的分配，战争是欧洲中世纪最大的公共产品（加州学派也持此观点，这与中国帝国提供的多样公共产品是不同的），提高军力是促进官僚化的主要动力，军事技术变迁是独立的变量。以往主张战争驱动的学者认为军事技术变迁并非独立变量、取决于社会经济的发展状况，但费纳否认了这一点。这在欧洲绝对主义国家时期以及当下非洲国家的文武关系也是成立的，进口武器并在地缘政治中占上风。"},{"kind":"p","text":"费纳总结的四种政体维度：宫廷维度（专制政治）、教会维度（神权政治）、贵族维度（精英政治）、论坛维度（大众政治）。"},{"kind":"p","text":"宫廷+论坛=极权政体"},{"kind":"p","text":"贵族+论坛=代议制民主"},{"kind":"p","text":"费纳提出的杂交政府，两两组合的六种可能性，论坛+教会和教会+贵族是比较罕见的，宫廷和教会以及宫廷+贵族在古代比较普遍，宫廷+论坛以及贵族+论坛在现代比较常见。"},{"kind":"p","text":"宫廷指的是专制政治,教会指的是神权政治,贵族指的是精英政治,而论坛指的是大众政治/民主政治。在当代社会,宫廷与论坛的组合就形成了全权国家,而贵族与论坛结合形成了现代代议制政府。"},{"kind":"p","text":"杂交型政府共有六种可能:宫廷/ 教会、宫廷/ 贵族、宫廷/ 论坛、论坛/ 教会、论坛/ 贵族、教会/ 贵族。其中,论坛/ 教会和教会/ 贵族类型的政体在历史上非常少,宫廷/ 教会和宫廷/ 贵族类型的政体非常普遍,宫廷/ 论坛和论坛/ 贵族型政体在古代时有出现,但是它们的普遍程度远不如现代。"},{"kind":"p","text":"4、珥特曼：《利维坦的兴起》"},{"kind":"p","text":"这本书很像一篇博士论文，特别注重框架，为了自圆其说而对材料进行取舍，研究不是很有灵气，不是天生的学者。后来珥特曼的职业生涯不是很顺利，在哈佛没办法评职称，后来去了纽约大学，怨恨政治学，希望做回社会学研究。这和斯考切波很像，因为老师摩尔而被迫做比较研究《国家与社会革命》，后来才回到美国政治，写了《保护战士与母亲》。"},{"kind":"p","text":"珥特曼要回答的是，18世纪国家形成之时，为何有的国家化为官僚制国家，而有些国家仍然停留在封建制国家？他认为，关键是在1450年代拜占庭帝国灭亡这个时间点。如果一些国家在1450年之前就开始进行地缘政治竞争，当时官僚制还不流行，这些国家会比较迷恋原来的封建制来进行斗争，形成世袭制。如果有些国家是在1450年代之后进行地缘政治竞争，就会倾向于采取官僚制来进行斗争。英国之所以和波、匈成为反例，是因为议会作为一个独立变量发生了作用。英国的议会是在持续竞争之后形成的，因此对原来的体制具有挑战性；波、匈的议会已经成熟之后才进入持续竞争，因此阻碍了官僚制的产生。"},{"kind":"p","text":"细化民主和专制的概念，侧重封建制和官僚制的对比。但这个细化有点变扭和机械，封建制和官僚制并不互斥。问题提出来之后需要选择timing，即拜占庭帝国的灭亡。但这个timing是众所周知的、很平庸的。越是有天赋的学者，找出的timing就越是不为人知的时间点。这个和政治哲学研究的文本选择是类似的，比如《鲁冰逊漂流记》和《格列弗游记》研究自然状态，阿伦特选择《白鲸》来研究平庸的恶。"},{"kind":"p","text":"珥特曼假设的是以1450年为界，如果在此之前就有地缘政治竞争，就会沿袭封建制；在此之后出现地缘政治竞争，就会创新出官僚制。这个和帆船理论有点像。"},{"kind":"p","text":"但在寻找资料的时候，珥特曼发现英国（官僚制代表）和波兰（世袭制代表）都不符合这个假设。因此提出了一个新的变量，认为议会产生的时间会影响官僚制的产生，但这个解释很牵强。"},{"kind":"p","text":"不过珥特曼的理论是用政治因素来解释政治变迁，在此之前都是用经济因素（农业商品化等）的角度来解释政治变迁的，把国家这个独立的变量细化到议会这一政治机构上，所以在学术史上青史留名。"},{"kind":"p","text":"5、布莱恩·唐宁：《军事变革与政治变迁》"},{"kind":"p","text":"写完这本书之后唐宁就离开了学术界，现在是美国脱口秀的主持人。他的研究比珥特曼的质量高很多。"},{"kind":"p","text":"为什么在国家转型过程中，有的国家走向独裁，而有的国家走向了代议制。与巴林顿·摩尔不同，唐宁认为宪政体的成熟程度比农业商品化程度更重要。"},{"kind":"p","text":"在这个过程中，决定性因素是军事变革。那些不需要调动庞大国内资源来应付战争的国家，容易形成代议制；那些需要调动庞大国内资源应付战争的则向军事官僚制方向发展。"},{"kind":"p","text":"戈尔斯基是目前真正继承历史社会学衣钵的人。他认为查尔斯梯利的理论完全是错误的，今天欧洲民族国家的形成不是战争的结果，而是贵族联姻的结果，梯利的假说是不符合历史史实的。"},{"kind":"p","text":"国家体系走向稳定并不是依赖战争的强制集中，而是规训革命，即驯化被统治者以接受统治。哈贝马斯也认为现代法治不是依靠镇压，而是依靠规训，大部分人被驯化而遵守法律，否则国家没有足够的资源来镇压革命。"}],"noteBlocksEn":[{"kind":"p","text":"The war-driven branch moves explanation from economic structure to military, fiscal, and coercive organization."},{"kind":"p","text":"Tilly links state formation to the shift from knight warfare to mercenary warfare to standing armies. Standing armies require durable taxation."},{"kind":"p","text":"War and preparation for war create coercion-intensive, capital-intensive, and capitalized-coercion paths."},{"kind":"personal","text":"The lecture says Tilly’s theory is not entirely new because Marx and Engels had already discussed the concentration of capital and political power; Tilly’s distinct move is to focus on coercion."},{"kind":"p","text":"Finer treats military organization as central to regime formation. The distribution of military power helps decide the form of government."},{"kind":"p","text":"Finer treats military technology as relatively independent because weapons can be imported."},{"kind":"p","text":"Finer’s four dimensions are palace, church, nobility, and forum, which combine into hybrid regime forms."},{"kind":"p","text":"Ertman asks why some states became bureaucratic while others remained patrimonial or feudal, using timing of geopolitical competition and parliament as variables."},{"kind":"personal","text":"The notes criticize Ertman’s framework as mechanical, but credit him for using political variables to explain political change."},{"kind":"p","text":"Downing argues that constitutional maturity and the degree of military mobilization matter more than agricultural commercialization."},{"kind":"p","text":"Gorski offers a rival thesis: state stability depends on disciplinary revolution as well as war and coercion."}]},{"id":"stateback","x":4.6,"y":8.8,"era":"1979–1985","title":{"zh":"找回国家学派","en":"Bringing the State Back In"},"tag":{"zh":"国家自主性 · 国家能力","en":"state autonomy · state capacity"},"core":{"zh":["斯考切波《国家与社会革命》把国家作为独立变量带回比较政治。社会革命不是单靠贫困、阶级矛盾或战争失败解释，而是国际压力下国家财政—行政机器崩溃，与能够发动反抗的农业社会结构相结合。","找回国家学派的核心不是说国家无所不能，而是说国家有相对自主性。国家由行政、法律、官僚和强制系统组成，它不只是社会力量的反映，也会主动塑造社会内部关系、资源分配和政治机会结构。","【课后补充】埃文斯把国家自主性与国家能力联系起来，区分发展型国家和掠夺型国家，并提出“嵌入式自主性”：国家既要有能够执行集体目标的官僚自主性，也要与社会经济行动者保持信息和合作联系。"],"en":["Skocpol’s States and Social Revolutions brought the state back as an independent variable. Social revolutions cannot be explained by poverty, class contradiction, or war defeat alone. They arise from the conjunction of fiscal-administrative state breakdown under international pressure and agrarian structures capable of peasant revolt.","The core claim is not that the state is omnipotent. It is that the state has relative autonomy. The state consists of administrative, legal, bureaucratic, and coercive systems. It is not only a reflection of social forces; it also shapes internal social relations, resource distribution, and political opportunity structures.","Post-class supplement: Evans links state autonomy to state capacity, distinguishes developmental from predatory states, and proposes embedded autonomy. The state needs bureaucratic autonomy to pursue collective goals, but it also needs informational and cooperative ties with socioeconomic actors."]},"relation":{"zh":"这一支直接喂养新制度主义，尤其是历史制度主义。","en":"This branch directly feeds new institutionalism, especially historical institutionalism."},"works":{"zh":["Skocpol，《States and Social Revolutions》","Evans, Rueschemeyer 与 Skocpol，《Bringing the State Back In》","Evans，《Embedded Autonomy》"],"en":["Skocpol, States and Social Revolutions","Evans, Rueschemeyer, and Skocpol, Bringing the State Back In","Evans, Embedded Autonomy"]},"strengths":{"zh":["修正社会中心论。","把国家能力、财政、行政、强制和国际压力放入同一解释。"],"en":["Corrects society-centered accounts.","Combines state capacity, fiscal extraction, administration, coercion, and international pressure."]},"limits":{"zh":["可能低估意识形态、领导人和组织策略。","国家自主性需要具体化为可观察的能力和制度。"],"en":["May underplay ideology, leadership, and organizational strategy.","State autonomy must be specified as observable capacities and institutions."]},"personal":{"zh":["理解斯考切波不能只抓“战争失败”。更关键的是国家机器为何崩溃、社会结构为何能把崩溃转化为革命。"],"en":["Skocpol should not be reduced to “war defeat.” The key is why the state machine collapses and why social structure can turn collapse into revolution."]},"noteSection":"07 比较历史社会学","keywords":["斯考切波","国家与社会革命","国家作为独立","国家自主性","找回国家"],"noteLimit":30,"noteBlocks":[{"kind":"p","text":"1、代表人物"},{"kind":"p","text":"巴林顿·摩尔、斯考切波、查尔斯·蒂利、戈德斯通、古德温、拉什曼、戈尔斯基"},{"kind":"p","text":"格德斯通父母曾在二战时被上海犹太难民救助馆收留过，因此格德斯通在《为什么是欧洲》中对早期中国有溢美之词。目前历史社会学的领军人物是戈尔斯基"},{"kind":"p","text":"4、珥特曼：《利维坦的兴起》"},{"kind":"p","text":"这本书很像一篇博士论文，特别注重框架，为了自圆其说而对材料进行取舍，研究不是很有灵气，不是天生的学者。后来珥特曼的职业生涯不是很顺利，在哈佛没办法评职称，后来去了纽约大学，怨恨政治学，希望做回社会学研究。这和斯考切波很像，因为老师摩尔而被迫做比较研究《国家与社会革命》，后来才回到美国政治，写了《保护战士与母亲》。"},{"kind":"p","text":"珥特曼要回答的是，18世纪国家形成之时，为何有的国家化为官僚制国家，而有些国家仍然停留在封建制国家？他认为，关键是在1450年代拜占庭帝国灭亡这个时间点。如果一些国家在1450年之前就开始进行地缘政治竞争，当时官僚制还不流行，这些国家会比较迷恋原来的封建制来进行斗争，形成世袭制。如果有些国家是在1450年代之后进行地缘政治竞争，就会倾向于采取官僚制来进行斗争。英国之所以和波、匈成为反例，是因为议会作为一个独立变量发生了作用。英国的议会是在持续竞争之后形成的，因此对原来的体制具有挑战性；波、匈的议会已经成熟之后才进入持续竞争，因此阻碍了官僚制的产生。"},{"kind":"p","text":"前面这些学者都在探究国家形成和国家构建，但后面这些学者都在讲国家崩溃。"},{"kind":"p","text":"6、斯考切波：《国家与社会革命》"},{"kind":"p","text":"巴林顿·摩尔的学生，研究套路和摩尔很类似。爆发革命的五种现有解释（纵轴），以及案例分析的六个国家。发现只有战争失败能够解释。"},{"kind":"p","text":"只有在一种情况下可能发生革命，那就是战争失败。为了弥补战争失败，国家不得不提高税收（赔款），对传统农业社会造成破坏而引起地方势力的抵制，从而引发革命。这一对社会革命的解释将国家作为独立的解释变量，因此这一结论成为国家自主性的代表作品，斯考切波成为找回国家的领军人物。"},{"kind":"p","text":"7、戈德斯通：《早期现代世界的革命与反抗》"},{"kind":"p","text":"戈德斯通是斯考切波的学生，在历史社会学领域备受争议，他是一个决定论学者，很多历史社会学学者认为社会变迁是多种历史因素促成的，但戈德斯通要把所有的结果都归结到一个因素上，导致结论单一（）求同法。戈德斯通的解释对加州学派影响很大，受到马尔库塞的影响（？）。"},{"kind":"p","text":"传统农业对人口增长特别敏感，土地不足的条件下，流动人口增加，向城市转移的反叛的年轻人集中在一起。税收能力下降造成国家的经济笼络能力下降，国家精英（官僚）与知识精英的距离拉大，一些知识精英开始创造出异端意识形态，为革命提供思想武器；国家精英内部的分化和权力斗争加剧。"}],"noteBlocksEn":[{"kind":"p","text":"This branch turns from state formation to state breakdown and social revolution."},{"kind":"p","text":"Skocpol inherits Moore’s comparative format but makes the state an autonomous structure with fiscal, administrative, and coercive capacities."},{"kind":"p","text":"Social revolution requires state breakdown under international and military pressure together with agrarian structures that make peasant revolt possible."},{"kind":"p","text":"The significance is state autonomy: state collapse is not merely a reflection of society."},{"kind":"p","text":"Goldstone emphasizes population growth, land shortage, urban migration, fiscal decline, alienated intellectual elites, heterodox ideology, and elite conflict."},{"kind":"p","text":"The lecture says Goldstone’s logic is elegant but deterministic. Its virtue is falsifiability; its danger is reducing complex change to one factor."},{"kind":"p","text":"Lachmann explains modern state formation through contingent elite struggle. Elites may unintentionally create state structures while pursuing their own interests."},{"kind":"personal","text":"The notes treat contingency as part of causal mechanism rather than as a nuisance."}]},{"id":"california","x":6.2,"y":9.5,"era":"1990s–2000s","title":{"zh":"加州学派","en":"The California School"},"tag":{"zh":"大分流 · 经济史 · 去西方中心","en":"Great Divergence · economic history · decentering Europe"},"core":{"zh":["加州学派主要是经济史和全球史研究，重视人口、自然环境、资源、贸易和白银流动。它与巴林顿·摩尔学派相比更接近历史学，史料更扎实，理论框架相对不那么政治学化。","它的核心问题是东西方大分流。彭慕兰把问题从“为什么中国没有发展出资本主义”改写为“为什么英国没有变成苏州”。煤炭、新大陆、资源边界和全球贸易被用来解释欧洲的特殊路径。","【课后补充】加州学派内部并不完全相同：弗兰克强调全球白银和世界体系，彭慕兰强调煤炭、新大陆和资源边界，王国斌强调中西互看，李伯重和李中清强调经济与人口史，黄宗智强调小农经济与过密化。它们共同反欧洲中心，但也常被批评有资源、人口或马尔萨斯决定论倾向。"],"en":["The California School is mainly economic history and global history. It emphasizes population, environment, resources, trade, and silver flows. Compared with the Barrington Moore school, it is closer to history, uses stronger sources, and is less centered on a political-science framework.","Its core question is the Great Divergence. Pomeranz reframed the question from “why did China not develop capitalism” to “why did England not become Suzhou.” Coal, the New World, resource frontiers, and global trade are used to explain Europe’s exceptional path.","Post-class supplement: The California School is not internally uniform. Frank stresses global silver and the world system. Pomeranz stresses coal, the New World, and resource frontiers. R. Bin Wong stresses mutual comparison between China and Europe. Li Bozhong and James Lee stress economic and demographic history. Huang Zongzhi stresses the peasant economy and involution. They all resist Eurocentrism, but they are often criticized for resource, population, or Malthusian determinism."]},"relation":{"zh":"它与历史社会学并行，但更重材料与经济史，较少从国家权力和制度机制出发。","en":"It runs parallel to historical sociology, but emphasizes sources and economic history more than state power and institutional mechanism."},"works":{"zh":["Pomeranz，《The Great Divergence》","R. Bin Wong，《China Transformed》","Frank，《ReOrient》","黄宗智关于华北小农经济的研究"],"en":["Pomeranz, The Great Divergence","R. Bin Wong, China Transformed","Frank, ReOrient","Huang Zongzhi’s work on North China peasant economy"]},"strengths":{"zh":["史料扎实，反西方中心论。","将资源、环境和全球贸易纳入政治经济解释。"],"en":["Strong sources and anti-Eurocentrism.","Adds resources, environment, and global trade to political economy."]},"limits":{"zh":["有马尔萨斯式决定论倾向。","政治制度与国家能力的机制有时不够展开。"],"en":["Can lean toward Malthusian determinism.","Political institutions and state capacity are sometimes underdeveloped."]},"personal":{"zh":["加州学派提醒我们，不要把欧洲结果当成世界历史标准；比较研究首先要问问题本身是不是欧洲中心的。"],"en":["The California School reminds us not to treat Europe’s outcome as the stan
