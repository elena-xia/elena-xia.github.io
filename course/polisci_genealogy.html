<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Genealogy of Contemporary Western Political Science · 当代西方政治学谱系</title>
  <meta name="description" content="A bilingual genealogy of contemporary Western political science based on Fudan University undergraduate course notes, with expanded theory pages and personal-note markers.">
  <style>
:root {
  --paper: #fbfbf8;
  --paper-deep: #f1f4ef;
  --ink: #17211d;
  --muted: #607066;
  --line: #d9dfd8;
  --forest: #24493d;
  --blue: #315b7c;
  --rust: #9a5737;
  --violet: #62577f;
  --gold: #b98d40;
  --white: #ffffff;
  --shadow: 0 18px 42px rgba(23, 33, 29, 0.12);
  /* homepage hero top whitespace — keep identical across all three course homepages */
  --hero-pad-top: 200px;
  --hero-pad-top-mobile: 120px;
  --hero-pad-bottom: 64px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 17px;
  line-height: 1.65;
}

img { display: block; max-width: 100%; height: auto; }

a {
  color: var(--blue);
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
}
a:hover { color: var(--rust); }

/* ── Header ── */
.site-header {
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid rgba(217, 223, 216, 0.9);
  background: rgba(251, 251, 248, 0.92);
  backdrop-filter: blur(14px);
}

.nav {
  width: min(1120px, calc(100% - 40px));
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 64px;
  gap: 24px;
}

.brand {
  font-weight: 700;
  color: var(--ink);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 18px;
  align-items: center;
  flex-wrap: wrap;
  font-size: 0.92rem;
}

.nav-links a {
  color: var(--muted);
  text-decoration: none;
}
.nav-links a:hover,
.nav-links a.active { color: var(--ink); }

/* ── Hero ── */
.hero {
  position: relative;
  min-height: 520px;
  display: flex;
  align-items: flex-end;
  overflow: hidden;
  color: var(--white);
  background: linear-gradient(135deg, #14241e 0%, #1a3a2e 50%, #0f1f19 100%);
}

.hero-content {
  position: relative;
  width: min(1120px, calc(100% - 40px));
  margin: 0 auto;
  padding: 140px 0 72px;
}

.eyebrow {
  margin: 0 0 14px;
  text-transform: uppercase;
  font-size: 0.78rem;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.72);
  letter-spacing: 0.06em;
}

.hero h1 {
  margin: 0;
  max-width: 860px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 3.6rem;
  line-height: 1.08;
  font-weight: 500;
  text-shadow: 0 3px 20px rgba(0, 0, 0, 0.35);
}

.hero p {
  max-width: 700px;
  margin: 20px 0 0;
  color: rgba(255, 255, 255, 0.85);
  font-size: 1.08rem;
  line-height: 1.6;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 28px;
}

/* ── Buttons ── */
.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 10px 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  background: var(--white);
  text-decoration: none;
  font-weight: 700;
  font-size: 0.92rem;
}
.button:hover {
  border-color: var(--rust);
  color: var(--rust);
}
.button.light {
  border-color: rgba(255, 255, 255, 0.45);
  color: var(--white);
  background: rgba(255, 255, 255, 0.1);
}
.button.light:hover {
  background: rgba(255, 255, 255, 0.18);
  color: var(--white);
}

.button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 24px;
}

/* ── Sections ── */
.section { padding: 80px 0; }
.section.alt { background: var(--paper-deep); }

.container {
  width: min(1120px, calc(100% - 40px));
  margin: 0 auto;
}

.section-heading {
  margin-bottom: 38px;
}
.section-heading h2 {
  margin: 0 0 12px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 2.1rem;
  line-height: 1.16;
  font-weight: 500;
}
.section-heading p {
  margin: 0;
  color: var(--muted);
  max-width: 720px;
}

/* ── Project Cards ── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.project-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: var(--white);
  text-decoration: none;
  color: var(--ink);
  display: flex;
  flex-direction: column;
  transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
}
.project-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
  border-color: rgba(154, 87, 55, 0.55);
  color: var(--ink);
}
.project-card .card-body { padding: 20px; }
.project-card h3 {
  margin: 0 0 10px;
  font-size: 1.1rem;
  line-height: 1.3;
}
.project-card p {
  margin: 0;
  color: var(--muted);
  font-size: 0.92rem;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}
.tag {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 3px 9px;
  border-radius: 8px;
  background: #e8eee8;
  color: var(--forest);
  font-size: 0.75rem;
  font-weight: 700;
}
.tag.blue { background: #e7edf3; color: var(--blue); }
.tag.rust { background: #f2e7df; color: var(--rust); }
.tag.violet { background: #ece9f2; color: var(--violet); }
.tag.gold { background: #f5edd8; color: #7a6020; }
.tag.status {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--muted);
  font-weight: 600;
}

/* ── Article Layout (sidebar TOC + content) ── */
.article-layout {
  display: grid;
  grid-template-columns: 240px minmax(0, 1fr);
  gap: 52px;
  align-items: start;
}

.toc {
  position: sticky;
  top: 90px;
  border-left: 3px solid var(--forest);
  padding-left: 16px;
  color: var(--muted);
  font-size: 0.88rem;
}
.toc strong { display: block; margin-bottom: 8px; color: var(--ink); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em; }
.toc a { display: block; margin: 6px 0; color: var(--muted); text-decoration: none; }
.toc a:hover { color: var(--ink); }
.toc .toc-sub { padding-left: 12px; font-size: 0.84rem; }

.article {
  max-width: 820px;
  width: 100%;
  min-width: 0;
}
.article section { scroll-margin-top: 90px; }
.article h2 {
  margin: 0 0 8px;
  padding-top: 8px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.85rem;
  line-height: 1.2;
  font-weight: 500;
}
.article h2 + .lead { margin-top: 0; }
.article h3 {
  margin: 32px 0 10px;
  font-size: 1.15rem;
  line-height: 1.3;
}
.article p { margin: 14px 0; }

.lead { color: var(--muted); font-size: 1.05rem; }

.divider {
  border: 0;
  border-top: 1px solid var(--line);
  margin: 48px 0;
}

/* ── Quote ── */
.quote {
  margin: 26px 0;
  padding: 22px 24px;
  border-left: 4px solid var(--gold);
  background: var(--white);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(23, 33, 29, 0.05);
}
.quote p {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.15rem;
  line-height: 1.55;
  color: var(--ink);
}

/* ── KPI Grid ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin: 28px 0;
}
.kpi {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--white);
  padding: 18px;
}
.kpi strong {
  display: block;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.8rem;
  line-height: 1;
  font-weight: 500;
  color: var(--forest);
}
.kpi span {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 0.88rem;
}

/* ── Method / Result Grids ── */
.method-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin: 26px 0;
}
.method-box,
.result-box {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--white);
  padding: 22px;
}
.method-box h3,
.result-box h3 { margin-top: 0; }
.result-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin: 26px 0;
}
.result-box.good { border-top: 4px solid var(--forest); }
.result-box.caution { border-top: 4px solid var(--rust); }

/* ── Data Tables ── */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 22px 0;
  border-radius: 8px;
  background: var(--white);
  box-shadow: 0 0 0 1px var(--line);
  font-size: 0.92rem;
  overflow: hidden;
}
.data-table th,
.data-table td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}
.data-table th {
  color: var(--muted);
  font-size: 0.78rem;
  text-transform: uppercase;
}
.data-table tr:last-child td { border-bottom: 0; }

/* ── Figures ── */
.figure-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin: 28px 0;
}
.figure {
  margin: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: var(--white);
}
.figure img { width: 100%; object-fit: contain; background: #fafafa; }
.figure.wide { grid-column: 1 / -1; }
.figure figcaption {
  padding: 12px 16px;
  color: var(--muted);
  font-size: 0.88rem;
}

/* ── Artifacts ── */
.artifact-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 22px;
}
.artifact {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--white);
  padding: 16px;
}
.artifact a { font-weight: 700; }
.artifact p { margin: 6px 0 0; color: var(--muted); font-size: 0.9rem; }

/* ── Note ── */
.note {
  padding: 16px 18px;
  border: 1px solid #e5d6c8;
  border-radius: 8px;
  background: #fff8f3;
  color: #5a3b2b;
  font-size: 0.95rem;
  margin: 22px 0;
}

/* ── Research Journey (timeline) ── */
.journey-step {
  padding: 22px 0;
  border-top: 1px solid var(--line);
}
.journey-step:first-of-type { border-top: 0; padding-top: 8px; }
.journey-step h3 { margin-top: 0; }

/* ── About page ── */
.about-grid {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 52px;
  align-items: start;
}
.about-sidebar {
  position: sticky;
  top: 90px;
}
.about-sidebar .contact-block {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  font-size: 0.92rem;
  color: var(--muted);
}
.about-sidebar .contact-block a { display: block; margin: 4px 0; }

.about-content { max-width: 720px; }
.about-content h2 {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.6rem;
  font-weight: 500;
  margin: 48px 0 12px;
}
.about-content h2:first-child { margin-top: 0; }
.about-content p { margin: 14px 0; }

/* ── CV Embed ── */
.cv-embed {
  width: 100%;
  height: 85vh;
  border: 1px solid var(--line);
  border-radius: 8px;
}

/* ── Home Timeline ── */
.home-timeline {
  position: relative;
  padding-left: 28px;
  border-left: 2px solid var(--line);
}
.home-timeline .tl-item {
  position: relative;
  padding: 0 0 36px;
}
.home-timeline .tl-item:last-child { padding-bottom: 0; }
.home-timeline .tl-dot {
  position: absolute;
  left: -35px;
  top: 4px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--forest);
  border: 2px solid var(--paper);
}
.home-timeline .tl-year {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--rust);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.home-timeline .tl-title {
  font-weight: 700;
  margin: 4px 0 2px;
}
.home-timeline .tl-title a { color: var(--ink); text-decoration: none; }
.home-timeline .tl-title a:hover { color: var(--blue); }
.home-timeline .tl-desc {
  color: var(--muted);
  font-size: 0.92rem;
  margin: 0;
}

/* ── Minor timeline node ── */
.home-timeline .tl-item.minor { padding-bottom: 28px; }
.home-timeline .tl-item.minor .tl-dot {
  width: 8px; height: 8px;
  left: -33px; top: 5px;
  background: var(--muted);
  border-color: var(--paper);
}
.home-timeline .tl-item.minor .tl-title { font-size: 0.88rem; font-weight: 600; }
.home-timeline .tl-item.minor .tl-desc { font-size: 0.84rem; }

/* ── Footer ── */
.site-footer {
  border-top: 1px solid var(--line);
  padding: 32px 0;
  color: var(--muted);
  font-size: 0.9rem;
}
.site-footer .container {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.site-footer a { color: var(--muted); }

/* ── Card with gradient image ── */
.card-image-wrap {
  position: relative;
  height: 180px;
  overflow: hidden;
}
.card-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}
.card-image-wrap::after {
  content: "";
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 70px;
  background: linear-gradient(to top, var(--white) 0%, transparent 100%);
  pointer-events: none;
}

/* ── Project hero with background image ── */
.hero-img {
  background-size: cover;
  background-position: center;
}
.hero-img::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(15, 30, 22, 0.58);
  backdrop-filter: blur(4px);
}

/* ── Pilot cities layout ── */
.pilot-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin: 28px 0;
  align-items: start;
}
.city-list { list-style: none; padding: 0; margin: 0; }
.city-list li {
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
  font-size: 0.95rem;
}
.city-list li:last-child { border-bottom: 0; }
.city-list .city-name { font-weight: 700; }
.city-list .city-info { color: var(--muted); font-size: 0.88rem; }
#china-map {
  width: 100%;
  height: 420px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f0f4f8;
}

/* ── Vertical data boxes ── */
.data-stack {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin: 26px 0;
}

/* ── Responsive ── */
@media (max-width: 920px) {
  .projects-grid,
  .article-layout,
  .about-grid,
  .method-grid,
  .result-grid,
  .figure-grid,
  .artifact-list { grid-template-columns: 1fr; }

  .toc {
    position: static;
    border-left: 0;
    border-top: 3px solid var(--forest);
    padding: 14px 0 0;
    margin-bottom: 32px;
  }
  .about-sidebar { position: static; }
  .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 700px) {
  body { font-size: 16px; }
  .nav {
    width: min(100% - 28px, 1120px);
    min-height: 56px;
    flex-direction: column;
    align-items: flex-start;
    padding: 12px 0;
    gap: 6px;
  }
  .nav-links { gap: 12px; }
  .hero { min-height: 440px; }
  .hero-content { width: min(100% - 28px, 1120px); padding: 100px 0 56px; }
  .hero h1 { font-size: 2.4rem; }
  .section { padding: 52px 0; }
  .section-heading h2,
  .article h2 { font-size: 1.6rem; }
  .kpi-grid { grid-template-columns: 1fr; }
  .data-table { display: block; overflow-x: auto; white-space: nowrap; }
  .container,
  .hero-content { width: min(100% - 28px, 1120px); }
}


/* ── Genealogy custom layer ── */
:root {
  --gene-paper-warm: #fbfbf8;
}
body { background: var(--paper); }
.lang-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 34px;
  padding: 4px 14px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--white);
  color: var(--ink);
  font-size: 0.84rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.lang-toggle:hover { border-color: var(--rust); color: var(--rust); }
.view { display: none; }
.view.active { display: block; }
.hero.compact { min-height: 0; display: block; }
.hero.compact .hero-content { padding: var(--hero-pad-top) 0 var(--hero-pad-bottom); }
@media (max-width: 700px) { .hero.compact .hero-content { padding-top: var(--hero-pad-top-mobile); } }
.hero .meta-line {
  display:flex; flex-wrap:wrap; gap:8px;
  margin-top:24px;
}
.hero .meta-line:empty { display:none; }
/* ── homepage hero unified to the IR course homepage (width + type scale) ── */
.hero.compact .breadcrumb { font-size: 0.86rem; color: rgba(255,255,255,.66); margin: 0 0 18px; }
.hero.compact .breadcrumb a { color: rgba(255,255,255,.86); }
.hero.compact .eyebrow { font-size: 0.78rem; }
.hero.compact h1 { font-size: 2.9rem; line-height: 1.1; max-width: 900px; }
.hero.compact #heroLead { max-width: 760px; font-size: 1.05rem; }
@media (max-width: 700px) { .hero.compact h1 { font-size: 2.1rem; } }
.meta-pill {
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:3px 10px;
  border:1px solid rgba(255,255,255,.35);
  border-radius:8px;
  color:rgba(255,255,255,.84);
  font-size:.78rem;
  font-weight:700;
}
.overview-grid {
  display:grid;
  grid-template-columns: 1.1fr .9fr;
  gap: 26px;
  align-items:start;
}
.reading-card {
  border:1px solid var(--line);
  background:var(--white);
  border-radius:8px;
  padding:22px;
  box-shadow:0 8px 24px rgba(23,33,29,.05);
}
.reading-card h3 {
  margin:0 0 10px;
  font-family: Georgia, "Times New Roman", serif;
  font-weight:500;
  font-size:1.35rem;
}
.reading-card p { color:var(--muted); margin:10px 0; }
.reading-card p:empty { display:none; }
.tree-shell {
  margin-top: 26px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(rgba(255,255,255,.82), rgba(255,255,255,.82)),
    linear-gradient(rgba(217,223,216,.55) 1px, transparent 1px),
    linear-gradient(90deg, rgba(217,223,216,.45) 1px, transparent 1px);
  background-size: auto, 34px 34px, 34px 34px;
  overflow: auto;
  box-shadow: inset 0 0 60px rgba(23,33,29,.04);
}
.tree-canvas {
  position: relative;
  min-width: 2400px;
  height: 2250px;
}
#treeSvg {
  position:absolute; inset:0;
  width:100%; height:100%;
  z-index:1;
}
.tl-rail {
  position:absolute;
  left:90px;
  top:70px;
  bottom:80px;
  border-left:2px solid var(--line);
  z-index:1;
}
.tl-label {
  position:absolute;
  left:22px;
  width:120px;
  transform:translateY(-50%);
  color:var(--rust);
  font-weight:700;
  font-size:.78rem;
  letter-spacing:.03em;
}
.g-node {
  position:absolute;
  width:176px;
  transform:translate(-50%, -50%);
  z-index:3;
  border:1px solid var(--line);
  background:var(--white);
  border-radius:8px;
  padding:12px 14px;
  box-shadow:0 10px 24px rgba(23,33,29,.08);
  cursor:pointer;
  transition:transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
}
.g-node:hover {
  transform:translate(-50%, -50%) translateY(-3px);
  box-shadow:var(--shadow);
  border-color:rgba(154,87,55,.55);
}
.g-node.trunk { border-left:4px solid var(--forest); }

  <script id="payload" type="application/json">{"nodes":[{"id":"intro","x":0,"y":0,"era":"1880s","title":{"zh":"美国政治科学的建制化","en":"Institutionalizing American Political Science"},"tag":{"zh":"哥伦比亚 · 学科对象 · 刊物与学会","en":"Columbia · disciplinary object · journals and associations"},"core":{"zh":["这门课把“西方政治科学”主要理解为美国政治科学。其建制化起点是 1880 年前后哥伦比亚的政治研究院，以及随后出现的博士培养、期刊和学会。政治学最初试图从历史学与社会学中分离出来，给自己划定对象：国家、宪法、政治制度、现实政治问题。","这一开端很重要：政治学有了研究对象，却没有完全独立的方法论。它更多借用历史学、法学、社会学、心理学、经济学的方法。后来的理论演变，很大程度上就是围绕“对象是什么、方法从哪里来、政治学是否应当像自然科学一样精确”这几个问题展开。","【课后补充】早期美国政治学还有两个基础点应补入：它最早从历史学中脱胎，“历史是过去的政治，政治是现在的历史”，又从社会学中分离出来，因此一开始就有去阶级化、弱化社会不平等分析的倾向；Barnes 所说的次领域分化，也使政治学较早形成树状学科结构和交叉学科传统。"],"en":["The course treats “Western political science” largely as American political science. Its institutional beginning lies in Columbia’s School of Political Science around 1880, followed by doctoral training, journals, and professional associations. The early discipline tried to separate itself from history and sociology by naming its object: the state, constitutions, political institutions, and contemporary political problems.","This beginning matters because political science gained an object before it gained an independent method. It borrowed methods from history, law, sociology, psychology, and economics. Much of the later genealogy turns on three questions: What is the object of politics? Where should political science get its methods? Should political science aspire to the precision of natural science?","Post-class supplement: Two early features should be added. American political science first grew out of history, so politics was treated as present history. It also separated itself from sociology, which made class and social inequality easier to neglect. Barnes’s idea of subfields helped political science develop as a branching and interdisciplinary field."]},"relation":{"zh":"这是谱系的树干。后面几乎所有流派都在重新回答“政治学研究国家、制度、行为、社会还是权力关系”这个问题。","en":"This is the trunk of the tree. Nearly every later school re-answers whether political science studies the state, institutions, behavior, society, or relations of power."},"works":{"zh":["Burgess 与哥伦比亚政治研究院","Political Science Quarterly","American Political Science Review"],"en":["Burgess and Columbia’s School of Political Science","Political Science Quarterly","American Political Science Review"]},"strengths":{"zh":["完成学科建制化。","把国家与现实政治问题确立为政治学对象。"],"en":["Institutionalized the discipline.","Made the state and contemporary political problems the object of political science."]},"limits":{"zh":["对象先于方法，方法长期依赖其他学科。","过早离开历史与社会结构，会削弱对政治基础的理解。"],"en":["The object preceded the method; the field long depended on other disciplines.","Leaving history and social structure too early weakens the understanding of political foundations."]},"personal":{"zh":["中国政治学的短板之一，正是政治经济学训练不足；这使很多现实政治问题缺少制度、市场、财政和利益结构的联动分析。"],"en":["One weakness of Chinese political science is the lack of political economy training, which makes it harder to analyze institutions, markets, fiscal structure, and interests together."]},"noteSection":"第一讲 导论：西方（美国）政治科学的沿革","keywords":["美国政治学的创建","创始","刊物","学会","政治学没有自己的方法论"],"noteLimit":20,"noteBlocks":[{"kind":"p","text":"西方政治科学实际上是美国政治科学，政治学作为一个学科起源于美国，这由于美国特别重视政治，美国是高度政治化的"},{"kind":"p","text":"一、美国政治学的创建"},{"kind":"p","text":"复旦政治学创建于1923年，五四运动的学生因受当局追捕而到美国学习政治学（伊利诺州立大学）后回国创建了复旦大学政治学系。王元的魔幻主义政治学研究，空间研究（诸子百家居住地很近，都起源于淮北，小商圈理论），时间研究（中国从1919年起，每隔8年发生一次大动乱，本科4年没有前辈教导，机制性分析）"},{"kind":"p","text":"1、创始"},{"kind":"p","text":"王沪宁《比较政治分析》详细介绍了美国政治学的创建历程。1880年10月，在美国学者JW柏古斯（John Burgess)的倡导下，美国成立“哥伦比亚大学政治研究院”。美国政治学由此创始，并开始培养政治学博士和进行具有学科意义的政治学研究，霍普金斯和密歇根大学步其后尘。"},{"kind":"p","text":"2、政治学创建之初的几个特点"},{"kind":"p","text":"③政治学有自己严格的对象范围（即国家），但没有独立的方法论，而多是与其他学科的整合。"},{"kind":"p","text":"政治学没有自己的方法论，但可以整合其他学科的方法论；而社会学必须将研究还原到社会关系上，不能使用一些研究方法（适于从整体来看，所以功能主义很适切）"},{"kind":"personal","text":"达尔：不平等社会如何可以构成民主？"},{"kind":"p","text":"3、政治学学科的载体：刊物"},{"kind":"p","text":"1886年第一个定期出版的政治学刊物－《政治学季刊》（Political Science Quarterty),在哥伦比亚政治学院创刊。1906年美国政治学会会刊《美国政治学评论》APSR创刊，是今天政治学顶刊"},{"kind":"p","text":"4、学会：1903年美国政治学会"},{"kind":"p","text":"成立之初鱼龙混杂，主要成员是记者和律师，也有政客议员，大学教授不多。古德诺是第一任会长，为袁世凯复辟背书，梁启超《异哉所谓国体问题者》批判。曾任会长的有拉斯韦尔、凯、杜鲁门、阿尔蒙德、达尔、伊斯顿、多伊奇、林德布洛姆、李普塞、洛威。近年美国政治学会的质性研究和女性学者较多，性别政治、工人政治、国家理论、政治哲学等领域的学者担任会长。"},{"kind":"p","text":"二、美国政治学的演变（戴维·伊斯顿）"},{"kind":"p","text":"（1）行为主义的产生"},{"kind":"p","text":"第二次世界大战之后，西方国家的政治科学研究获得了巨额资金援助，研究机构和教育机构普遍设立，学者和学生队伍迅速扩大，刊物和专著大量问世，政治科学研究进入鼎盛时期，形成大量次领域（理论体系如一般系统论、结构"},{"kind":"personal","text":"功能论和沟通理论等：概念范畴如政治体系、政治沟通、政治评价等；学科领域如政治社会学、政治心理学、政治人类学、政治生态学、政治文化、政治发展等）。"},{"kind":"personal","text":"政治学研究与自由民主发展关系可能不如与帝国、霸权关系紧密 只研究可观察的对象，国家是个黑箱（只能依赖经验的观察，而不能进行调查），因此转而研究调查社会（但问卷调查有很大局限，基本上只能问主观态度）。"},{"kind":"p","text":"1928年F·肯特在《政治行为》一书中提出“政治行为”这一核心概念，瑞典政治学者H·廷斯滕1937年的《政治行为》一书则使之广为人知。"},{"kind":"p","text":"·20世纪50、60年代，行为主义逐渐在美国政治学中占据了统治地位。1950年，P.奥德加德成为第一位当选美国政治学会会长的行为主义学者。但实际上这个阶段美国政治学评论发表的行为主义研究专著很少（平均每年只占4%，最多11%，很少把量化研究写成书，研究专著一般是历史社会学和比较历史研究或者政治学理论），10年间发表的505篇文章中政治科学的文章只有180篇左右（美国政治学会主席沃克在就职仪式上的演讲提出的质疑），大量还是政治哲学和政治理论的文章。因此沃克认为当时美国政治学并不处于行为主义阶段，而是前行为主义阶段。这十年之所以看似行为主义繁荣，是因为行为主义的学者的影响力很大。美国理性选择理论的杂志rational choice 作者排序是按照音序，现在理性选择理论要求实证案例证实，歪风邪气。经济学只是模型，并不能直接解释现实。"},{"kind":"p","text":"比较来看，中国政治学发展到了哪个阶段？只有唯一一本政治学刊物《政治学研究》。《政治思想史》刊物的影响因子（引用率）太低，政治思想史学者不会互相引用。因此中国政治学的刊物问题只能以书代刊，比如《复旦政治学评论》，但以书代刊面临严打压力，审查出版的周期很长。现在做学问很多是可替代的，大家都会跑回归，研究可以交给电脑，政治科学量化报告和公司白领是一样的，大学老师都在跑项目、项目经理，结果就是学者都变成可替代的；传统做学术不可替代，严北溟讲《金刚经》。中国发文章真正双向匿名评审的文章是不会通过的，发出文章的一般就是约稿。"}],"noteBlocksEn":[{"kind":"p","text":"The course treats Western political science mainly as American political science. Political science became a professional discipline in the United States partly because American public life is intensely politicized."},{"kind":"p","text":"The lecture situates Fudan’s own political science lineage in this history. Fudan’s department was founded in 1923 after May Fourth students returned from study in the United States. This local note matters because the course also asks how Chinese political science received American political science."},{"kind":"p","text":"John W. Burgess and Columbia mark the disciplinary beginning. Around 1880, Columbia created a School of Political Science, began doctoral training, and helped make political science a field with journals, associations, and research programs."},{"kind":"p","text":"Early political science broke away from history and sociology. It first named its object: the state, constitutions, public law, institutions, and current political problems. The cost was that class, inequality, and social structure became easier to neglect."},{"kind":"p","text":"The early discipline had a clear object but no independent method. It borrowed from history, law, sociology, psychology, statistics, economics, and later anthropology. Later schools repeatedly redefine both the object of politics and the method that can explain it."},{"kind":"p","text":"The institutional carriers were Political Science Quarterly in 1886, the American Political Science Review in 1906, and the American Political Science Association in 1903. Early APSA membership included journalists, lawyers, politicians, and only some university professors."},{"kind":"personal","text":"The notes ask Dahl’s problem directly: how can democracy be built in an unequal society? This question runs under the whole genealogy."},{"kind":"personal","text":"The notes also suggest that political science may be tied less to liberal democracy than to empire, hegemony, funding, and governability. This is a personal reflection, not a settled disciplinary claim."}]},{"id":"oldinst","x":0,"y":1,"era":"1880s–1910s","title":{"zh":"旧制度主义","en":"Old Institutionalism"},"tag":{"zh":"国家 · 法条 · 静态比较","en":"state · legal text · static comparison"},"core":{"zh":["旧制度主义研究国家、宪法和正式制度。它相信政治权力的分配由法律规定，因此研究宪法、法律和制度之间的关系，就能理解政治运作。方法上，它依靠历史—比较方法和法理学方法，常把各国制度并列罗列，尤其重视英国内阁制与美国总统制。","它的贡献是把政治学从历史学与社会学中独立出来；它的问题是把“制度文本”当成“政治过程”。正式规则和实际运作之间常有裂缝，例如总统权力并不只由宪法条文决定，政党、舆论、行政资源和危机情境都会改变权力的实际强弱。","【课后补充】从学界通行表述看，旧制度主义更准确地说是“形式—法律制度主义”或“历史—比较制度主义”：它研究宪法、行政制度与法律规范，但很少系统处理制度为何被遵守、为何失效、以及非正式制度如何改变正式规则。"],"en":["Old institutionalism studied the state, constitutions, and formal institutions. It assumed that political power is distributed by law, so the study of constitutions, statutes, and the relations among institutions would reveal how politics works. Its method was historical comparison and jurisprudence, often listing national institutions side by side, especially British cabinet government and the American presidency.","Its achievement was to separate political science from history and sociology. Its weakness was to treat the institutional text as the political process. Formal rules and actual operation often diverge: presidential power, for example, is not determined by constitutional text alone. Parties, public opinion, administrative resources, and crises all alter the real distribution of power.","Post-class supplement: In standard terms, old institutionalism is better called formal-legal or historical-comparative institutionalism. It studies constitutions, administrative arrangements, and legal norms, but it rarely explains why rules are obeyed, why they fail, or how informal institutions reshape formal rules."]},"relation":{"zh":"传统主义与行为主义都从这里出发反叛：它们认为只看正式制度无法解释政策如何产生。","en":"Traditionalism and behavioralism both rebel against this point: formal institutions alone cannot explain how policy is made."},"works":{"zh":["A. Lawrence Lowell，《The Government of England》","Harold Laski，《The American Presidency》"],"en":["A. Lawrence Lowell, The Government of England","Harold Laski, The American Presidency"]},"strengths":{"zh":["确立国家与制度为政治学核心对象。","训练了法律文本、比较制度和历史材料的基本功。"],"en":["Made the state and institutions central objects.","Trained the field in legal texts, comparative institutions, and historical materials."]},"limits":{"zh":["把正式规定误当成实际政治。","无法解释非正式组织、政党、压力集团和舆论的作用。","很难区分民主国家和非民主国家，因为复杂制度并非民主国家所独有。"],"en":["Mistakes formal rules for actual politics.","Cannot explain informal organizations, parties, pressure groups, and public opinion.","Has difficulty distinguishing democratic from non-democratic states, because institutional complexity is not unique to democracy."]},"personal":{"zh":["制度研究不能只研究制度表面。真正困难的问题是：正式规则如何被非正式实践改写，哪些规则只是摆设，哪些规则能真实改变行动者预期。"],"en":["Institutional study cannot stop at institutional surfaces. The real question is how formal rules are rewritten by informal practice, which rules are ornamental, and which rules actually change expectations."]},"noteSection":"第一讲 导论：西方（美国）政治科学的沿革","keywords":["制度主义阶段","法律制度的正式规定","拉斯基","局限性"],"noteLimit":24,"noteBlocks":[{"kind":"p","text":"1985年伊斯顿来复旦访问，并首次发表了关于美国政治学的演变的报告。从某种意义上，伊斯顿的美国政治学发展历程的四个阶段可以理解为学者做研究的过程。复旦政治学系黄金时代常请国外政治学学者普利萨沃斯基；菲利普·施密特；拉德曼；Jan Elster等来给博士生上课，实际上是专业英语，名义上是民主化理论、国家理论等。在《中国城市争夺公民权》伯恩斯坦（最早研究中国的政治学者《上山下乡》）的妻子，"},{"kind":"p","text":"1、制度主义阶段（以国家研究为主的阶段）"},{"kind":"p","text":"①在研究对象上："},{"kind":"p","text":"④代表学者与作品"},{"kind":"p","text":"洛威、维尔，拉斯基《美国总统制》：为什么英国首相权力稳定，而美国不同总统的权力强弱程度却不一样（通过总统行使否决权的次数）？此研究无关行政过程，完全是制度主义的。浦兴祖老师研究当代中国政治制度的方法与此类似。唐德刚（《胡适口述自治》《梅兰芳传稿》）在哥伦比亚大学留学的时候就质疑了美国通过定量方法研究中国政治。"},{"kind":"p","text":"⑤局限性："},{"kind":"p","text":"（1)法律制度的正式规定与实际政治过程之间的裂痕，无法从根本上得到解释"},{"kind":"p","text":"（2)在关怀上，并未真正体现出自由社会中的政治学的特点，因为发现所有国家的政体都是十分复杂的（在美国，研究国家是为了控制国家，将研究全面呈现给选民、告知该如何选择），列宁看来政治应该要去秘密化（人要从工具中解放），自由民主国家为了约束政治权力而精心设计了复杂的政治制度，制度主义发现所有国家的制度都很复杂，因此复杂制度并非自由民主国家所独有，发现无法区分民主国家和非民主国家（希望达到：只有自由社会能产生政治学、政治科学需要的调查在独裁国家不能进行），无法实现理论关怀"},{"kind":"p","text":"⑧一体化。政治学整合经济学、心理学、社会学、文化、哲学等等所有的学科，政治学的包容的特征。今天美国政治学是美国最容易创新研究方法的学科，因为政治变化很大而经济变化较小。"},{"kind":"p","text":"（7）行为主义的局限性："},{"kind":"p","text":"1、忽视本质性的政治问题（即，意识形态。所以政治理论都有其意识形态语境）。由于将研究问题局限在可观察、可测量的对象上，主张“价值中立”，行为主义政治学倾向于忽视政治行为最基本的道德和价值因素，它将注意力都集中在一些琐碎商易于研究的问题上，对于无法收集数据资料、无法重复验证的政治问题则予以放弃。因此，行为主义政治学对重大的政治问题往往缺之解释力，甚至很少予以关注。王沪宁《比较政治分析》也提出了这个问题，一次调查可以拆分成很多文章，研究越来越精致，但距离社会越来越遥远。最严重的问题是公共管理领域，很多管理经验是不可复制和学习的。"}],"noteBlocksEn":[{"kind":"p","text":"Easton’s four-stage account of American political science was introduced at Fudan in 1985. The first stage is old institutionalism, centered on the state and formal constitutional arrangements."},{"kind":"p","text":"Old institutionalism studied constitutions, basic political institutions, and the logical relations among them. Its method was historical comparison and legal analysis."},{"kind":"p","text":"The lecture uses Laski’s study of the American presidency as a typical example. It asks why British prime-ministerial power is stable while American presidential power varies, but it still explains through formal institutions rather than administrative process."},{"kind":"p","text":"Its first limit is the gap between legal provisions and actual political process. Constitutions state where power should be, but parties, bureaucracies, public opinion, and crises alter where power actually is."},{"kind":"p","text":"Its second limit concerns liberal political purpose. If free political science should make power visible and controllable, old institutionalism disappoints because every state has complex institutions, including non-democratic states."},{"kind":"p","text":"This stage therefore creates the next question: if legal institutions cannot explain actual politics, should political science study informal processes, parties, groups, and public opinion?"},{"kind":"personal","text":"The notes connect this limit to a warning about measurable research: precision can make political science distant from the most important political problems."}]},{"id":"traditional","x":0,"y":2,"era":"1900s–1920s","title":{"zh":"传统主义与政府过程","en":"Traditionalism and the Governmental Process"},"tag":{"zh":"政党 · 压力集团 · 非正式政治","en":"parties · pressure groups · informal politics"},"core":{"zh":["传统主义并不是回到古典传统，而是奠定新政治科学传统的过渡阶段。本特利和后来的杜鲁门把研究重心从正式制度转向正式制度之外的政党、集团、舆论和压力政治。政策并不只是宪法机构按法条自动运行的结果，而是在组织化利益之间的互动中形成。","这一阶段的工具还不成熟，本特利的《政府过程》更像一种方向性的宣言，资料搜集和分析技术都比较粗糙。但它改变了政治学的问题意识：研究对象从“制度是什么”转向“政治实际上如何发生”。","【课后补充】传统主义中的本特利与杜鲁门也是集团理论和早期多元主义的重要来源。它们把政治看成组织化利益之间的过程，而不是国家意志的单向输出；后来达尔的多元主义城市政治研究，延续了这一从正式制度转向社会集团的方向。"],"en":["Traditionalism here does not mean a return to classical tradition. It is a transitional stage that founded a new political-science tradition. Bentley and later Truman shifted attention from formal institutions to parties, groups, public opinion, and pressure politics outside formal institutions. Policy is not the automatic output of constitutional organs following legal rules; it emerges from interaction among organized interests.","The tools were still immature. Bentley’s The Process of Government was more a directional manifesto than a fully developed empirical method. But it changed the question: from “what are institutions?” to “how does politics actually happen?”","Post-class supplement: Bentley and Truman are also key sources of group theory and early pluralism. They treat politics as a process among organized interests, not as a one-way output of state will. Dahl’s later pluralist study of city politics extends this move from formal institutions to social groups."]},"relation":{"zh":"它暴露旧制度主义的盲点，也为梅里安的科学化运动和行为主义开路。","en":"It exposed the blind spot of old institutionalism and prepared the ground for Merriam’s scientific movement and behavioralism."},"works":{"zh":["Arthur Bentley，《The Process of Government》","David Truman，《The Governmental Process》"],"en":["Arthur Bentley, The Process of Government","David Truman, The Governmental Process"]},"strengths":{"zh":["把非正式政治过程纳入政治学。","提出集团理论的基本方向。"],"en":["Brought informal political process into political science.","Established the basic direction of group theory."]},"limits":{"zh":["资料搜集和分析方法仍弱。","容易把集团互动描述成政治全部，而忽略制度和国家能力。"],"en":["Still weak in data collection and analysis.","Can reduce politics to group interaction and overlook institutions and state capacity."]},"personal":{"zh":["“政府过程”研究在中国语境中很难做，因为真正的政策过程往往不公开；这不是理论无用，而是资料结构与学术伦理的问题。"],"en":["Researching the governmental process in China is difficult because the real policy process is often not open. That does not make the theory useless; it makes data structure and research ethics central problems."]},"noteSection":"第一讲 导论：西方（美国）政治科学的沿革","keywords":["传统主义","政府过程","本特利","杜鲁门","新政治科学运动"],"noteLimit":20,"noteBlocks":[{"kind":"p","text":"4、学会：1903年美国政治学会"},{"kind":"p","text":"成立之初鱼龙混杂，主要成员是记者和律师，也有政客议员，大学教授不多。古德诺是第一任会长，为袁世凯复辟背书，梁启超《异哉所谓国体问题者》批判。曾任会长的有拉斯韦尔、凯、杜鲁门、阿尔蒙德、达尔、伊斯顿、多伊奇、林德布洛姆、李普塞、洛威。近年美国政治学会的质性研究和女性学者较多，性别政治、工人政治、国家理论、政治哲学等领域的学者担任会长。"},{"kind":"p","text":"二、美国政治学的演变（戴维·伊斯顿）"},{"kind":"p","text":"（2)在关怀上，并未真正体现出自由社会中的政治学的特点，因为发现所有国家的政体都是十分复杂的（在美国，研究国家是为了控制国家，将研究全面呈现给选民、告知该如何选择），列宁看来政治应该要去秘密化（人要从工具中解放），自由民主国家为了约束政治权力而精心设计了复杂的政治制度，制度主义发现所有国家的制度都很复杂，因此复杂制度并非自由民主国家所独有，发现无法区分民主国家和非民主国家（希望达到：只有自由社会能产生政治学、政治科学需要的调查在独裁国家不能进行），无法实现理论关怀"},{"kind":"p","text":"2、传统主义（过渡阶段）"},{"kind":"p","text":"①发生："},{"kind":"p","text":"第一次世界大战前后，现实主义研究方法对历史－比较方法提出了挑战，J·W·伯吉斯和伍德罗·威尔逊发现，在正式的政治制度之外。还存在大量非正式的政治行为和组织，而政策制定往往取决于后者，因此，研究的重点应转向政党和其他压力集团及其活动上，在这方面轰动一时的代表性阿瑟·本特利的《政府过程》，尽管传统阶段的政治科学研究尚嫌粗糙，政治学者并没有掌握专门的资料搜集方法和分析方法来研究非正式的政府过程。但是它为政治科学研究奠定了基本路向。（奠定了政治科学研究的传统）"},{"kind":"p","text":"传统阶段的意思是奠定新的政治科学的传统的阶段，因此也是一种革命阶段。要求要在政治制度之外，研究非正式的政治行为和组织。阿瑟·本特利《政府过程》-比较粗糙；杜鲁门《政府过程》（《政治过程》）-相对精致-民意形成与舆论对政府过程的影响"},{"kind":"personal","text":"集团理论的代表性学者group theory。胡伟《政府过程》。本特利的《政府过程》还停留在观念阶段，缺乏专门的资料搜集（梅里安认为政治学学者都应该去政府部门工作一段时间），因此研究成果相对粗糙。"},{"kind":"p","text":"②新政治科学运动："},{"kind":"p","text":"之前所有的政治学都是政治哲学，20世纪20年代，受自然科学发展的影响，在美国出现了场“新政治科学运动”，以查尔斯·梅里安，威廉·芒罗和乔治卡特林等为代表的政治学者，提倡科学主义的政治研究方法，主张采用社会学、心理学和统计学的方法来改革政治学研究，摒弃传统政治分析浓厚的价值判断色彩，以梅里安为首形成了政治学的“芝加哥学派”，聚拢了一大批政治科学研究者。成为继哥伦比亚大学之后美国又一政治学学术中心。这场“新政治科学运动为行为主义政治学研究开辟了道路。"},{"kind":"personal","text":"选票是可以量化的、精确的，而且是民主社会才有的"},{"kind":"p","text":"代表学者有罗伯特·达尔、戴维·伊斯顿、卡尔·多伊奇、塞缪尔·马丁·李普塞、H·西蒙、G·阿尔蒙德等，都深受行为主义的影响。"},{"kind":"p","text":"代表性著作包括V.O·凯的《美国各州及南部政治》（1949)、H拉斯韦尔和A·卡普兰的《权力与社会》（1950)、H·西蒙的《行政行为》（1950)、D·杜鲁门的《政府过程》（1951)、K·多伊奇的《政府的神经：政治沟通与控制的模式》（1963)、S·M·李普塞的《政治人》（1963)、D·伊斯顿的《政治生活的系统分析》（1965)、G·阿尔蒙德与G·小鲍威尔的《比较政治学：体系、过程、功能》（1966)等。"},{"kind":"p","text":"1928年F肯特在《政治行为》书中提出“政治行为”这一核心概念，瑞典政治学者H廷斯膝1937年的《政治行为》 书则使之广为人知。VO凯《美国各州及南部政治》这本书很好，《行政行为》政治心理学，拿了诺贝尔经济学奖。多伊奇政治传播学，资源动员理论。"}],"noteBlocksEn":[{"kind":"p","text":"Traditionalism here means a transitional stage that founded a new political-science tradition. It shifted attention from formal institutions to political process."},{"kind":"p","text":"Around the First World War, realist methods challenged legal and historical comparison. Scholars began to notice informal political behavior, parties, pressure groups, public opinion, and organized interests outside formal constitutional text."},{"kind":"p","text":"Bentley’s The Process of Government is treated as direction-setting but crude. It grasped that policy emerges through group activity, yet lacked refined data collection and analysis."},{"kind":"p","text":"Truman’s Governmental Process made group theory more precise. The course links it to interest articulation, opinion formation, and the study of pressure politics."},{"kind":"personal","text":"The notes add that Bentley remained largely conceptual. Merriam’s view that political scientists should work in government for a period explains why process research needs contact with actual administration."},{"kind":"p","text":"The New Political Science movement of the 1920s then follows. Merriam, Munro, and Catlin promoted social science, psychology, statistics, and empirical methods in place of thick normative judgment."},{"kind":"personal","text":"The vote matters because it is quantifiable, precise, and available in democratic society. Electoral research therefore became a natural bridge from political process to behavioral political science."}]},{"id":"merriam","x":-1.5,"y":3,"era":"1920s–1930s","title":{"zh":"梅里安与芝加哥学派","en":"Merriam and the Chicago School"},"tag":{"zh":"政治科学革命 · 调查 · 民主","en":"political-science revolution · survey · democracy"},"core":{"zh":["梅里安推动政治学科学化，但他不是简单的“统计主义者”。他支持社会调查、心理学和统计学方法，也反对把政治学完全交给统计学。他的核心立场可以概括为：政治学要跟着问题走，不应先决定方法，再用方法筛选问题。","梅里安的实践背景是美国进步主义运动。他希望用科学方法重建民主思想，使普通公民能够理解和控制公共事务。芝加哥学派由此成为行为主义之前最重要的政治科学基地，培养了阿尔蒙德、拉斯韦尔、V. O. Key 等一代学者。","【课后补充】笔记还强调梅里安的制度建设贡献：创建芝加哥政治学系、培养芝加哥学派、推动本科—研究生训练、论文规范、政治研究委员会和学会网络。政治科学不是单靠一本书建立，而是靠训练、组织和评价标准建立。"],"en":["Merriam pushed political science toward science, but he was not a simple statistician. He supported survey research, psychology, and statistical technique, while also rejecting the idea that statistics could absorb political science. His central position was: political science must follow the problem, not choose a method first and then select only questions that fit it.","His practical background was the Progressive movement. He wanted scientific method to rebuild democratic thought, making public affairs intelligible and controllable by ordinary citizens. The Chicago School thus became the most important base for political science before behavioralism, training figures such as Almond, Lasswell, and V. O. Key.","Post-class supplement: The notes also stress Merriam’s institution-building. He helped build Chicago’s political science department, train the Chicago School, and create undergraduate and graduate training, thesis norms, research committees, and association networks. Political science was built not by one book alone, but by training, organization, and standards of evaluation."]},"relation":{"zh":"梅里安把传统主义提出的问题转化为可调查、可组织、可培养的学科工程。","en":"Merriam turned the problems raised by traditionalism into a researchable, organized, teachable disciplinary project."},"works":{"zh":["《New Aspects of Politics》","《Non-Voting: Causes and Methods of Control》"],"en":["New Aspects of Politics","Non-Voting: Causes and Methods of Control"]},"strengths":{"zh":["建立政治学训练体系。","把政治科学与民主改革联系起来。","强调从问题出发，而非崇拜方法。"],"en":["Built a training system for political science.","Linked political science to democratic reform.","Insisted on problem-driven rather than method-worshipping research."]},"limits":{"zh":["政治科学化可能滑向技术主义。","行政推动学科也可能造成学派权力集中。"],"en":["Scientization can slide into technicism.","Administrative building of a school can also centralize academic power."]},"personal":{"zh":["梅里安的重要性不只是写了什么书，而是他怎样把政治学变成一个有学生、有课程、有规范、有研究团队的学科。"],"en":["Merriam matters not only because of what he wrote, but because he turned political science into a field with students, courses, norms, and research teams."]},"noteSection":"02 查尔斯·梅里安：美国的政治科学革命","keywords":["梅里安","政治科学","芝加哥学派","问题","统计学","民主"],"noteLimit":28,"noteBlocks":[{"kind":"p","text":"02 查尔斯·梅里安：美国的政治科学革命"},{"kind":"p","text":"很多美国政治学者将梅里安视为美国政治学之父，但中国目前很少的政治学者会关注到梅里安。社会科学研究大厦进门的牌子上写着“如果你的研究不能衡量，那么它就是苍白无力的。”但梅里安反对这种非统计学不科学的看法，因此梅里安一方面支持量化方法，另一方面又对其进行反思，统计学不能完全吸纳政治学。"},{"kind":"p","text":"一、查尔斯·梅里安其人其著"},{"kind":"p","text":"芝加哥是一个移民城市，19世纪的一场大火后，芝加哥经历重建，建成了现代化大都市，道路笔直。斯科特在《国家的视角》中对芝加哥的城市规划进行了分析。芝加哥融经济、商业、犯罪和学术于一体，和广州很像。是社会学研究的重要田野研究地，发展了最早的城市社会学。因此芝加哥也是美国社会学的发源地。移民研究著作《身处欧美的波兰农民》。政治科学革命在芝加哥发展出来是天时地利人和的。"},{"kind":"p","text":"1、学术生涯"},{"kind":"p","text":"1897年毕业于哥伦比亚大学，主修公法和政治理论，曾去柏林大学访学，因此获得了留校任教的资格。梅里安在德国访学期间受到了西美尔和韦伯的巨大影响（认为政治学应该吸取社会学的方法），二者都著有《经济与社会》。奥肯在《美国和美国的敌人》中认为梅里安在柏林大学的经历使其思想受到了德国纳粹的影响，因此美国政治学是法西斯主义的变种。"},{"kind":"p","text":"1900年起任教于芝加哥大学，主讲地方政府。1905年担任芝加哥大学政治学系系主任，一直延续到1940年，在任的35年使芝加哥大学政治学系蓬勃发展，任内非常专制。很类似伊利诺·奥斯特罗姆（诺贝尔经济学奖获得者）及其丈夫掌握印第安纳州立大学政府系长达半个世纪。梅里安卸任后由列奥·施特劳斯接任，将政治科学学者全部祛除出政治学系，引进汉娜阿伦特等政治哲学家，林毓生师承阿伦特（《中国传统的创造性转化》），政治科学家在全国各地寻求教职，因此促生了此后美国政治科学的行为主义革命。"},{"kind":"p","text":"2、两个思想渊源：实践和理论"},{"kind":"p","text":"①实践：进步主义运动"},{"kind":"p","text":"20世纪初，美国大繁荣时期社会治理的混乱，腐败严重。进步党候选人担任总统。进步主义时代的重要社会科学后果：进步主义运动主力军的记者（扒粪者）在记者生涯结束后成为芝加哥大学的社会学教授，比如费孝通的老师帕克就曾是记者。梅里安在研究生阶段就参与进步主义的各种运动，还讲授进步主义运动的课程，1909和1911年两次参选芝加哥市长但都以失败告终，但仍然成为了芝加哥市政委员并成为芝加哥进步主义运动的主力军。梅里安在政府任职的经历对其政治学研究有很大的助益，对公共事务进行成功的控制是政治学研究的目标。"},{"kind":"p","text":"②理论：马克思·韦伯与芝加哥社会学"},{"kind":"p","text":"芝加哥的社会学蓬勃发展使梅里安大受鼓舞，梅里安与社会学的斯诺和托马斯等学者结下了深厚的友谊。韦伯在1904年去美国搜集比较研究的资料（主题是非欧亚的宗教和政治组织），当时梅里安还是芝加哥大学名不见经传的讲师，听了韦伯的报告和讲座后梅里安认为韦伯的思想远远超过了当时美国政治学的杰出人物阿瑟·本特利。《经济与社会》和《以政治为业》是梅里安常常提及的韦伯的著作。"},{"kind":"p","text":"“人们的思想从未有过更大的波动，从未有过更尖锐的矛盾，在使用照理应该是理解得很透彻和确认了得名词和公式方面从未有过更莫名其妙的混乱。所有新的政治学说和主义反过来又祈求历史、科学和统计学、心理学和哲学的支持，使它们为进攻或防御所进行的新的宣传得到人们的认可。"},{"kind":"personal","text":"查尔斯·梅里安"},{"kind":"personal","text":"在现代国家产生之前，欧洲的档案资料由贵族保存，有家庭史但没有国家史；现代国家才会有统计学的资料"},{"kind":"p","text":"3、倡导政治科学"},{"kind":"p","text":"梅里安博士论文是《卢梭的政治学说》，另一著作是《美国的政治思想传统》。但此时的梅里安要扭转曾经的研究兴趣和专长，转为倡导政治科学。阿尔蒙德（梅里安学生）认为无论在学术还是公共生活中，梅里安都不是学者而是政治家。梅里安的主要做法是以行政行动推动政治科学，而非自己研究政治科学。但实际上第一部政治科学作品《不投票：控制的原因与方法》，以大规模社会调查为依据研究芝加哥公民不投票的原因，就是梅里安与同事合著的。梅里安另外的著作《政治学研究现状》和《政治学的新面向》，后者提出了“政治科学”这一概念。阿尔蒙德的评价有些偏颇，但主要是为了突出梅里安促进政治科学发展的行政作用（比如晚年参加博士生seminar）。"},{"kind":"p","text":"二、何谓“政治科学”"},{"kind":"p","text":"1、民主与科学：科学为民主服务"},{"kind":"p","text":"梅里安研究政治科学的目的是要守护美国的民主。他认为20世纪初的美国政治出现反民主的倾向，权力逐渐集中在少数人手中，而普通公民越来越难以参与政治，贫富分化越来越严重。而非科学的理论（非事实分析，而实际仅为判断性观点）以自由民主的修辞以维护权力集中化的倾向，陌生晦涩的学术话语脱离了民主倾向，保守思想甚嚣尘上。因此梅里安认为新时代的政治学必须重建民主思想，用科学的方法为民主原则服务。这是梅里安理解的德先生和赛先生。"},{"kind":"personal","text":"对当时很多学者来说，可能不认为美国是民主的政体，而是自由的政体，民主是苏联（无产阶级立国，平民政体）"},{"kind":"p","text":"2、政治学的科学化：主要是指引入社会调查的方法和技术。"},{"kind":"p","text":"有人认为社会调查是社会学方法，而政治学很多大的问题是不能调查的黑箱。但梅里安认为现代统计学正是起源于对国家事务的研究，现代国家就是建立在大规模和连续性的社会统计的基础上（人口、生产等）。因此中国在这一意义上很早就进入了现代国家阶段，而欧洲则多是家族私人资料的统计，且保存不完整、碎片化。因此梅里安认为政治学天生建立在统计学基础之上。不过梅里安的观点还是比较辩证的，虽然他认为采用统计学方法是正当的，但并不是绝对的。统计学吸纳政治学是完全不可能的。"},{"kind":"p","text":"政治科学最重要的是根据现象观察提出研究问题，而统计学的研究方法只是工具。政治学的科学化主要是指政治学的研究应该跟着问题走。很多案例研究要求做田野，而不一定要用问卷。问卷多只能用于主观感受的评估。"},{"kind":"p","text":"“要是政治研究者没有对我们所谓的‘问题’进行初步的考虑和说明并且没有特定的假设，就扎进对事实的搜集和定量分析的话，那将是灾难性的。”"},{"kind":"personal","text":"从问题出发，而不是从方法出发，但定量而言，只有符合方法才能研究"},{"kind":"p","text":"“我不是不关注研究人类经验史的重要性；我也不是不关注法学方法的价值；我只是说：不管问题通向哪里，政治学必须跟着问题走。”"},{"kind":"p","text":"三、梅里安的主要贡献"},{"kind":"p","text":"1、创建政治学系：1924年芝加哥大学创建政治学系，招收政治学本科生，使政治学开始有了自己培养的本科背景的研究生，意味着政治学学科自成体系。阿尔蒙德就是芝加哥大学政治学系的本科生。"},{"kind":"p","text":"2、创建芝加哥学派：梅里安通过从本科到研究生的政治学培养，创建了芝加哥学派，代表人物有阿尔蒙德、拉斯韦尔、V. O. Key 等。研究涉及公民投票、政治心理、政治效能感、城市社区政治、新闻团体等。"},{"kind":"p","text":"3、养育政治学学科：梅里安认为政治科学要超越单个学者在图书馆中培育出来的历史、法律和哲学方法，成为一门更有力的解释性学科；因此要有刊物、本科生、学会、研究委员会和标准化论文规范。"}],"noteBlocksEn":[{"kind":"p","text":"Merriam is treated as a founder of American political science. He supported quantification but rejected the idea that anything non-statistical is therefore unscientific."},{"kind":"p","text":"Chicago matters as a place: an immigrant metropolis rebuilt after fire, combining commerce, crime, municipal politics, and social research. Urban sociology made it a natural site for political science’s empirical turn."},{"kind":"p","text":"Merriam studied public law and political theory at Columbia, visited Berlin, and was influenced by Simmel and Weber. At Chicago he used administrative power to build the department and the field."},{"kind":"p","text":"His practical source was Progressivism. Corruption, concentrated power, and blocked participation convinced him that political science should help democratic control of public affairs."},{"kind":"p","text":"His theoretical source was Weber and Chicago sociology. The lecture stresses that modern states generate statistics, while premodern records often remained private or familial."},{"kind":"p","text":"Merriam turned from Rousseau and American political thought toward political science as an institutional project. Almond’s claim that he was more politician than scholar is treated as partly biased, because Merriam did produce empirical work such as the study of non-voting."},{"kind":"p","text":"For Merriam, science served democracy. Factual inquiry was a way to resist anti-democratic concentration of power hidden behind liberal rhetoric."},{"kind":"p","text":"The central methodological lesson is problem-first inquiry. Social survey is a tool. Research should begin with a problem and hypothesis, not with a pile of data or a fetish for method."},{"kind":"personal","text":"The notes stress the tension that quantitative research often studies only what fits the method, while Merriam’s better lesson is that political science must follow the problem wherever it leads."},{"kind":"p","text":"Merriam helped create a political science department at Chicago in 1924. It admitted undergraduates, which meant the discipline could train graduate students with a political-science background of their own. Almond was one of Chicago’s political science undergraduates."},{"kind":"p","text":"Merriam built the Chicago School through undergraduate and graduate training. Key figures included Almond, Lasswell, and V. O. Key. Their research covered voting, political psychology, political efficacy, urban community politics, and media groups."},{"kind":"p","text":"Merriam thought political science had to move beyond the historical, legal, and philosophical methods of lone scholars in libraries and become a stronger explanatory discipline. This required journals, undergraduate training, associations, research committees, and standardized thesis norms."}]},{"id":"behavioral","x":0,"y":4,"era":"1940s–1960s","title":{"zh":"行为主义","en":"Behavioralism"},"tag":{"zh":"可观察行为 · 政治系统 · 价值中立","en":"observable behavior · political system · value neutrality"},"core":{"zh":["行为主义的基本假设是：政治学应研究可观察、可测量、可检验的政治行为，而不是抽象的国家本质或规范价值。它从心理学的行为主义和逻辑实证主义取得灵感，强调规律性、可检验性、技术化、定量化、价值祛除和跨学科整合。","它把“国家”替换成“政治系统”。输入是要求和支持，输出是政策和决策；国家内部被视作难以观察的黑箱。这样，研究从国家中心转向社会中心，尤其重视选民、民意、政治传播、利益表达和公共舆论。","新制度主义反对的正是这一点：行为主义把制度当成容器或黑箱，倾向于把政治结果还原为个体态度、社会输入和行为数据。但制度并不只是反应社会压力，它还主动塑造偏好、身份、资源分配和行动者能看到的选择集合。","【课后补充】伊斯顿概括的行为主义特征包括规律性、可检验性、技术化、定量化、价值祛除、系统化、纯科学与一体化。其中“价值祛除”是研究姿态而非可完全实现的事实；“系统化”也更接近行为主义后期和结构功能主义共享的语言。"],"en":["Behavioralism assumes that political science should study observable, measurable, testable political behavior, not the abstract essence of the state or normative values. It drew inspiration from psychological behaviorism and logical positivism, stressing regularity, verification, technique, quantification, value-neutrality, and interdisciplinary integration.","It replaced “the state” with the “political system.” Inputs are demands and support; outputs are policies and decisions; the inside of the state is treated as a hard-to-observe black box. Research thus moved from a state-centered to a society-centered field, focusing on voters, attitudes, communication, interest articulation, and public opinion.","This is exactly what new institutionalism later opposed. Behavioralism treats institutions as containers or black boxes and tends to reduce political outcomes to individual attitudes, social inputs, and behavioral data. But institutions do not merely respond to social pressures; they shape preferences, identities, resources, and the set of choices actors can see.","Post-class supplement: Easton’s list of behavioral traits includes regularity, verification, technique, quantification, value-neutrality, systematization, pure science, and integration. Value-neutrality is a research stance, not a fully attainable fact. Systematization also belongs more to the shared language of late behavioralism and structural functionalism."]},"relation":{"zh":"行为主义解决了旧制度主义的静态问题，却制造了新的盲点：重大政治问题、价值、意识形态和制度自主性被边缘化。","en":"Behavioralism solved old institutionalism’s static problem, but created new blind spots: large political questions, value, ideology, and institutional autonomy were pushed aside."},"works":{"zh":["Dahl，《Who Governs?》","Easton，《A Systems Analysis of Political Life》","Lipset，《Political Man》","Simon，《Administrative Behavior》"],"en":["Dahl, Who Governs?","Easton, A Systems Analysis of Political Life","Lipset, Political Man","Simon, Administrative Behavior"]},"strengths":{"zh":["让政治学具备可检验的社会科学形式。","把民意、政治传播、选民行为纳入核心。","使研究从静态制度描述转向动态政治过程。"],"en":["Gave political science a testable social-scientific form.","Made public opinion, communication, and voting behavior central.","Moved the field from static institutional description to dynamic political process."]},"limits":{"zh":["能测量的往往是琐碎问题，重大政治问题反而被排除。","价值中立是方法姿态，不可能完全实现。","在不可测量或数据不透明的社会中解释力大幅下降。"],"en":["What is measurable is often trivial, while major political questions get excluded.","Value-neutrality is a methodological stance, not fully attainable.","Explanatory power declines sharply in societies where data are opaque or not measurable."]},"personal":{"zh":["政治科学与自由民主的关系，可能没有它与帝国、国家能力和调查基础设施的关系那么紧密。能调查谁，能统计什么，本身就是权力结构的一部分。"],"en":["Political science may be less tied to liberal democracy than to empire, state capacity, and survey infrastructure. Who can be surveyed and what can be counted are themselves part of power."]},"noteSection":"第一讲 导论：西方（美国）政治科学的沿革","keywords":["行为主义","政治体系","价值祛除","可检验性","只适用于可测量社会","局限性"],"noteLimit":36,"noteBlocks":[{"kind":"p","text":"洛威、维尔，拉斯基《美国总统制》：为什么英国首相权力稳定，而美国不同总统的权力强弱程度却不一样（通过总统行使否决权的次数）？此研究无关行政过程，完全是制度主义的。浦兴祖老师研究当代中国政治制度的方法与此类似。唐德刚（《胡适口述自治》《梅兰芳传稿》）在哥伦比亚大学留学的时候就质疑了美国通过定量方法研究中国政治。"},{"kind":"p","text":"⑤局限性："},{"kind":"p","text":"（1)法律制度的正式规定与实际政治过程之间的裂痕，无法从根本上得到解释"},{"kind":"p","text":"②新政治科学运动："},{"kind":"p","text":"之前所有的政治学都是政治哲学，20世纪20年代，受自然科学发展的影响，在美国出现了场“新政治科学运动”，以查尔斯·梅里安，威廉·芒罗和乔治卡特林等为代表的政治学者，提倡科学主义的政治研究方法，主张采用社会学、心理学和统计学的方法来改革政治学研究，摒弃传统政治分析浓厚的价值判断色彩，以梅里安为首形成了政治学的“芝加哥学派”，聚拢了一大批政治科学研究者。成为继哥伦比亚大学之后美国又一政治学学术中心。这场“新政治科学运动为行为主义政治学研究开辟了道路。"},{"kind":"personal","text":"选票是可以量化的、精确的，而且是民主社会才有的"},{"kind":"p","text":"3、行为主义（以权力研究为主的阶段）：政治学真正走向成熟的阶段"},{"kind":"p","text":"（1）行为主义的产生"},{"kind":"p","text":"第二次世界大战之后，西方国家的政治科学研究获得了巨额资金援助，研究机构和教育机构普遍设立，学者和学生队伍迅速扩大，刊物和专著大量问世，政治科学研究进入鼎盛时期，形成大量次领域（理论体系如一般系统论、结构"},{"kind":"personal","text":"功能论和沟通理论等：概念范畴如政治体系、政治沟通、政治评价等；学科领域如政治社会学、政治心理学、政治人类学、政治生态学、政治文化、政治发展等）。"},{"kind":"personal","text":"政治学研究与自由民主发展关系可能不如与帝国、霸权关系紧密 只研究可观察的对象，国家是个黑箱（只能依赖经验的观察，而不能进行调查），因此转而研究调查社会（但问卷调查有很大局限，基本上只能问主观态度）。"},{"kind":"p","text":"芝加哥大学发生的政变，列奥施特劳斯把政治科学学者都赶走后转向政治哲学研究，而政治科学则在美国开枝散叶了，政治学真正走向成熟。此阶段的政治学开始社会科学化，但“社会科学”之名被麦卡锡主义排斥，因此改名为行为主义。"},{"kind":"p","text":"行为主义的缘起："},{"kind":"p","text":"心理学：政治学的“行为主义”（behavioralism）是从心理学的“行为主义” （behaviorism）一词演变而来的，两者都强调祛除主观因素，研究因外界刺激所产生的可观察的行为。"},{"kind":"p","text":"逻辑实证主义：从普遍的现象中进行归纳推演出“真命题”"},{"kind":"p","text":"1928年F·肯特在《政治行为》一书中提出“政治行为”这一核心概念，瑞典政治学者H·廷斯滕1937年的《政治行为》一书则使之广为人知。"},{"kind":"p","text":"·20世纪50、60年代，行为主义逐渐在美国政治学中占据了统治地位。1950年，P.奥德加德成为第一位当选美国政治学会会长的行为主义学者。但实际上这个阶段美国政治学评论发表的行为主义研究专著很少（平均每年只占4%，最多11%，很少把量化研究写成书，研究专著一般是历史社会学和比较历史研究或者政治学理论），10年间发表的505篇文章中政治科学的文章只有180篇左右（美国政治学会主席沃克在就职仪式上的演讲提出的质疑），大量还是政治哲学和政治理论的文章。因此沃克认为当时美国政治学并不处于行为主义阶段，而是前行为主义阶段。这十年之所以看似行为主义繁荣，是因为行为主义的学者的影响力很大。美国理性选择理论的杂志rational choice 作者排序是按照音序，现在理性选择理论要求实证案例证实，歪风邪气。经济学只是模型，并不能直接解释现实。"},{"kind":"p","text":"比较来看，中国政治学发展到了哪个阶段？只有唯一一本政治学刊物《政治学研究》。《政治思想史》刊物的影响因子（引用率）太低，政治思想史学者不会互相引用。因此中国政治学的刊物问题只能以书代刊，比如《复旦政治学评论》，但以书代刊面临严打压力，审查出版的周期很长。现在做学问很多是可替代的，大家都会跑回归，研究可以交给电脑，政治科学量化报告和公司白领是一样的，大学老师都在跑项目、项目经理，结果就是学者都变成可替代的；传统做学术不可替代，严北溟讲《金刚经》。中国发文章真正双向匿名评审的文章是不会通过的，发出文章的一般就是约稿。"},{"kind":"p","text":"（3）代表性学者与代表性著作"},{"kind":"p","text":"代表学者有罗伯特·达尔、戴维·伊斯顿、卡尔·多伊奇、塞缪尔·马丁·李普塞、H·西蒙、G·阿尔蒙德等，都深受行为主义的影响。"},{"kind":"p","text":"代表性著作包括V.O·凯的《美国各州及南部政治》（1949)、H拉斯韦尔和A·卡普兰的《权力与社会》（1950)、H·西蒙的《行政行为》（1950)、D·杜鲁门的《政府过程》（1951)、K·多伊奇的《政府的神经：政治沟通与控制的模式》（1963)、S·M·李普塞的《政治人》（1963)、D·伊斯顿的《政治生活的系统分析》（1965)、G·阿尔蒙德与G·小鲍威尔的《比较政治学：体系、过程、功能》（1966)等。"},{"kind":"p","text":"1928年F肯特在《政治行为》书中提出“政治行为”这一核心概念，瑞典政治学者H廷斯膝1937年的《政治行为》 书则使之广为人知。VO凯《美国各州及南部政治》这本书很好，《行政行为》政治心理学，拿了诺贝尔经济学奖。多伊奇政治传播学，资源动员理论。"},{"kind":"p","text":"（4）行为主义的缘起"},{"kind":"p","text":"·心理学：政治学的“行为主义”（behavioralism)是从心理学的“行为主义”（behaviorism)一词演变而来的，两者都强调祛除主观因素，研究因外界刺激所产生的可观察的行为。当时心理学是所有社会科学的标杆，因为心理学已经无比地科学化，但心理学不是社会心理学（后者往往很水，厉害的心理学是医学领域的，医学在某种程度上也是社会科学、建立在大量统计基础上，接触疑难杂症多的医生的水平更高 公共卫生领域QCA-“案例导向”的小数量和中等数量案例研究-症状的最大公约数）。行为主义不等于政治心理学，当时政治心理学是边缘化的，尽管拉斯韦尔（政治心理学学者）当时当过美国政治学会的主席。"},{"kind":"p","text":"·逻辑实证主义：从普遍的现象中进行归纳推演出“真命题”。维特根斯坦等维也纳学派，为行为主义贡献的是从普遍现象中进行归纳推演出“真命题”。洪谦。"},{"kind":"p","text":"（5）行为主义革命"},{"kind":"p","text":"行为主义反对传统的制度研究方法，认为人的政治行为相比政治制度更具有根本性。因此，个体的政治行为是政治学研究最基本的单位，也是唯一正确的信息来源，政治学研究应集中在政治机构的活动以及围绕它所发生的政治行为上。"},{"kind":"personal","text":"中国的特点：很多调查是政府内调查。与美国很不同（社会学调查、调查选民等，所以转变为社会为中心）"},{"kind":"p","text":"行为主义是一场革命，主张行为比制度更重要，行为才是唯一正确的信息来源。其革命之处为以下三点："},{"kind":"p","text":"①行为主义政治学为政治学研究设定了新的研究重点和研究方向，并提供了相应的方法论，使政治学研究具有了精确性。不再研究国家，转而研究社会。因为国家是不可观察的，社会相应容易调查。但换个角度，可以被科学研究观察的对象都是对政治不重要的，政治科学和实际政治毫无关联，为了发表而发表，不追求真理、只追求评职称。但在中国可以进行政府内调查，设计一套政府内调查的学术伦理。"},{"kind":"p","text":"②使政治学研究从静态描述转向动态研究、从定性分析转向定量分析，从规范理论转向经验事实、从宏观建构转向微观考察（微观研究对象是个体，动机等等）、从封闭式研究转向跨学科综合研究。"},{"kind":"p","text":"③用“政治体系”取代“国家”，使国家中心的政治学向社会中心的政治学转变因为纳入了社会为研究对象，把国家和社会打包成政治体系。"},{"kind":"personal","text":"最核心的是政治传播、公共舆论、民意。从社会到国家，之间的桥梁是最重要的，如何将利益表达聚合成某种政策，这其中公共舆论是最重要的"},{"kind":"p","text":"（6）行为主义的特征（伊斯顿）："},{"kind":"p","text":"①规律性。以前的都是应然的、规范性的，没有归纳。"},{"kind":"p","text":"②可检验性。可以被经验证实或证伪。"},{"kind":"personal","text":"社会运动无法重复检验，很多人类学研究几乎难以检验"}],"noteBlocksEn":[{"kind":"p","text":"Behavioralism grows from the failure of old institutionalism and from the methodological work of the Chicago School. It turns from formal institutions to observable political behavior."},{"kind":"p","text":"After the Second World War, political science received major funding, research centers, journals, and students. Subfields expanded rapidly: political sociology, psychology, anthropology, culture, development, communication, and systems theory."},{"kind":"personal","text":"The notes add that political science may be connected to empire, hegemony, and governability, not only to liberal democracy."},{"kind":"p","text":"Behavioralism has two intellectual sources. From psychological behaviorism it takes the effort to remove subjective factors and study observable behavior. From logical positivism it takes the hope of deriving true propositions from empirical regularities."},{"kind":"p","text":"The idea of political behavior appears in F. Kent in 1928 and becomes widely known through Herbert Tingsten in 1937. Dahl, Easton, Deutsch, Lipset, Simon, and Almond all become associated with the behavioral moment."},{"kind":"p","text":"The lecture complicates the story of behavioral dominance: some critics argued that fully behavioral work was not as common in APSR as the later narrative suggests. Behavioral influence was larger than its publication share."},{"kind":"p","text":"The behavioral revolution makes individual political behavior the basic unit, shifts research from static and normative to dynamic and empirical, and replaces the state with the political system."},{"kind":"personal","text":"The notes say China differs because many political surveys are internal to government rather than social surveys of voters. This creates a separate ethics problem for inside-government research."},{"kind":"p","text":"Easton’s behavioral traits include regularity, verification, technique, quantification, value-neutrality, systematization, pure science, and integration. The course treats value-neutrality as an ideal rather than a fully achievable condition."},{"kind":"p","text":"The limits are central: behavioralism avoids value and ideology, focuses on measurable but often trivial topics, lets method replace problem, and works only in societies that can be measured."},{"kind":"personal","text":"A sharp marginal note says what can be observed scientifically may be exactly what is politically unimportant. This explains why later schools return to state, history, culture, and political philosophy."}]},{"id":"structfunc","x":1.5,"y":4.4,"era":"1950s–1970s","title":{"zh":"结构功能主义","en":"Structural Functionalism"},"tag":{"zh":"系统 · 功能 · 中层理论","en":"system · function · middle range"},"core":{"zh":["结构功能主义试图提供一种“科学的定性方法”。它不是单纯规范论，也不是定量相关分析，而是追问某种结构在系统中承担什么功能。涂尔干把社会看作有机体，马林诺夫斯基把人类学中的异文化实践放回整体关系中理解，帕森斯以行动系统和 AGIL 模式将功能主义系统化。","默顿的中层理论修正了帕森斯的宏大抽象。中层理论位于零散工作假设和包罗万象的宏大理论之间，它要求研究者找到最贴近因果机制的研究单位。这样，因果链不会过长，也不容易把研究变成空泛的意识形态。","【课后补充】结构功能主义的基本工具还包括帕森斯的 AGIL 模式，即适应、目标达成、整合和模式维持；默顿则补充显功能、潜功能、反功能和功能替代物。后者使功能主义不必把每个现存制度都理解为有益于系统维持。"],"en":["Structural functionalism tried to provide a “scientific qualitative method.” It was neither pure normative theory nor quantitative correlation analysis; it asked what function a structure performs inside a system. Durkheim treated society as an organism, Malinowski interpreted alien cultural practices within whole relations, and Parsons systematized functionalism through action systems and the AGIL schema.","Merton’s middle-range theory corrected the abstraction of Parsonsian grand theory. Middle-range theory lies between scattered working hypotheses and all-encompassing grand theory. It asks researchers to find the unit closest to the causal mechanism, so the causal chain is shorter and less likely to become ideology.","Post-class supplement: The basic tools of structural functionalism also include Parsons’s AGIL scheme: adaptation, goal attainment, integration, and latent pattern maintenance. Merton adds manifest functions, latent functions, dysfunctions, and functional alternatives. This keeps functionalism from treating every existing institution as beneficial to system maintenance."]},"relation":{"zh":"它与行为主义并行：行为主义提供测量，结构功能主义提供机制化的定性解释。后来新制度主义继承了它对“结构”的重视，但反对它过强的目的论。","en":"It ran alongside behavioralism: behavioralism offered measurement, structural functionalism offered qualitative mechanism. New institutionalism inherited its attention to structure but rejected its heavy teleology."},"works":{"zh":["Parsons，《The Social System》","Merton，《Social Theory and Social Structure》","Almond 与 Powell，《Comparative Politics》"],"en":["Parsons, The Social System","Merton, Social Theory and Social Structure","Almond and Powell, Comparative Politics"]},"strengths":{"zh":["提供定性机制分析语言。","允许比较不同结构如何承担同一功能。","中层理论能避免宏大解释的空泛。"],"en":["Provides a language for qualitative mechanism.","Allows comparison of how different structures perform the same function.","Middle-range theory avoids the emptiness of grand explanation."]},"limits":{"zh":["容易把系统维持当成政治的自然目的。","功能分析常有目的论和保守色彩。","若只问功能，不问冲突和权力来源，就难以解释变迁。"],"en":["Can treat system maintenance as the natural purpose of politics.","Functional analysis often carries teleological and conservative assumptions.","If it asks only about function and not conflict or power, it struggles to explain change."]},"personal":{"zh":["结构功能主义在中国政治学中影响很大，因为它和“系统工程”的改革语言很契合。但若把所有问题都说成结构—功能错位，就容易失去具体机制。"],"en":["Structural functionalism mattered in Chinese political science because it fit the reform language of “systems engineering.” But if every problem becomes structural-functional mismatch, concrete mechanism disappears."]},"noteSection":"03 政治学的“结构——功能主义”","keywords":["功能主义","帕森斯","默顿","结构与功能","中层理论","局限性"],"noteLimit":36,"noteBlocks":[{"kind":"p","text":"03 政治学的“结构"},{"kind":"personal","text":"功能主义”"},{"kind":"p","text":"结构功能主义在美国政治学的主流看来是无用的，阿尔蒙德之后很快就被历史淘汰了。但这个流派对中国政治学90年代的时候扮演了非常重要的角色。"},{"kind":"p","text":"梅里安之后，美国政治学的行为主义和量化研究大行其道，但定量研究只能揭示相关关系，而不能分析因果机制。而结构功能主义则是一种科学的定性方法（区别于定量研究和规范性、制度主义的定性研究）。"},{"kind":"personal","text":"阿尔蒙德对中国的政治制度改革很有意义，结构与功能错位，对中国影响深远"},{"kind":"p","text":"一、功能主义简介"},{"kind":"p","text":"1、涂尔干的功能主义"},{"kind":"p","text":"功能原本是生物学概念，涂尔干对社会的生物学考察是团结社会学，社会是有机体，研究人类的共同生活形式对维护人类的团结的意义，不同于马克思的冲突社会学。查尔斯梯利早期是研究社会冲突的，但晚年开始了对涂尔干的研究，试图将涂尔干和马克思的理论弥合"},{"kind":"personal","text":"《信任与统治》（越是具有有机团结的社群，对社会的冲突性就越强）。"},{"kind":"personal","text":"整体主义的取向"},{"kind":"p","text":"后来马林·诺夫斯基等学者开始将功能主义和人类学相结合。《特罗布里恩群岛》认为社会事务的意义取决于他和其他事物的关系和他对社会的整体贡献。"},{"kind":"p","text":"①强调社会整体大于个人，因此社会学整体上是功能主义的，将个人行为放入整体社会中理解，（因此做社会学解释就是功能主义的）还原为社会的影响，强调文化语境。因此社会学不能使用博弈论（从个体理性出发），因为个人理性选择不能用普遍的社会理论解释。"},{"kind":"p","text":"②突破了西方中心论的立场，以解释社会学的态度去理解其他文明的合理性。从行为的表象出发，寻找行为背后的动因和社会结构。功能主义的名言：“巫术是巫术所做的”，原始部落的行为和现代文明社会的行为的功能是一致的，巫术具有缓解危机焦虑的作用，这与现代医学和科学的功能是一样的，重点不在于巫术而在于巫术背后的社会功能。如果不能平等对待其他文化，何来比较研究？功能主义认为个体行为是不能孤立观察的，致力于寻找行为表象的理论意义，即背后动机，这就不得不引进整体的社会关系。"},{"kind":"p","text":"费孝通（马林诺夫斯基的学生）晚年用霍桑实验反思所受的功能主义的影响，比如婚恋是为了实现延续种族的功能，而个体情感则被功能主义彻底抛弃了。"},{"kind":"personal","text":"社会学几乎就是功能主义"},{"kind":"p","text":"2、帕森斯的“结构"},{"kind":"personal","text":"功能主义”"},{"kind":"p","text":"帕森斯提出系统的概念，他认为整体概念太抽象了，且有严重的神秘主义色彩。他认为任何人的行为都置于一个具体的系统之中，把系统论引入功能主义，提出“行动系统”的概念。但实际上系统的概念也很抽象，虽然他本人看来是具体的。"},{"kind":"p","text":"帕森斯提出了AGIL模式，即系统维持所必须的四种功能。适应功能（Adaptation）、目标（Goal）、整合（Integration）、维持（Latence）。但这四种功能是先验而非经验的，因此有严重的目的论和决定论色彩。不过帕森斯把功能主义的整体观点与美国文化语境中的个人主义相结合，可以用功能主义在美国社会进行实证研究。"},{"kind":"p","text":"80s中国学者基本上都在做系统论"},{"kind":"personal","text":"方法论上的提醒，改革是系统工程"},{"kind":"p","text":"3、默顿的中层理论"},{"kind":"p","text":"杨念群（杨度的孙子）曾长期致力于在国内推广默顿的中层理论。整体的概念过于抽象和宏达，大而无当，从个体到整体的因果链太长了，对微观行为的解释力较弱，因此需要中层单位来使因果解释更加切实。整体的规模是需要科学地确定的，研究质量的高低就在于“整体”是否贴近所研究的客体，约贴近，因果链就越短，反之过于宏大的因果链则更容易被质疑，因果链太长就容易变成意识形态，因此要找的不是决定论意义上的因果关系，而是生物学以上的机制。中层理论不再囊括整个社会，而是侧重对参考群体的考察"},{"kind":"p","text":"默顿的中层理论是很重要的，中层理论不是介于宏观和微观之间的研究，个案研究应该要找到与因果解释最贴近、最合适的研究单位。一切革命都源于生产力和生产关系的矛盾，这是正确的，但对学术研究的发展毫无作用，研究需具体。因此默顿的中层理论使得功能主义产生了一种可以与行为主义定量方法相对的研究方法（合适的研究单位）。"},{"kind":"p","text":"二、政治学中的结构"},{"kind":"personal","text":"功能主义"},{"kind":"p","text":"柏伊姆区分了政治学对功能主义的三种运用：一是折衷主义的功能主义，二是经验的功能主义，三是结构—功能主义。"},{"kind":"p","text":"结构与功能：功能实际上是“结构所产生的与系统相关的结果”。结构与功能可以相互转换，当功能被固定化就成为结构。一定的结构必然具有一定的功能，一定的功能也相应地要求某种结构。"},{"kind":"p","text":"国内学术界对三种功能主义是滥用的，应该具有方法论的自觉。折衷主义的功能主义，即认为任何事物都有其功能，这种功能主义是没有任何理论意义的。经验的功能主义（社会学），即默顿的中层理论，通过田野调查找到因果解释。政治学的结构功能主义（帕森斯），不同于默顿中层理论的仅在一定规模之内的因果机制的特殊性，而是强调系统论及其普遍性的功能。"},{"kind":"p","text":"职责不是“结果”，而是前提条件、被规定的，一种基础（结构），是静态的；而功能是动态的"},{"kind":"p","text":"伊斯顿企图建立一般理论，进行宏观分析，而不是象微观研究那样支离破碎；问题在于伊斯顿的“一般系统论”又是一种经验分析，故而不仅抽象，而且无法产生持久的影响。"},{"kind":"p","text":"一般理论用在经验分析通常会脱节，经验分析和宏观分析是不能直接结合的，否则就会显得畸形，落在默顿的中层才会有生命力。60年代之后在美国政治学发表的论文中就极少引用伊斯顿的理论了，一般系统论被美国政治学抛弃了。（伊斯顿、阿尔蒙德基本上在case study中被抛弃了）"},{"kind":"p","text":"四、阿尔蒙德的“结构功能主义”"},{"kind":"p","text":"伊斯顿认为政府是黑箱，而阿尔蒙德关注的重点则恰恰是政府本身，在伊斯顿的基础上细化了政治系统内部的结构和功能。"},{"kind":"personal","text":"如今很多重要的政治行为都是在阿尔蒙德的利益表达框架理解，政策制定则在利益聚合的框架中理解；为理解政府的过程提供了很好用的框架。中国学者一直很希望探讨政府过程，但实际上是非常难的；真正贯彻阿尔蒙德的框架研究中国政治的是《政府过程》"},{"kind":"p","text":"五、结构"},{"kind":"personal","text":"功能主义的理论影响"},{"kind":"p","text":"1、将政治学的研究对象从“国家”扩展到“政治体系”"},{"kind":"p","text":"对不同政治文化持平等的分析和比较态度，并不是国会立法优于行政机构的立法，还要看法律的效果如何。"},{"kind":"p","text":"六、结构—功能主义的局限性"},{"kind":"p","text":"1、早期的功能主义都是强调系统整体对于行动者个人的影响，或者说，行动者完全服从于整体系统的功能需要而行动，因此研究的重点在于维持系统所必要的行动。行为主义的兴起，则使使之开始注重行动者的选择，探讨维护政治系统所必要的行为方式。"},{"kind":"p","text":"2、以整体功能假定为预设前提，目的论和决定论色彩浓重。"}],"noteBlocksEn":[{"kind":"p","text":"Structural functionalism was soon considered outdated in the American mainstream after Almond, but the lecture stresses its importance for Chinese political science in the 1990s."},{"kind":"p","text":"It offers a scientific qualitative method. Quantitative research can show correlation, but structural functionalism asks what functions a structure performs for a system."},{"kind":"p","text":"Durkheim’s functionalism begins from society as an organism and studies solidarity. The lecture contrasts this with Marx’s conflict sociology."},{"kind":"p","text":"Malinowski and anthropology extend functionalism by treating apparently irrational practices as meaningful. Magic matters because of what magic does: it relieves anxiety and helps a community handle uncertainty."},{"kind":"p","text":"The course uses functionalism to oppose Western-centrism. Comparative research must ask what a practice does in its own cultural context before judging it irrational."},{"kind":"p","text":"The limit of early functionalism is that the individual can be swallowed by the system. Fei Xiaotong’s later reflections show that functional explanation can erase emotion and subjectivity."},{"kind":"p","text":"Parsons introduces the system and the AGIL model: adaptation, goal attainment, integration, and latent pattern maintenance. The problem is that these functions are a priori, so the model easily becomes teleological."},{"kind":"p","text":"Merton’s middle-range theory corrects grand functionalism by choosing the unit closest to the causal mechanism, such as a reference group, community, organization, or institution."},{"kind":"p","text":"The lecture distinguishes eclectic, empirical, and structural functionalism. Eclectic functionalism says everything has a function and explains little; empirical functionalism seeks mechanisms; political structural functionalism emphasizes system-level functions."},{"kind":"personal","text":"The notes warn that a duty is not a function. A duty is stipulated; a function is the consequence a structure produces for the system."}]},{"id":"easton","x":2.8,"y":4.9,"era":"1965","title":{"zh":"伊斯顿的一般系统论","en":"Easton’s General Systems Theory"},"tag":{"zh":"输入 · 支持 · 黑箱","en":"inputs · support · black box"},"core":{"zh":["伊斯顿把政治生活理解为系统。环境向政治系统输入要求与支持，政治系统输出权威性决策，再通过反馈影响环境。要求有表达、调节和缩减功能；支持则分为政治共同体、典则和当局三个对象。","伊斯顿的贡献是把政治学从分散经验研究重新拉向宏观框架。他的问题也在这里：一般系统论过于抽象，很多概念难以操作化。尤其是把政府内部当成黑箱，后来使它很难直接服务于具体案例研究。","【课后补充】伊斯顿的“支持”需要区分弥散性支持与特定支持。弥散性支持是一种对共同体、政体和象征的情感储蓄；特定支持则是对具体政策输出的就事论事评价。这个区分对分析合法性、政策满意度与政权韧性很有用。"],"en":["Easton understood political life as a system. The environment sends demands and support into the political system; the system outputs authoritative decisions; feedback then affects the environment. Demands express, regulate, and reduce; support is directed toward the political community, the regime, and the authorities.","Easton’s contribution was to pull political science back from fragmented empirical work toward a macro framework. Its weakness lies in the same move: general systems theory is highly abstract and difficult to operationalize. Treating the inside of government as a black box made it hard to use in concrete case research.","Post-class supplement: Easton’s idea of support should be divided into diffuse and specific support. Diffuse support is a reservoir of attachment to community, regime, and symbols. Specific support is approval of particular policy outputs. This distinction is useful for studying legitimacy, policy satisfaction, and regime resilience."]},"relation":{"zh":"阿尔蒙德之所以更有生命力，是因为他接着打开伊斯顿的黑箱，分析政治系统内部的功能分工。","en":"Almond lasted longer because he opened Easton’s black box and analyzed functional differentiation inside the political system."},"works":{"zh":["David Easton，《A Systems Analysis of Political Life》"],"en":["David Easton, A Systems Analysis of Political Life"]},"strengths":{"zh":["区分要求、支持、反馈，提供宏观政治分析框架。","弥散性支持与特定支持的区分仍能用于分析合法性和政策支持。"],"en":["Distinguishes demands, support, and feedback in a macro framework.","The distinction between diffuse and specific support remains useful for legitimacy and policy support."]},"limits":{"zh":["抽象性强，操作性弱。","把国家内部当黑箱，限制了制度分析。"],"en":["High abstraction, low operationalization.","Treating the state’s interior as a black box limits institutional analysis."]},"personal":{"zh":["在中国研究中，“政治支持高、政策支持低”很有启发性，但必须追问党、国家、政体、当局能否在经验上分开。不能把西方概念直接套入。"],"en":["For China studies, “high political support, low policy support” is useful, but one must ask whether party, state, regime, and authorities can be empirically separated. Western concepts cannot simply be imposed."]},"noteSection":"03 政治学的“结构——功能主义”","keywords":["伊斯顿","输入","支持","政治共同体","弥散性支持","特定支持","一般理论"],"noteLimit":26,"noteBlocks":[{"kind":"p","text":"职责不是“结果”，而是前提条件、被规定的，一种基础（结构），是静态的；而功能是动态的"},{"kind":"p","text":"功能是结构产生的与系统相关的结果，一定的结构必然有一定的功能，一定的功能也相应地要求某种结构。比如政党这个结构在整个政治系统中的作用，适应功能即调适国家和社会利益，界定政治系统的目标，整合社会多元利益并输入社会系统，输入社会对国家的支持。"},{"kind":"p","text":"功能是先验的，结构则是变化的，同一功能可以由不同结构来承担，这就可以进行比较研究，平等评价不同结构的功能效果。"},{"kind":"p","text":"结构和功能是可以相互转换的，功能被固定了就可以成为结构，结构固定了就成为功能。比如政府职能，是法律规定的一种结构，但也可以视作政府的功能。"},{"kind":"p","text":"三、戴维·伊斯顿的“一般系统论”"},{"kind":"p","text":"从80年代直到21世纪，中国社会科学都笼罩在系统论的阴影之下。伊斯顿的《政治生活的系统分析》。"},{"kind":"p","text":"输入政治系统的是要求和支持"},{"kind":"p","text":"要求具有三大功能：（1）表达功能；（2）调节功能；（3）缩减功能/聚合功能"},{"kind":"p","text":"如果要求获得了满足，环境就会输入支持，而系统就得到了维持，否则会形成支持损耗。"},{"kind":"p","text":"支持具有三个层次，即政治共同体（民族国家）、典则（政体、法律）和当局。"},{"kind":"p","text":"政治系统为了获得支持，可以有三种反应："},{"kind":"p","text":"（1）结构调节"},{"kind":"p","text":"（2）散布性支持"},{"kind":"p","text":"（3）特定支持"},{"kind":"p","text":"输入的是需求和支持，输出的则是决策。伊斯顿认为输入政治系统的要求有表达、调节和缩减的三大功能。"},{"kind":"p","text":"SOR的刺激反应模式，S输入，O组织有机体，R回馈。O在伊斯顿看来是一个黑箱，是不能研究的，因此政治学能研究的只是需求和支持的输入和决策的输出以及反馈。"},{"kind":"p","text":"伊斯顿的支持概念属于合法性，但支持是有条件的，合法性在韦伯看来是无条件的。即赵鼎新的绩效合法性的概念谬误（绩效合法性只是有效性，即支持，但不能说是合法性）。"},{"kind":"p","text":"支持具有政治共同体（民族国家）、典则（政体、法律）和当局的三个层次，三个层次的支持是相互独立的，认同政治共同体也不一定认同典则和当局，但支持当局则意味着同时支持典则和政治共同体。"},{"kind":"p","text":"弥散性支持"},{"kind":"personal","text":"支持储蓄。因此要培养对特定象征的情感"},{"kind":"p","text":"特定支持"},{"kind":"personal","text":"就事论事"},{"kind":"p","text":"以伊斯顿的系统论为基础，对中国的研究提出了：威权的韧性的来源：有回馈的政体会不断释放政策红利；陈捷研究的中国的政治支持和政策支持之间的分野，政治支持很高但政策支持率比较低。但是，党和国能分开吗？"},{"kind":"p","text":"伊斯顿企图建立一般理论，进行宏观分析，而不是象微观研究那样支离破碎；问题在于伊斯顿的“一般系统论”又是一种经验分析，故而不仅抽象，而且无法产生持久的影响。"},{"kind":"p","text":"一般理论用在经验分析通常会脱节，经验分析和宏观分析是不能直接结合的，否则就会显得畸形，落在默顿的中层才会有生命力。60年代之后在美国政治学发表的论文中就极少引用伊斯顿的理论了，一般系统论被美国政治学抛弃了。（伊斯顿、阿尔蒙德基本上在case study中被抛弃了）"},{"kind":"p","text":"四、阿尔蒙德的“结构功能主义”"},{"kind":"p","text":"伊斯顿认为政府是黑箱，而阿尔蒙德关注的重点则恰恰是政府本身，在伊斯顿的基础上细化了政治系统内部的结构和功能。"},{"kind":"personal","text":"为什么阿尔蒙德至今有用而伊斯顿被抛弃，就是因为伊斯顿认为是黑箱的部分，阿尔蒙德试图打开它"}],"noteBlocksEn":[{"kind":"p","text":"Easton translates structural functionalism into political analysis. The political system receives demands and support and produces authoritative decisions."},{"kind":"p","text":"Demands perform expression, regulation, and reduction or aggregation. When demands are satisfied, support flows back into the system; when they are not, support is depleted."},{"kind":"p","text":"Support has three objects: the political community, the regime, and the authorities. These are analytically distinct, even when they overlap in real politics."},{"kind":"p","text":"The model resembles stimulus-organism-response. The organism, meaning the internal political system, is treated as a black box. Political science studies inputs, outputs, and feedback."},{"kind":"p","text":"Diffuse support is a reservoir of attachment to symbols and institutions. Specific support is approval of concrete outputs."},{"kind":"p","text":"The China-related extension is authoritarian resilience: a responsive regime can release policy benefits and preserve support. The notes also mention research separating political support from policy support."},{"kind":"personal","text":"The question for China is whether party and state can really be separated as objects of support."},{"kind":"p","text":"The fundamental problem is that Easton wants both general theory and empirical analysis. The result is often too abstract for case studies and too empirical to function as pure theory."},{"kind":"personal","text":"Almond remains useful because he tries to open the black box that Easton leaves closed."}]},{"id":"almond","x":3.8,"y":5.2,"era":"1966","title":{"zh":"阿尔蒙德的比较政治框架","en":"Almond’s Comparative Politics"},"tag":{"zh":"打开黑箱 · 利益表达 · 功能层次","en":"opening the black box · interest articulation · functional levels"},"core":{"zh":["阿尔蒙德保留“政治系统”的语言，但不再把政府内部当作黑箱。他把政治功能分为三个层次：体系层次（政治社会化、政治录用、政治沟通）、过程层次（利益表达、利益综合、政策制定、政策实施）、政策层次（提取、分配、管制、象征）。","他的理论价值在于把经验事实抽象成可比较的功能。例如税收、征兵和公务员录用都可被理解为“提取功能”；国会、行政机关、政党和利益集团都可以参与利益表达与聚合。这样，不同制度可以在功能上被平等比较。","【课后补充】阿尔蒙德的另一个核心贡献是政治文化研究。《公民文化》把政治取向区分为地方型、臣属型与参与型，并追问怎样的文化组合有利于民主稳定。政治文化在这里是连接宏观制度和微观态度的中层概念。"],"en":["Almond kept the language of the political system but refused to leave the inside of government as a black box. He divided political functions into three levels: system functions, such as political socialization, recruitment, and communication; process functions, such as interest articulation, aggregation, policy-making, and implementation; and policy functions, such as extraction, distribution, regulation, and symbolic functions.","His value lies in abstracting empirical facts into comparable functions. Taxation, conscription, and bureaucratic recruitment can all be seen as extraction. Legislatures, executives, parties, and interest groups can all participate in articulation and aggregation. Different institutions can therefore be compared by function.","Post-class supplement: Almond’s other major contribution is political culture. The Civic Culture distinguishes parochial, subject, and participant orientations and asks which cultural mix supports democratic stability. Political culture functions here as a middle-level concept linking macro institutions and micro attitudes."]},"relation":{"zh":"阿尔蒙德把结构功能主义从过度抽象的一般系统论拉回政府过程研究。","en":"Almond brought structural functionalism back from abstract systems theory into the study of governmental process."},"works":{"zh":["Almond 与 Powell，《Comparative Politics: A Developmental Approach》","Almond 与 Verba，《The Civic Culture》"],"en":["Almond and Powell, Comparative Politics: A Developmental Approach","Almond and Verba, The Civic Culture"]},"strengths":{"zh":["功能层次清楚，便于比较。","为政府过程研究提供可用框架。","将政治文化引入比较政治。"],"en":["Clear functional levels for comparison.","Provides a usable framework for governmental process.","Introduces political culture into comparative politics."]},"limits":{"zh":["描述完整不等于解释充分。","仍带有系统维持的保守预设。"],"en":["Descriptive completeness is not sufficient explanation.","Still carries the conservative premise of system maintenance."]},"personal":{"zh":["阿尔蒙德比伊斯顿耐用，是因为他给研究者留下了可以落地的分类工具。中国政治的很多过程研究，仍然需要这类中层框架。"],"en":["Almond is more durable than Easton because he gives researchers usable categories. Many studies of Chinese political process still need this kind of middle-level framework."]},"noteSection":"03 政治学的“结构——功能主义”","keywords":["阿尔蒙德","政治功能的三个层次","利益表达","利益综合","提取功能","贡献"],"noteLimit":30,"noteBlocks":[{"kind":"p","text":"03 政治学的“结构"},{"kind":"personal","text":"功能主义”"},{"kind":"p","text":"结构功能主义在美国政治学的主流看来是无用的，阿尔蒙德之后很快就被历史淘汰了。但这个流派对中国政治学90年代的时候扮演了非常重要的角色。"},{"kind":"p","text":"梅里安之后，美国政治学的行为主义和量化研究大行其道，但定量研究只能揭示相关关系，而不能分析因果机制。而结构功能主义则是一种科学的定性方法（区别于定量研究和规范性、制度主义的定性研究）。"},{"kind":"personal","text":"阿尔蒙德对中国的政治制度改革很有意义，结构与功能错位，对中国影响深远"},{"kind":"p","text":"一、功能主义简介"},{"kind":"personal","text":"整体主义的取向"},{"kind":"p","text":"后来马林·诺夫斯基等学者开始将功能主义和人类学相结合。《特罗布里恩群岛》认为社会事务的意义取决于他和其他事物的关系和他对社会的整体贡献。"},{"kind":"p","text":"①强调社会整体大于个人，因此社会学整体上是功能主义的，将个人行为放入整体社会中理解，（因此做社会学解释就是功能主义的）还原为社会的影响，强调文化语境。因此社会学不能使用博弈论（从个体理性出发），因为个人理性选择不能用普遍的社会理论解释。"},{"kind":"p","text":"伊斯顿企图建立一般理论，进行宏观分析，而不是象微观研究那样支离破碎；问题在于伊斯顿的“一般系统论”又是一种经验分析，故而不仅抽象，而且无法产生持久的影响。"},{"kind":"p","text":"一般理论用在经验分析通常会脱节，经验分析和宏观分析是不能直接结合的，否则就会显得畸形，落在默顿的中层才会有生命力。60年代之后在美国政治学发表的论文中就极少引用伊斯顿的理论了，一般系统论被美国政治学抛弃了。（伊斯顿、阿尔蒙德基本上在case study中被抛弃了）"},{"kind":"p","text":"四、阿尔蒙德的“结构功能主义”"},{"kind":"p","text":"伊斯顿认为政府是黑箱，而阿尔蒙德关注的重点则恰恰是政府本身，在伊斯顿的基础上细化了政治系统内部的结构和功能。"},{"kind":"personal","text":"为什么阿尔蒙德至今有用而伊斯顿被抛弃，就是因为伊斯顿认为是黑箱的部分，阿尔蒙德试图打开它"},{"kind":"p","text":"阿尔蒙德指出不同层次有各自的主要功能，而不是整个系统的均一化的功能。阿尔蒙德不同于我们通常所说的政府职能，而是将其抽象化，比如税收、录用等政府职能抽象化为提取功能。经验事实的理论化能力是很重要的。"},{"kind":"p","text":"政治功能的三个层次："},{"kind":"p","text":"（1）体系层次：体系的维持与适应功能"},{"kind":"p","text":"（2）过程层次：要求和支持的输入通过转换过程变成了权威性政策的输出"},{"kind":"p","text":"利益表达"},{"kind":"personal","text":"利益集团或个人提出改变某一政策或继续某一政策的要求；利益综合——经利益表达提出的许多要求综合成为几个重大的政策选择方案；政策制定——在宪法范围内选择方案；政策实施——行政机关执行"},{"kind":"p","text":"（3）政策层次；输出，即政治体系涉及其他社会体系及其环境的行为"},{"kind":"p","text":"提取功能"},{"kind":"personal","text":"向环境汲取资源（人力、税收等）；分配功能——经济产品、教育、医疗、环境；管制功能——对社会进行控制；象征功能——培养对共同体的认同感"},{"kind":"p","text":"阿尔蒙德的贡献：政治文化+政策评价？？？"},{"kind":"personal","text":"他认为政治分析不是他的贡献，在美国这样的同类太多了"},{"kind":"p","text":"描述的完整程度"},{"kind":"personal","text":"如今很多重要的政治行为都是在阿尔蒙德的利益表达框架理解，政策制定则在利益聚合的框架中理解；为理解政府的过程提供了很好用的框架。中国学者一直很希望探讨政府过程，但实际上是非常难的；真正贯彻阿尔蒙德的框架研究中国政治的是《政府过程》"},{"kind":"p","text":"五、结构"},{"kind":"personal","text":"功能主义的理论影响"},{"kind":"p","text":"1、将政治学的研究对象从“国家”扩展到“政治体系”"},{"kind":"p","text":"把国家和社会同时囊括在政治体系之中，当时美国政治学对社会的研究是潮流，但阿尔蒙德认为国家和社会不可偏废，因此将其扩展为“政治体系”"},{"kind":"p","text":"2、为政府过程的动态研究提供框架"},{"kind":"p","text":"本特利的政府过程是静态的，杜鲁门的理论则失之太繁，而阿尔蒙德的框架则很适合用于政府过程研究"},{"kind":"p","text":"3、为比较研究提供方法，同时引入了政治文化分析。"}],"noteBlocksEn":[{"kind":"p","text":"Almond keeps systems language but moves attention inside government and the political system. Concrete governmental tasks become abstract functions."},{"kind":"p","text":"At the system level, political socialization, recruitment, and communication maintain and adapt the system."},{"kind":"p","text":"At the process level, interest articulation raises demands; interest aggregation turns them into policy alternatives; policy-making chooses; implementation carries them out."},{"kind":"p","text":"At the policy level, the political system acts through extraction, distribution, regulation, and symbolic functions."},{"kind":"p","text":"The lecture stresses Almond’s ability to theorize empir
