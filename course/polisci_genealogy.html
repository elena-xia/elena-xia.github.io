dard of world history. Comparative research must first ask whether the question itself is Eurocentric."]},"noteSection":"07 比较历史社会学","keywords":["加州学派","白银资本","大分流","彭慕兰","王国斌","黄宗智"],"noteLimit":28,"noteBlocks":[{"kind":"p","text":"军事技术变迁与社会和经济有关，但它可以从外部进口，所以是独立变量，对于上述几个方面具有决定性意义。"},{"kind":"p","text":"费纳只关注军事在国家建设中的作用，战争驱动的主要学者是费纳而不是梯利。威权、民主或极权的政体形式取决于军事权力的分配，战争是欧洲中世纪最大的公共产品（加州学派也持此观点，这与中国帝国提供的多样公共产品是不同的），提高军力是促进官僚化的主要动力，军事技术变迁是独立的变量。以往主张战争驱动的学者认为军事技术变迁并非独立变量、取决于社会经济的发展状况，但费纳否认了这一点。这在欧洲绝对主义国家时期以及当下非洲国家的文武关系也是成立的，进口武器并在地缘政治中占上风。"},{"kind":"p","text":"费纳总结的四种政体维度：宫廷维度（专制政治）、教会维度（神权政治）、贵族维度（精英政治）、论坛维度（大众政治）。"},{"kind":"p","text":"7、戈德斯通：《早期现代世界的革命与反抗》"},{"kind":"p","text":"戈德斯通是斯考切波的学生，在历史社会学领域备受争议，他是一个决定论学者，很多历史社会学学者认为社会变迁是多种历史因素促成的，但戈德斯通要把所有的结果都归结到一个因素上，导致结论单一（）求同法。戈德斯通的解释对加州学派影响很大，受到马尔库塞的影响（？）。"},{"kind":"p","text":"传统农业对人口增长特别敏感，土地不足的条件下，流动人口增加，向城市转移的反叛的年轻人集中在一起。税收能力下降造成国家的经济笼络能力下降，国家精英（官僚）与知识精英的距离拉大，一些知识精英开始创造出异端意识形态，为革命提供思想武器；国家精英内部的分化和权力斗争加剧。"},{"kind":"p","text":"戈德斯通找到的决定性因素是人口。不同的国家为什么在19世纪都爆发了革命？其共同因素就是人口的激增（医学进步、长期和平等等，抗生素的发明，避孕措施、文化、政策还没有成熟，出生率上升死亡率下降）。人口激增后，农村人口大量向城市流动，年轻人是主力军，聚集在城里没有工作就成为潜在的革命力量（客观条件）。国家对流动人口的税收能力下降，所以国家不能用足够的税收去垄断知识精英，知识精英就与国家渐行渐远，为革命提供思想武器（主观条件）。国家精英内部分化出拥抱异端的和保持保守的两派（一般而言上层精英更容易改信异端思想。美国当代著名社会学家斯塔克研究什么样的人容易改宗他的信仰？韩国上层人士更容易从佛教改信基督教），权力斗争加剧。这一解释在逻辑上很完美，但决定论色彩很浓厚。"},{"kind":"p","text":"戈德斯通的另一本著作《为什么是欧洲》是加州学派的代表作，也有浓厚的决定论色彩。学习这种寻找唯一解释的研究方法，引得他人批判以积累社会科学知识。卡尔波普尔所说的社会科学的可证伪性，不要写正确的废话。"},{"kind":"p","text":"8、拉克曼：精英斗争理论 《不由自主的资产阶级》"},{"kind":"p","text":"正是经过“规训革命”，臣民被成功驯化，才让新生的国家体制获得了稳定。"},{"kind":"p","text":"三、加州学派"},{"kind":"p","text":"主要是经济史研究，代表学者：弗兰克、彭慕兰、王国斌、李伯重、黄宗智、李中清"},{"kind":"personal","text":"都是历史学者，而巴林顿摩尔学派的历史资料大量引用二手三手四手资料"},{"kind":"p","text":"受年鉴学派影响更深，与巴林顿摩尔学派（更注重理论框架，接近政治学或社会学）相比更接近历史学，在历史资料上更扎实。加州学派主要是进行东西方比较研究，去除西方中心论色彩，因此有很多华人学者。"},{"kind":"personal","text":"大量经济史、人口、自然环境史资料，需要大量资料研究"},{"kind":"p","text":"弗兰克《白银资本》对全球史比较有奠基性的作用，魏飞德《清朝开国史》认为郑和下西洋和地理大发现的交叉点是白银的流动，美洲开发使白银流入中国，中国社会的货币化，明代一条鞭法，西班牙、葡萄牙衰落使白银供应量下降，明朝陷入财政危机，地方官员和民间社会共谋，地方官员中饱私囊而中央财政亏空。"},{"kind":"p","text":"彭慕兰《大分流》，苏州为什么没有发展出资本主义是错误的问题，而应该是英国为什么没有变成苏州？煤炭资源。"},{"kind":"p","text":"因此加州学派的决定论色彩很明显，和古德斯通（加州学派重要一员）、王国斌很像，都是马尔萨斯的忠实追随者。因此也有很多人批评彭慕兰。"},{"kind":"p","text":"何炳棣 加州学派研究基于前人对经济、人口的史料整理"},{"kind":"p","text":"王国斌《大分流之外》在中西之间互瞰，写的很好。"},{"kind":"p","text":"李中清，李政道的儿子，香港科技大学社会科学部主任，是复旦国政系校友。"},{"kind":"p","text":"李伯重，经济史研究。"},{"kind":"p","text":"黄宗智，推广了很多加州学派的理论。过密化与中国小农经济的研究。杜赞奇内卷化"},{"kind":"p","text":"从经济史研究延伸到自然史、环境史、灾难史等"}],"noteBlocksEn":[{"kind":"p","text":"The California School is mainly economic history rather than political sociology. Its figures include Frank, Pomeranz, R. Bin Wong, Li Bozhong, Huang Zongzhi, and James Lee."},{"kind":"p","text":"It is more influenced by the Annales School and uses extensive economic, demographic, environmental, and archival materials."},{"kind":"p","text":"Its aim is to decenter Europe through East-West comparison."},{"kind":"p","text":"Frank’s ReOrient is linked to global silver flows, Ming monetization, the single-whip tax reform, and fiscal crisis."},{"kind":"p","text":"Pomeranz reframes the question: not why Suzhou failed to become England, but why England did not become Suzhou. Coal and the New World are decisive."},{"kind":"p","text":"The lecture sees Malthusian and deterministic tendencies in Pomeranz, Goldstone, and R. Bin Wong."},{"kind":"p","text":"He Bingdi is noted as an earlier source because later work relies on economic and demographic history."},{"kind":"p","text":"R. Bin Wong is praised for mutual comparison; James Lee is noted as a Fudan alumnus; Huang Zongzhi popularizes over-involution and small-peasant studies."},{"kind":"p","text":"The branch expands into natural history, environmental history, disaster history, and resource history."}]},{"id":"newinst","x":1.6,"y":9.6,"era":"1980s–","title":{"zh":"新制度主义","en":"New Institutionalism"},"tag":{"zh":"反行为主义 · 制度自主性 · 三流派","en":"anti-behavioralism · institutional autonomy · three variants"},"core":{"zh":["新制度主义的现实背景，是国家改革、民主化转型和苏东剧变等重大政治变化，使政治学重新意识到制度的重要性。半个世纪的行为主义擅长测量个体态度和社会输入，却没有预见制度崩溃和政权转型，这暴露出社会中心研究的盲点。","它首先反行为主义。行为主义把制度当作黑箱或行动场所，研究输入、输出、态度和行为；新制度主义则认为制度有相对自主性。制度不仅反映社会要求，也塑造社会本身：它规定资源如何分配，谁有进入政治的资格，哪些选择被看见，哪些身份被承认。","它也超越旧制度主义。旧制度主义研究正式法律和宪法结构，新制度主义不仅研究制度条文，还研究制度如何产生、如何运作、产生什么后果，以及正式规范与实践之间为什么会有差距。制度概念因此被扩大为正式或非正式的程序、惯例、规范、标准和传统。","霍尔与泰勒把新制度主义分成三支。理性选择制度主义把制度看作博弈规则，重点是制度如何提供信息、降低交易成本、稳定合作。社会学制度主义把制度看作文化脚本和合法性结构，重点是组织为什么采用看似低效率却被社会认可的形式。历史制度主义把制度放进时间中，研究路径依赖、关键转折点和事件次序如何使同样压力产生不同结果。","【课后补充】March 与 Olsen 的“合宜性逻辑”提醒我们，行动者常按身份和规则判断“我这样做是否合适”，而不只是计算收益。诺思关于交易成本、制度变迁和路径依赖的研究很重要，但不完全能被霍尔与泰勒的三分法吸收；这说明新制度主义本来就是多源汇合，而不是一个单一范式。"],"en":["The real background of new institutionalism was state reform, democratic transition, and the Soviet collapse. These large political changes made political science recognize institutions again. Half a century of behavioralism was good at measuring attitudes and social inputs, but it did not foresee institutional collapse and regime transformation. This exposed the blind spot of society-centered research.","New institutionalism first reacts against behavioralism. Behavioralism treats institutions as a black box or arena and studies inputs, outputs, attitudes, and behavior. New institutionalism argues that institutions have relative autonomy. Institutions do not only reflect social demands; they shape society itself. They determine how resources are distributed, who is qualified to enter politics, which choices are visible, and which identities are recognized.","It also goes beyond old institutionalism. Old institutionalism studied formal law and constitutional structure. New institutionalism studies not only institutional text, but how institutions arise, how they operate, what consequences they produce, and why formal rules diverge from practice. The concept of institution is therefore expanded to include formal and informal procedures, routines, norms, standards, and traditions.","Hall and Taylor divide new institutionalism into three branches. Rational-choice institutionalism sees institutions as rules of the game, asking how institutions provide information, reduce transaction costs, and stabilize cooperation. Sociological institutionalism sees institutions as cultural scripts and legitimacy structures, asking why organizations adopt forms that may be inefficient but socially recognized. Historical institutionalism places institutions in time, studying how path dependence, critical junctures, and sequence make similar pressures produce different outcomes.","Post-class supplement: March and Olsen’s logic of appropriateness reminds us that actors often ask whether an action fits their identity and rules, not only whether it maximizes benefit. North’s work on transaction costs, institutional change, and path dependence is crucial, but it does not fit neatly into Hall and Taylor’s threefold division. This shows that new institutionalism is a convergence of several sources, not one unified paradigm."]},"relation":{"zh":"新制度主义不是单一范式，而是三种反行为主义路径汇合：理性选择、组织社会学、人类学与历史社会学都把“制度”推回中心。","en":"New institutionalism is not one paradigm. It is the convergence of three anti-behavioralist paths: rational choice, organizational sociology, anthropology, and historical sociology all push institutions back to the center."},"works":{"zh":["Hall 与 Taylor，《Political Science and the Three New Institutionalisms》","March 与 Olsen，《The New Institutionalism》","North，《Structure and Change in Economic History》"],"en":["Hall and Taylor, Political Science and the Three New Institutionalisms","March and Olsen, The New Institutionalism","North, Structure and Change in Economic History"]},"strengths":{"zh":["修正行为主义的黑箱问题。","把正式规则、非正式惯例、合法性与历史时间放到同一图景中。","为过程追踪和制度变迁研究提供语言。"],"en":["Corrects behavioralism’s black-box problem.","Places formal rules, informal routines, legitimacy, and historical time in one picture.","Provides language for process tracing and institutional change."]},"limits":{"zh":["制度概念过度扩张，容易什么都算制度。","三流派共享名称，却没有完全共享的方法和因果假设。"],"en":["The concept of institution can expand too far, making everything an institution.","The three branches share a name but not fully shared methods or causal assumptions."]},"personal":{"zh":["新制度主义最容易被误读成“重新重视制度”。这太浅。关键是制度不再只是法条，而是能塑造行动者、偏好、身份、资源和时间路径的结构。"],"en":["New institutionalism is too often reduced to “institutions matter again.” That is too shallow. The key is that institutions are no longer just legal rules; they structure actors, preferences, identities, resources, and temporal paths."]},"noteSection":"08 新制度主义","keywords":["新制度主义的兴起","反行为主义","对旧制度主义的超越","制度概念的泛化","三大流派","理性选择的制度主义","社会学的制度主义","历史学的制度主义"],"noteLimit":48,"noteBlocks":[{"kind":"p","text":"美国政治学最早的制度主义是静态研究"},{"kind":"p","text":"一、新制度主义的兴起"},{"kind":"p","text":"1、现实背景：国家政权改革、民主化转型的重大政治现象引发了对制度的重新重视。"},{"kind":"p","text":"2、理论背景："},{"kind":"p","text":"反行为主义：行为主义忽略了个人行为与制度之间的关系；政治制度本身具有自主性，而不是简单的对社会要求作出反应的机制"},{"kind":"p","text":"原本认为，政治制度是一个黑箱、场所，只能研究输入和输出；但政治制度也会塑造社会，而不是只能对社会作出反应，国家政权有强大动机塑造社会"},{"kind":"p","text":"对旧制度主义的超越：传统制度主义围绕法律、正式制度来解释政治现象，缺乏说服力，应注重制度的产生、过程及其后果的研究，尤其是制度规范与实践活动的差异"},{"kind":"p","text":"行为主义出于就制度主义的弊端而关注具体谈判等，新制度主义也对旧制度主义作出弥补"},{"kind":"p","text":"哈贝马斯《在事实与规范之间》"},{"kind":"p","text":"制度概念的泛化"},{"kind":"p","text":"制度不仅仅是指正式的法律制度，而是指一种均衡、一种规范、一种规则。制度是“扎根于政治组织结构或政治经济关系中的正式或非正式的程序、惯例、标准、传统”。"},{"kind":"p","text":"中国建国时只有宪法和婚姻法，后者用来界定中国家庭，什么意义上算是一个家庭，国家社会资源的基本分配单位是家庭，这就是国家对社会内部构造的能力；结婚涉及分房，因此需要批准"},{"kind":"p","text":"二、三大流派"},{"kind":"p","text":"分类出自彼得·霍尔、罗斯玛丽·泰勒《政治科学和三个新制度主义》，其中历史学制度主义，可以视为政治学研究本身在方法论上的转型；理性选择的制度主义则是理性选择理论在研究对象上的扩展；社会学的制度主义则在很大程度上与政治学无关。因此，所谓新制度主义并不是一个内部统一的研究范式。新制度主义不是范式的转换，而是追求多面相的政治解释。"},{"kind":"p","text":"历史学制度主义对应的是历史社会学的学者，理性选择制度主义对应的是理性选择学派的学者，社会学的制度主义对应着组织社会学和人类学的学者。"},{"kind":"p","text":"政治学希望用制度分析来统一所有的社会科学，"},{"kind":"p","text":"三、理性选择的制度主义"},{"kind":"p","text":"理性选择的制度主义是理性选择理论在研究侧重点上的一个变化，即从行为转向制度、规则和共识的研究。它起因于对美国国会行为的研究，发现理性选择理论无法解释美国国会的立法何以保持稳定的多数，而这一稳定的多数是由国会的议事规则和委员会体制来保证的。（原来关注议员的讨价还价，但会发现国会议事规则作用更大，设置议程，委员会可以通过没能通过的，美国国会对台湾的文件，是委员会通过并把文件变成不反对就表示通过的形式，而议员通常不关心这个问题，不反对，就表示一致通过）它构造出信息（议事规则的议程控制了国会投票时做选择的范围和顺序；或将主要问题的管辖权分配给委员会，为互投赞成票提供机制），降低交易成本，使议员们能达成协议。"},{"kind":"p","text":"人们在不同制度下博弈，制度会产生很大影响，不能没有context，制度决定人做出相应的行为"},{"kind":"p","text":"公共财（修路问题）public pool，pool是赌博时放筹码的地方"},{"kind":"p","text":"四、社会学的制度主义"},{"kind":"p","text":"70年代末从社会学的组织理论中发展而来，认为统治现代世界的官僚制组织，不仅仅是因为其组织效率，而且存在某种超越“理性”的东西存在。功能主义将制度与文化相分离，实际上现代组织所采用的规则、规范和程序都是特定文化的实践形态，它们不会提高组织的效率，但可以提高组织的合法性，强化制度中的人的身份认同。"},{"kind":"p","text":"70年代末从社会学的组织理论中发展而来，认为统治现代世界的官僚制组织，不仅仅是因为其组织效率，而且存在某种超越“理性”的东西存在。功能主义将制度与文化相分离，实际上现代组织所采用的规则、规范和程序都是特定文化的实践形态，它们不会提高组织的效率，但可以提高组织的合法性，强化制度中的人的身份认同。"},{"kind":"p","text":"四、社会学的制度主义"},{"kind":"p","text":"70年代末从社会学的组织理论中发展而来，认为统治现代世界的官僚制组织，不仅仅是因为其组织效率，而且存在某种超越“理性”的东西存在。功能主义将制度与文化相分离，实际上现代组织所采用的规则、规范和程序都是特定文化的实践形态，它们不会提高组织的效率，但可以提高组织的合法性，强化制度中的人的身份认同。"},{"kind":"p","text":"人类学；职业群体的研究已经超越了组织形态，比如《静寂工人》人类学的视角"},{"kind":"p","text":"五、历史学的制度主义"},{"kind":"p","text":"1、历史学的制度主义的来源"},{"kind":"p","text":"集团理论：围绕着稀缺资源而展开竞争的各个集团之间的冲突构成了政治的核心。历史学的制度主义认为，决定这些冲突在不同国家中的不同后果的主要是该国的制度结构。（之前所讲的集团理论主要是讲利益集团、游说；其实就是拉克曼所说的精英斗争）"},{"kind":"p","text":"结构—功能主义：将某一政体的制度组织或政治经济结构看作是造成不同政治后果的主要因素。历史学的制度主义更侧重结构而不是功能，将政治结果看做是系统需求的反映。"},{"kind":"p","text":"历史社会学：从历史的长时段中寻找社会结构形成的原因、目标和意义。"},{"kind":"personal","text":"更侧重于结构而不是功能，关心的是哪些结构在发挥作用，功能是可以被替代的；深受布罗代尔的影响，加州学派、历史社会学、历史学制度主义都是受到年鉴学派决定性影响的"},{"kind":"p","text":"政治活动是各政治结构在资源分配上进行斗争和相互影响的结果，正是因为某些变量在特定时期内的某一地区中的特定集合，才构成了某种制度并决定政治的进程。而在不同时期、不同地区这种集合是如何形成的，则取决于对特定历史社会条件的分析。"},{"kind":"p","text":"受结构—功能主义影响较大的学者持多元主义观念（尊重多样性，不同国家不同道路），而集团冲突理论则与新马克思主义相结合（带有强烈左翼倾向，对精英团体持批判态度），（二者结合是很奇特的，代表着历史社会学本身对现代性的批判，批评线性发展，批评精英上层）并对历史学的制度主义在70年代的发展产生决定性影响，促使历史学的制度主义学者将目光放在国家上。（资本主义、市场、国家，三大支柱，单纯的市场不能变成资本主义，市场扩张是国家推动的。很多问题解释不了是因为没有把国家当成一个变量；社会中心基本上是量化、做问卷，找回国家则是历史的研究）以历史学的制度主义学者为主力军，形成“回归国家学派”。"},{"kind":"p","text":"过程追踪法：要找到关键事件"},{"kind":"p","text":"广义的路径依赖是指前一阶段的事件可能会对后一阶段的事件产生影响和制约作用；狭义的路径依赖是指一旦形成某种制度，维持该制度的收益将会增加，而改变该制度的成本也会相应增加。"},{"kind":"personal","text":"有制度就可以寻租"},{"kind":"p","text":"在历史学的制度主义学者看来，历史学的制度主义对长期历史变迁进程的研究之所以是有效的，是因为社会变迁中路径依赖的特点。"},{"kind":"p","text":"路径依赖会使某种特殊的政治安排制度化。"},{"kind":"p","text":"5、关键转折点"},{"kind":"p","text":"正常时期的制度变迁遵循路径依赖，在个人、制度和环境之间保持均衡。“制度断裂”则是在制度变迁进程中的一种不均衡状态，它为新制度结构的形成创造条件。历史学的制度主义就要关注在制度断裂的关键转折点中所发生的事件，以对制度变迁做出解释和预测。"},{"kind":"p","text":"在关键转折点上所发生的事件，会对未来的模式产生决定性影响。"}],"noteBlocksEn":[{"kind":"p","text":"New institutionalism rejects both old institutionalism and behavioralism. Old institutionalism studied formal rules too statically; behavioralism treated institutions as black boxes or containers."},{"kind":"p","text":"The real-world background is regime reform, democratization, and especially the shock that behavioral political science did not foresee the Soviet collapse."},{"kind":"p","text":"Against behavioralism, new institutionalism says institutions have relative autonomy. They do not merely respond to social demands; they shape society, incentives, identities, and conflict."},{"kind":"p","text":"Against old institutionalism, it says institutions cannot be reduced to law. Research must study how institutions arise, operate, and produce consequences, and how norms differ from practice."},{"kind":"p","text":"The concept of institution expands to include formal and informal procedures, routines, norms, conventions, equilibria, and rules embedded in political organization or political-economic relations."},{"kind":"p","text":"The state is a durable administrative, legal, bureaucratic, and coercive system that structures relations between public authority and civil society, and also relations inside civil society."},{"kind":"p","text":"The Marriage Law example shows that a legal institution can define what counts as a family and how social resources such as housing are allocated."},{"kind":"p","text":"Hall and Taylor’s three variants are rational-choice, sociological, and historical institutionalism. They are not one unified paradigm; they inherit different parent traditions."},{"kind":"p","text":"Rational-choice institutionalism explains how rules stabilize cooperation and lower transaction costs, especially through congressional agenda control and committee systems."},{"kind":"p","text":"Sociological institutionalism asks why bureaucratic forms spread even when they do not improve efficiency. They survive as cultural scripts that create legitimacy and identity."},{"kind":"p","text":"Historical institutionalism studies path dependence, critical junctures, and event sequences."},{"kind":"personal","text":"The notes say political science hoped to unify social science through institutional analysis. The risk is that the institution concept becomes so broad that it loses clear boundaries."}]},{"id":"rcinst","x":0.2,"y":10.7,"era":"1980s–","title":{"zh":"理性选择制度主义","en":"Rational-Choice Institutionalism"},"tag":{"zh":"规则 · 议程控制 · 交易成本","en":"rules · agenda control · transaction costs"},"core":{"zh":["理性选择制度主义从美国国会研究发展出来。单纯理性选择很难解释国会为什么能够形成相对稳定的多数，因为议员偏好复杂、议题众多、投票策略多变。制度主义的回答是：议事规则、委员会体制和议程控制让合作变得可能。","制度在这里不是文化，也不是历史沉淀，而是博弈规则。规则决定信息如何分布、选择顺序如何安排、谁能把议题放上议程、哪些交换可以被执行。制度通过降低交易成本和减少不确定性，使理性行动者能够达成协议。","【课后补充】理性选择制度主义的经典问题包括国会委员会、议程控制、否决点、委托—代理和集体行动。制度的解释力来自约束策略集合、改变信息结构和稳定预期，而不是假定行动者更有道德。"],"en":["Rational-choice institutionalism developed from studies of the US Congress. Pure rational choice has difficulty explaining why Congress can form relatively stable majorities, because legislators have complex preferences, issues are numerous, and voting strategies change. The institutional answer is that rules of procedure, the committee system, and agenda control make cooperation possible.","Here institutions are not culture or historical sediment; they are rules of the game. Rules determine how information is distributed, how choices are sequenced, who can place issues on the agenda, and which exchanges can be enforced. By reducing transaction costs and uncertainty, institutions allow rational actors to reach agreements.","Post-class supplement: Classic topics in rational-choice institutionalism include congressional committees, agenda control, veto points, principal-agent relations, and collective action. Institutions explain by constraining strategy sets, changing information, and stabilizing expectations, not by assuming that actors are more moral."]},"relation":{"zh":"它把理性选择从“个体偏好”推进到“规则如何塑造偏好表达与合作”。","en":"It moves rational choice from individual preference to how rules shape preference expression and cooperation."},"works":{"zh":["Shepsle 关于国会委员会的研究","Cox 与 McCubbins 关于政党与议程控制的研究","Tsebelis，《Veto Players》"],"en":["Shepsle on congressional committees","Cox and McCubbins on parties and agenda control","Tsebelis, Veto Players"]},"strengths":{"zh":["能解释稳定多数和制度均衡。","适合研究立法、欧盟、民主转型和委托代理。"],"en":["Explains stable majorities and institutional equilibria.","Useful for legislatures, the EU, democratic transition, and principal-agent problems."]},"limits":{"zh":["仍假设行动者偏好清楚且策略理性。","制度外的文化、身份和历史来源处理不足。"],"en":["Still assumes clear preferences and strategic rationality.","Handles culture, identity, and historical origins outside rules poorly."]},"personal":{"zh":["理性选择制度主义的关键不是“理性”，而是“规则”。同一批行动者，在不同规则下会表现出完全不同的政治行为。"],"en":["The key word is not “rational” but “rules.” The same actors behave very differently under different institutional rules."]},"noteSection":"08 新制度主义","keywords":["理性选择的制度主义","国会","议事规则","交易成本","代理理论"],"noteLimit":24,"noteBlocks":[{"kind":"p","text":"二、三大流派"},{"kind":"p","text":"分类出自彼得·霍尔、罗斯玛丽·泰勒《政治科学和三个新制度主义》，其中历史学制度主义，可以视为政治学研究本身在方法论上的转型；理性选择的制度主义则是理性选择理论在研究对象上的扩展；社会学的制度主义则在很大程度上与政治学无关。因此，所谓新制度主义并不是一个内部统一的研究范式。新制度主义不是范式的转换，而是追求多面相的政治解释。"},{"kind":"p","text":"历史学制度主义对应的是历史社会学的学者，理性选择制度主义对应的是理性选择学派的学者，社会学的制度主义对应着组织社会学和人类学的学者。"},{"kind":"p","text":"政治学希望用制度分析来统一所有的社会科学，"},{"kind":"p","text":"三、理性选择的制度主义"},{"kind":"p","text":"理性选择的制度主义是理性选择理论在研究侧重点上的一个变化，即从行为转向制度、规则和共识的研究。它起因于对美国国会行为的研究，发现理性选择理论无法解释美国国会的立法何以保持稳定的多数，而这一稳定的多数是由国会的议事规则和委员会体制来保证的。（原来关注议员的讨价还价，但会发现国会议事规则作用更大，设置议程，委员会可以通过没能通过的，美国国会对台湾的文件，是委员会通过并把文件变成不反对就表示通过的形式，而议员通常不关心这个问题，不反对，就表示一致通过）它构造出信息（议事规则的议程控制了国会投票时做选择的范围和顺序；或将主要问题的管辖权分配给委员会，为互投赞成票提供机制），降低交易成本，使议员们能达成协议。"},{"kind":"p","text":"人们在不同制度下博弈，制度会产生很大影响，不能没有context，制度决定人做出相应的行为"},{"kind":"p","text":"2、方法论基础"},{"kind":"p","text":"主要借用经济学中的组织理论，强调产权和交易成本对制度运作和发展的重要性。如威廉姆森认为组织降低了交易成本；诺思认为制度的变迁也取决于降低交易成本的需要"},{"kind":"p","text":"如果亚当斯密“看不见的手”是对的，就不应该有企业，而企业/组织的存在就是为了降低交易成本，而理性选择、博弈就是一种交易，组织的存在规定交易的方向"},{"kind":"p","text":"3、主要研究领域"},{"kind":"p","text":"国家立法机关的研究，在解释国会规则影响立法者行为的方式外，也研究国会与独立管制机构的关系（如代理理论解释了委托人监管代理人的制度机制如独立管制机构的形成）、政党结构（Cox、McCubbins）、国会与法院之间的关系。"},{"kind":"p","text":"跨国联盟行为研究，如欧盟制度（Tsebelis）"},{"kind":"p","text":"民主转型，Przeworski、Geddes等采用博弈论研究发展中国家的民主转型"},{"kind":"p","text":"4、案例：汽车厂商游说国会延缓环保条款"},{"kind":"p","text":"在资源不均等分配的条件下，小的占大的便宜（这个模型最适合描述北约，欧洲小国有强烈动机加入但不想干事，特朗普不是破坏与欧洲盟友的关系，而是不愿意占便宜，但如果美国不承担，北约就难以维系）"}],"noteBlocksEn":[{"kind":"p","text":"Rational-choice institutionalism shifts rational choice from isolated behavior to rules, institutions, and stable expectations."},{"kind":"p","text":"The puzzle came from the United States Congress: why can legislation maintain stable majorities? Rules and committees provide the missing mechanism."},{"kind":"p","text":"Agenda rules shape the range and order of choices; committee jurisdiction gives specialists control; logrolling allows legislators to trade support. These mechanisms lower transaction costs."},{"kind":"p","text":"The lecture notes that procedural formats can turn non-objection into consent, so institutions shape outcomes even when most legislators are inattentive."},{"kind":"p","text":"The core point is context. People bargain within institutional settings; there is no game without rules of the game."},{"kind":"p","text":"The method borrows from Williamson and North: organizations and institutions lower transaction costs and stabilize expectations."},{"kind":"p","text":"The firm analogy is used: if the invisible hand worked perfectly, firms would not be needed. Organizations exist because markets alone are costly."},{"kind":"p","text":"Research areas include legislatures, regulators and principal-agent control, party structures, courts, EU institutions, and democratic transitions."},{"kind":"personal","text":"The NATO example illustrates unequal resources: smaller members want benefits without bearing the main cost."}]},{"id":"sociinst","x":2.1,"y":10.9,"era":"1970s–","title":{"zh":"社会学制度主义","en":"Sociological Institutionalism"},"tag":{"zh":"合法性 · 文化脚本 · 组织同构","en":"legitimacy · cultural scripts · organizational isomorphism"},"core":{"zh":["社会学制度主义来自组织社会学。它反对把现代官僚组织只解释为效率机器。许多组织形式并不一定提高效率，但因为它们符合社会认可的理性神话、专业规范和合法性标准，组织会主动采纳。","Meyer 与 Rowan 把正式结构称为“神话与仪式”：学校、企业、政府部门建立某些正式规则，是为了显示自己现代、理性、合法。DiMaggio 与 Powell 进一步解释组织为什么越来越像：强制性、模仿性和规范性同构会让组织趋同。","【课后补充】社会学制度主义的关键词是“合宜性逻辑”、理性化神话、脱耦和同构。组织遵守制度常常是为了被承认为合法、现代和专业，而非直接提高效率。"],"en":["Sociological institutionalism comes from organizational sociology. It rejects the view that modern bureaucratic organizations are only efficiency machines. Many organizational forms do not necessarily improve efficiency, but organizations adopt them because they fit socially accepted myths of rationality, professional norms, and standards of legitimacy.","Meyer and Rowan call formal structure “myth and ceremony”: schools, firms, and government agencies create formal rules to appear modern, rational, and legitimate. DiMaggio and Powell explain why organizations become increasingly similar: coercive, mimetic, and normative isomorphism lead to convergence.","Post-class supplement: Key terms in sociological institutionalism are the logic of appropriateness, rationalized myths, decoupling, and isomorphism. Organizations often follow institutions to be recognized as legitimate, modern, and professional, not to directly improve efficiency."]},"relation":{"zh":"它把政治人类学的文化问题带入制度研究，说明制度不只是约束，也是一套身份和合法性语言。","en":"It brings the cultural problem of political anthropology into institutional analysis, showing that institutions are not only constraints but languages of identity and legitimacy."},"works":{"zh":["Meyer 与 Rowan，《Institutionalized Organizations》","DiMaggio 与 Powell，《The Iron Cage Revisited》"],"en":["Meyer and Rowan, Institutionalized Organizations","DiMaggio and Powell, The Iron Cage Revisited"]},"strengths":{"zh":["解释低效率制度为何存续。","说明组织趋同不一定来自竞争效率。"],"en":["Explains why inefficient institutions persist.","Shows that organizational convergence does not necessarily come from competitive efficiency."]},"limits":{"zh":["对权力冲突和利益分配解释相对弱。","合法性概念如果不操作化，也会变成万能解释。"],"en":["Relatively weak on power conflict and distributional interests.","If legitimacy is not operationalized, it becomes an all-purpose explanation."]},"personal":{"zh":["社会学制度主义特别适合解释“为什么大家都知道某制度没效率，但仍然必须保留”。答案往往不是成本收益，而是身份、体面和合法性。"],"en":["Sociological institutionalism is especially useful for explaining why everyone knows an institution is inefficient but still keeps it. The answer is often not cost-benefit, but identity, face, and legitimacy."]},"noteSection":"08 新制度主义","keywords":["社会学的制度主义","组织理论","合法性","身份认同"],"noteLimit":22,"noteBlocks":[{"kind":"p","text":"二、三大流派"},{"kind":"p","text":"分类出自彼得·霍尔、罗斯玛丽·泰勒《政治科学和三个新制度主义》，其中历史学制度主义，可以视为政治学研究本身在方法论上的转型；理性选择的制度主义则是理性选择理论在研究对象上的扩展；社会学的制度主义则在很大程度上与政治学无关。因此，所谓新制度主义并不是一个内部统一的研究范式。新制度主义不是范式的转换，而是追求多面相的政治解释。"},{"kind":"p","text":"历史学制度主义对应的是历史社会学的学者，理性选择制度主义对应的是理性选择学派的学者，社会学的制度主义对应着组织社会学和人类学的学者。"},{"kind":"p","text":"政治学希望用制度分析来统一所有的社会科学，"},{"kind":"p","text":"2、方法论基础"},{"kind":"p","text":"主要借用经济学中的组织理论，强调产权和交易成本对制度运作和发展的重要性。如威廉姆森认为组织降低了交易成本；诺思认为制度的变迁也取决于降低交易成本的需要"},{"kind":"p","text":"如果亚当斯密“看不见的手”是对的，就不应该有企业，而企业/组织的存在就是为了降低交易成本，而理性选择、博弈就是一种交易，组织的存在规定交易的方向"},{"kind":"p","text":"公共财（修路问题）public pool，pool是赌博时放筹码的地方"},{"kind":"p","text":"四、社会学的制度主义"},{"kind":"p","text":"70年代末从社会学的组织理论中发展而来，认为统治现代世界的官僚制组织，不仅仅是因为其组织效率，而且存在某种超越“理性”的东西存在。功能主义将制度与文化相分离，实际上现代组织所采用的规则、规范和程序都是特定文化的实践形态，它们不会提高组织的效率，但可以提高组织的合法性，强化制度中的人的身份认同。"},{"kind":"p","text":"70年代末从社会学的组织理论中发展而来，认为统治现代世界的官僚制组织，不仅仅是因为其组织效率，而且存在某种超越“理性”的东西存在。功能主义将制度与文化相分离，实际上现代组织所采用的规则、规范和程序都是特定文化的实践形态，它们不会提高组织的效率，但可以提高组织的合法性，强化制度中的人的身份认同。"},{"kind":"p","text":"四、社会学的制度主义"},{"kind":"p","text":"70年代末从社会学的组织理论中发展而来，认为统治现代世界的官僚制组织，不仅仅是因为其组织效率，而且存在某种超越“理性”的东西存在。功能主义将制度与文化相分离，实际上现代组织所采用的规则、规范和程序都是特定文化的实践形态，它们不会提高组织的效率，但可以提高组织的合法性，强化制度中的人的身份认同。"},{"kind":"p","text":"人类学；职业群体的研究已经超越了组织形态，比如《静寂工人》人类学的视角"},{"kind":"p","text":"休厄尔：《历史的逻辑》历史学与社会科学的结合，时间次序，历史如何变成可以解释的，是通过时间次序：A先发生，B再发生，可能会产生甲；B先发生，A再发生，可能会产生乙（比如，先有国家再有政党，先有政党再有国家政党就会有宪制地位；先输入市场还是先输入民主，如果先输入市场产生精英，再有民主，精英就可以掌控，民主化会相对成功，市场和民主一起输入就产生了现在的很多失败国家）"},{"kind":"p","text":"对中国当代史的研究聚焦于国共斗争，抗日战争结束时国民党合法性很高、装备精良、控制几乎所有大城市，两年后就几乎被共产党击败，两年中到底发生了什么？"},{"kind":"personal","text":"找到timing"},{"kind":"p","text":"萧邦奇《血路》《九个世纪的悲歌》《中国精英与政治变迁》"},{"kind":"personal","text":"去找一个交叉因素做一个分析"}],"noteBlocksEn":[{"kind":"p","text":"Sociological institutionalism comes from organizational sociology and asks why bureaucratic forms rule the modern world."},{"kind":"p","text":"The answer is not efficiency alone. Organizations adopt rules and procedures because these forms carry legitimacy, status, and cultural meaning."},{"kind":"p","text":"Functionalism separated institution and culture too sharply. Sociological institutionalism reconnects them."},{"kind":"p","text":"Institutional forms may not improve output, but they make an organization appear rational, modern, professional, legal, or legitimate."},{"kind":"p","text":"This branch explains institutional isomorphism: organizations resemble one another because they face the same legitimacy scripts."},{"kind":"p","text":"The lecture connects this to anthropology and occupational communities, where institutions are lived cultures rather than only formal structures."},{"kind":"p","text":"Its relation to political science is indirect, but it is essential for understanding legitimacy and identity."},{"kind":"personal","text":"The notes emphasize that sociological institutionalism is one reason new institutionalism is not a single paradigm."}]},{"id":"histinst","x":3.8,"y":10.8,"era":"1980s–","title":{"zh":"历史制度主义","en":"Historical Institutionalism"},"tag":{"zh":"路径依赖 · 关键转折点 · 事件次序","en":"path dependence · critical junctures · sequence"},"core":{"zh":["历史制度主义把制度放进时间。制度一旦形成，就会产生正反馈：维持制度的收益增加，改变制度的成本增加，这就是狭义的路径依赖。正常时期制度按既有路径运作；在制度断裂和关键转折点上，新的制度结构才可能出现。","它特别重视事件次序。同样两个因素，A 先发生再发生 B，和 B 先发生再发生 A，可能产生不同结果。历史制度主义的任务，是找到关键时间点、关键事件和机制交叉点，而不是把一段历史讲成线性发展。","【课后补充】历史制度主义的路径依赖不等于“历史很重要”。它需要说明递增收益、锁定效应、转换成本、受益者联盟和关键转折点。后来的制度变迁研究还区分层叠、漂移、转换和置换等渐进变化形式。"],"en":["Historical institutionalism places institutions in time. Once an institution forms, it generates positive feedback: the returns to maintaining it rise and the cost of changing it increases. This is path dependence in the narrow sense. In normal periods, institutions follow existing paths; during institutional rupture and critical junctures, new structures become possible.","It pays special attention to sequence. If factor A occurs before B, the result may differ from B before A. The task is to identify critical timing, key events, and intersections of mechanisms, not to narrate history as linear development.","Post-class supplement: Path dependence in historical institutionalism does not simply mean that history matters. It requires specifying increasing returns, lock-in effects, switching costs, beneficiary coalitions, and critical junctures. Later work on institutional change also distinguishes layering, drift, conversion, and displacement as forms of gradual change."]},"relation":{"zh":"它继承比较历史社会学和找回国家学派，把制度、时间和国家能力结合起来。","en":"It inherits comparative historical sociology and the statist turn, combining institutions, time, and state capacity."},"works":{"zh":["Sewell，《Logics of History》","Pierson，《Politics in Time》","Thelen 与 Steinmo 关于历史制度主义的研究"],"en":["Sewell, Logics of History","Pierson, Politics in Time","Thelen and Steinmo on historical institutionalism"]},"strengths":{"zh":["解释为什么早期小选择会造成长期大差异。","适合研究福利国家、国家建设、政党制度和革命。"],"en":["Explains how small early choices produce large long-term differences.","Useful for welfare states, state-building, party systems, and revolutions."]},"limits":{"zh":["关键转折点容易事后选择。","如果只讲路径依赖，会低估突发事件和行动者策略。"],"en":["Critical junctures are easy to select after the fact.","A focus on path dependence can underplay shocks and actor strategy."]},"personal":{"zh":["路径依赖是分析概念，不是描述性标签。它要求说明：哪个制度产生了什么正反馈，谁因此获益，改变成本为什么上升。"],"en":["Path dependence is an analytical concept, not a descriptive label. It requires specifying which institution creates what feedback, who benefits, and why the cost of change rises."]},"noteSection":"08 新制度主义","keywords":["历史学的制度主义","路径依赖","关键转折点","事件次序","过程追踪"],"noteLimit":34,"noteBlocks":[{"kind":"p","text":"国家是持久的行政、法律、官僚和强制体系，它不仅试图构造一个政治体中公共权威与市民社会之间的关系，同样也构造市民社会内部的许多重要关系。"},{"kind":"p","text":"把制度进行泛化，甚至包括政治过程。斯考切波对美国和加拿大的福利制度与选举制度的研究，但非正式制度和过程可能更为关键。出现了过程追踪法，回溯制度衍生过程中的具体事件对制度的影响。"},{"kind":"p","text":"中国建国时只有宪法和婚姻法，后者用来界定中国家庭，什么意义上算是一个家庭，国家社会资源的基本分配单位是家庭，这就是国家对社会内部构造的能力；结婚涉及分房，因此需要批准"},{"kind":"p","text":"人类学；职业群体的研究已经超越了组织形态，比如《静寂工人》人类学的视角"},{"kind":"p","text":"五、历史学的制度主义"},{"kind":"p","text":"1、历史学的制度主义的来源"},{"kind":"p","text":"集团理论：围绕着稀缺资源而展开竞争的各个集团之间的冲突构成了政治的核心。历史学的制度主义认为，决定这些冲突在不同国家中的不同后果的主要是该国的制度结构。（之前所讲的集团理论主要是讲利益集团、游说；其实就是拉克曼所说的精英斗争）"},{"kind":"p","text":"结构—功能主义：将某一政体的制度组织或政治经济结构看作是造成不同政治后果的主要因素。历史学的制度主义更侧重结构而不是功能，将政治结果看做是系统需求的反映。"},{"kind":"p","text":"历史社会学：从历史的长时段中寻找社会结构形成的原因、目标和意义。"},{"kind":"personal","text":"更侧重于结构而不是功能，关心的是哪些结构在发挥作用，功能是可以被替代的；深受布罗代尔的影响，加州学派、历史社会学、历史学制度主义都是受到年鉴学派决定性影响的"},{"kind":"p","text":"政治活动是各政治结构在资源分配上进行斗争和相互影响的结果，正是因为某些变量在特定时期内的某一地区中的特定集合，才构成了某种制度并决定政治的进程。而在不同时期、不同地区这种集合是如何形成的，则取决于对特定历史社会条件的分析。"},{"kind":"p","text":"受结构—功能主义影响较大的学者持多元主义观念（尊重多样性，不同国家不同道路），而集团冲突理论则与新马克思主义相结合（带有强烈左翼倾向，对精英团体持批判态度），（二者结合是很奇特的，代表着历史社会学本身对现代性的批判，批评线性发展，批评精英上层）并对历史学的制度主义在70年代的发展产生决定性影响，促使历史学的制度主义学者将目光放在国家上。（资本主义、市场、国家，三大支柱，单纯的市场不能变成资本主义，市场扩张是国家推动的。很多问题解释不了是因为没有把国家当成一个变量；社会中心基本上是量化、做问卷，找回国家则是历史的研究）以历史学的制度主义学者为主力军，形成“回归国家学派”。"},{"kind":"p","text":"过程追踪法：要找到关键事件"},{"kind":"p","text":"3、基本特点"},{"kind":"p","text":"在研究对象上，主要关注组织化、制度化的结构、社会变迁中的关键转折点；社会变迁的长期进程"},{"kind":"p","text":"研究政治中重大的实质性问题；"},{"kind":"p","text":"关注时间点和事件次序：社会变迁是长期过程，在关键因素出现之前不会有结果。由于要研究特定后果的结构性前提条件，就要找到一个时间段集中加以研究，如民族国家形成的时间点问题、做比较政治研究的时间点选择问题"},{"kind":"p","text":"分析社会变迁的宏观条件，对制度和历史进程的联合结果加以预测。关键在于从两个进程中找到交叉点，从中挖掘出因果关系。"},{"kind":"p","text":"萧邦奇《血路》《九个世纪的悲歌》《中国精英与政治变迁》"},{"kind":"personal","text":"去找一个交叉因素做一个分析"},{"kind":"p","text":"4、路径依赖"},{"kind":"p","text":"广义的路径依赖是指前一阶段的事件可能会对后一阶段的事件产生影响和制约作用；狭义的路径依赖是指一旦形成某种制度，维持该制度的收益将会增加，而改变该制度的成本也会相应增加。"},{"kind":"personal","text":"有制度就可以寻租"},{"kind":"p","text":"在历史学的制度主义学者看来，历史学的制度主义对长期历史变迁进程的研究之所以是有效的，是因为社会变迁中路径依赖的特点。"},{"kind":"p","text":"路径依赖会使某种特殊的政治安排制度化。"},{"kind":"personal","text":"这不是类似于“弱者的武器”的描述，而是分析性的概念，正因为存在路径依赖，才会有因果分析"},{"kind":"p","text":"梯利：历史学之所以重要，是因为社会变迁的路程是路径依赖的"},{"kind":"p","text":"5、关键转折点"},{"kind":"p","text":"正常时期的制度变迁遵循路径依赖，在个人、制度和环境之间保持均衡。“制度断裂”则是在制度变迁进程中的一种不均衡状态，它为新制度结构的形成创造条件。历史学的制度主义就要关注在制度断裂的关键转折点中所发生的事件，以对制度变迁做出解释和预测。"},{"kind":"p","text":"在关键转折点上所发生的事件，会对未来的模式产生决定性影响。"},{"kind":"p","text":"在关键转折点上的策略选择也具有不同影响。"},{"kind":"p","text":"迈克尔曼：社会制度会变成一种权力结晶体，出现缝隙时（制度断裂）就可能出现变迁，因此要研究关键点是什么、发生了什么"}],"noteBlocksEn":[{"kind":"p","text":"Historical institutionalism begins from a concrete state: durable administrative, legal, bureaucratic, and coercive systems."},{"kind":"p","text":"Institutions include formal rules, informal practices, and political processes. Process tracing asks how specific events shape institutional development."},{"kind":"p","text":"The PRC Marriage Law example shows how a state can define family as a social and resource-distribution unit."},{"kind":"p","text":"Its sources are group theory, structural functionalism, and historical sociology."},{"kind":"p","text":"Political activity results from struggles among political structures over resources. Particular constellations at particular times and places create institutions and paths."},{"kind":"p","text":"The lecture notes a productive mix of pluralism and neo-Marxist elite critique, which pushes attention toward the state."},{"kind":"p","text":"Process tracing means finding key events in a causal sequence, not merely listing background conditions."},{"kind":"p","text":"The field studies organized structures, critical turning points, long-term processes, and major substantive political problems."},{"kind":"p","text":"Timing and sequence are central. A before B may produce one outcome, while B before A may produce another."},{"kind":"p","text":"The lecture applies this to Chinese modern history by asking what happened between the end of the Anti-Japanese War and the rapid Nationalist defeat."},{"kind":"p","text":"Path dependence means earlier events constrain later ones. Once an institution forms, the benefits of maintaining it rise and the costs of changing it rise."},{"kind":"personal","text":"The notes add that where there is an institution, there can be rent-seeking."},{"kind":"p","text":"Critical junctures are moments of institutional rupture. What happens at such moments can shape future patterns for a long time."},{"kind":"p","text":"Michael Mann’s image is that institutions crystallize power; when cracks appear, change becomes possible."}]},{"id":"arendt","x":-1.7,"y":9.8,"era":"1951–1963","title":{"zh":"汉娜·阿伦特","en":"Hannah Arendt"},"tag":{"zh":"劳动 · 工作 · 行动 · 平庸之恶","en":"labor · work · action · banality of evil"},"core":{"zh":["阿伦特是政治哲学家而非一般哲学家。她关心人在现实政治中的行动、判断和自由。她的《人的境况》把积极生活分成劳动、工作和行动：劳动维持生命，受必然性支配；工作制造持存的人造世界；行动发生在人与人的言谈中，是自由和政治生活的核心。","阿伦特区分私人领域、公共领域和社会领域。现代社会的问题在于社会领域扩张，把公共行动压缩为消费、管理、制度服从和功利计算。极权主义的根源不是单纯野蛮，而是大众社会中孤立、无思、失去公共判断能力的人。艾希曼的“平庸之恶”说明，恶可能来自不思考和服从程序，而不一定来自深刻的邪恶动机。","《论革命》中，阿伦特把革命的目的理解为自由的建构，而不只是从压迫中解放。真正的政治自由需要持续参与公共事务的空间。她因此重视委员会、市政会议和小规模参与者政府。","【课后补充】政治哲学部分不只有阿伦特。笔记还提到柏林和哈耶克的古典自由主义、罗尔斯以后分析自由主义、盖尔斯敦的多元自由主义、法兰克福学派，以及《正义论》对行为主义的冲击。阿伦特应放在这条价值回归与现代性批判的长线上读。"],"en":["Arendt is a political philosopher rather than a philosopher in the abstract. She cares about action, judgment, and freedom in real political life. In The Human Condition, she divides the vita activa into labor, work, and action: labor maintains life under necessity; work creates a durable artificial world; action occurs in speech among people and forms the core of freedom and political life.","Arendt distinguishes private, public, and social realms. The modern problem is the expansion of the social realm, which compresses public action into consumption, administration, institutional obedience, and utility. Totalitarianism is not merely barbarism; it emerges from mass society, where isolated and thoughtless individuals lose the capacity for public judgment. Eichmann’s “banality of evil” shows that evil can arise from thoughtlessness and obedience to procedure, not only from deep evil motives.","In On Revolution, Arendt understands revolution as the constitution of freedom, not merely liberation from oppression. Political freedom requires a durable space for participation in public affairs. This is why she values councils, town meetings, and small-scale participatory government.","Post-class supplement: The political-philosophy part is not only Arendt. The notes also mention Berlin and Hayek as classical liberals, post-Rawls analytic liberalism, Galston’s liberal pluralism, the Frankfurt School, and the shock of A Theory of Justice to behavioral political science. Arendt should be read within this longer return to value and critique of modernity."]},"relation":{"zh":"阿伦特代表后行为主义之后政治哲学的回归：政治学不能只问可测量行为，也要问行动、判断、自由和恶。","en":"Arendt represents the return of political philosophy after behavioralism: political science cannot ask only about measurable behavior; it must ask about action, judgment, freedom, and evil."},"works":{"zh":["《The Origins of Totalitarianism》","《The Human Condition》","《Eichmann in Jerusalem》","《On Revolution》","Rawls，《A Theory of Justice》","Berlin，《Four Essays on Liberty》"],"en":["The Origins of Totalitarianism","The Human Condition","Eichmann in Jerusalem","On Revolution","Rawls, A Theory of Justice","Berlin, Four Essays on Liberty"]},"strengths":{"zh":["把政治理解为行动和公共性，而非管理技术。","深刻诊断大众社会、官僚服从和平庸之恶。"],"en":["Understands politics as action and publicness, not administrative technique.","Deep diagnosis of mass society, bureaucratic obedience, and banal evil."]},"limits":{"zh":["对劳动和社会领域的评价过于尖锐。","参与者政府的可行性和规模条件仍有疑问。"],"en":["Her judgment of labor and the social realm can be too sharp.","The feasibility and scale conditions of participatory government remain uncertain."]},"personal":{"zh":["阿伦特的关键不是“反现代”，而是追问现代社会如何让人失去判断能力。政治哲学在这里不是抽象伦理，而是恢复公共判断的能力。"],"en":["Arendt’s key is not simply anti-modernism. She asks how modern society makes people lose judgment. Political philosophy here is not abstract ethics; it is the recovery of public judgment."]},"noteSection":"09 汉娜·阿伦特","keywords":["政治哲学渊源","人的条件","劳动","工作","行动","极权主义","恶的平庸化","论革命"],"noteLimit":58,"noteBlocks":[{"kind":"p","text":"海德格尔：向死而生"},{"kind":"p","text":"在汉娜·阿伦特那里，只有作为一个人的存在，而没有作为其他什么外在强加的东西的存在。证实人的独立存在的是勇敢的爱、积极的行动和生命本身的“伟大性”。最终的依据是能否坚持独立的“自我判断”。"},{"kind":"p","text":"1、政治哲学渊源"},{"kind":"p","text":"亚里士多德 劳作、工作与行动领域，人的条件是对亚里士多德的翻版"},{"kind":"p","text":"奥古斯丁 爱这个世界来自于奥古斯丁 阿伦特在海德格尔之后的导师是雅斯贝尔斯，《现时代的思想状况》，从私人的爱的忧伤（海德格尔）中走出来爱这个世界，让她去研究奥古斯丁。爱、自由与开端（beginning） 海德格尔关注的是终结，人的生命的有限性意味着生命的意义，《存在与时间》。而阿伦特突破了这一观点，人的出生是另一个端点，从出生找寻人的意义，降生是一个开端，寓意着“新”，把海德格尔的消极面转化为具有生命力的积极的政治哲学"},{"kind":"personal","text":"马克思说到底还是黑格尔主义者，恩格斯与马克思正如扬-布鲁尔和阿伦特"},{"kind":"p","text":"2、人的条件"},{"kind":"p","text":"人是有条件的存在：生命自身、人在世界的降生和死亡、世界、多样性、大地"},{"kind":"p","text":"因此人的三个角色："},{"kind":"p","text":"（1）劳动。劳动是惩罚、枷锁，而不是马克思所说的解放。人是劳动中的动物，没有摆脱自然劳动时人是受制于必然性的；劳动使人陷入自然界的循环，而不是创造人"},{"kind":"p","text":"（2）工作。工作创造的是世界，现代市民社会诞生于工作而非劳动，工作相对于劳动而言是有持存性的，对应于现代社会。但工作也有局限，功利性"},{"kind":"p","text":"（3）行动"},{"kind":"p","text":"人的交流对话，但行动没有持存性。苏格拉底的讲话本身是一个行动，但记下来就只能是工作。行动只能依靠工作来保留。"},{"kind":"p","text":"1、劳动（labor）：劳动的动物（animal laborans） 功利"},{"kind":"p","text":"人在劳动中面对的是自然、大地。劳动受制于基本的物质生产需要。劳动的作用是维持物种的延续和个体的存活，但是在劳动中，人并未摆脱其动物性的自然存在，因此从事劳动的人是劳动的动物。"},{"kind":"p","text":"翻译成劳动而非劳作是为了与马克思的劳动对应起来，劳动面对的是土地，而工作面对的是人造的世界"},{"kind":"p","text":"2、工作（work）：homo faber（制造者、工作的人） 自然"},{"kind":"p","text":"人在工作中面对的是一个人造的世界。工作与人类非自然的存在相应，工作的产品具有一种持存性（durability）。工作的前提是对自然生命的破坏，但是，工作为人类提供了一种持存的尺度，人可以通过与工作的产品联系而使自身在某种程度上获得持存的感觉。从事工作的人是制造者，受制于机器和制度，缺乏自我判断能力。"},{"kind":"p","text":"将自然界的某物提炼出来，有了持存性，这就是工作（从洛克的《政府论》得来，对某物的劳动使你拥有它、它成了你的财产，洛克所讲的市民、财产，资产阶级市民社会，就是homo faber，学者所著也就是持存，尼采就是在破除黑格尔的形而上学体系）人只能要么在劳作要么困在这个人造世界成为homo faber吗？"},{"kind":"p","text":"3、行动（action）：actor（行动者） 自由"},{"kind":"p","text":"行动是人与人的关系。人们的行动是转瞬即逝的，而且也完全无法对它的发生和进程进行预料。行动是人与人之间的联系。行动不象劳动、工作那样，需要以生产工具、制度为中介与对方建立联系，行动的人所面对的，是与他一样摆脱了物役的自由个体，通过相互的交流、接触和理解，人的独特性得到确证。因此，行动决定了自我的构成，它是真正的人的生活，也就是政治生活。"},{"kind":"p","text":"阿伦特所说的行动主要是交谈speech，而现代性的可怕之处就在于没有交谈no talk，这是最大的异化；但行动作为人类最基本、最本真的，却是不能持存的，但因此也能是不断创新、不断涌现的；第一个行动就是出生natality（译成降生，神圣性），人生命的意义在于开端，一个出生就能带来创新性（而不像海德格尔那样是向死而生，为海德格尔的生命哲学注入积极意义）"},{"kind":"p","text":"三个领域：私人领域、公共领域、社会领域"},{"kind":"personal","text":"马克思的共产主义社会，人的自由超越必然性；马克思的劳动偏重于制造，包括劳动、制造、行动；现在仍旧未摆脱劳动是一种苦难"},{"kind":"p","text":"（1）私人领域没有自由，是对自然的暴力开发，但私人领域让人有安全感。"},{"kind":"p","text":"（2）公共领域，行动"},{"kind":"p","text":"（3）社会领域，功利性，一切可以被源源不断地制造出来。出现了三种状况"},{"kind":"p","text":"1、私人领域：私人领域的活动就是劳动，劳动受制于必需性（necessity），它所关心的是个体生命的维持以及物种的存续。在私人领域中，专制和暴力是正当的，因为它们是驾驭必需性的必要手段。故私人领域无自由可言。是“前政治阶段”。同时，私人领域使人拥有一种安全感。"},{"kind":"p","text":"2、公共领域：公共领域的活动就是行动。维系公共领域的是言谈（speech）和行动，言谈是最重要的交往机制。人们在言谈中形成共识，而共识为公共领域权力的合法性提供基础。公共领域的功能，在于使得那些不留痕迹的行动被人们看到和听到，并在此基础上得以存留，不再被人遗忘。公共领域的特征就是自由。"},{"kind":"p","text":"3、社会领域：社会领域是homo faber的统治，如果说私人领域受制于必需性，公共领域受制于多样性，那么，社会领域就是受制于功利性。功利的思虑取代了一切，目的－手段范畴对人类的活动进行评价。"},{"kind":"p","text":"无人：看不见的手，无人统治，看不到负责人（制度统治）"},{"kind":"p","text":"无能：大量孤立、隔绝的个人，失去行动能力，"},{"kind":"p","text":"无思：no think 丧失判断能力，没有反思，"},{"kind":"p","text":"“无人”：社会领域是一种“无人”统治（the rule of nobody），即所谓“无统治”，也就是制度的统治。"},{"kind":"p","text":"“无能”：homo faber运用制造出来的整齐划一的规则，支配了人的行为，使之日趋单一化，行动的可能性被排除了。个人的独特性无法展现，而不得不退缩进隐秘的私人性中，从而形成了大量孤立、隔绝的个人。"},{"kind":"p","text":"“无思”：由于公共空间被摧毁，共同的观点无法形成，个人已经完全丧失了对事实的判断能力，他们已经不能够在对与错之间作出区分，而只是接受同一化的观点和规则。这是现代官僚统治的典型特征。他们标榜“价值中立”，抛弃了所有的人性的立场，只懂得无条件地执行命令。艾希曼这一纳粹政权的官僚，由于不作任何的自我判断，而沦为纳粹政权的帮凶和冷血的刽子手。在现代官僚的统治下，“无思”已经成为一种普遍的状况，甚至已经蔓延到知识界。"},{"kind":"p","text":"极权政府（the totalitarian government）。它呈现为一种“洋葱式结构”（the structure of onion）。极权“元首”位于中心的空白地带，外围按照意识形态的狂热程度由里向外逐渐递减形成各种层次，从而构成一种虚幻的“现实”，每个层次的人都从其外围那里感觉到极权运动是与真实的世界相符合的。"},{"kind":"p","text":"3、极权主义的起源"},{"kind":"p","text":"极权主义起源于市民社会的“无人”统治。整个市民社会就是孤立、隔绝的个人的松散组合，他们之间无法建立一种联系，个人无法与他人的交往而得到自我的确证，从而日益失去了对自我的信赖，导致对自己和人类的命运漠不关心，最终个人在市民社会中陷入一种寂寞无依的状态，惟有依附于制度才能获得安全感，这也是极权主义最为根本的起源。"},{"kind":"p","text":"在将极权主义的起源归于大众社会之后，实质上就将极权主义的批判延展到整个现代政治形式的批判。"},{"kind":"p","text":"从根本恶（极端的恶）到恶的平庸化"},{"kind":"p","text":"最初汉娜·阿伦特把极权主义归结为根本恶，认为极权主义的根本特征在于它割裂了一切传统，而具有可怕的原创性，恶与善都作为第一性的，彻底突破了政治思想的范畴和既有的道德判断标准，无法以之来加以解释。"},{"kind":"p","text":"在《耶路撒冷的艾希曼》中，阿伦特将艾希曼的行为归结为恶的平庸化。艾希曼犯下滔天罪行，但他只是作为一名普通的官僚按部就班地完成上级的指示。艾希曼并没有什么邪恶的动机，而只有向上爬的欲望。他只是我们熟悉的那一种人。恶的动机变得肤浅，人人都能为恶，从恶中也体会不到自由的可能性。恶已经融入人们的日常生活，人们根本体会不到恶，从而丧失任何罪恶感。其实，人正是在善恶两种可能性中做选择时实现自由，恶的平庸化同时意味着自由的丧失。阿伦特为此称惟有善是第一性的、原创的，恶只是善的丧失。"},{"kind":"p","text":"根本恶是第一性的、原创的，现在只有善是这样的"},{"kind":"p","text":"艾希曼就是我们身边的普通人，作恶的动机很肤浅，人人都能为恶，在恶中体会不到自由的可能性（希特勒作恶能体会自由的快感），恶融入到日常生活。若作恶能体会到自由（极端的恶），能够在善恶之间自由选择，人相应也会有罪恶感；但恶的平庸化则没有善恶之间选择的自由，因此不会有罪恶感。恶不是独立的，恶只是善的丧失。"},{"kind":"p","text":"4、共和主义"},{"kind":"p","text":"“参与者政府”的因素之一就是规模要足够小，以确保所有参与者都能充分地进行参与。另一个更为重要的因素，那就是政治事务要足够简单，以确保所有人都能掌握并有效地参与。轮流执政的前提就在于对政治事务的参与已经成为公民的常识，这也就是政治要排除专业化的匠人的主要原因之一。在职业化官僚组织控制之下，政治公开是没有意义的。"},{"kind":"p","text":"1、极权主义"},{"kind":"p","text":"极权主义之“新”并不在于它所造成的痛苦.也不在于它害.死了多少人.而在于它使人性本身处在危险之中。阿伦特认为.人之所以是人.其区别于动物的地方从根本上说就在于他们具有自觉行动和思想的能力，在这个意义上，每一个个体都是一种个别性的、独特的存在，因此多样性是人类的一个根本的特点。然而，这种新的政府形式要在一切层面上消灭的恰恰就是这种人的多样性和人的自发性，它要消除一切人为和偶然的东西，要把人变成人类动物的标本，变成仅仅是一样东西，一个“不停反应和反映的集合”。在阿伦特看来，极权主义用恐怖给自己扫清障碍并不完全靠肉体消灭，而是通过恐怖使人划一，失去自己的个性和特殊性，失去自己的创造性和创新能力，使之成为人这个类的样本。"},{"kind":"p","text":"尽管极权主义利用了恐怖与意识形态等手段来实现建立一个“千人一面”的制度的目的，但在阿伦特看来，这种极权主义统治如果没有被操纵的、划一的大众的支持，也是根本不可能的。阿伦特认为，极权主义运动是一种大众的运动，正是大众的无私奉献使得极权主义领导人可以无视他的人民的生命和利益。而大众是阶级社会崩溃的产物，是孤立的、原子式的个人，他们孤独无助，缺少正常的社会关系，也没有特定的、有限的、可达到的目标。在政治上，大众通常是冷漠的，他显然不关心公共事务，因此也不会加入任何党派甚至不会去投票站。在阿伦特看来，正是因为其孤独冷漠，这些原子化的大众才成了极权主义运动的“死士”，而极权主义也因此而得以滋生。在阿伦特看来，极权主义不是指一种特别野蛮的政权，而是与20世纪大众社会的发展结合在一起的一种更新更危险的东西，是“我们世纪的危机”。纳粹主义和斯大林主义只不过是它的标准体现而已。“"},{"kind":"p","text":"早在一百多年前，托克维尔就看到了民主时代的社会原子化和对他人、对公共事务冷漠的趋势，并且敏锐地指出：“在平等时代……每个人都既是独立的又是软弱无援的……他们的软弱无力有时使他们感到需要他人的支援，但他们却不能指望任何人给予他们帮助，因为大家都是软弱和冷漠的。迫于这种困境，他们自然将视线转向在这种普遍感到软弱无力的情况下惟一能够超然屹立的伟大存在（即政府当局"},{"kind":"personal","text":"引者）。他们的需要，尤其是他们的欲求，不断地把他们引向这个伟大存在；最后，他们终于把这个存在视为补救个人弱点的惟一的和必要的靠山”（托克维尔，1991：845）"},{"kind":"p","text":"2、人的条件：劳动、工作、行动"},{"kind":"p","text":"通过对人的条件的分析，阿伦特为现代“大众社会”或者说“消费社会”的兴起提供了一个概念性的分析框架。阿伦特关于人的条件的分析是从“Vita Activa”即“积极的生活”这一称语入手的。关于“Vita Activa”这个词，阿伦特认为可以把它解释为人的三种最基本的活动：劳动、工作和行动。"},{"kind":"p","text":"劳动的目的是维持生命，或者可以这么说，生命或维持生命是劳动的最高价值。，“劳动和消费只是周而复始的生命循环过程中的两个阶段。劳动和消费只是同一过程的两个因生活的必需品而强加于人的阶段，劳动的产物从来不会持久、稳定地存在。，劳动不会为人类创造一个持久稳定的世界，它体现的只是一种“‘无法在任何永恒的东西中确定自身和认识自身’的生命的无效”（阿伦特，1999：115）。劳动与消费本身所体现的这种“无效”性，使得阿伦特将人类的劳动称为“动物化劳动”。劳动，无论多么必要，在她看来，都只是一种次于人类的活动，其必要性来自我们的生物性，它是一种人类最缺少自由的活动模式。在阿伦特眼里，劳动是与人的自由或者从根本上说是与人性相对立的，是人的一种奴役性状态。"},{"kind":"p","text":"在亚里士多德眼里，一个真正意义上的人必须是一个“政治的动物”，即他必须不仅生活在家庭中，而且还生活在城邦即公共领域中。而私人领域，则意味着人的“一种被剥夺的状态，甚至是被剥夺了人类能力中最高级、最具人性的部分”（阿伦特，1999：29）。当然阿伦特并不认为因为劳动所体现的仅仅是人的生物性特点，是“动物化的劳动”，因此劳动就不再是人的基本的条件，她明确指出劳动作为人的生命的基本条件，对于人的存在来说是必须的，而私人领域则为人们提供了一个“遮蔽的空间”。"},{"kind":"p","text":"阿伦特将工作置于行动与劳动之间，所谓工作是这样一种活动，它联系着人类确立和维持为政治生活所必须的物质性事物的能力。作为人的条件之一，工作体现了一种“现世性”。阿伦特将工作的人称为“创造者的人”。在阿伦特看来，尽管劳动和工作的生产都是通过直接、间接地利用人力来改造自然，但衡量劳动的动物的生产尺度是消费，而衡量创造者的人的生产尺度则是实用或者说持久。工作本身的这种“现世性”或者说“持久性”从客观上为人类多样性的存在提供了支持，并使每一个独特的个体都获得了展开的可能性。，尽管与劳动相比，工作的人是个相对自由的人，但这个“创造者的人”不可能有最大的自由，因为，他活动的对象仍然是受着必然规律支配的自然。从这个意义上说，工作并没有完全摆脱必然性，因此，对于阿伦特来说，它仍然仅仅是人类自身实现最高自由的手段。"},{"kind":"p","text":"在人的条件中，阿伦特将行动置于核心位置。在阿伦特看来，行动是政治的真正核心所在，只有它能够成为反抗政治恐怖与一切政治上的恣意妄为的惟一堡垒，也是惟一体现了“人天生是政治的动物”这一内涵的人类的活动模式。如果说劳动根植于人的生命之必需，那么，行动根植于人的多样性之存在。人的多样性是行动得以可能的基本条件或者说基本前提。通过“自我展示”，阿伦特将言语与行动紧密地联系在一起，在她看来，“没有言语的行动不再是行动”，因为正是言语“同人之差异性相对应，并且实现了人类的多样性状况，也就是说，实现了在相同的存在中作为独特的、有差别的存在的人类的生活状况”"},{"kind":"p","text":"公共领域和行动是彼此交织、互相依赖的。在公共领域中，我们不仅区分了自身与他人，而且也区分了“与公共世界有关的行为和与维持生活有关的行为”，如生产与消费。"}],"noteBlocksEn":[{"kind":"p","text":"Arendt is presented as a political philosopher rather than a philosopher because she studies politics as a participant in worldly events."},{"kind":"p","text":"Her standard is the existence of a person as a person, not as an externally imposed role. Independent judgment is the final test."},{"kind":"p","text":"Her sources are Aristotle, Augustine, Kant, and Heidegger. Aristotle gives labor, work, and action; Augustine gives love of the world and beginning; Kant gives judgment; Heidegger gives phenomenology."},{"kind":"p","text":"Arendt turns Heidegger’s being-toward-death toward birth. Natality means that every birth is a new beginning."},{"kind":"p","text":"The human condition includes life, birth and death, world, plurality, and earth."},{"kind":"p","text":"Labor faces nature and necessity. It maintains life but does not create a durable human world."},{"kind":"p","text":"Work creates an artificial world with durability, but remains bound to utility and the means-end logic."},{"kind":"p","text":"Action occurs among people through speech and deed. It is unpredictable and non-durable, yet it reveals unique persons to one another."},{"kind":"p","text":"Action cannot persist by itself. Socrates speaking is action; once written down, it becomes work."},{"kind":"p","text":"The private realm is necessity and protection; the public realm is action and freedom; the social realm is the expansion of utility and administration into common life."},{"kind":"p","text":"The social realm produces nobody, no power, and no thought: rule by systems, isolated individuals, and loss of judgment."},{"kind":"p","text":"Eichmann shows thoughtlessness. Evil becomes banal when ordinary bureaucratic obedience replaces independent judgment."},{"kind":"p","text":"Arendt moves from radical evil to the banality of evil. Evil is not a first principle equal to good; it is the loss of good, judgment, and freedom."},{"kind":"p","text":"Totalitarianism is new because it endangers human plurality and spontaneity, turning people into interchangeable specimens."},{"kind":"p","text":"The mass basis of totalitarianism is atomized society. Isolated individuals without public life become available for total movements."},{"kind":"p","text":"On revolution, liberation removes oppression, but freedom requires creating a public realm in which people participate in common affairs."},{"kind":"p","text":"The ideal is participatory government, visible in councils and town meetings, requiring small scale and simple public affairs."},{"kind":"personal","text":"The notes connect Arendt to Marx but warn that a neat table of labor, work, and action is too simple. Modern social life constantly blurs private necessity and public freedom."}]}],"edges":[{"from":"intro","to":"oldinst","type":"extend","kw":{"zh":"学科对象：国家","en":"object: the state"},"tip":{"zh":"政治学先确立对象，再慢慢寻找方法。","en":"Political science first fixed its object, then sought its method."}},{"from":"oldinst","to":"traditional","type":"react","kw":{"zh":"法条≠过程","en":"text ≠ process"},"tip":{"zh":"正式法律不能解释实际政策过程，研究转向政党、集团和舆论。","en":"Formal law cannot explain actual policy process, so research turns to parties, groups, and public opinion."}},{"from":"traditional","to":"merriam","type":"extend","kw":{"zh":"科学化","en":"scientization"},"tip":{"zh":"非正式过程需要可调查的方法，梅里安推动政治科学革命。","en":"Informal process required researchable methods; Merriam pushed the political-science revolution."}},{"from":"merriam","to":"behavioral","type":"extend","kw":{"zh":"调查与量化","en":"survey and quantification"},"tip":{"zh":"芝加哥学派为行为主义提供训练、方法和学科组织。","en":"The Chicago School supplied training, method, and disciplinary organization for behavioralism."}},{"from":"behavioral","to":"postbehav","type":"react","kw":{"zh":"价值与大问题","en":"value and big questions"},"tip":{"zh":"行为主义过度依赖可测量对象，难以回应战争、运动、革命和正义问题。","en":"Behavioralism over-relied on measurable objects and struggled with war, movements, revolutions, and justice."}},{"from":"behavioral","to":"structfunc","type":"parallel","kw":{"zh":"机制化定性","en":"qualitative mechanism"},"tip":{"zh":"结构功能主义与行为主义并行，试图用结构—功能关系补充纯量化。","en":"Structural functionalism ran alongside behavioralism, supplementing pure quantification with structure-function relations."}},{"from":"structfunc","to":"easton","type":"extend","kw":{"zh":"系统论","en":"systems theory"},"tip":{"zh":"伊斯顿把系统论移入政治分析，形成输入—输出—反馈模型。","en":"Easton moved systems theory into political analysis through an input-output-feedback model."}},{"from":"easton","to":"almond","type":"extend","kw":{"zh":"打开黑箱","en":"open the black box"},"tip":{"zh":"阿尔蒙德把政府内部细分成功能层次，使框架更能落地。","en":"Almond subdivided the inside of government into functional levels, making the framework more usable."}},{"from":"postbehav","to":"ratchoice","type":"extend","kw":{"zh":"形式模型","en":"formal models"},"tip":{"zh":"后行为主义之后，一支走向理性选择和政治经济学。","en":"After post-behavioralism, one branch moves toward rational choice and political economy."}},{"from":"ratchoice","to":"collective","type":"extend","kw":{"zh":"规则与合作","en":"rules and cooperation"},"tip":{"zh":"集体行动和公共池研究把理性选择推进到制度与规则。","en":"Collective-action and common-pool studies push rational choice into institutions and rules."}},{"from":"collective","to":"politecon","type":"extend","kw":{"zh":"政治经济学主干","en":"political economy trunk"},"tip":{"zh":"公共选择、制度经济学和博弈论汇入政治经济学。","en":"Public choice, institutional economics, and game theory flow into political economy."}},{"from":"postbehav","to":"anthro","type":"react","kw":{"zh":"反抽象化","en":"against abstraction"},"tip":{"zh":"政治人类学反对只看可测量行为，转向田野、文化和日常权力。","en":"Political anthropology rejects only-measurable behavior and turns to fieldwork, culture, and everyday power."}},{"from":"anthro","to":"geertz","type":"extend","kw":{"zh":"深描","en":"thick description"},"tip":{"zh":"格尔兹用解释人类学重构文化与国家。","en":"Geertz reconstructs culture and the state through interpretive anthropology."}},{"from":"anthro","to":"scott","type":"extend","kw":{"zh":"日常反抗","en":"everyday resistance"},"tip":{"zh":"斯科特把权力和抵抗从宏大革命带到日常实践。","en":"Scott moves power and resistance from grand revolution to everyday practice."}},{"from":"postbehav","to":"histsoc","type":"extend","kw":{"zh":"长时段结构","en":"long-term structure"},"tip":{"zh":"另一支回到历史、国家、战争和社会结构。","en":"Another branch returns to history, the state, war, and social structure."}},{"from":"histsoc","to":"moore","type":"extend","kw":{"zh":"阶级路径","en":"class paths"},"tip":{"zh":"摩尔用阶级结构和农业商品化解释现代政治道路。","en":"Moore explains modern political paths through class structure and agricultural commercialization."}},{"from":"moore","to":"statewar","type":"react","kw":{"zh":"战争与国家能力","en":"war and state capacity"},"tip":{"zh":"战争驱动论把解释从经济结构转向军事、财政和强制组织。","en":"War-driven theory shifts explanation from economic structure to military, fiscal, and coercive organization."}},{"from":"histsoc","to":"stateback","type":"extend","kw":{"zh":"国家自主性","en":"state autonomy"},"tip":{"zh":"斯考切波把国家重新作为独立变量。","en":"Skocpol brings the state back as an independent variable."}},{"from":"histsoc","to":"california","type":"parallel","kw":{"zh":"经济史并行","en":"economic-history parallel"},"tip":{"zh":"加州学派同样做历史比较，但更重经济史和去西方中心。","en":"The California School also compares historically, but emphasizes economic history and decentering Europe."}},{"from":"stateback","to":"newinst","type":"extend","kw":{"zh":"制度重估","en":"institutions revalued"},"tip":{"zh":"找回国家与制度变迁研究共同推动新制度主义。","en":"The statist turn and institutional-change research together push new institutionalism."}},{"from":"behavioral","to":"newinst","type":"react","kw":{"zh":"制度不是黑箱","en":"institutions are not a black box"},"tip":{"zh":"新制度主义反对把制度当作黑箱或容器。制度会塑造行动者。","en":"New institutionalism rejects treating institutions as a black box or container. Institutions shape actors."}},{"from":"newinst","to":"rcinst","type":"extend","kw":{"zh":"博弈规则","en":"rules of the game"},"tip":{"zh":"理性选择制度主义研究规则如何降低交易成本和稳定合作。","en":"Rational-choice institutionalism studies how rules reduce transaction costs and stabilize cooperation."}},{"from":"newinst","to":"sociinst","type":"extend","kw":{"zh":"合法性脚本","en":"scripts of legitimacy"},"tip":{"zh":"社会学制度主义研究制度如何作为文化脚本和合法性形式。","en":"Sociological institutionalism studies institutions as cultural scripts and forms of legitimacy."}},{"from":"newinst","to":"histinst","type":"extend","kw":{"zh":"时间与路径","en":"time and paths"},"tip":{"zh":"历史制度主义研究路径依赖、关键转折点和事件次序。","en":"Historical institutionalism studies path dependence, critical junctures, and sequence."}},{"from":"postbehav","to":"arendt","type":"parallel","kw":{"zh":"政治哲学回归","en":"political philosophy returns"},"tip":{"zh":"阿伦特代表政治哲学对行为主义价值祛除的深层反击。","en":"Arendt represents political philosophy’s deeper response to behavioral value-neutrality."}}],"refs":{"zh":["Peter A. Hall 与 Rosemary C. R. Taylor，《Political Science and the Three New Institutionalisms》，Political Studies, 1996。","James G. March 与 Johan P. Olsen，《The New Institutionalism: Organizational Factors in Political Life》，APSR, 1984。","John W. Meyer 与 Brian Rowan，《Institutionalized Organizations: Formal Structure as Myth and Ceremony》，AJS, 1977。","Paul J. DiMaggio 与 Walter W. Powell，《The Iron Cage Revisited: Institutional Isomorphism and Collective Rationality in Organizational Fields》，ASR, 1983。","Robert K. Merton，《On Sociological Theories of the Middle Range》，1949。","Theda Skocpol，《States and Social Revolutions》，1979。","Elinor Ostrom，《Governing the Commons》，1990。","Clifford Geertz，《The Interpretation of Cultures》与《Local Knowledge》。","William H. Riker 与 Peter C. Ordeshook，《An Introduction to Positive Political Theory》，1973。","James M. Buchanan 与 Gordon Tullock，《The Calculus of Consent》，1962。","Samuel P. Huntington，《Political Order in Changing Societies》，1968。","Joel S. Migdal，《Strong Societies and Weak States》，1988。","Peter Evans，《Embedded Autonomy》，1995。","Perry Anderson，《Lineages of the Absolutist State》，1974。","Philip S. Gorski，《The Disciplinary Revolution》，2003。","John Rawls，《A Theory of Justice》，1971。"],"en":["Peter A. Hall and Rosemary C. R. Taylor, Political Science and the Three New Institutionalisms, Political Studies, 1996.","James G. March and Johan P. Olsen, The New Institutionalism: Organizational Factors in Political Life, APSR, 1984.","John W. Meyer and Brian Rowan, Institutionalized Organizations: Formal Structure as Myth and Ceremony, AJS, 1977.","Paul J. DiMaggio and Walter W. Powell, The Iron Cage Revisited: Institutional Isomorphism and Collective Rationality in Organizational Fields, ASR, 1983.","Robert K. Merton, On Sociological Theories of the Middle Range, 1949.","Theda Skocpol, States and Social Revolutions, 1979.","Elinor Ostrom, Governing the Commons, 1990.","Clifford Geertz, The Interpretation of Cultures and Local Knowledge.","William H. Riker and Peter C. Ordeshook, An Introduction to Positive Political Theory, 1973.","James M. Buchanan and Gordon Tullock, The Calculus of Consent, 1962.","Samuel P. Huntington, Political Order in Changing Societies, 1968.","Joel S. Migdal, Strong Societies and Weak States, 1988.","Peter Evans, Embedded Autonomy, 1995.","Perry Anderson, Lineages of the Absolutist State, 1974.","Philip S. Gorski, The Disciplinary Revolution, 2003.","John Rawls, A Theory of Justice, 1971."]},"overview":{"zh":["这个网页基于复旦大学政治学本科课程《当代西方政治学说史》的课程笔记制作，把课程中反复出现的主线重排成一棵政治学理论谱系树：美国政治科学如何从国家、宪法和正式制度出发，逐步转向政治过程、行为、系统、理性选择、历史社会学、政治人类学、新制度主义和政治哲学。个人思考、评价或课堂边注，以“个人笔记”标出。"],"en":["This webpage is based on notes from Fudan University’s undergraduate political science course “Contemporary Western Political Science”. It reorganizes the course’s recurring through-lines into a genealogy of political-science theory: how American political science moved from the state, constitutions, and formal institutions toward political process, behavior, systems, rational choice, historical sociology, political anthropology, new institutionalism, and political philosophy. Personal reflections, evaluations, and lecture marginalia are marked as “Personal note.”"]}}</script>
  <script>
  const DATA = JSON.parse(document.getElementById('payload').textContent);
  let lang = 'zh';
  let currentId = null;
  const nodeById = new Map(DATA.nodes.map(n => [n.id, n]));

  const L = {
    zh: {
      eyebrow:'复旦大学 · 政治学本科课程笔记 · 当代西方政治学说史',
      title:'当代西方政治学理论谱系',
      lead:'基于复旦大学政治学本科课程《当代西方政治学说史》的课程笔记，重排为一棵展示政治学理论如何分叉、反驳、继承与重组的树。',
      pills:[],
      readTitle:'如何阅读这棵树',
      readP1:'谱系图横向分叉代表理论路线，纵向位置代表大致时间。连线上的关键词说明一个流派为何从前一个流派中分化出来，悬停鼠标显示更详细内容。',
      readP2:'',
      jumpTree:'查看谱系图',
      treeTitle:'谱系图',
      treeHint:'鼠标悬停连线可读流派关系；点击节点进入详情页。',
      refsTitle:'参考文献',
      refsLead:'这里是本页用来补充笔记的学术锚点。',
      toc:'On This Page',
      core:'核心理论',
      relation:'它解决或反对的问题',
      works:'代表人物与文献',
      strengths:'贡献',
      limits:'局限',
      personal:'个人笔记',
      notes:'按课程笔记保留的细节',
      notesHint:'以下是原课程笔记的内容。',
      refs:'参考文献',
      back:'← 返回谱系图',
      prev:'上一节点',
      next:'下一节点',
      footer:'据复旦大学政治学本科课程《当代西方政治学说史》笔记重构',
      home:'Back to overview'
    },
    en: {
      eyebrow:'Fudan University · Political Science undergraduate course notes · Contemporary Western Political Thought',
      title:'A Genealogy of Contemporary Western Political Theory',
      lead:'A genealogy built from lecture notes for Fudan University’s undergraduate course “Contemporary Western Political Science”. It shows how political-science theories branch, react, inherit, and recombine.',
      pills:[],
      readTitle:'How to read the tree',
      readP1:'Horizontal branches represent theoretical routes, and vertical placement represents approximate time. Keywords on the connecting lines explain why one school branched out from another; hover over a line to see the fuller explanation.',
      readP2:'',
      jumpTree:'Open genealogy map',
      treeTitle:'Genealogy Map',
      treeHint:'Hover a line for the relation between schools; click a node for the detail page.',
      refsTitle:'References',
      refsLead:'These are academic anchors used to supplement the notes.',
      toc:'On This Page',
      core:'Core theory',
      relation:'Problem addressed',
      works:'Key figures and works',
      strengths:'Strengths',
      limits:'Limits',
      personal:'Personal note',
      notes:'Detailed course-note excerpts',
      notesHint:'The following is an English version of the course note. Personal evaluations are marked as “Personal note.”',
      refs:'References',
      back:'← Back to genealogy',
      prev:'Previous node',
      next:'Next node',
      footer:'Reconstructed from Fudan University undergraduate course notes on Contemporary Western Political Science',
      home:'Back to overview'
    }
  };

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }
  function t(obj) { return obj?.[lang] ?? obj?.zh ?? ''; }
  function listHtml(items) {
    return '<ul class="clean">' + (items || []).map(x => '<li>' + esc(x) + '</li>').join('') + '</ul>';
  }

  function renderOverview() {
    document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
    document.getElementById('langToggle').textContent = lang === 'zh' ? 'English' : '中文';
    document.getElementById('heroEyebrow').textContent = L[lang].eyebrow;
    document.getElementById('heroTitle').textContent = L[lang].title;
    document.getElementById('heroLead').textContent = L[lang].lead;
    document.getElementById('heroPills').innerHTML = L[lang].pills.map(x => `<span class="meta-pill">${esc(x)}</span>`).join('');
    const ov = document.getElementById('overviewText');
    ov.innerHTML = DATA.overview[lang].map(p => `<p>${esc(p)}</p>`).join('');
    document.getElementById('readTitle').textContent = L[lang].readTitle;
    document.getElementById('readP1').textContent = L[lang].readP1;
    document.getElementById('readP2').textContent = L[lang].readP2;
    document.getElementById('treeTitle').textContent = L[lang].treeTitle;
    document.getElementById('treeHint').textContent = L[lang].treeHint;
    document.getElementById('refsTitle').textContent = L[lang].refsTitle;
    document.getElementById('refsLead').textContent = L[lang].refsLead;
    document.getElementById('refsList').innerHTML = DATA.refs[lang].map(r => `<li>${esc(r)}</li>`).join('');
    document.getElementById('footerLeft').textContent = L[lang].footer;
    document.getElementById('footerHome').textContent = L[lang].home;
    document.getElementById('navTree').textContent = lang === 'zh' ? '↩ 谱系树' : '↩ The Tree';
    drawTree();
  }

  function pos(n) {
    const minX = -4.3;
    const laneW = 195;
    const marginX = 150;
    const marginY = 120;
    const stepY = 180;
    return {
      x: marginX + (n.x - minX) * laneW,
      y: marginY + n.y * stepY
    };
  }

  function drawTree() {
    const canvas = document.getElementById('treeCanvas');
    // Skip while the genealogy view is hidden (e.g. the detail page): redrawing
    // a hidden canvas is wasted work, and it would also defeat the scroll anchor
    // captured for a language switch. We redraw on return to the overview.
    if (!canvas.offsetParent) return;
    canvas.querySelectorAll('.g-node,.tl-label').forEach(el => el.remove());
    const svg = document.getElementById('treeSvg');
    svg.setAttribute('viewBox', '0 0 2400 2250');
    svg.innerHTML = '';

    const years = [
      ['1880s', .1], ['1920s', 3], ['1940s–60s', 4.6],
      ['1969–', 6.1], ['1980s–', 9.7], ['2000s', 10.9]
    ];
    years.forEach(([label,y]) => {
      const d = document.createElement('div');
      d.className = 'tl-label';
      d.style.top = (120 + y*180) + 'px';
      d.textContent = label;
      canvas.appendChild(d);
    });

    const nodeRects = DATA.nodes.map(n => {
      const p = pos(n);
      return { id:n.id, left:p.x-104, right:p.x+104, top:p.y-94, bottom:p.y+94 };
    });
    const labelHitsNode = (x, y, labelText) => {
      const w = Math.min(190, Math.max(54, labelText.length * (lang === 'zh' ? 11 : 7)));
      const box = { left:x-w/2, right:x+w/2, top:y-15, bottom:y+7 };
      return nodeRects.some(r => !(box.right < r.left || box.left > r.right || box.bottom < r.top || box.top > r.bottom));
    };

    DATA.edges.forEach(e => {
      const a = nodeById.get(e.from), b = nodeById.get(e.to);
      if (!a || !b) return;
      const p1 = pos(a), p2 = pos(b);
      const dx = Math.abs(p2.x - p1.x);
      const midY = (p1.y + p2.y)/2;
      const c1x = p1.x, c1y = p1.y + Math.max(38, Math.abs(p2.y-p1.y)*.45);
      const c2x = p2.x, c2y = p2.y - Math.max(38, Math.abs(p2.y-p1.y)*.45);
      const d = `M ${p1.x} ${p1.y} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', d);
      path.setAttribute('class', 'edge-path edge-' + e.type);
      svg.appendChild(path);

      const hit = document.createElementNS('http://www.w3.org/2000/svg','path');
      hit.setAttribute('d', d);
      hit.setAttribute('class','edge-hit');
      hit.addEventListener('mousemove', ev => showTip(ev, t(e.kw), t(e.tip)));
      hit.addEventListener('mouseleave', hideTip);
      svg.appendChild(hit);

      const labelText = t(e.kw);
      let labelX = (p1.x+p2.x)/2 + (dx > 70 ? 0 : 24);
      let labelY = midY - 6;
      const vx = p2.x - p1.x;
      const vy = p2.y - p1.y;
      const len = Math.hypot(vx, vy) || 1;
      const nx = -vy / len;
      const ny = vx / len;
      const offsets = [0, 36, -36, 72, -72, 112, -112, 150, -150];
      for (const off of offsets) {
        const tx = labelX + nx * off;
        const ty = labelY + ny * off;
        if (!labelHitsNode(tx, ty, labelText)) { labelX = tx; labelY = ty; break; }
      }

      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', labelX);
      txt.setAttribute('y', labelY);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('class','edge-label');
      txt.textContent = labelText;
      svg.appendChild(txt);
    });

    DATA.nodes.forEach(n => {
      const p = pos(n);
      const el = document.createElement('div');
      let cls = 'g-node ';
      cls += n.x < -0.4 ? 'left' : (n.x > 0.4 ? 'right' : 'trunk');
      el.className = cls;
      el.dataset.nodeId = n.id;
      el.style.left = p.x + 'px';
      el.style.top = p.y + 'px';
      el.innerHTML = `<div class="era">${esc(n.era)}</div><div class="title">${esc(t(n.title))}</div><div class="tag">${esc(t(n.tag))}</div>`;
      el.addEventListener('click', () => showDetail(n.id));
      canvas.appendChild(el);
    });
  }

  function showTip(ev, key, text) {
    const tip = document.getElementById('tooltip');
    document.getElementById('tipKey').textContent = key;
    document.getElementById('tipText').textContent = text;
    tip.style.left = Math.min(ev.clientX + 14, window.innerWidth - 340) + 'px';
    tip.style.top = Math.min(ev.clientY + 14, window.innerHeight - 150) + 'px';
    tip.classList.add('show');
  }
  function hideTip() { document.getElementById('tooltip').classList.remove('show'); }

  function noteBlocksHtml(n) {
    const blocks = (lang === 'en' && n.noteBlocksEn) ? n.noteBlocksEn : (n.noteBlocks || []);
    const body = blocks.map(b => {
      if (b.kind === 'personal') {
        return `<div class="note personal-note"><strong>${esc(L[lang].personal)}</strong><p>${esc(b.text)}</p></div>`;
      }
      return `<p>${esc(b.text)}</p>`;
    }).join('');
    return `<details class="note-block" open><summary>${esc(L[lang].notes)}</summary><p class="lead">${esc(L[lang].notesHint)}</p><div class="excerpt-body">${body}</div></details>`;
  }

  function showDetail(id, preserveScroll) {
    currentId = id;
    const n = nodeById.get(id);
    if (!n) return;
    document.getElementById('overviewView').classList.remove('active');
    const view = document.getElementById('detailView');
    view.classList.add('active');

    const ordered = DATA.nodes;
    const idx = ordered.findIndex(x => x.id === id);
    const prev = ordered[(idx - 1 + ordered.length) % ordered.length];
    const next = ordered[(idx + 1) % ordered.length];

    view.innerHTML = `
      <section class="detail-hero">
        <div class="container">
          <p class="eyebrow" style="color:var(--rust);">${esc(n.era)} · ${esc(t(n.tag))}</p>
          <h1>${esc(t(n.title))}</h1>
          <p class="lead">${esc(t(n.relation))}</p>
        </div>
      </section>
      <section class="section">
        <div class="container article-layout">
          <aside class="toc">
            <strong>${esc(L[lang].toc)}</strong>
            <a href="#core">${esc(L[lang].core)}</a>
            <a href="#relation">${esc(L[lang].relation)}</a>
            <a href="#works">${esc(L[lang].works)}</a>
            <a href="#pros">${esc(L[lang].strengths)}</a>
            <a href="#notes">${esc(L[lang].notes)}</a>
            <a href="#refs-detail">${esc(L[lang].refs)}</a>
          </aside>
          <article class="article">
            <section id="core"><h2>${esc(L[lang].core)}</h2>${t(n.core).map(p => `<p>${esc(p)}</p>`).join('')}</section>
            <hr class="divider">
            <section id="relation"><h2>${esc(L[lang].relation)}</h2><p class="lead">${esc(t(n.relation))}</p></section>
            <hr class="divider">
            <section id="works"><h2>${esc(L[lang].works)}</h2>${listHtml(t(n.works))}</section>
            <hr class="divider">
            <section id="pros"><h2>${esc(L[lang].strengths)}</h2>${listHtml(t(n.strengths))}<h3>${esc(L[lang].limits)}</h3>${listHtml(t(n.limits))}</section>
            <hr class="divider">
            <section><h2>${esc(L[lang].personal)}</h2>${t(n.personal).map(p => `<div class="note personal-note"><strong>${esc(L[lang].personal)}</strong><p>${esc(p)}</p></div>`).join('')}</section>
            <hr class="divider">
            <section id="notes">${noteBlocksHtml(n)}</section>
            <hr class="divider">
            <section id="refs-detail"><h2>${esc(L[lang].refs)}</h2><ul class="ref-list">${DATA.refs[lang].map(r => `<li>${esc(r)}</li>`).join('')}</ul></section>
            <div class="node-nav">
              <button type="button" onclick="showDetail('${prev.id}')"><small>${esc(L[lang].prev)}</small>${esc(t(prev.title))}</button>
              <button type="button" onclick="showDetail('${next.id}')"><small>${esc(L[lang].next)}</small>${esc(t(next.title))}</button>
            </div>
          </article>
        </div>
      </section>`;
    // A normal open (click / arrow-key nav) jumps to the top of the node; a
    // language switch passes preserveScroll so the reader keeps their place.
    if (!preserveScroll) window.scrollTo({top:0, behavior:'smooth'});
  }

  function goOverview(ev) {
    if (ev) ev.preventDefault();
    currentId = null;
    document.getElementById('detailView').classList.remove('active');
    document.getElementById('overviewView').classList.add('active');
    renderOverview();
    setTimeout(() => document.getElementById('genealogy').scrollIntoView({behavior:'smooth'}), 30);
  }

  // Scroll to y with no animation (defeats html{scroll-behavior:smooth}).
  function instantScrollTo(y) {
    const root = document.documentElement;
    const prev = root.style.scrollBehavior;
    root.style.scrollBehavior = 'auto';
    window.scrollTo(0, Math.max(0, y));
    root.style.scrollBehavior = prev;
  }

  // On the overview, remember the tree card nearest the viewport centre and its
  // on-screen position, so we can put the SAME card back after re-render. The zh
  // and en pages differ in height (the text above the tree reflows), so anchoring
  // to a node is reliable where a raw scrollY would land on the wrong place.
  function captureTreeAnchor() {
    const cards = document.querySelectorAll('#treeCanvas .g-node');
    if (!cards.length) return null;
    const vMid = window.innerHeight / 2;
    let best = null, bestD = Infinity;
    cards.forEach(c => {
      const r = c.getBoundingClientRect();
      const d = Math.abs((r.top + r.height / 2) - vMid);
      if (d < bestD) { bestD = d; best = c; }
    });
    if (!best) return null;
    const r = best.getBoundingClientRect();
    if (r.bottom < 0 || r.top > window.innerHeight) return null; // tree not in view
    return { id: best.dataset.nodeId, vpTop: r.top };
  }

  function setLang(nextLang) {
    // Capture where the reader is BEFORE switching, then put them back.
    const onDetail = !!currentId;
    const prevY = window.scrollY;
    const anchor = onDetail ? null : captureTreeAnchor();
    lang = nextLang;
    renderOverview();
    if (currentId) showDetail(currentId, true);   // same node, no jump to top
    if (onDetail) {
      instantScrollTo(prevY);                      // detail: keep reading position
    } else if (anchor) {
      const c = document.querySelector('#treeCanvas .g-node[data-node-id="' + anchor.id + '"]');
      if (c) instantScrollTo(window.scrollY + (c.getBoundingClientRect().top - anchor.vpTop));
      else instantScrollTo(prevY);                 // anchor node vanished — fall back
    } else {
      instantScrollTo(prevY);                      // not looking at the tree — keep scrollY
    }
  }

  document.getElementById('langToggle').addEventListener('click', () => setLang(lang === 'zh' ? 'en' : 'zh'));
  document.getElementById('navTree').addEventListener('click', ev => { ev.preventDefault(); currentId = null; document.getElementById('detailView').classList.remove('active'); document.getElementById('overviewView').classList.add('active'); document.getElementById('genealogy').scrollIntoView({behavior:'smooth'}); });
  document.getElementById('footerHome').addEventListener('click', ev => { ev.preventDefault(); currentId = null; document.getElementById('detailView').classList.remove('active'); document.getElementById('overviewView').classList.add('active'); window.scrollTo({top:0, behavior:'smooth'}); });


  function navigateNode(delta) {
    if (!currentId) return;
    const active = document.activeElement;
    if (active && ['INPUT', 'TEXTAREA', 'SELECT'].includes(active.tagName)) return;
    const ordered = DATA.nodes;
    const idx = ordered.findIndex(x => x.id === currentId);
    if (idx < 0) return;
    const target = ordered[(idx + delta + ordered.length) % ordered.length];
    showDetail(target.id);
  }

  document.addEventListener('keydown', ev => {
    if (!currentId) return;
    if (ev.altKey || ev.ctrlKey || ev.metaKey || ev.shiftKey) return;
    if (ev.key === 'ArrowLeft') {
      ev.preventDefault();
      navigateNode(-1);
    } else if (ev.key === 'ArrowRight') {
      ev.preventDefault();
      navigateNode(1);
    }
  });

  renderOverview();
  </script>
</body>
</html>
