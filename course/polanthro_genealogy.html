  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }
  function t(obj) { return obj?.[lang] ?? obj?.zh ?? ''; }
  function listHtml(items) {
    return '<ul class="clean">' + (items || []).map(x => '<li>' + esc(x) + '</li>').join('') + '</ul>';
  }

  function renderOverview() {
    document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
    document.getElementById('langToggle').textContent = lang === 'zh' ? 'English' : '中文';
    document.getElementById('heroEyebrow').textContent = L[lang].eyebrow;
    document.getElementById('heroTitle').textContent = L[lang].title;
    document.getElementById('heroLead').textContent = L[lang].lead;
    document.getElementById('heroPills').innerHTML = L[lang].pills.map(x => `<span class="meta-pill">${esc(x)}</span>`).join('');
    const ov = document.getElementById('overviewText');
    ov.innerHTML = DATA.overview[lang].map(p => `<p>${esc(p)}</p>`).join('');
    document.getElementById('readTitle').textContent = L[lang].readTitle;
    document.getElementById('readP1').textContent = L[lang].readP1;
    document.getElementById('readP2').textContent = L[lang].readP2;
    document.getElementById('treeTitle').textContent = L[lang].treeTitle;
    document.getElementById('treeHint').textContent = L[lang].treeHint;
    document.getElementById('refsTitle').textContent = L[lang].refsTitle;
    document.getElementById('refsLead').textContent = L[lang].refsLead;
    document.getElementById('refsList').innerHTML = DATA.refs[lang].map(r => `<li>${esc(r)}</li>`).join('');
    document.getElementById('footerLeft').textContent = L[lang].footer;
    document.getElementById('footerHome').textContent = L[lang].home;
    document.getElementById('navTree').textContent = lang === 'zh' ? '↩ 谱系树' : '↩ The Tree';
    drawTree();
  }

  function pos(n) {
    const minX = -4.3;
    const laneW = 195;
    const marginX = 150;
    const marginY = 120;
    const stepY = 180;
    return {
      x: marginX + (n.x - minX) * laneW,
      y: marginY + n.y * stepY
    };
  }

  function drawTree() {
    const canvas = document.getElementById('treeCanvas');
    // Skip while the genealogy view is hidden (e.g. detail page): offsetHeight
    // would read 0 and the adaptive layout would be wrong. We redraw on return
    // to the overview, so nothing is lost.
    if (!canvas.offsetParent) return;
    canvas.querySelectorAll('.g-node,.tl-label').forEach(el => el.remove());
    const svg = document.getElementById('treeSvg');
    svg.innerHTML = '';

    const GUTTER = 36;   // minimum vertical gap between two cards in the same column
    const VPAD = 120;    // breathing room below the lowest card

    // ---- PASS 1: create every card and measure its REAL rendered size.
    //      Card height depends on language (English titles/tags wrap taller),
    //      so we read offsetHeight instead of assuming a fixed step. ----
    const els = {};
    const layout = {};   // id -> { x, desiredY, w, h, adjY }
    DATA.nodes.forEach(n => {
      const p = pos(n);
      const el = document.createElement('div');
      let cls = 'g-node ';
      cls += n.x < -0.4 ? 'left' : (n.x > 0.4 ? 'right' : 'trunk');
      el.className = cls;
      el.style.left = p.x + 'px';
      el.style.top = p.y + 'px';
      el.innerHTML = `<div class="era">${esc(t(n.era))}</div><div class="title">${esc(t(n.title))}</div><div class="tag">${esc(t(n.tag))}</div>`;
      el.addEventListener('click', () => showDetail(n.id));
      canvas.appendChild(el);
      els[n.id] = el;
      layout[n.id] = { x: p.x, desiredY: p.y, w: el.offsetWidth, h: el.offsetHeight, adjY: p.y };
    });

    // ---- adaptive de-overlap: keep each card's desired centre, but push a card
    //      DOWN only when it would fall within GUTTER of an earlier card that
    //      actually overlaps it horizontally (i.e. the same trunk/column).
    //      The two trunks never overlap horizontally, so they stay independent;
    //      short Chinese cards never trip the gutter, so the zh layout is left
    //      exactly as-is. ----
    const order = DATA.nodes.slice().sort((a, b) => layout[a.id].desiredY - layout[b.id].desiredY);
    const placed = [];
    order.forEach(n => {
      const L = layout[n.id];
      let y = L.desiredY;
      placed.forEach(m => {
        const M = layout[m.id];
        const overlapX = Math.abs(L.x - M.x) < (L.w / 2 + M.w / 2);
        if (overlapX) {
          const minY = M.adjY + M.h / 2 + GUTTER + L.h / 2;
          if (y < minY) y = minY;
        }
      });
      L.adjY = y;
      placed.push(n);
    });

    // commit the adjusted vertical centre to each card
    DATA.nodes.forEach(n => { els[n.id].style.top = layout[n.id].adjY + 'px'; });

    // single source of truth for positions — shared by nodes, edges and labels
    const apos = id => ({ x: layout[id].x, y: layout[id].adjY });

    // grow the canvas + SVG to fit whatever the adjusted layout needs
    let maxBottom = 0;
    DATA.nodes.forEach(n => { maxBottom = Math.max(maxBottom, layout[n.id].adjY + layout[n.id].h / 2); });
    const totalH = Math.max(2250, Math.round(maxBottom + VPAD));
    canvas.style.height = totalH + 'px';
    svg.setAttribute('viewBox', '0 0 2400 ' + totalH);

    // ---- timeline labels: shift each label down by the accumulated push of the
    //      cards above it, so the axis stays aligned after de-overlapping ----
    const offPts = DATA.nodes.map(n => ({ d: layout[n.id].desiredY, off: layout[n.id].adjY - layout[n.id].desiredY }));
    const offsetAt = ty => { let o = 0; for (const p of offPts) { if (p.d <= ty && p.off > o) o = p.off; } return o; };
    const years = DATA.timeline || [];
    years.forEach(it => {
      const baseY = 120 + it.y * 180;
      const d = document.createElement('div');
      d.className = 'tl-label';
      d.style.top = (baseY + offsetAt(baseY)) + 'px';
      d.textContent = it[lang] || it.zh;
      canvas.appendChild(d);
    });

    // ---- edges use the SAME adjusted positions, so every line still starts and
    //      ends on its card; node rects use measured size for label collision ----
    const nodeRects = DATA.nodes.map(n => {
      const p = apos(n.id), L = layout[n.id];
      return { id: n.id, left: p.x - L.w / 2, right: p.x + L.w / 2, top: p.y - L.h / 2, bottom: p.y + L.h / 2 };
    });
    const labelHitsNode = (x, y, labelText) => {
      const w = Math.min(190, Math.max(54, labelText.length * (lang === 'zh' ? 11 : 7)));
      const box = { left:x-w/2, right:x+w/2, top:y-15, bottom:y+7 };
      return nodeRects.some(r => !(box.right < r.left || box.left > r.right || box.bottom < r.top || box.top > r.bottom));
    };

    DATA.edges.forEach(e => {
      const a = nodeById.get(e.from), b = nodeById.get(e.to);
      if (!a || !b) return;
      const p1 = apos(a.id), p2 = apos(b.id);
      const dx = Math.abs(p2.x - p1.x);
      const midY = (p1.y + p2.y)/2;
      const c1x = p1.x, c1y = p1.y + Math.max(38, Math.abs(p2.y-p1.y)*.45);
      const c2x = p2.x, c2y = p2.y - Math.max(38, Math.abs(p2.y-p1.y)*.45);
      const d = `M ${p1.x} ${p1.y} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', d);
      const cross = a.trunk !== b.trunk;
      path.setAttribute('class', 'edge-path edge-' + e.type + (cross ? ' edge-cross' : ''));
      svg.appendChild(path);

      const hit = document.createElementNS('http://www.w3.org/2000/svg','path');
      hit.setAttribute('d', d);
      hit.setAttribute('class','edge-hit');
      hit.addEventListener('mousemove', ev => showTip(ev, t(e.kw), t(e.tip)));
      hit.addEventListener('mouseleave', hideTip);
      svg.appendChild(hit);

      const labelText = t(e.kw);
      let labelX = (p1.x+p2.x)/2 + (dx > 70 ? 0 : 24);
      let labelY = midY - 6;
      const vx = p2.x - p1.x;
      const vy = p2.y - p1.y;
      const len = Math.hypot(vx, vy) || 1;
      const nx = -vy / len;
      const ny = vx / len;
      const offsets = [0, 36, -36, 72, -72, 112, -112, 150, -150];
      for (const off of offsets) {
        const tx = labelX + nx * off;
        const ty = labelY + ny * off;
        if (!labelHitsNode(tx, ty, labelText)) { labelX = tx; labelY = ty; break; }
      }

      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', labelX);
      txt.setAttribute('y', labelY);
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('class','edge-label');
      txt.textContent = labelText;
      svg.appendChild(txt);
    });
  }

  function showTip(ev, key, text) {
    const tip = document.getElementById('tooltip');
    document.getElementById('tipKey').textContent = key;
    document.getElementById('tipText').textContent = text;
    tip.style.left = Math.min(ev.clientX + 14, window.innerWidth - 340) + 'px';
    tip.style.top = Math.min(ev.clientY + 14, window.innerHeight - 150) + 'px';
    tip.classList.add('show');
  }
  function hideTip() { document.getElementById('tooltip').classList.remove('show'); }

  function noteBlocksHtml(n) {
    const blocks = (lang === 'en' && n.noteBlocksEn) ? n.noteBlocksEn : (n.noteBlocks || []);
    const body = blocks.map(b => {
      if (b.kind === 'personal') {
        return `<div class="note personal-note"><strong>${esc(L[lang].personal)}</strong><p>${esc(b.text)}</p></div>`;
      }
      return `<p>${esc(b.text)}</p>`;
    }).join('');
    return `<details class="note-block" open><summary>${esc(L[lang].notes)}</summary><p class="lead">${esc(L[lang].notesHint)}</p><div class="excerpt-body">${body}</div></details>`;
  }

  function showDetail(id, preserveScroll) {
    currentId = id;
    const n = nodeById.get(id);
    if (!n) return;
    document.getElementById('overviewView').classList.remove('active');
    const view = document.getElementById('detailView');
    view.classList.add('active');

    const ordered = DATA.nodes;
    const idx = ordered.findIndex(x => x.id === id);
    const prev = ordered[(idx - 1 + ordered.length) % ordered.length];
    const next = ordered[(idx + 1) % ordered.length];

    view.innerHTML = `
      <section class="detail-hero">
        <div class="container">
          <p class="eyebrow" style="color:var(--rust);">${esc(t(n.era))} · ${esc(t(n.tag))}</p>
          <h1>${esc(t(n.title))}</h1>
          <p class="lead">${esc(t(n.relation))}</p>
        </div>
      </section>
      <section class="section">
        <div class="container article-layout">
          <aside class="toc">
            <strong>${esc(L[lang].toc)}</strong>
            <a href="#core">${esc(L[lang].core)}</a>
            <a href="#relation">${esc(L[lang].relation)}</a>
            <a href="#works">${esc(L[lang].works)}</a>
            <a href="#pros">${esc(L[lang].strengths)}</a>
            ${n.reflection ? `<a href="#reflection-note">${esc(L[lang].reflection)}</a>` : ''}
            <a href="#notes">${esc(L[lang].notes)}</a>
            <a href="#refs-detail">${esc(L[lang].refs)}</a>
          </aside>
          <article class="article">
            <section id="core"><h2>${esc(L[lang].core)}</h2>${t(n.core).map(p => `<p>${esc(p)}</p>`).join('')}</section>
            <hr class="divider">
            <section id="relation"><h2>${esc(L[lang].relation)}</h2><p class="lead">${esc(t(n.relation))}</p></section>
            <hr class="divider">
            <section id="works"><h2>${esc(L[lang].works)}</h2>${listHtml(t(n.works))}</section>
            <hr class="divider">
            <section id="pros"><h2>${esc(L[lang].strengths)}</h2>${listHtml(t(n.strengths))}<h3>${esc(L[lang].limits)}</h3>${listHtml(t(n.limits))}</section>
            <hr class="divider">
            <section><h2>${esc(L[lang].personal)}</h2>${t(n.personal).map(p => `<div class="note personal-note"><strong>${esc(L[lang].personal)}</strong><p>${esc(p)}</p></div>`).join('')}</section>
            <hr class="divider">
            ${n.reflection ? `<section id="reflection-note"><h2>${esc(L[lang].reflection)}</h2><div class="note reflection-note"><strong>${esc(L[lang].reflection)}</strong>${t(n.reflection).map(p => `<p>${esc(p)}</p>`).join('')}</div></section><hr class="divider">` : ''}
            <section id="notes">${noteBlocksHtml(n)}</section>
            <hr class="divider">
            <section id="refs-detail"><h2>${esc(L[lang].refs)}</h2><ul class="ref-list">${DATA.refs[lang].map(r => `<li>${esc(r)}</li>`).join('')}</ul></section>
            <div class="node-nav">
              <button type="button" onclick="showDetail('${prev.id}')"><small>${esc(L[lang].prev)}</small>${esc(t(prev.title))}</button>
              <button type="button" onclick="showDetail('${next.id}')"><small>${esc(L[lang].next)}</small>${esc(t(next.title))}</button>
            </div>
          </article>
        </div>
      </section>`;
    // A normal open (click / arrow-key nav) jumps to the top of the node; a
    // language switch passes preserveScroll so the reader stays where they were.
    if (!preserveScroll) window.scrollTo({top:0, behavior:'smooth'});
  }

  function goOverview(ev) {
    if (ev) ev.preventDefault();
    currentId = null;
    document.getElementById('detailView').classList.remove('active');
    document.getElementById('overviewView').classList.add('active');
    renderOverview();
    setTimeout(() => document.getElementById('genealogy').scrollIntoView({behavior:'smooth'}), 30);
  }

  function navigateNode(delta) {
    if (!currentId) return;
    const ordered = DATA.nodes;
    const idx = ordered.findIndex(x => x.id === currentId);
    if (idx < 0) return;
    const target = ordered[(idx + delta + ordered.length) % ordered.length];
    showDetail(target.id);
  }

  document.addEventListener('keydown', ev => {
    if (!currentId) return;
    if (ev.altKey || ev.ctrlKey || ev.metaKey || ev.shiftKey) return;
    const active = document.activeElement;
    const tag = active && active.tagName ? active.tagName.toLowerCase() : '';
    if (active && (active.isContentEditable || tag === 'input' || tag === 'textarea' || tag === 'select')) return;
    if (ev.key === 'ArrowLeft') {
      ev.preventDefault();
      navigateNode(-1);
    } else if (ev.key === 'ArrowRight') {
      ev.preventDefault();
      navigateNode(1);
    }
  });

  function setLang(nextLang) {
    // Remember where the reader is, switch language, then put them back.
    // Overview: same scrollY (the tree may grow taller, but content above it
    // is unchanged). Detail: same node + same scrollY, no jump to top.
    const y = window.scrollY;
    lang = nextLang;
    renderOverview();
    if (currentId) showDetail(currentId, true);
    // Restore instantly — temporarily defeat html{scroll-behavior:smooth}.
    const root = document.documentElement;
    const prevBehavior = root.style.scrollBehavior;
    root.style.scrollBehavior = 'auto';
    window.scrollTo(0, y);
    root.style.scrollBehavior = prevBehavior;
  }

  document.getElementById('langToggle').addEventListener('click', () => setLang(lang === 'zh' ? 'en' : 'zh'));
  document.getElementById('navTree').addEventListener('click', ev => { ev.preventDefault(); currentId = null; document.getElementById('detailView').classList.remove('active'); document.getElementById('overviewView').classList.add('active'); document.getElementById('genealogy').scrollIntoView({behavior:'smooth'}); });
  document.getElementById('footerHome').addEventListener('click', ev => { ev.preventDefault(); currentId = null; document.getElementById('detailView').classList.remove('active'); document.getElementById('overviewView').classList.add('active'); window.scrollTo({top:0, behavior:'smooth'}); });

  renderOverview();
  </script>
