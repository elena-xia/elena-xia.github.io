向国家演进的起点。政治上集权（由最高酋长控制多聚落），经济上再分配（集中决策以协调一大批聚落）。","酋邦演化的前提是定居农业带来的资源富余与私有财产意识。通用机制是：通过战争、宴飨、聘礼等一系列由头，鼓动群众生产剩余粮食，再由酋长掌握再分配权。“大分流”的关键在于：有的酋邦掌握了永久产权／战略性生计资源（如土地、捕猎路径的垄断），因而层化并发展为早期国家；多数酋邦则灭亡或退回部落。","鼓动剩余的常见策略：战争（赔偿、联盟礼赠、甚至故意制造争端迫使生产剩余）；宴飨（夸富宴建立债务关系，回不起就沦为附庸或劳力，逐渐变成宴请为主、打仗为辅）；聘礼。但酋长无法把集体财产转化为个人世袭财产，其声望地位不能世袭，每一代都要从头争取——根源在于没有永久产权，政治权力也就只能发展到这个程度。","课后补充：酋邦理论通常假定三个核心要素：跨聚落的等级领导、以中心为节点的再分配、以及地位差异的制度化但尚未完全阶级化。它的强处是提供“部落—国家之间”的中间类型；弱处是容易把复杂多样的考古遗存塞进一个演化阶段。"],"en":["The chiefdom is a “transegalitarian society”: more complex than the tribe, but less complex than the state. Its upper bound marks the end of settlement autonomy, its lower bound the start of evolution toward the state. It is politically centralized (a paramount chief controlling many settlements) and economically redistributive (centralized decision-making coordinating many settlements).","The chiefdom’s evolution presupposes the surplus and private-property consciousness brought by settled agriculture. The general mechanism: through war, feasting, and bridewealth, leaders induce people to produce a grain surplus, which the chief then redistributes. The “great divergence” turns on whether a chiefdom seizes permanent property rights / strategic subsistence resources (e.g., monopoly over land or hunting paths); those stratify into early states; most chiefdoms perish or revert to tribes.","Common strategies to induce surplus: war (compensation, gift-exchange with allies, even deliberately manufactured disputes to force production); feasting (competitive potlatch creating debt; those who cannot reciprocate become dependents or labor; over time feasting dominates over war); and bridewealth. But the chief cannot convert collective property into personal heritable wealth, and prestige is not hereditary; each generation must earn it anew, because there is no permanent property right, and so political power can only develop this far.","Post-class supplement: chiefdom theory usually assumes three core elements: ranked leadership across settlements, redistribution through a center, and institutionalized status difference that has not yet become full class stratification. Its strength is that it supplies an intermediate type between tribe and state; its weakness is that it can force diverse archaeological remains into one evolutionary stage."]},"relation":{"zh":"酋邦是“平等社会 → 国家”之间不可或缺的中间阶段。“有无永久产权”这一变量，直接通向下一节点“国家起源”的双层禁闭机制。","en":"The chiefdom is the indispensable middle stage between egalitarian society and the state. The variable “permanent property rights or not” leads directly into the next node, the “circumscription” mechanism of state origins."},"works":{"zh":["Elman Service：酋邦的界定（转型平等社会、集权、再分配）","夸富宴（potlatch）民族志；聘礼与战争礼赠的人类学研究"],"en":["Elman Service: defining the chiefdom (transegalitarian, centralized, redistributive)","Potlatch ethnography; anthropology of bridewealth and war-gift exchange"]},"strengths":{"zh":["把酋邦确立为分析国家起源的关键中间环节，避免“国家拔地而起”的错觉。","用再分配、债务、产权把经济机制与政治集权连接起来。"],"en":["Establishes the chiefdom as the key intermediate stage for state origins, avoiding the illusion that the state “springs up” from nothing.","Links economic mechanisms; redistribution, debt, property; to political centralization."]},"limits":{"zh":["“战争／宴飨是为了鼓动剩余”的功能解释，有时倒果为因，需具体民族志支撑。","酋邦概念是否普适、是否适用于中国考古，学界仍有争议。"],"en":["The functional reading that “war/feasting exist to induce surplus” can invert cause and effect and needs concrete ethnographic support.","Whether the chiefdom concept is universal and applies to Chinese archaeology remains contested."]},"personal":{"zh":["酋邦最深的洞见是：权力集中的天花板由产权形式决定。没有永久产权，再能干的酋长也只能是“经理人”，每代归零——这把政治问题还原成了财产制度问题。"],"en":["The deepest insight of the chiefdom is that the ceiling of power concentration is set by the form of property rights. Without permanent property, even the ablest chief is only a “manager”, resetting each generation; reducing a political problem to a problem of the property regime."]},"reflection":{"zh":["原笔记使用塞维斯“酋邦比部落进步”的说法时，应把“进步”改写为“复杂化”。“进步”暗含价值判断，好像国家一定比部落更好；而政治人类学更稳妥的比较维度是人口规模、分工、再分配、等级与强制能力的复杂度。","“酋长故意制造争端以迫使生产剩余”“宴飨逐渐变成宴请为主、打仗为辅”等说法需要民族志证据支持。它们作为机制假说很有启发，但不能直接推广为酋邦演化的普遍规律。"],"en":["When the note follows Service in saying chiefdoms are more “progressive” than tribes, it is better to say “more complex”. “Progress” carries a value judgment, as if the state were necessarily better than the tribe. A safer comparative dimension in political anthropology is complexity in population, division of labor, redistribution, rank, and coercive capacity.","Claims such as “chiefs deliberately create disputes to force surplus production” or “feasting gradually replaces fighting” need ethnographic support. They are useful as mechanism hypotheses, but they should not be generalized as universal laws of chiefdom evolution."]},"noteSection":"第四讲 大转型与酋邦：不平等的演化途径","noteBlocks":[{"kind":"p","text":"酋邦／转型平等社会演化的过程机制：1）前提——定居农业，资源富余与私有财产意识的出现；2）基本思路——通过战争、聘礼、宴飨等一系列由头鼓动群众生产剩余粮食；3）“大分流”——为何有的酋邦出现层化并发展为早期国家？关键在于对永久产权／战略性生计资源的掌握（如土地、捕猎路径的垄断）。"},{"kind":"p","text":"egalitarian（很多部落、游群发展出酋邦形态，进入 ranked）→ ranked（但只有很少部分酋邦演化为国家，很多灭亡，有的又退回部落形态）→ stratified → state（军事机关垄断暴力，垄断暴力者多是世袭贵族；若没发展出世袭、不断重新积累权力资源，就认为没有国家产生、权力没有制度化。国家：权力的世袭，对经济资源、军事的垄断，对意识形态的垄断、拥有合法性、解释权力）。"},{"kind":"p","text":"定居农业不是等级社会的充分条件，而是必要条件；定居农业才发生资源富余，出现私有财产意识。部落社会的公共习俗为何不鼓励囤积？因为还没有深耕细作，囤积会破坏资源；有了定居农业、资源富余、生产力提高，才能容忍个人囤积资源，开始有私有财产概念。领袖要有权力，就要保证有可再分配的剩余。"},{"kind":"p","text":"酋邦的界定（塞维斯）：转型平等社会，其上限标志着聚落自治的结束，下限标志着向国家演进的起点；政治上集权，由最高酋长控制多聚落和多社会群体；经济上再分配，拥有集中的决策等级制以协调一大批聚落。“中间阶段”在讨论国家起源上很有用——国家不是拔地而起的，很多关键节点发生在中间阶段。集约化生产依靠专业分工，需要再分配；区位优势出现强势村寨，创始酋长宣称自己的意识形态合法性，酋长地位主要依赖于对再分配权力的占有和操纵。"},{"kind":"p","text":"鼓动生产剩余的常见策略——战争：村寨之间的纠纷、非自然死亡率很高，死亡导致赔偿，需备多余物资；战争需要联盟、互相礼赠；战争也可能只是借口，酋长会故意制造争端迫使生产剩余；冲突中同盟有人被杀相当于欠下债务。"},{"kind":"p","text":"宴飨：gift-giving 对维护社会整合、稳定有重要作用，有时与战争功能相同；主人通过举办宴席吸引军事同盟、联姻伙伴；夸富宴建立债务关系，若对方无力回赠就可能沦为附庸或劳动力；回礼少可被视为不尊重，成为袭击理由；逐渐变成宴请为主、打仗为辅。"},{"kind":"p","text":"酋长可以鼓励剩余、支配剩余，但因此增加的财产不是给他个人的、获取的声望地位不是世袭的，其后代还是要自己争取；酋长无法将集体财产转化为个人经济财产时，他只有一些琐碎的权力（再分配权）和影响力，不能强制村民生产，长远看是很低效的创造差异方式，每一代人都要从头开始，原因就在于没有永久产权，政治权力也就只能发展到这个程度。聘礼亦是鼓动剩余的由头之一。"}],"noteBlocksEn":[{"kind":"p","text":"Mechanism of chiefdom/transegalitarian evolution: (1) precondition; settled agriculture, surplus, and emerging private-property consciousness; (2) general logic; inducing surplus production through war, bridewealth, and feasting; (3) the 'great divergence'; why do some chiefdoms stratify into early states? The key is control over permanent property rights / strategic subsistence resources (e.g., monopoly over land or hunting paths)."},{"kind":"p","text":"egalitarian (many tribes and bands develop chiefdom form and become ranked) → ranked (only a few chiefdoms evolve into states; many perish or revert) → stratified → state (a military organ monopolizes violence, usually held by hereditary nobles; without heritability and with constant re-accumulation of power, no state is said to form and power is not institutionalized. The state = hereditary power, monopoly over economic resources and the military, monopoly over ideology and legitimacy)."},{"kind":"p","text":"Settled agriculture is a necessary, not sufficient, condition of hierarchy; only with it does surplus and private-property consciousness appear. Tribal custom discourages hoarding because, before intensive cultivation, hoarding would deplete resources; once agriculture yields surplus, individual hoarding can be tolerated and property emerges. A leader's power requires a redistributable surplus."},{"kind":"p","text":"Service's chiefdom: a transegalitarian society whose upper bound ends settlement autonomy and lower bound starts evolution toward the state; politically centralized under a paramount chief; economically redistributive with a centralized decision hierarchy coordinating many settlements. The 'middle stage' is useful for state origins; the state does not spring up from nothing; key moments occur in the middle. Intensive production rests on specialization and requires redistribution; locational advantage produces dominant villages, and the founding chief claims ideological legitimacy, his status resting on control of redistribution."},{"kind":"p","text":"Strategies to induce surplus; war: disputes between settlements and high non-natural mortality require compensation and reserves; war needs alliances and gift-exchange; war can be a mere pretext, with chiefs deliberately manufacturing disputes to force surplus; allies killed in conflict create debt."},{"kind":"p","text":"Feasting: gift-giving sustains social integration and can serve the same function as war; hosts attract military allies and marriage partners; competitive potlatch creates debt, and those unable to reciprocate may become dependents or labor; meager return gifts are read as disrespect and pretexts for raids. Over time, feasting dominates over war."},{"kind":"p","text":"A chief can encourage and command surplus, but the added wealth is not personally his and the prestige he gains is not hereditary; his heirs must earn it anew. Unable to convert collective property into personal wealth, he holds only minor powers (redistribution) and influence, cannot compel villagers to produce, and over the long run this is a very inefficient way to create difference because every generation starts over; precisely because there is no permanent property right, political power can only go this far. Bridewealth is another pretext for inducing surplus."}]},{"id":"state-origin","trunk":"subst","x":3.0,"y":6.6,"era":{"zh":"第五讲","en":"Lecture 5"},"title":{"zh":"国家起源：社会层化与军事强制","en":"State Origins: Stratification and Military Coercion"},"tag":{"zh":"社会禁闭（卡尔内洛）· 灌溉 · 城市/寺庙/书写","en":"circumscription (Carneiro) · irrigation · city/temple/writing"},"core":{"zh":["早期国家最明显的标志：设防城市的产生、社会层化（出现脱离生产的专职阶层）、社会等级化（最高领导人、奴隶）、国家对暴力的垄断。文明是反常的东西，原始社会状态才是常态；早期文明只有少数几个（两河、秘鲁、黄河、埃及），它们彼此独立、平行出现，背后必有共同的基本过程。","第一阶段——社会层化。前提是“准私有财产”的出现（不是个人所有，而是家庭群体所有，GENS：group exploitation of nucleated subsistence）。全新世气候稳定、资源丰沛，有些家庭开始保护并世袭固定产权，需要宗族联合起来捍卫不动产（类似黑社会的保护组织）。核心机制是卡尔内洛（Carneiro）的“禁闭机制”：在灌溉农业形成的肥沃区域之外资源疲乏，人们被环境禁闭、无处可逃，比起逃走不如留下来服从；灌溉一方面带来固定财产权与依附体系，另一方面通过不平等交换积累巨额财富。财富招致侵略，于是出现设防城市；村庄之间需要仲裁，于是出现寺庙（最早的法院／国际组织，迈克尔·曼：寺庙是历史上第一个国家）；出现书写，发挥记账功能。","第二阶段——军事主义的集中强制。边地游牧政权结合农耕者与游牧者的军事技术，征服并建立帝国（如阿卡德的萨尔贡一世）。统治策略由附庸（形式附庸、实际自治，不是有效统治）、军事统治（有效征服与军事征服的矛盾，不可持续）到强制性合作（通过军事保护与劳动强化剥削被统治者）。","课后补充：国家起源没有单一共识。除了卡尔内洛的社会禁闭论，常见解释还包括魏特夫的水利国家论、战争/军事竞争论、贸易与世界体系论、人口压力论、管理/整合论、意识形态与祭司组织论。更稳妥的做法，是把国家起源看成多因组合：生态约束、退出机会、剩余生产、战争、贸易、宗教合法性和行政技术在不同地区的权重不同。"],"en":["The clearest marks of the early state: fortified cities, social stratification (a class detached from production), graded hierarchy (a supreme leader, slaves), and a state monopoly over violence. Civilization is the anomaly; the earlier small-scale condition is the norm; early civilizations were few (Mesopotamia, Peru, the Yellow River, Egypt), arose independently and in parallel, and so must share a basic underlying process.","Stage one; stratification. The precondition is “quasi-private property” (owned not by individuals but by family groups; GENS: group exploitation of nucleated subsistence). In the stable, resource-rich Holocene, some families begin to protect and inherit fixed property, requiring lineages to defend immovable assets (mafia-like protective organizations). The core mechanism is Carneiro’s “circumscription”: beyond the fertile irrigated zone, resources are scarce, so people are environmentally circumscribed with nowhere to flee, and submission beats flight; irrigation brings both fixed property rights with dependency and huge wealth through unequal exchange. Wealth invites invasion, producing fortified cities; disputes between villages require arbitration, producing the temple (the earliest court / international body; Michael Mann: the temple was the first state); writing appears, serving accounting.","Stage two; the concentrated coercion of militarism. Frontier pastoral polities combine farmer and herder military technique to conquer and build empires (e.g., Sargon of Akkad). Strategies run from vassalage (formal submission but actual autonomy, not effective rule) and military rule (the contradiction between effective and merely military conquest, unsustainable) to coerced cooperation (exploiting the ruled through military protection and intensified labor).","Post-class supplement: there is no single consensus on state origins. Besides Carneiro’s circumscription theory, common explanations include Wittfogel’s hydraulic state, warfare / military competition, trade and world-systems, population pressure, managerial / integrative theories, and ideology / priestly organization. A safer approach treats state origins as a multi-causal combination: ecological constraint, exit options, surplus production, war, trade, religious legitimacy, and administrative techniques matter with different weights in different regions."]},"relation":{"zh":"国家起源是整条实质线的高潮：它把权力、不平等、酋邦、产权全部收束进“禁闭—层化—军事强制”的双阶段模型，并为后面的领导继承、宗教、民族主义提供了“国家”这一对象。","en":"State origins is the climax of the substantive axis: it gathers power, inequality, chiefdom, and property into a two-stage model of “circumscription–stratification–coercion”, and supplies “the state” as the object for later nodes on succession, religion, and nationalism."},"works":{"zh":["Robert Carneiro（1967, 1970, 1978）：环境禁闭论（circumscription）","Michael Mann，《社会权力的来源》：寺庙是第一个国家","Engels：私有财产产生无情的链条、阶级与巨大不平等"],"en":["Robert Carneiro (1967, 1970, 1978): the circumscription theory","Michael Mann, The Sources of Social Power: the temple as the first state","Engels: private property creates a remorseless chain, classes, and vast inequality"]},"strengths":{"zh":["禁闭论用一个变量（退出机会的有无）统一解释了为何只有少数地区出现国家。","明确区分“社会分化是国家的前提条件，而非原因”，避免简单因果。"],"en":["Circumscription explains with one variable (the presence or absence of an exit option) why states arose only in a few places.","Clearly distinguishes “social differentiation as a precondition, not the cause, of the state”, avoiding crude causation."]},"limits":{"zh":["禁闭论被批评过于环境决定论，难以解释非灌溉、非三角洲的国家。","“四大文明都起源于冲积三角洲灌溉”是简化，部分案例并不严格符合。"],"en":["Circumscription is criticized as too environmentally deterministic, struggling with non-irrigation, non-delta states.","“All four great civilizations arose from alluvial-delta irrigation” is a simplification that some cases do not strictly fit."]},"personal":{"zh":["这节最有方法论价值的一句是：社会分化不是国家形成的原因，而是其前提条件——初始分化很不稳定，可能解体回退，也可能沿权力集中方向发展。把“前提”和“原因”分开，是避免目的论叙事的关键。"],"en":["The most methodologically valuable line here: social differentiation is not the cause but the precondition of the state; initial differentiation is unstable, may dissolve and revert, or may move toward power concentration. Separating “precondition” from “cause” is key to avoiding teleological narrative."]},"reflection":{"zh":["笔记里有一连串“印第安人没有发明轮子→没有战争的需要→没有大规模杀人的游戏”“没有驯化苹果→采集社会不需要非主食水果”式的因果链。这类推断是高度思辨的“恰好故事”（just-so story）：它从一个结果（无轮子／无苹果）倒推出一个单一动机（无战争／无奢侈需求），既无法证伪，也忽略了更平实的解释（如美洲缺乏可驯化的大型挽畜、苹果野生种的遗传自交不亲和性等技术与生态原因）。作为课堂上的发散联想可以保留，但不应被当作严肃的因果命题。","与之相关，“魏特夫水利说”在笔记中被正确地相对化（治水可强化集权但非其原因，关键仍是社会禁闭），这一处理是稳妥的；但“禁闭论”本身同样是强环境决定论，宜与水利说、战争说并列为竞争性假说，而非唯一正解。","“四大文明都起源于冲击三角洲的灌溉农业”也应收窄。两河与埃及可较好地支持冲积平原/河谷农业与国家形成的联系，但黄河早期文明、安第斯文明和中美洲案例并不都能被“冲积三角洲灌溉”整齐概括。把“河谷/可耕地约束/水资源管理”扩展成更一般的“生态与退出机会约束”，比单说“三角洲灌溉”更稳妥。"],"en":["The notes contain a chain of just-so reasoning: “Native Americans did not invent the wheel → no need for war → no mass-killing game”; “did not domesticate the apple → foragers need no non-staple fruit”. Such inferences run from an outcome (no wheel / no apple) back to a single motive (no war / no luxury demand); they are unfalsifiable and ignore plainer explanations (the Americas lacked large domesticable draft animals; wild apples are genetically self-incompatible; technical and ecological reasons). They can stay as classroom free-association but should not be taken as serious causal claims.","Relatedly, the notes correctly relativize Wittfogel’s hydraulic thesis (water management can reinforce but does not cause centralization; circumscription remains key); a sound move. But circumscription is itself strong environmental determinism and is better placed alongside the hydraulic and warfare theses as competing hypotheses, not as the sole correct answer.","The claim that “the four great civilizations all arose from alluvial-delta irrigation” should also be narrowed. Mesopotamia and Egypt support a link between alluvial / river-valley agriculture and state formation fairly well, but the early Yellow River, Andean, and Mesoamerican cases do not all fit “alluvial-delta irrigation” neatly. It is safer to generalize from “delta irrigation” to the broader constraint of ecology and exit options, including river valleys, limited arable land, and water management."]},"noteSection":"第五讲—第六讲 国家起源","noteBlocks":[{"kind":"p","text":"两河流域（今伊拉克），约5500年前人类从采集捕猎走向随季节耕作、到村庄、到城市，因城市产生新的社会组织形式；原本按亲属关系组织，新形式要求超越于此；设防的城市出现（酋邦、游群不设防），出现市民、专职僧侣阶层、专职手工业者，商业网络将各地联系起来。早期国家最明显的标志：设防城市的产生、社会层化（专职人员）、社会等级化（最高领导人、奴隶等）、国家对暴力的垄断。"},{"kind":"p","text":"研究原始国家的意义：人类社会持续性的 political inequality 到底是怎么出现的，携带着现代国家基因密码的种子。文明是反常的东西（原始社会状态才是常态），早期文明只有少数几个（两河、秘鲁、黄河、埃及），酋邦的演变是 back and forth 的过程；文明的进化是异常现象却不是孤例，在全球几个地方独立、平行出现，背后必有共同的基本过程。"},{"kind":"p","text":"第一阶段：社会层化。前提：准私有财产的出现，家庭群体的私有制 GENS（group exploitation of nucleated subsistence）。例：北美西北海岸的捕鱼平台。全新世气候稳定、大量资源出现，有些人不再只是囤积，而开始保护家庭固定的私有产权并传给后代；需要宗族、几个家庭联合的组织来占有和保护财产，能发挥类似黑社会的作用；当社会进入资源不足阶段，不拥有捕鱼平台、栅栏陷阱的家庭，为生存只能为拥有准私有财产的家庭服务以获得使用权。"},{"kind":"p","text":"核心机制：灌溉和地域互动的双层禁闭机制（卡尔内洛，1967、1970、1978）：城市、寺庙和书写。禁闭机制：给定区域中只有某块地域能保证生存，附近没有可耕地／海岸／森林，人们就被禁闭其中；在资源丰裕地区人们有退出机制，而在高度灌溉农业区之外其他地区资源疲乏，这就是禁闭；人们无处可逃，比起逃走不如留下来服从。灌溉一方面导致固定财产权、不断吸引周围人前来依附且很难逃脱，另一方面在与他者互动中占据优势，通过不平等交换积累财富（比采集指数级增长）；财富招致侵略，定居点需要设要塞城墙，这是早期城市发展的雏形。"},{"kind":"p","text":"另一个产物是寺庙。越来越多附近部落归附后，核心城邦富有而有竞争力，与周围摩擦需要固定化的调节，第二个更大的准政治实体——寺庙——出现，作为村庄之间的仲裁者，如同最早的法院、国际组织；占据冲积平原的村庄与周围形成核心—边缘关系，灌溉农业地区（早期国家）开始形成等级制，本地人可剥削外来人、战俘、奴隶。出现书写，发挥记账功能——更高层次、更顽固的不平等。迈克尔曼：寺庙是历史上的第一个国家；统治者身兼祭司与政治首领。"},{"kind":"p","text":"恩格斯：私有财产一旦产生就会生成无情的链条，生出生产资料集体占有的阶级，产生穷人和富人巨大的不平等。“真正的社会分化出现，国家也就产生了”——不那么对：社会分化不是国家形成的原因、不是因果关系，而是国家发展过程中的前提条件；初始的分化很不稳定、可能很快解体回到过去，也可能沿政治权力集中方向发展。"},{"kind":"p","text":"魏特夫东方专制主义水利说：管理大规模复杂农业需要集权，为修建水利系统建立政府——这可以强化集权，但不是它导致集权，是先有国家出现，关键因素还是社会禁闭。战争创造国家说／军事主义说（斯宾塞）：外部威胁导致团结拥护权威——但面对战争威胁群体会选择溃逃，只有环境禁闭才会使人屈服而生存，因此军事说必须以环境禁闭为条件才成立。村庄内部不会自发产生阶级压迫（亲属不能内部剥削），剥削一定在一个群体对另一群体的征服中开始。"},{"kind":"p","text":"第二阶段：军事主义的集中强制作用。背景：边境贵族和军事主义的发展。边地游牧政权征服并建立军事帝国是普遍现象：城邦建立后，文明发达、农业剩余的中央政权与周边贸易交换获得珍稀品，加上土地，招致觊觎，落后的游牧地区剥削、洗劫核心地区。苏美尔—阿卡德：阿卡德人控制边地，结合农耕者和游牧者的军事技术，一开始只有5400人，却征服冲积平原形成大型军事帝国（萨尔贡一世）。最早的文字用于记账，说明出现层化。统治策略：附庸（形式附庸、实际自治，并非政治权力集中、不是有效统治）；军事统治（有效征服与军事征服之间的矛盾，不可持续）；强制性合作（通过军事保护和强制劳动剥削被统治者）。"}],"noteBlocksEn":[{"kind":"p","text":"In Mesopotamia (today's Iraq), about 5,500 years ago people moved from foraging to seasonal cultivation, to villages, to cities; new urban social forms required moving beyond kinship; fortified cities appeared (chiefdoms and bands were unfortified), along with citizens, a professional priestly stratum, and specialized artisans, with trade networks linking regions. The clearest marks of the early state: fortified cities, stratification (specialists), graded hierarchy (a supreme leader, slaves), and a state monopoly over violence."},{"kind":"p","text":"Why study the early state: to understand how persistent political inequality arose, carrying the genetic code of the modern state. Civilization is anomalous (the earlier small-scale condition is the norm); early civilizations were few (Mesopotamia, Peru, the Yellow River, Egypt); the chiefdom's evolution is a back-and-forth process; civilization's emergence is anomalous yet not unique, arising independently and in parallel in several places, so a common basic process must lie behind it."},{"kind":"p","text":"Stage one: stratification. Precondition: quasi-private property, owned by family groups; GENS (group exploitation of nucleated subsistence). Example: the fishing platforms of the Northwest Coast of North America. In the stable, resource-rich Holocene, some begin to protect and inherit fixed property; lineages and allied families form mafia-like organizations to hold and defend assets; when resources later grow scarce, families without platforms or weir-traps can survive only by serving the owning families to gain use-rights."},{"kind":"p","text":"Core mechanism: the two-layer circumscription of irrigation and territorial interaction (Carneiro 1967, 1970, 1978): city, temple, writing. Circumscription: in a given region only one patch sustains survival, with no arable land, coast, or forest nearby, so people are confined there; resource-rich areas allow exit, but beyond a highly irrigated zone other areas are barren; that is circumscription, and people have nowhere to flee, so submission beats flight. Irrigation yields fixed property rights, draws dependents who can hardly escape, and through unequal exchange accumulates wealth (exponentially beyond foraging); wealth invites invasion, so settlements need fortified walls; the embryo of the early city."},{"kind":"p","text":"Another product is the temple. As nearby tribes submit, the rich, competitive core city-state generates friction needing fixed arbitration; a second, larger quasi-political body; the temple; arises as an arbiter among villages, like the earliest court or international body; alluvial-plain villages form a core–periphery with surroundings, the early state develops hierarchy, and locals exploit outsiders, captives, and slaves. Writing appears for accounting; a higher and more stubborn inequality. Michael Mann: the temple was the first state; the ruler was both priest and political head."},{"kind":"p","text":"Engels: private property, once it appears, forges a remorseless chain, producing classes that collectively own the means of production and vast inequality between rich and poor. 'When real differentiation appears, the state appears' is not quite right: differentiation is not the cause of the state but its precondition; initial differentiation is unstable, may dissolve and revert, or may move toward power concentration."},{"kind":"p","text":"Wittfogel's hydraulic thesis of Oriental despotism: managing large-scale agriculture needs centralization, and a state is built to construct waterworks; this can reinforce centralization but does not cause it; the state comes first, and the key factor remains circumscription. The warfare/militarist thesis (Spencer): external threat unites people behind authority; but facing war, groups flee; only environmental circumscription makes them submit to survive, so the warfare thesis requires circumscription. Class oppression does not arise spontaneously within a village (kin cannot exploit kin); exploitation begins in one group's conquest of another."},{"kind":"p","text":"Stage two: the concentrated coercion of militarism. Background: frontier nobility and militarism. Frontier pastoral polities conquering and building empires is common: after city-states form, the developed, surplus-rich core trades for luxuries and, with its land, invites covetousness, and so-called backward pastoral regions exploit and sack the core. Sumer–Akkad: the Akkadians held the frontier, combined farmer and herder military technique, started with only 5,400 people, yet conquered the alluvial plain into a great empire (Sargon). The earliest writing served accounting, indicating stratification. Strategies: vassalage (formal submission, actual autonomy; not real centralization or effective rule); military rule (the contradiction between effective and merely military conquest, unsustainable); coerced cooperation (exploiting the ruled through military protection and forced labor)."}]},{"id":"leadership","trunk":"subst","x":3.0,"y":7.8,"era":{"zh":"第五讲","en":"Lecture 5"},"title":{"zh":"领导与政治继承","en":"Leadership and Political Succession"},"tag":{"zh":"个人领导 · 世袭继承 · 拉美/考迪罗模式","en":"personal leadership · hereditary succession · caudillismo"},"core":{"zh":["政治人类学主要关注三种领导与继承模式。其一，个人领导：一种不确定的领导地位，依靠不可转让的个人品质或能力，即韦伯的“魅力型权威”，无法继承，领袖死后权力游戏重新开始。许多部落的“big man”以慷慨施舍（如夸富宴、操纵再分配）获得追随者，今天的金钱政治仍延续这一逻辑。","其二，世袭继承：在酋邦和原始国家中政治继承几乎都是世袭的，依靠身外力量（如宗教神化、“吗那”mana 可遗传）合法化，即韦伯的“传统型权威”。要注意规则的灵活程度与候选人范围大小——特定家族以外的人没有角逐资格，问题在于如何获得承认。","其三，拉美／考迪罗（caudillismo）模式：反建制主义，政治继承无法现代化和制度化，军人独裁、寡头专制与代议制民主周期性混乱交替。其渊源在于殖民时代没有留下稳定的政治制度，寡头与军人各成一体；反建制不是单向的领导人强加，民众也对强人有需求。军队自认扮演局外人、看护人角色，但武装政变政府没有合法性，于是又要举办并操纵选举。"],"en":["Political anthropology focuses on three modes of leadership and succession. First, personal leadership: an uncertain position resting on non-transferable personal qualities; Weber’s “charismatic authority”; which cannot be inherited, so after the leader dies the power game restarts. Many tribal “big men” gain followers through generosity (potlatch, manipulated redistribution); today’s money politics extends the same logic.","Second, hereditary succession: in chiefdoms and early states succession is almost always hereditary, legitimated by external forces (religious sanctification, the heritable mana); Weber’s “traditional authority”. What matters is the flexibility of rules and the breadth of the candidate pool; those outside a specific lineage cannot compete, and the question is how to win recognition.","Third, the Latin American / caudillismo model: anti-establishmentism, where succession cannot modernize or institutionalize, and military dictatorship, oligarchy, and representative democracy cycle chaotically. Its source is that the colonial era left no stable institutions, with oligarchs and the military each forming separate bodies; anti-establishmentism is not imposed by leaders alone; the people also demand strongmen. The army sees itself as an outsider-guardian, but coup governments lack legitimacy and so must hold and manipulate elections."]},"relation":{"zh":"领导继承把国家起源中的“权力世袭”问题展开：它用韦伯三种权威把个人魅力、传统神化、现代制度三条路线并置，并通过拉美模式预示了后面民族主义与现代化中“强人政治”的难题。","en":"Succession unpacks the “hereditary power” problem from state origins: using Weber’s three types of authority, it sets charisma, traditional sanctification, and modern institution side by side, and through the caudillo model foreshadows the strongman dilemma in later nationalism and modernization."},"works":{"zh":["Max Weber：魅力型／传统型／法理型权威","Wolf & Hansen（1972）：考迪罗主义（caudillismo）","“big man” 与 mana（吗那）的人类学研究"],"en":["Max Weber: charismatic / traditional / legal-rational authority","Wolf & Hansen (1972): caudillismo","Anthropology of the “big man” and mana"]},"strengths":{"zh":["用韦伯三权威把三种继承模式整合成清晰类型学。","拉美模式揭示了“反建制需求”是上下双向的，而非仅由领导人制造。"],"en":["Integrates three succession modes into a clear typology via Weber’s three authorities.","The caudillo model shows that “anti-establishment demand” is two-directional, not simply manufactured by leaders."]},"limits":{"zh":["三类型是理想型，现实政体常是混合（如魅力＋世袭）。","“人民政治素养不高、容易被煽动”的表述带有精英主义色彩，需谨慎。"],"en":["The three types are ideal types; real regimes are often hybrids (e.g., charisma + heredity).","The phrasing “the people have low political literacy and are easily incited” carries an elitist tone and needs caution."]},"personal":{"zh":["拉美模式最深的一点：制度化失败不只是领导人之过，当社会缺乏能组织政府、平衡各方的政治经济资源时，强人政治就成了一种“均衡”。这把问题从道德批判转向结构分析。"],"en":["The deepest point of the caudillo model: institutional failure is not simply the leader’s fault; when a society lacks the political-economic resources to organize government and balance forces, strongman politics becomes an “equilibrium”. This shifts the question from moral blame to structural analysis."]},"reflection":{"zh":["笔记说“人民政治素养也并不高、容易被煽动”，作为对反建制需求来源的解释。这一表述在比较政治中需要更中性的处理：民众支持强人，往往不是“素养低”，而是在制度缺位、安全与再分配无保障的条件下的理性选择（与前面“农民的安全原则”、庇护制逻辑一致）。把它归为民众素质，既不公允，也遮蔽了结构性成因。更稳妥的说法是：在缺乏可信制度的环境中，对强人的需求是一种应对不确定性的策略。"],"en":["The notes explain the demand for anti-establishment leaders by saying “the people have low political literacy and are easily incited”. Comparative politics handles this more neutrally: popular support for strongmen is often not “low literacy” but a rational response under absent institutions and insecure protection and redistribution (consistent with the earlier “safety-first” logic of peasants and patronage). Attributing it to the quality of the people is both unfair and obscures structural causes. A safer statement: where credible institutions are lacking, demand for a strongman is a strategy for coping with uncertainty."]},"noteSection":"第五讲 领导和政治继承","noteBlocks":[{"kind":"p","text":"了解三种政治人类学主要关注的领导和政治继承模式：1）个人领导；2）世袭继承；3）拉美模式。"},{"kind":"p","text":"个人领导：是一种不确定的领导地位，依靠不可转让的个人品质或能力，即韦伯的魅力型权威；无法继承，领袖死后权力游戏重新开始。在部落社会，有时领导地位只是临时的（如祭祀结束祭司就还是普通人）。领导可以设法谋求权力（如夸富宴、操纵再分配）；很多部落增加影响力以施舍赠礼开始，头人以慷慨举动获得追随者；现在也还有金钱政治，很多国家的政治游戏玩法还是部落的 big man 模式。"},{"kind":"p","text":"世袭继承：在酋邦和原始国家中，政治继承几乎都是世袭的。重要注意事项：规则的灵活程度、候选人的范围大小。权力合法化依靠身外力量，如宗教神化，即韦伯的传统型权威。特定家族以外的人都没有参与角逐的资格，如何得到承认？吗那（mana）：头人身上的吗那最多，可以遗传给后代。按理说竞争的法理权威把竞争限制在可控范围内、有序和平交接，但问题是复杂的。"},{"kind":"p","text":"拉美模式：反建制主义，政治继承无法现代化和制度化，军人独裁、寡头专制和代议制民主周期性地混乱交替；军队在权威塑造中地位重要。背后渊源：没有从殖民时代继承下来任何稳定的政治制度，寡头和军人各成一体——“考迪罗主义”（Wolf and Hansen, 1972）。反建制主义不是单向的、领导人强加的，民众也对权威领导人有需求，人民政治素养也并不高、容易被煽动。历史上缺乏制度化的政治体系，各种势力都能干政却都没有足够强大的政治经济资源来组织政府、平衡各方。考迪罗即领袖、首领；军队认为自己扮演局外人、看护人角色，但武装政变政府没有合法性，因此又要举办、操纵选举。"}],"noteBlocksEn":[{"kind":"p","text":"Three modes of leadership and succession that political anthropology focuses on: (1) personal leadership; (2) hereditary succession; (3) the Latin American model."},{"kind":"p","text":"Personal leadership: an uncertain position resting on non-transferable personal qualities; Weber's charismatic authority; that cannot be inherited; after the leader dies the power game restarts. In tribal society leadership is sometimes only temporary (after a rite, the priest is again an ordinary person). Leaders may pursue power (potlatch, manipulated redistribution); many gain influence by gift-giving, and 'big men' win followers through generosity. Money politics persists, and many states still play the tribal big-man game."},{"kind":"p","text":"Hereditary succession: in chiefdoms and early states succession is almost always hereditary. Key points: the flexibility of rules and the breadth of the candidate pool. Power is legitimated by external forces such as religious sanctification; Weber's traditional authority. Those outside a lineage cannot compete; how is recognition won? Mana: the chief carries the most mana, heritable to his heirs. In principle competitive legal-rational authority confines competition to a controllable range with orderly succession, but in practice the problem is complex."},{"kind":"p","text":"The Latin American model: anti-establishmentism, where succession cannot modernize or institutionalize, and military dictatorship, oligarchy, and representative democracy cycle chaotically; the military is central to shaping authority. Source: the colonial era left no stable institutions, with oligarchs and the military each a separate body; caudillismo (Wolf and Hansen, 1972). Anti-establishmentism is not imposed by leaders alone; the people also demand strongmen. Historically, lacking institutionalized politics, every force can meddle yet none has enough political-economic resources to organize government and balance the rest. The caudillo is the chief; the army sees itself as outsider-guardian, but coup governments lack legitimacy and so hold and manipulate elections."}]},{"id":"restorative-justice","trunk":"subst","x":4.35,"y":8.4,"era":{"zh":"第七周讲座","en":"Guest Lecture"},"title":{"zh":"恢复性司法在中国","en":"Restorative Justice in China"},"tag":{"zh":"调解 · 和谐社会 · 稳定维护 · 少数民族调解","en":"mediation · harmonious society · stability maintenance · minority mediation"},"core":{"zh":["恢复性司法（Restorative Justice, RJ）反对以惩罚为中心的报应性正义，强调“修复”而非单纯惩罚，把冲突的处置权部分还给利益相关者（加害者、受害者与社区）。其过程定义强调所有与特定伤害有关的当事人共同讨论如何处理后果及未来影响；结果定义强调修复犯罪造成的个人、关系与社会伤害。常见形式包括加害者—受害者调解、量刑圈、家庭会议。","传统刑事司法问：违反了什么规则？谁应负责？如何惩罚？恢复性司法问：发生了什么？谁受到伤害或影响？如何修复伤害？它要求参与、平等发言、协商与非支配，给受害者表达伤害、获得道歉和赔偿的机会，也给加害者承认责任、表达悔意并弥补损害的机会。","中国脉络中，课程把恢复性司法追溯到儒家“无讼”精神与毛泽东时期人民调解：前者强调礼与和谐，后者在群众路线下把农村矛盾交给群众自己解决。2000 年代以来，人民调解法、刑事和解立法、少数民族地区本土调解等构成了自上而下的恢复性司法改革。讲座同时指出，中国 RJ 的关键逻辑常常不是纯粹的当事人赋权，而是“社会稳定维护”：是否调解，取决于是否属于民间纠纷、社会影响是否轻微。"],"en":["Restorative justice (RJ) stands against punishment-centered retributive justice. It stresses repair rather than punishment and partly returns the handling of conflict to the stakeholders: offender, victim, and community. A process definition stresses that all parties with a stake in a specific harm come together to discuss how to deal with the aftermath and future implications; an outcome definition stresses repairing the individual, relational, and social harm caused by an offense. Common forms include victim–offender mediation, sentencing circles, and family conferencing.","Traditional criminal justice asks: What rule was broken? Who is to blame? How should they be punished? Restorative justice asks: What happened? Who was harmed or affected? How can the harm be repaired? It requires participation, equal voice, deliberation, and non-domination. It gives victims a chance to express harm and receive apology and restitution, and gives offenders a chance to accept responsibility, express remorse, and make amends.","In the Chinese context, the lecture links RJ to the Confucian spirit of “no litigation” and Mao-era people’s mediation: the former stresses ritual order and harmony; the latter, under the mass line, lets rural communities handle conflicts themselves. Since the 2000s, the People’s Mediation Law, the legalization of criminal reconciliation, and indigenous mediation in minority regions have formed top-down RJ reforms. The lecture also notes that the key logic of Chinese RJ is often not pure stakeholder empowerment but “social stability maintenance”: whether mediation is used depends on whether the case is a civil dispute and whether its social impact is minor."]},"relation":{"zh":"这是课程中的插入专题，不属于“权力起源—国家—民族主义”的长程主线，却补上了政治人类学的法律维度：在现代国家内部，冲突并不总是通过国家惩罚解决，也可通过社区、调解、关系修复与稳定治理来处理。它向上连接“领导/继承”中的权威合法性，向下连接“宗教”中的规范与共同体整合。","en":"This is an inserted topic in the course. It does not belong to the long line from power origins to the state and nationalism, but it adds the legal dimension of political anthropology: inside the modern state, conflict is not always handled through state punishment; it may also be handled through community, mediation, relational repair, and stability governance. It connects upward to authority and legitimacy in the leadership node and downward to norms and community integration in the religion node."},"works":{"zh":["John Braithwaite（2002）：恢复性司法与儒家传统","Marshall（1996）：过程定义","Walgrave（2012）：结果定义","2010 年《人民调解法》；2012 年刑事和解入法"],"en":["John Braithwaite (2002): restorative justice and the Confucian tradition","Marshall (1996): process definition","Walgrave (2012): outcome definition","People’s Mediation Law (2010); criminal reconciliation legislation (2012)"]},"strengths":{"zh":["把犯罪/纠纷从“国家—罪犯”的二元关系，重新放回受害者、加害者和社区的关系网络。","中国案例显示，同一种制度话语在不同政治环境中会被重新编码：从赋权与修复，转向稳定治理与风险控制。"],"en":["Moves crime / conflict out of the simple state–offender dyad and back into the relational network of victim, offender, and community.","The Chinese case shows that the same institutional language can be re-coded in different political settings: from empowerment and repair toward stability governance and risk control."]},"limits":{"zh":["如果缺乏自愿、平等发言和非支配，调解可能变成对弱者的压力，而非真正的修复。","把儒家“无讼”直接读作恢复性司法传统，可能把和谐意识形态中的等级与压制面向浪漫化。"],"en":["Without voluntariness, equal voice, and non-domination, mediation can become pressure on the weaker party rather than real repair.","Reading the Confucian “no litigation” ideal directly as a restorative-justice tradition can romanticize the hierarchical and suppressive side of harmony ideology."]},"personal":{"zh":["这个专题把“政治”拉回到日常冲突解决：谁有资格处理纠纷、谁能定义“修复”、谁以“和谐/稳定”的名义结束争议，都是权力问题。"],"en":["This topic brings “politics” back to everyday conflict resolution: who may handle a dispute, who defines “repair”, and who ends a conflict in the name of “harmony” or “stability” are all questions of power."]},"reflection":{"zh":["把孔子或儒家“无讼”视为恢复性司法源头，有启发但要谨慎。现代 RJ 的核心规范包括当事人自愿、平等发言、受害者赋权与非支配；传统“无讼”有时更强调秩序、名分与息事宁人，可能牺牲弱者表达伤害的机会。两者相似之处在于反对单纯惩罚、重视关系修复；差异在于是否承认平等主体与程序权利。","中国当代 RJ 改革的“自上而下”特征尤其重要。若调解主要服务于社会稳定维护，它就可能从恢复性机制变成治理技术：把复杂的权利冲突处理为“民间纠纷”或“轻微影响”，从而去政治化。恢复性司法在中国不是单纯移植 RJ 理念，而是在国家治理、群众路线、儒家和谐话语与基层风险控制之间重新组合。"],"en":["It is suggestive but risky to treat Confucius or the Confucian ideal of “no litigation” as the source of restorative justice. Modern RJ centers on voluntariness, equal voice, victim empowerment, and non-domination. The traditional “no litigation” ideal often stresses order, status, and ending trouble, and can sacrifice the weaker party’s chance to speak harm. The similarity lies in rejecting pure punishment and valuing relational repair; the difference lies in whether equal subjects and procedural rights are recognized.","The top-down character of contemporary Chinese RJ reforms matters especially here. If mediation mainly serves social stability maintenance, it can turn from a restorative mechanism into a technology of governance: complex rights conflicts are reclassified as “civil disputes” or “minor impact” cases and thus depoliticized. RJ in China is not a simple import of RJ ideals; it is recombined among state governance, the mass line, Confucian harmony discourse, and grassroots risk control."]},"noteSection":"第七周 10月25日 讲座：Restorative Justice in China","noteBlocks":[{"kind":"p","text":"讲座：Restorative Justice in China。恢复性司法（RJ）反对报应性正义（恢复而非惩罚），将冲突财产返还给利益相关者（加害者、受害者和社区）——个体，而非国家，才是拥有纠纷的主体，因而拥有处置纠纷的最终权力。"},{"kind":"p","text":"基于流程的定义（Marshall, 1996）：与特定犯罪行为有利害关系的所有各方聚集在一起，共同解决如何处理犯罪后果及其对未来影响的过程。基于结果的定义（Walgrave, 2012）：犯罪发生后伸张正义的一种选择，主要是为了修复该犯罪造成的个人、关系和社会伤害。形式包括加害者与被害者调解、量刑圈、家庭会议。"},{"kind":"p","text":"传统刑事司法问：What rule was broken? Who is to blame? How should they be punished? 恢复性刑事司法问：What happened? Who was harmed or affected? How can the harm be repaired? 受害者有机会直接参与解决情况、获得关于犯罪和加害者的回答、表达犯罪影响、获得赔偿或修复、获得道歉、在适当时恢复与加害者的关系、达到 closure；加害者有机会承认责任、理解对受害者的影响、表达情绪或悔意、获得支持以修复伤害、作出补偿、道歉、在适当时修复关系、达到 closure。"},{"kind":"p","text":"中国恢复性司法的过去：Confucius 被视为最有影响力的 RJ 哲学家（Braithwaite, 2002）；无讼精神；儒家谴责诉讼，认为它会破坏由“礼”创造的和谐、有序社会。孔子：“听讼吾犹人也，必也使无讼乎！”毛泽东时期：调解的革命视角，人民调解在 1930 年代农民运动后兴起，作为农村群众自己解决纠纷的机制，被中共在群众路线意识形态下用来获得群众支持、维持政治体制。"},{"kind":"p","text":"中国恢复性司法的现在：中国可能拥有世界上最大、最多样的调解项目（Braithwaite, 2002; Cloke, 1987）；2021 年有 931 万人民调解案件（China Yearbook, 2022）；包括人民调解、治安调解、刑事和解等，55 个少数民族也有本土调解（如彝族德古调解、回族穆斯林阿訇调解等）。自上而下的 RJ 改革包括 2010 年《人民调解法》、2012 年刑事和解立法、承认各民族地区本土调解。"},{"kind":"p","text":"为什么 2010 年左右出现大规模 RJ reform？中国刑事司法系统的三个时期：毛泽东时期（1949—1978）以阶级斗争为纲，功利辩证法区分朋友与敌人；改革开放时期（1979—2002）以经济发展为目标，犯罪率上升，严打运动（1983、1996、2001）有短期效果但产生高压、不安与不稳定；和谐社会时期（2002—）以社会稳定为社会政治目标，宽严相济，轻微社会影响犯罪从宽、威胁社会政治稳定犯罪从严，人民调解和刑事和解正式立法，是对毛泽东“朋友与敌人”辩证法的重新发明。"},{"kind":"p","text":"一线警察是否调解？关键是社会稳定维护，两个关键词是“民间纠纷”和“轻微影响”。讲座还提到，恢复性司法对环境司法很有帮助，可以转变以人为中心的思维理念，追问资源、环境受到怎样的损害。"}],"noteBlocksEn":[{"kind":"p","text":"Guest lecture: Restorative Justice in China. Restorative justice (RJ) stands against retributive justice; restoration rather than punishment; and returns “the property of conflicts” to stakeholders: offenders, victims, and community. Individuals, not the state, are the subjects who own disputes and therefore have final power over how to handle them."},{"kind":"p","text":"Process-based definition (Marshall, 1996): a process in which all parties with a stake in a particular offense come together to decide collectively how to deal with the aftermath and its future implications. Outcome-based definition (Walgrave, 2012): an option for doing justice after an offense, mainly aimed at repairing the individual, relational, and social harm caused by that offense. Forms include victim–offender mediation, sentencing circles, and family conferencing."},{"kind":"p","text":"Traditional criminal justice asks: What rule was broken? Who is to blame? How should they be punished? Restorative criminal justice asks: What happened? Who was harmed or affected? How can the harm be repaired? Victims can directly participate, receive answers, express impact, receive restitution or reparation, receive an apology, restore a relationship when appropriate, and reach closure. Offenders can acknowledge responsibility, understand the effects on the victim, express emotion or remorse, receive support to repair harm, make amends, apologize, restore the relationship when appropriate, and reach closure."},{"kind":"p","text":"The past of restorative justice in China: Confucius is regarded as the most influential RJ philosopher (Braithwaite, 2002); the spirit of non-litigation; Confucianism condemns litigation because it may disrupt the harmonious, orderly society created by li (ritual). Confucius: “In hearing lawsuits, I am like anyone else. What is necessary is to make there be no lawsuits.” In Maoist times: a revolutionary view of mediation. People's mediation arose after the 1930s peasant movement as a mechanism for rural masses to solve disputes themselves, and was used by the CCP under the mass line to gain support and sustain the regime."},{"kind":"p","text":"The present of restorative justice in China: China arguably has the world's largest and most diverse mediation programs (Braithwaite, 2002; Cloke, 1987); there were 9.31 million people's mediation cases in 2021 (China Yearbook, 2022); forms include people's mediation, public-order mediation, and criminal reconciliation, and 55 minority ethnic groups also have indigenous mediation (such as De Gu mediation among the Yi and Muslim imam mediation among the Hui). Top-down RJ reforms include the 2010 People's Mediation Law, the 2012 legislation of criminal reconciliation, and recognition of indigenous mediation in minority regions."},{"kind":"p","text":"Why did large-scale RJ reform appear around 2010? Three periods of Chinese criminal justice: Maoist time (1949–1978), with class struggle and a utilitarian dialectic of friend and enemy; Reform and Opening (1979–2002), with economic development as the goal, rising crime, and Strike Hard campaigns (1983, 1996, 2001) that had short-term effects but created high pressure, unrest, and instability; the Harmonious Society period (2002–), with social stability as a socio-political priority, balancing leniency and severity, leniency for crimes with minor social impact and severity for crimes that threaten social and political stability. People's mediation and criminal reconciliation were formally legalized, a reinvention of Mao's friend/enemy dialectic."},{"kind":"p","text":"Should frontline police mediate? The key is social stability maintenance, with two keywords: “civil disputes” and “minor impact”. The lecture also noted that restorative justice can help environmental justice by moving beyond anthropocentric thinking and asking what harm has been done to resources and the environment."}]},{"id":"religion","trunk":"subst","x":3.0,"y":9.0,"era":{"zh":"第七讲","en":"Lecture 7"},"title":{"zh":"宗教与政治","en":"Religion and Politics"},"tag":{"zh":"涂尔干 · 吉尔茨 · 整合统治集团 · 神权国家","en":"Durkheim · Geertz · integrating the ruling class · theocracy"},"core":{"zh":["宗教的起源有两种主要解释：演化心理学视角把宗教看作人类寻求因果解释的副产物（常常过度推论）；结构功能主义视角把宗教看作社会群体整合的工具——抑制自私、提高群体生存率，同时提高心理健康。罗萨诺（Rossano）认为宗教是在道德之后出现的，加入守护共同祖先、神灵的想法，建立更大的合作团体。","界定上，涂尔干把宗教定义为关于神圣事物的统一信仰和实践体系，把信奉者整合为“教会”这一道德共同体；吉尔茨在《文化的解释》中把宗教定义为一种符号体系，建立强大、普遍而持久的情感和动机。课程的工作定义：宗教是一种共享的信仰和实践体系，涉及自然与超自然现象之间相互关系的信仰。三个关键特点：以相信超自然力量为基础；是群体现象；是一套实践制度。宗教是一种意识形态，但意识形态不一定是宗教。","宗教在政治中的作用：历史上宗教的第一个作用是整合统治集团内部，形成同质化的统治阶级（与文字、书写相关——神话被记录、戏剧从宗教中产生，成为贵族高级文化）；其次统治阶级依靠宗教获得合法性；再次统治者依靠宗教建立社会规范、达到社会控制与整合（最早的宗教规则可视为法律的初级形式）；最后统治者以宗教名义发动战争。迈克尔·曼：寺庙是历史上第一个国家，统治者身兼祭司与政治首领。民族主义、爱国精神是宗教情绪的一种变体。","课后补充：宗教与政治研究还包括韦伯的合法性与魅力权威、彼得·伯格的神圣帷幕（sacred canopy）、罗伯特·贝拉的“公民宗教”（civil religion）、以及“世俗化并不等于宗教消失”的研究。现代国家中的国旗、烈士、纪念日、宣誓与公共仪式，常被分析为公民宗教或政治神圣化的形式。"],"en":["Two main accounts of religion’s origin: the evolutionary-psychology view treats religion as a byproduct of humans seeking causal explanations (often over-inferring); the structural-functionalist view treats it as a tool for integrating social groups; curbing selfishness and raising group survival while improving mental health. Rossano holds that religion appeared after morality, adding the idea of guarding shared ancestors and spirits to build larger cooperative groups.","On definition: Durkheim defines religion as a unified system of beliefs and practices about sacred things that integrates believers into a moral community, the “church”; Geertz in The Interpretation of Cultures defines it as a system of symbols establishing powerful, pervasive, and lasting moods and motivations. The course’s working definition: religion is a shared system of belief and practice concerning the relations between natural and supernatural phenomena. Three key features: it rests on belief in supernatural power; it is a group phenomenon; it is a system of practice. Religion is an ideology, but not every ideology is a religion.","Religion’s political roles: historically its first role was to integrate the ruling class internally into a homogeneous elite (tied to writing; myth is recorded, drama emerges from religion, becoming aristocratic high culture); second, the ruling class draws legitimacy from religion; third, rulers use religion to set social norms for control and integration (the earliest religious rules can be seen as an early form of law); fourth, rulers wage war in religion’s name. Michael Mann: the temple was the first state, with the ruler as both priest and political head. Nationalism and patriotism are variants of religious feeling.","Post-class supplement: the study of religion and politics also includes Weber’s legitimacy and charismatic authority, Peter Berger’s “sacred canopy”, Robert Bellah’s “civil religion”, and research showing that secularization does not simply mean the disappearance of religion. In modern states, flags, martyrs, national holidays, oaths, and public ceremonies are often analyzed as civil religion or the sacralization of politics."]},"relation":{"zh":"宗教是国家起源与民族主义之间的关键中介：它先整合统治集团、再提供合法性，最后变成发动战争与建构认同的工具——这条线直接通向“民族主义是宗教情绪的变体”这一命题。","en":"Religion is the key mediator between state origins and nationalism: it first integrates the ruling class, then supplies legitimacy, and finally becomes a tool for war and identity-building; leading directly to the claim that “nationalism is a variant of religious feeling.”"},"works":{"zh":["Durkheim（1915）：宗教的定义","Clifford Geertz，《文化的解释》（1973）","Diamond（1997）；Gould et al.（2007）；Rossano（2009）","Michael Mann：寺庙是第一个国家","Max Weber：合法性、魅力权威与宗教社会学","Robert Bellah：公民宗教","Peter Berger：神圣帷幕"],"en":["Durkheim (1915): the definition of religion","Clifford Geertz, The Interpretation of Cultures (1973)","Diamond (1997); Gould et al. (2007); Rossano (2009)","Michael Mann: the temple as the first state","Max Weber: legitimacy, charismatic authority, and the sociology of religion","Robert Bellah: civil religion","Peter Berger: the sacred canopy"]},"strengths":{"zh":["区分“整合统治集团”与“提供大众合法性”两个不同作用，纠正了“宗教一开始就是统治工具”的误解。","把宗教与文字、戏剧、贵族文化的兴起联系起来，揭示精英整合机制。"],"en":["Distinguishes “integrating the ruling class” from “providing popular legitimacy”, correcting the idea that religion was a ruling tool from the start.","Links religion to writing, drama, and aristocratic culture, revealing the mechanism of elite integration."]},"limits":{"zh":["功能主义解释（宗教提高群体生存率）有事后合理化风险，难以证伪。","“最早宗教规则即法律初级形式”的判断需更多跨文化证据。"],"en":["The functionalist account (religion raises group survival) risks post-hoc rationalization and is hard to falsify.","The claim that “the earliest religious rules are an early form of law” needs more cross-cultural evidence."]},"personal":{"zh":["“宗教最早不是用于统治、而是用于整合统治集团”是一个被低估的洞见：它把合法性问题往后推了一步——先有精英的审美与道德共同体，才有面向大众的合法性话语。"],"en":["“Religion was first used not to rule but to integrate the ruling class” is an underrated insight: it pushes the legitimacy problem one step back; an elite aesthetic-moral community comes first, and only then a legitimacy discourse aimed at the masses."]},"reflection":{"zh":["“佛教只是一种生活哲学”的说法是部分现代诠释，不宜概括佛教整体。佛教具有寺院制度、戒律、僧团、仪式、功德经济、国家护法关系等丰富的宗教—政治形态；在南亚、东南亚、东亚和藏传佛教世界中，佛教都曾深度参与王权合法性、法律秩序与共同体建构。","“宗教最早的作用不是被用于统治，而是整合统治集团”是一个有启发的反常识命题，但也需避免过度单线化。不同地区宗教、祭祀、祖先崇拜、萨满实践与政治权威的关系差异很大；有些宗教实践确实先服务于精英整合，有些则更早嵌入亲属、治疗、生态和日常互惠。更稳妥的说法是：宗教可以同时提供宇宙秩序、精英整合、大众规范和政治合法性，具体权重取决于社会形态。","“民族主义、爱国精神是宗教情绪的一种变体”也应收窄为分析类比。民族主义常借用宗教形式（神圣牺牲、烈士、仪式、圣地），但它也依赖学校、传媒、兵役、税收、行政分类和公民权等现代国家技术；不能把民族主义完全还原为宗教情绪。"],"en":["The claim that “Buddhism is only a philosophy of life” is one modern interpretation and should not be generalized to Buddhism as a whole. Buddhism has monastic institutions, precepts, sangha, ritual, merit economies, and relations between state and protector of the dharma. In South Asia, Southeast Asia, East Asia, and Tibetan Buddhist worlds, Buddhism has deeply shaped royal legitimacy, legal order, and community formation.","“Religion first integrated the ruling group rather than serving rule” is a useful counter-intuitive claim, but it should not become a single-line story. The relations among religion, ritual, ancestor worship, shamanic practice, and political authority vary greatly across regions. Some practices may first serve elite integration; others are earlier embedded in kinship, healing, ecology, and everyday reciprocity. A safer statement is: religion can at the same time supply cosmic order, elite integration, popular norms, and political legitimacy, with different weights in different social forms.","“Nationalism and patriotism are variants of religious feeling” should also be narrowed to an analytic analogy. Nationalism often borrows religious forms; sacred sacrifice, martyrs, ritual, holy places; but it also depends on schools, media, conscription, taxation, administrative categories, and citizenship. It cannot be reduced entirely to religious emotion."]},"noteSection":"第八周 11月1日 第七讲 宗教与政治","noteBlocks":[{"kind":"p","text":"涂尔干：human duplex，除了满足生存需求，人也有神圣的一面，向上的。宗教的起源：演化心理学视角——人类寻求因果关系解释的副产物（Diamond, 1997）；结构功能主义视角——社会群体整合的工具（Gould et al., 2007; Rossano, 2009）。Rossano：宗教是在道德后出现的，加入守护共同祖先、神灵的想法，抑制自私、建立更大的合作团体。结构功能主义：宗教的产生是社会性的，抑制人的自私、提高群体生存率，同时能提高心理健康。演化心理学／认知科学：寻求因果关系解释时常常会过度推论。"},{"kind":"p","text":"界定宗教。涂尔干：宗教是有关神圣事物的统一信仰和实践体系，那些被视为神圣和禁忌的事物，以及将所有坚守这些信仰和实践的人统一成一个名为“教会”的道德共同体（1915, p.47）。吉尔茨《文化的解释》（1973）：宗教是（1）一种符号体系，用以（2）建立强大、普遍和持久的情感和动机，通过（3）制定一般存在秩序的概念，并通过（4）赋予这些概念一种如事实般的光环，以至于（5）情感和动机似乎具有独特的现实感（90）。我们可以广泛地将宗教定义为一种共享的信仰和实践体系，涉及自然和超自然现象之间相互关系的信仰。"},{"kind":"p","text":"宗教的三个关键特点：1）以相信超自然现象的力量为基础；2）是一个群体现象；3）是一套实践的制度。宗教是一种意识形态，但意识形态不一定是宗教（有观点认为佛教只是一种生活哲学）。巫术和迷信，没有群体现象、规约的一套实践制度。"},{"kind":"p","text":"宗教在政治中的作用：1）历史上宗教的第一个作用是首先整合了统治集团内部，形成了一个比较同质化、普遍化的统治阶级；2）统治阶级依靠宗教获得合法性。部落族群相信鬼神与此是两件事；宗教最早的作用不是被用于统治，而是整合统治集团；统治者内部用宗教来整合，与读写有关，有了文字后写作也被用于记录神话（最早的宗教文本，宗教史的开始），戏剧从宗教中产生（宗教剧目），成了贵族特有的高级文化；宗教因而加强了统治集团道德上、审美、智识趣味的团结。"},{"kind":"p","text":"后来，统治者利用有组织的宗教维持权威，早期国家很多为神权国家；社会责任原本以关系来定，酋邦人数很多、部落的行为规则无法适用，宗教设定社会规范，最早的宗教规则可被视为法律的初级形式（原始社会所没有）——对陌生人的行为规范、出现越轨时的惩治。迈克尔曼：寺庙是历史上的第一个国家；统治者身兼祭司与政治首领。3）统治者依靠宗教建立社会规范，达到社会控制和整合；4）统治者以宗教名义发动战争。民族主义、爱国精神是宗教情绪的一种变体。"}],"noteBlocksEn":[{"kind":"p","text":"Durkheim: homo duplex; beyond survival, humans have a sacred, upward side. Origins of religion: the evolutionary-psychology view; a byproduct of seeking causal explanation (Diamond 1997); the structural-functionalist view; a tool of social integration (Gould et al. 2007; Rossano 2009). Rossano: religion came after morality, adding guardianship of shared ancestors and spirits, curbing selfishness and building larger cooperation, while also improving mental health. Evolutionary psychology / cognitive science note that causal inference often over-generalizes."},{"kind":"p","text":"Defining religion. Durkheim (1915, p.47): a unified system of beliefs and practices relative to sacred things; set apart and forbidden; uniting all adherents into one moral community called a church. Geertz (1973, p.90): religion is (1) a system of symbols that (2) establishes powerful, pervasive, lasting moods and motivations by (3) formulating conceptions of a general order of existence and (4) clothing them with such an aura of factuality that (5) the moods and motivations seem uniquely realistic. Broadly, religion is a shared system of belief and practice concerning relations between natural and supernatural phenomena."},{"kind":"p","text":"Three key features: it rests on belief in supernatural power; it is a group phenomenon; it is a system of practice. Religion is an ideology, but not every ideology is a religion (some hold Buddhism is merely a philosophy of life). Magic and superstition lack the group phenomenon and codified practice."},{"kind":"p","text":"Religion's political roles: (1) historically its first role was to integrate the ruling class internally into a relatively homogeneous elite; (2) the ruling class draws legitimacy from religion. A tribe's belief in spirits is a separate matter; religion's earliest role was not ruling but integrating the elite, tied to literacy; once writing existed, myth was recorded (the earliest religious texts, the start of religious history), and drama emerged from religion, becoming aristocratic high culture; religion and so strengthened the elite's moral, aesthetic, and intellectual cohesion."},{"kind":"p","text":"Later, rulers used organized religion to maintain authority, and many early states were theocracies; as chiefdoms grew too large for tribal rules, religion set social norms, and the earliest religious rules can be seen as an early form of law; norms toward strangers and punishment of transgression. Michael Mann: the temple was the first state; the ruler was both priest and political head. (3) Rulers use religion to set norms for control and integration; (4) rulers wage war in religion's name. Nationalism and patriotism are variants of religious feeling."}]},{"id":"nationalism","trunk":"subst","x":3.0,"y":10.2,"era":{"zh":"第十—十一周","en":"Lectures 9"},"title":{"zh":"民族主义与现代国家","en":"Nationalism and the Modern State"},"tag":{"zh":"政治—意识形态互动 · 九个转折点 · 零和认同","en":"politics–ideology interaction · nine turning points · zero-sum identity"},"core":{"zh":["课程把民族主义理解为一种认同，依靠意识形态和强制（即政治）而非客观基础，并用“政治—意识形态互动”框架展开。它先破除几个误区：民族主义并无单一起源（政治／战争 Tilly、经济 Gellner、宗教 Gorski、美法革命、通讯 Anderson 等都被提出过）；民族主义不必然保护地方文化，反而常是地方多样性的杀手；“好民族主义／坏民族主义”、“客观基础”（A. Smith）都是需要警惕的说法。","课程按“转折点”重排民族主义史：第一转折点是犹太／基督教对认同形态的塑造（群体扩大化、与他者对立化、边界清晰化的零和认同）；随后经历再征服运动与宗教战争（主权国家对本国宗教的规训、第一波大规模族群清洗）、帝国竞争与美法革命（国家认同在普通人中扩张、自由主义民族主义主导）、拿破仑扩张（同构性扩散、族群民族主义在德国与东欧出现）、奥斯曼衰弱与英帝国主宰、一战与十月革命（共产主义民族运动）、二战与帝国垮台（民族主义全球化）、第三波民主化（自由主义民族主义复兴），直到第三波终结后民族主义性质的多样化。","总结的六点：民族主义是犹太—基督教意识形态与近代西方政治的产物，并非单一原因决定；它是地方多样性文化的杀手；帝国政治既激发反应性民族主义又是其推手；掌握资源的国家与地区精英也会有野心构造民族认同（上下都有帮手）；民族主义没有本原性质，总能与正在上升的意识形态结合产生变种；它是一个可以无中生有、进行建构的意识形态。","课后补充：民族主义研究的经典分歧通常包括现代主义、原生论/族群象征主义与建构主义。盖尔纳强调工业化需要同质的高文化和学校体系；安德森强调印刷资本主义使陌生人想象为共同体；霍布斯鲍姆强调传统的发明；史密斯强调前现代族群记忆、神话和象征的延续；布鲁伊利强调民族主义是一种围绕国家权力的政治策略。把这些路径并置，比把民族主义归于单一意识形态源头更稳妥。"],"en":["The course treats nationalism as an identity that rests on ideology and coercion (i.e., politics) rather than an objective basis, developed through a “politics–ideology interaction” frame. It first dispels myths: nationalism has no single origin (politics/war for Tilly, economy for Gellner, religion for Gorski, the American–French revolutions, communications for Anderson); it does not necessarily protect local culture but often kills local diversity; the “good vs bad nationalism” and “objective basis” (A. Smith) framings deserve suspicion.","It re-narrates nationalism’s history as “turning points”: the first is the shaping of identity by Judaism/Christianity (a zero-sum identity of group expansion, opposition to others, and sharpened boundaries); then the Reconquista and wars of religion (sovereign states disciplining their own religion; the first wave of large-scale ethnic cleansing), imperial competition and the American–French revolutions (national identity spreading among ordinary people; liberal nationalism dominant), Napoleon’s expansion (homogenizing diffusion; ethnic nationalism appearing in Germany and Eastern Europe), Ottoman decline and British imperial dominance, WWI and the October Revolution (communist national movements), WWII and imperial collapse (the globalization of nationalism), the Third Wave of democratization (the revival of liberal nationalism), and finally the diversification of nationalism’s character after the Third Wave ended.","Six conclusions: nationalism is a product of Judeo-Christian ideology and modern Western politics, not determined by a single cause; it kills local cultural diversity; imperial politics both provokes reactive nationalism and propels it; resource-holding state and regional elites also ambitiously construct national identity (helpers above and below); nationalism has no original essence and always fuses with the rising ideology to spawn variants; it is an ideology that can be built from nothing.","Post-class supplement: classic debates in nationalism studies often divide into modernism, primordialism / ethno-symbolism, and constructivism. Gellner stresses that industrialization needs a homogeneous high culture and school system; Anderson stresses that print capitalism lets strangers imagine themselves as a community; Hobsbawm stresses the invention of tradition; Smith stresses the continuity of pre-modern ethnic memories, myths, and symbols; Breuilly stresses nationalism as a political strategy around state power. Placing these paths side by side is safer than deriving nationalism from one ideological source."]},"relation":{"zh":"民族主义把宗教（认同与零和扩张）、国家起源（强制与合法性）、领导继承（强人与动员）几条线收束起来，并直接通向现代化与殖民主义中“西方扩张如何制造他者”的讨论。","en":"Nationalism gathers the threads of religion (identity and zero-sum expansion), state origins (coercion and legitimacy), and succession (strongmen and mobilization), leading directly into how modernization and colonialism “manufacture the other” through Western expansion."},"works":{"zh":["赵鼎新，《帝国政治和主导性意识形态——民族运动的起源、发展和未来》","Tilly（national state）；Gellner；Gorski；Benedict Anderson；A. Smith","Benedict Anderson：《想象的共同体》","Ernest Gellner：《民族与民族主义》","Eric Hobsbawm：被发明的传统与民族主义","John Breuilly：民族主义与国家权力"],"en":["Zhao Dingxin, Imperial Politics and Dominant Ideology: The Origin, Development, and Future of National Movements","Tilly (the national state); Gellner; Gorski; Benedict Anderson; A. Smith","Benedict Anderson, Imagined Communities","Ernest Gellner, Nations and Nationalism","Eric Hobsbawm: invented traditions and nationalism","John Breuilly: nationalism and state power"]},"strengths":{"zh":["“政治—意识形态互动”框架避免把民族主义本质化，强调其建构性与可变性。","用“转折点”把零散史实编织成一条可追踪的演化线，并指出帝国政治的双重角色。"],"en":["The “politics–ideology interaction” frame avoids essentializing nationalism, stressing its constructed and mutable character.","The “turning points” weave scattered facts into a trackable evolution and identify the double role of imperial politics."]},"limits":{"zh":["把民族主义起源高度集中于犹太—基督教意识形态，存在欧洲中心化与单因化风险（详见课后反思）。","“公民／族群民族主义只是屠杀时间点不同”是有力但争议很大的强命题。"],"en":["Concentrating nationalism’s origin so heavily in Judeo-Christian ideology risks Eurocentrism and mono-causality (see the reflection).","“Civic vs ethnic nationalism differ only in the timing of killing” is a powerful but highly contested strong claim."]},"personal":{"zh":["这套叙事最有力的部分是“建构性”：民族不是被发现的客观实体，而是被意识形态和强制制造出来的认同。最该警惕的部分则是它的单一起源倾向——把如此多样的现象都收归一个意识形态源头。"],"en":["The most powerful part of this account is constructedness: nations are not discovered objective entities but identities manufactured by ideology and coercion. The part to watch is its mono-origin tendency; folding such varied phenomena into one ideological source."]},"reflection":{"zh":["这一讲几乎完全采纳了赵鼎新关于民族主义的论述，包括“民族主义是犹太—基督教意识形态的产物，与东方文明无关”“没有基督教的零和扩张就没有十字军、再征服与宗教战争”等强命题。这些观点富有洞见，但在民族主义研究中属于一家之言，应与主流诸说并置而非全盘当作定论。","几处需要平衡的地方：（1）单一意识形态起源的过强。主流研究（Gellner 的工业化/同质文化说、Anderson 的印刷资本主义与想象的共同体、Hobsbawm 的被发明的传统、Breuilly 的国家—政治说）普遍认为民族主义是多重条件（工业化、国家建构、识字与传媒、世俗化）共同作用的产物；把它的根源几乎完全归于犹太—基督教“零和认同”，会忽略这些结构性因素，也难解释非基督教语境（如东亚、日本明治）中同样强烈的民族主义。","（2）“与东方文明无关”的判断过强。它把非西方民族主义一律读作西方意识形态的输入或反应，剥夺了本地行动者的能动性；后殖民研究（下一节斯皮瓦克、查特吉）恰恰强调殖民地民族主义有自身的、并非简单复制西方的逻辑。","（3）“公民民族主义与族群民族主义只是屠杀时间点不同”是有力的去魅命题，但把两者的规范差异完全抹平，可能低估制度设计（公民身份 vs 血统）对后续暴力的真实约束作用。","赵鼎新的观点作为一种有解释力的强假设是合理的，但它是“一种有争议的理论框架”，不是学界共识，还有 Anderson、Gellner、后殖民等竞争性解释。"],"en":["This lecture adopts almost entirely Zhao Dingxin’s account of nationalism, including strong claims that “nationalism is a product of Judeo-Christian ideology and unrelated to Eastern civilization” and “without Christianity’s zero-sum expansion there would be no Crusades, Reconquista, or wars of religion”. These are insightful but represent one position in nationalism studies and should sit alongside mainstream theories rather than be taken as settled.","Points to balance: (1) The single-ideology origin is too strong. Mainstream work (Gellner’s industrialization/homogeneous culture, Anderson’s print capitalism and imagined communities, Hobsbawm’s invented tradition, Breuilly’s state-political account) generally sees nationalism as a product of multiple conditions (industrialization, state-building, literacy and media, secularization); rooting it almost entirely in a Judeo-Christian “zero-sum identity” ignores these structural factors and struggles to explain the equally strong nationalisms of non-Christian contexts (e.g., East Asia, Meiji Japan).","(2) The claim “unrelated to Eastern civilization” is too strong. It reads all non-Western nationalism as an import of, or reaction to, Western ideology, denying local actors agency; postcolonial scholarship (Spivak, Chatterjee in the next node) stresses precisely that colonial nationalism has its own logic, not a simple copy of the West.","(3) “Civic and ethnic nationalism differ only in the timing of killing” is a powerful demystifying claim, but flattening the normative difference entirely may underestimate the real constraining effect of institutional design (citizenship vs descent) on subsequent violence.","Zhao Dingxin’s view is reasonable as a strong and useful hypothesis, but it is a contested theoretical framework, not a scholarly consensus. Anderson, Gellner, postcolonial scholarship, and other competing explanations remain important."]},"noteSection":"第十—十一周 第九讲 民族主义与现代国家","noteBlocks":[{"kind":"p","text":"民族主义就是想要自己的公民权，要使自己获得意识形态合法性，就要用各种政治思想包装自己，何种思想最流行就可能与其结合，形成运动浪潮。几个主要误区：民族主义有单一的起源【政治／战争(Tilly)、经济(Gellner)、宗教(Gorski)、美法革命、通讯(Anderson)】；民族主义有“民主”元素（公民权、公民义务、制造民族英雄）；有“好”民族主义和“坏”民族主义；民族主义有“客观基础”(A. Smith)；民族主义能保护地方文化。"},{"kind":"p","text":"民族主义研究的理论出发点：民族是一种认同，依靠意识形态和强制（即政治），而不是客观基础；采用政治—意识形态互动框架的视角。家庭之外的认同感的建立，都是依靠意识形态和强制的，带着强制性的想象。"},{"kind":"p","text":"第一转折点（意识形态突破）：犹太／基督教对人类认同感形态发展的重要性。犹太教的历史转折点意义：群体的扩大化，与其他群体关系对立化，群体边界清晰化；基督教维持了犹太教式认同的零和特性。犹太教是“民族的宗教”，基督教是“帝国的宗教”。轴心时代之前大部分都信仰多神教，犹太教的产生对整合有很大作用，但与其他群体之间的隔阂加深，仪式繁琐门槛高难以扩张；罗马帝国本是多神教文化，基督教只要相信就可以、传播更快，缓冲了犹太教的认同形式，但零和认同的形式不变。"},{"kind":"p","text":"第二转折点：再征服运动、宗教战争、主权国家形成对本国宗教的规训（零和性国家建构）。没有基督教的“零和扩张”意识形态特性，十字军东征、再征服运动和宗教战争都不会发生。宗教战争撕裂了基督教世界，给君主在基督教式理念下加强对本国宗教的控制和改造提供了合法性；强行推崇宗教或强行改教，造成了现代意义第一波大规模的族群清洗。"},{"kind":"p","text":"（赵鼎新引文）西方学者把英法的民族主义称为“公民民族主义”，认为此类民族主义不会导致族群清洗。其实公民民族主义和族群民族主义形成过程中都伴随着大规模杀戮和被迫移民，区别仅在于屠杀发生的时间点不同：法国的圣巴多罗买大屠杀、英国宗教争端与内战、光荣革命，都造成大规模杀戮和被迫移民，构成欧洲民族国家形成过程中的第一波大规模族群清洗。正因这些血腥事件，英法核心地区在民族主义思潮出现前文化认同已较高整合，为族群意识不强的公民民族主义打下基础；神圣罗马帝国地区族群／宗教构成复杂、国家分裂力量弱，没有出现同等规模的前现代族群清洗，因此十九世纪德国形成的是通过族群而非公民认同来定义民族的族群民族主义。"},{"kind":"p","text":"第三转折点：帝国竞争（七年战争）和美法革命。国家认同在普通人中扩张，现代意义上的民族主义在欧洲兴起；革命与民族主义都是帝国政治的一部分，而不是民族主义抵抗、打破帝国；自由主义民族主义在这一阶段占主导。浪漫主义音乐的兴起其实是文化清洗：原本各村庄都有自己的特色，出现浪漫主义音乐家后就有了“XX民族音乐”的说法，特色要么被贬低要么流失。"},{"kind":"p","text":"第四—第五转折点：拿破仑的帝国扩张使民族主义成为同构性扩散力量，族群民族主义（ethnic nationalism）在德国和东欧出现，反犹主义在此发作；奥斯曼帝国衰弱、维多利亚英帝国主宰，民族主义在西方帝国主义扩张和英俄争霸中扩散到整个欧洲乃至部分地区，族群清洗开始发生在原奥斯曼控制地区，中国、印度等传统文明体出现民族主义思潮。"},{"kind":"p","text":"第六—第九转折点：一战、十月革命与共产主义民族运动；二战与英、法、日帝国垮台、民族主义全球化、大量“无历史民族”涌现、民族认同基础进一步主观化；第三次民主浪潮与自由主义民族主义复兴、族群清洗大量涌现；第三波终结后民族主义性质多样化（自由主义、宗教、族群、民粹民族主义……），民族主义其实没有性质，只是与时下强势的意识形态结合。"},{"kind":"p","text":"总结：第一，民族和民族主义是犹太—基督教意识形态和近代西方政治的产物，与东方文明无关，其形成是一个发展的过程，并不是单一原因决定的；第二，民族主义不是保护地方文化的法宝，而是地方多样性文化的杀手；第三，帝国政治既激发了反应性民族主义，又是民族主义的推手；第四，掌握大量资源的国家或地区精英也会有野心构造民族认同，民族主义是一个上下都有帮手的意识形态；第五，民族主义没有本原性质，总能和正在上升的意识形态结合并产生多个变种；第六，民族主义是一个可以无中生有、进行建构的意识形态。"}],"noteBlocksEn":[{"kind":"p","text":"Nationalism is the demand for one's own citizenship; to gain ideological legitimacy it wraps itself in whatever political idea is most current, fusing with it into a movement. Myths to dispel: that nationalism has a single origin (politics/war-Tilly, economy-Gellner, religion-Gorski, the American–French revolutions, communications-Anderson); that it has a 'democratic' element; that there is 'good' vs 'bad' nationalism; that it has an 'objective basis' (A. Smith); that it protects local culture."},{"kind":"p","text":"Starting point: a nation is an identity resting on ideology and coercion (i.e., politics), not an objective basis; the frame is politics–ideology interaction. All identity beyond the family is built through ideology and coercion; a coercive imagining."},{"kind":"p","text":"First turning point (ideological breakthrough): the role of Judaism/Christianity in shaping identity. Judaism's significance: group expansion, opposition to other groups, sharpened boundaries; Christianity preserved the zero-sum character of this identity. Judaism is 'the religion of a people', Christianity 'the religion of empire'. Before the Axial Age most were polytheist; Judaism greatly aided integration but deepened separation from others, and its elaborate, high-threshold ritual made expansion hard; the Roman Empire was polytheist, and Christianity, requiring only belief, spread faster, buffering Judaism's identity form while keeping its zero-sum character."},{"kind":"p","text":"Second turning point: the Reconquista, wars of religion, and the sovereign state's disciplining of its own religion (zero-sum state-building). Without Christianity's zero-sum expansion, the Crusades, Reconquista, and wars of religion would not have happened. The wars of religion tore Christendom apart and gave monarchs legitimacy to control and reshape their own religion; forced imposition or conversion produced the first modern wave of large-scale ethnic cleansing."},{"kind":"p","text":"(Quoting Zhao) Western scholars call English and French nationalism 'civic' and hold it does not cause ethnic cleansing. In fact both civic and ethnic nationalism formed amid mass killing and forced migration, differing only in timing: France's St Bartholomew's Day Massacre, England's religious strife, Civil War, and Glorious Revolution all produced mass killing and forced migration; the first wave of large-scale ethnic cleansing in European nation-formation. Precisely because of this bloodshed, the cores of England and France were already culturally integrated before nationalism, laying the ground for a low-ethnic civic nationalism; the Holy Roman Empire, with complex ethnic/religious composition and weak fragmented states, saw no comparable pre-modern cleansing, so 19th-century Germany formed an ethnic nationalism defining the nation by descent rather than citizenship."},{"kind":"p","text":"Third turning point: imperial competition (the Seven Years' War) and the American–French revolutions. National identity spread among ordinary people and modern nationalism arose in Europe; revolution and nationalism are part of imperial politics, not nationalism breaking empire; liberal nationalism dominated. The rise of Romantic music was actually cultural cleansing: villages once had their own styles, but once Romantic composers appeared there was talk of 'the music of nation X', and local distinctiveness was either denigrated or lost."},{"kind":"p","text":"Fourth–fifth turning points: Napoleon's expansion made nationalism a homogenizing diffusing force; ethnic nationalism appeared in Germany and Eastern Europe, where antisemitism erupted; the Ottoman Empire weakened and the Victorian British Empire dominated, and nationalism spread across Europe and beyond amid Western imperial expansion and Anglo-Russian rivalry, with ethnic cleansing beginning in former Ottoman lands and nationalist currents appearing in traditional civilizations like China and India."},{"kind":"p","text":"Sixth–ninth turning points: WWI, the October Revolution, and communist national movements; WWII and the collapse of the British, French, and Japanese empires, the globalization of nationalism, the rise of many 'history-less nations', and the further subjectivization of national identity; the Third Wave of democratization and the revival of liberal nationalism amid much ethnic cleansing; after the Third Wave, the diversification of nationalism's character (liberal, religious, ethnic, populist); nationalism has no essence and merely fuses with the dominant ideology of the moment."},{"kind":"p","text":"Summary: (1) nation and nationalism are products of Judeo-Christian ideology and modern Western politics, unrelated to Eastern civilization, formed through a process and not determined by a single cause; (2) nationalism is not a charm for protecting local culture but a killer of local diversity; (3) imperial politics both provokes reactive nationalism and propels it; (4) resource-holding state and regional elites also ambitiously construct national identity; nationalism has helpers above and below; (5) nationalism has no original essence and always fuses with the rising ideology to spawn variants; (6) nationalism is an ideology that can be built from nothing."}]},{"id":"modernization","trunk":"subst","x":3.0,"y":11.4,"era":{"zh":"第十二周","en":"Lecture: Modernization"},"title":{"zh":"现代化与官僚制度","en":"Modernization and Bureaucracy"},"tag":{"zh":"单线进化论批判 · 多元现代性 · 再部落化 · 反官僚","en":"critique of unilineal evolutionism · multiple modernities · re-tribalization · anti-bureaucracy"},"core":{"zh":["当政治人类学把关注点从前工业、相对封闭的政治结构转向发展中国家时，几个研究门类之间的界限变得模糊：大多数村庄、社群已被正规政治机构整合，整体论与参与式观察难以机械套用，研究工业社会的政治意味着全新的问题与方法挑战。课程由此提出：政治不是一个可以单独研究的问题，而要放进更宽广的历史—文化背景。","现代化叙事的经典版本是罗斯托的“起飞”模型／经济成长阶段论——它把通向现代化的道路看成单线的，认为国家间的发展差异并非历史、文化的结构性原因，而忽略了“发展的历史机遇”：相差百年起步的国家不会拥有相似的内外环境。艾森斯塔特（Eisenstadt）对此提出多元现代性：现代性是基督教欧洲文明内部发展出来的，欧洲的现代化开启了“第二个轴心时代”，其元意识形态（自由主义）向全球扩张时，不可避免地刺激出民族独立、法西斯等另类政治方案；现代化的核心被概括为社会区别（social differentiation）与社会动员——把宗教与其他领域分开，为旧组织确立新目标、推进管理集权、建构国旗与国族起源等符号，使政治忠诚从地方转向中央。","课程用两个案例落地：科恩（Abner Cohen）笔下尼日利亚豪萨人的“再部落化”显示，现代化不一定消解族群认同，反而可能使之政治化、激进化——独立后的政党政治削弱了传统酋长权威，但在外经商的豪萨人重新强调族内凝聚、采取更严格的宗教形式，把豪萨认同变成维护商业垄断的武器，是“旧瓶装新酒”的结构功能变化。怀特（Martin King Whyte）对现代中国行政体系与反官僚运动的研究则追问：在抱有平等化理想的社会里，如何处理官僚与人民的张力——毛泽东用定期政治运动、干部下放学习来完善而非对立化行政体系，因为官僚随时可能替代被推翻的阶级成为新的统治者。","课后补充：现代化理论内部并不只有罗斯托。韦伯传统把现代性与理性化、科层制、法理权威联系起来；马克思主义传统强调资本主义生产关系与阶级；世界体系/依附理论强调中心—外围关系；国家能力研究强调财政、兵役、基础设施与官僚组织。多元现代性的重要性在于：现代化不是“复制西方”，而是不同社会在全球权力结构中对现代制度、技术和想象的再组合。"],"en":["When political anthropology shifted its focus from pre-industrial, relatively closed political structures to developing countries, the boundaries between research fields blurred: most villages and communities had already been integrated into formal political institutions, holism and participant observation could no longer be applied mechanically, and studying the politics of industrial society meant new problems and methodological challenges. The course concludes that politics cannot be studied in isolation but must be placed in a broader historical-cultural context.","The classic version of the modernization narrative is Rostow’s “take-off” model / stages of economic growth; it treats the road to modernity as unilineal, holding that differences in national development are not due to structural historical-cultural causes, and so ignores the “historical opportunity of development”: countries starting a century apart will not share similar internal and external conditions. Eisenstadt counters with multiple modernities: modernity developed internally within Christian European civilization, Europe’s modernization opened a “second Axial Age”, and as its meta-ideology (liberalism) expanded globally it inevitably provoked alternative political programs such as national-independence and fascist movements. The core of modernization is summarized as social differentiation and social mobilization; separating religion from other domains, setting new goals for old organizations, centralizing management, and building symbols such as the flag and a narrative of national origins, so that political loyalty shifts from the local to the center.","The course grounds this in two cases. Abner Cohen’s account of the Hausa in Nigeria shows “re-tribalization”: modernization need not dissolve ethnic identity but may politicize and radicalize it; post-independence party politics weakened traditional chiefs’ authority, yet Hausa traders abroad re-emphasized in-group cohesion and adopted stricter religious forms, turning Hausa identity into a weapon for protecting their commercial monopoly; a “new wine in an old bottle” change of structural function. Martin King Whyte’s study of modern China’s administrative system and its anti-bureaucracy campaigns asks how a society holding egalitarian ideals manages the tension between bureaucracy and the people; Mao used periodic political campaigns and the rotation of cadres into study to perfect rather than antagonize the administrative system, since bureaucrats can at any moment replace the overthrown class as new rulers.","Post-class supplement: modernization theory is more than Rostow. The Weberian tradition links modernity to rationalization, bureaucracy, and legal-rational authority; Marxist approaches stress capitalist relations of production and class; world-systems and dependency theory stress center–periphery relations; state-capacity studies stress taxation, conscription, infrastructure, and bureaucratic organization. The importance of multiple modernities is that modernization is not “copying the West” but the recombination of modern institutions, techniques, and imaginaries within global power relations."]},"relation":{"zh":"现代化这一节把右干前面的“进化—国家—领导—宗教—民族主义”诸线收拢到一个问题上：当西方的发展模式被普遍化为唯一道路时会发生什么。它向上呼应左干的进化论（单线 vs 多线），向下直接通往殖民主义对“欧洲中心传播主义”的批判。","en":"The modernization node gathers the earlier threads of the right trunk; evolution, the state, leadership, religion, nationalism; around a single question: what happens when the Western development model is universalized as the only road. It echoes the left trunk’s debate over evolutionism (unilineal vs multilinear) and leads directly into colonialism’s critique of “Eurocentric diffusionism”."},"works":{"zh":["Rostow, The Stages of Economic Growth（起飞模型／经济成长阶段论）","S. N. Eisenstadt，多元现代性、第二轴心时代、social differentiation 与社会动员","Abner Cohen, Custom and Politics in Urban Africa（《非洲都市中的习惯法和政治》，1969）——豪萨人再部落化","Martin King Whyte（怀默霆），现代中国国家行政体系与反官僚运动研究","David Graeber, The Utopia of Rules（“官僚制是结构性愚蠢”一说的来源，见课后反思）"],"en":["Rostow, The Stages of Economic Growth (the take-off model / stages of economic growth)","S. N. Eisenstadt, multiple modernities, the second Axial Age, social differentiation and social mobilization","Abner Cohen, Custom and Politics in Urban Africa (1969); Hausa re-tribalization","Martin King Whyte, studies of modern China’s state administration and anti-bureaucracy campaigns","David Graeber, The Utopia of Rules (source of the “bureaucracy as structural stupidity” claim; see the reflection)"]},"strengths":{"zh":["用艾森斯塔特的多元现代性有效拆解了罗斯托式单线进化论，把现代化从“西方=终点”的目的论中解放出来。","豪萨人案例提供了反直觉的经验证据：现代化可以强化而非消解族群认同，揭示了认同的建构性与工具性。"],"en":["Eisenstadt’s multiple modernities effectively dismantles Rostow-style unilineal evolutionism, freeing modernization from the teleology of “the West = endpoint”.","The Hausa case offers counter-intuitive empirical evidence: modernization can strengthen rather than dissolve ethnic identity, revealing identity’s constructed and instrumental character."]},"limits":{"zh":["艾森斯塔特把现代性的源头仍系于“基督教欧洲文明内部发展”，多元现代性在起点上仍带欧洲中心的尾巴。","“社会区别＋社会动员＝现代化核心”的概括偏功能主义，容易把冲突、暴力与殖民掠夺等“外部条件”轻描淡写。"],"en":["Eisenstadt still roots the origin of modernity in “internal development within Christian European civilization”, so multiple modernities keeps a Eurocentric tail at its starting point.","Defining modernization’s core as “social differentiation + social mobilization” is functionalist and tends to understate conflict, violence, and colonial extraction as mere “external conditions”."]},"personal":{"zh":["这一节最有用的转向，是把“现代化”从一个时间表（谁先谁后）改写成一个权力问题（谁有资格定义“现代”）。豪萨人案例尤其值得记住：当我们看到“传统复兴”时，常常看到的其实是旧结构在新条件下的功能再造，而不是文化的本真延续。"],"en":["The most useful move here is rewriting “modernization” from a timetable (who came first) into a question of power (who gets to define “the modern”). The Hausa case is worth remembering: when we see a “revival of tradition” we are often seeing an old structure refunctioned under new conditions, not the authentic continuity of a culture."]},"reflection":{"zh":["笔记末尾把怀特的研究延伸为一句格雷伯式断言：“官僚制度是一种结构性愚蠢”（出自 David Graeber《规则的乌托邦》）。这句话作为对官僚理性自负的去魅很有冲击力，但作为一般命题需要平衡。","需要补充的几点：（1）韦伯的经典论证恰恰相反——相对于人格化、庇护式的旧统治，科层制的非人格化、规则化与可计算性，是现代国家能够公平、可预期地提供公共服务的前提；把官僚制一概斥为“愚蠢”，会连同它对任意权力的约束一起否定。（2）格雷伯的洞见更精确的版本是“结构性暴力催生结构性愚蠢”：是权力的不对称让上位者无需理解下位者，从而制造出制度化的盲区——问题在权力关系，而不在“官僚制”这一形式本身。（3）笔记里毛泽东式“以政治运动反官僚”的方案也并非无代价：定期运动固然能冲击官僚惰性，但也可能瓦解专业能力、法治与可预期性，其历史后果（如“文革”）提醒我们，反官僚的激进手段同样可能制造新的伤害。","“官僚制＝结构性愚蠢”可以作为提醒权力盲区的警句，但不宜上升为对官僚制的整体判决。更稳妥的表述是：官僚制既是约束任意权力的工具，也是制造制度性盲区的温床；哪一面占主导，取决于它嵌入怎样的权力关系与问责结构。"],"en":["The note ends by extending Whyte’s study into a Graeber-style claim: “bureaucracy is a form of structural stupidity” (from David Graeber’s The Utopia of Rules). As a demystification of bureaucratic rationality’s conceit this is striking, but as a general proposition it needs balancing.","Points to add: (1) Weber’s classic argument runs the other way; relative to personalized, patronage-based older rule, the impersonality, rule-boundedness, and calculability of bureaucracy are preconditions for a modern state to deliver public goods fairly and predictably; condemning bureaucracy wholesale as “stupid” throws out its constraint on arbitrary power along with it. (2) A more precise version of Graeber’s insight is “structural violence breeds structural stupidity”: it is the asymmetry of power that lets those above avoid understanding those below, manufacturing institutionalized blind spots; the problem lies in the power relation, not in the bureaucratic form as such. (3) The Maoist program of “fighting bureaucracy through political campaigns” is not costless either: periodic campaigns can shake bureaucratic inertia but can also dissolve professional competence, the rule of law, and predictability, and their historical consequences (e.g., the Cultural Revolution) warn that radical anti-bureaucratic means can manufacture new harms.","“Bureaucracy = structural stupidity” can work as an aphorism that flags power blind spots, but it should not become a verdict on bureaucracy as a whole. A safer statement is that bureaucracy can both constrain arbitrary power and produce institutional blind spots. Which side dominates depends on the power relations and accountability structures in which it is embedded."]},"noteSection":"第十二周 现代化与官僚制度","noteBlocks":[{"kind":"p","text":"好几个研究门类之间的区分变得模糊。政治人类学传统上研究前工业、相对封闭的政治结构，强调参与式观察；当关注点放在发展中国家，很难用传统方法搜集材料，不能机械性使用整体论方法；大多数村庄、社群已经被正规政治机构整合了；研究工业社会的政治意味着全新的问题、研究方法的挑战，大规模人群无法用质性方法。政治不是一个可以单独研究的问题，而要放在一个更宽广的历史文化背景下。"},{"kind":"p","text":"现代化过程：单线进化论及其批评。经典理论是罗斯托的起飞模型／经济成长阶段理论——国家发展的区别不是因为一些历史、文化的结构性原因，达致现代化的线路是单线的；这里有发展的历史机遇问题，发展相差百年的国家不会拥有相似的发展内外环境。"},{"kind":"p","text":"艾森哈特（S. N. Eisenstadt）的现代化理论：所谓现代性是基督教欧洲文明的内部发展起来的；欧洲的现代化开动了第二个轴心时代，带来了多元现代性。如何理解旧有社会形态和现代化之间的关系？艾森哈特：现代化的核心是社会区别（social differentiation）和社会动员。这与诺斯替主义的反抗表现相关——相信人可以通过有意识的活动形塑世界、反抗现有建制；当看到世界有不平等、剥削，可以通过社会运动人为制造乌托邦。"},{"kind":"p","text":"欧洲的现代化、第二个轴心时代的到来，是多元的现代化路程；元意识形态是自由主义，以其为基本形成自由民主代议制度，其向全球扩张的过程中不可避免地刺激很多另类政治方案的形成：民族独立运动、法西斯运动（对自由主义的反扑，反体制）；其他社会不断重新解释、重新表述，建造出新的现代化方案，强调不同要素，对现代性和西方抱矛盾态度，伴随抗议运动、建构集体认同。社会区别即把宗教和其他领域区分开来，社会动员意味着要为旧组织确立新目标，管理的集权化是现代化的关键因素；建构符号——国旗、国族起源；政治忠诚从地方转向中央、形成国族认同，现代化才算是成功。"},{"kind":"p","text":"政治族类性与再部落化：豪萨人案例（《非洲都市中的习惯法和政治》，科恩，1969）。居住的地方变成大城市，新人口涌入，豪萨人影响力涌入；二战后尼日利亚独立，中央政府开始搞党派政治，谴责部落主义、削弱了传统首领酋长的权威，年轻人走向族外婚，豪萨人部落面临解体威胁。但在外的年轻人发现在外成功要靠族内凝聚力，其他地区人群做生意的传统比不上豪萨人，反而意识到家乡、豪萨人之间的联结，面对经济挑战重新强调团结。穆斯林很多有兄弟会，泛穆斯林化，豪萨人本为“同宗会”
