<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Genealogy of Political Anthropology · 政治人类学谱系</title>
  <meta name="description" content="A bilingual, dual-trunk genealogy of political anthropology based on Fudan University course notes, with paradigm and substantive-history axes, cross-trunk influence lines, and course-reflection callouts.">
  <style>
:root {
  --paper: #fbfbf8;
  --paper-deep: #f1f4ef;
  --ink: #17211d;
  --muted: #607066;
  --line: #d9dfd8;
  --forest: #24493d;
  --blue: #315b7c;
  --rust: #9a5737;
  --violet: #62577f;
  --gold: #b98d40;
  --white: #ffffff;
  --shadow: 0 18px 42px rgba(23, 33, 29, 0.12);
  /* homepage hero top whitespace — keep identical across all three course homepages */
  --hero-pad-top: 200px;
  --hero-pad-top-mobile: 120px;
  --hero-pad-bottom: 64px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 17px;
  line-height: 1.65;
}

img { display: block; max-width: 100%; height: auto; }

a {
  color: var(--blue);
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
}
a:hover { color: var(--rust); }

/* ── Header ── */
.site-header {
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid rgba(217, 223, 216, 0.9);
  background: rgba(251, 251, 248, 0.92);
  backdrop-filter: blur(14px);
}

.nav {
  width: min(1120px, calc(100% - 40px));
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 64px;
  gap: 24px;
}

.brand {
  font-weight: 700;
  color: var(--ink);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 18px;
  align-items: center;
  flex-wrap: wrap;
  font-size: 0.92rem;
}

.nav-links a {
  color: var(--muted);
  text-decoration: none;
}
.nav-links a:hover,
.nav-links a.active { color: var(--ink); }

/* ── Hero ── */
.hero {
  position: relative;
  min-height: 520px;
  display: flex;
  align-items: flex-end;
  overflow: hidden;
  color: var(--white);
  background: linear-gradient(135deg, #14241e 0%, #1a3a2e 50%, #0f1f19 100%);
}

.hero-content {
  position: relative;
  width: min(1120px, calc(100% - 40px));
  margin: 0 auto;
  padding: 140px 0 72px;
}

.eyebrow {
  margin: 0 0 14px;
  text-transform: uppercase;
  font-size: 0.78rem;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.72);
  letter-spacing: 0.06em;
}

.hero h1 {
  margin: 0;
  max-width: 860px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 3.6rem;
  line-height: 1.08;
  font-weight: 500;
  text-shadow: 0 3px 20px rgba(0, 0, 0, 0.35);
}

.hero p {
  max-width: 700px;
  margin: 20px 0 0;
  color: rgba(255, 255, 255, 0.85);
  font-size: 1.08rem;
  line-height: 1.6;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 28px;
}

/* ── Buttons ── */
.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 10px 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  background: var(--white);
  text-decoration: none;
  font-weight: 700;
  font-size: 0.92rem;
}
.button:hover {
  border-color: var(--rust);
  color: var(--rust);
}
.button.light {
  border-color: rgba(255, 255, 255, 0.45);
  color: var(--white);
  background: rgba(255, 255, 255, 0.1);
}
.button.light:hover {
  background: rgba(255, 255, 255, 0.18);
  color: var(--white);
}

.button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 24px;
}

/* ── Sections ── */
.section { padding: 80px 0; }
.section.alt { background: var(--paper-deep); }

.container {
  width: min(1120px, calc(100% - 40px));
  margin: 0 auto;
}

.section-heading {
  margin-bottom: 38px;
}
.section-heading h2 {
  margin: 0 0 12px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 2.1rem;
  line-height: 1.16;
  font-weight: 500;
}
.section-heading p {
  margin: 0;
  color: var(--muted);
  max-width: 720px;
}

/* ── Project Cards ── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.project-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: var(--white);
  text-decoration: none;
  color: var(--ink);
  display: flex;
  flex-direction: column;
  transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
}
.project-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
  border-color: rgba(154, 87, 55, 0.55);
  color: var(--ink);
}
.project-card .card-body { padding: 20px; }
.project-card h3 {
  margin: 0 0 10px;
  font-size: 1.1rem;
  line-height: 1.3;
}
.project-card p {
  margin: 0;
  color: var(--muted);
  font-size: 0.92rem;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}
.tag {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 3px 9px;
  border-radius: 8px;
  background: #e8eee8;
  color: var(--forest);
  font-size: 0.75rem;
  font-weight: 700;
}
.tag.blue { background: #e7edf3; color: var(--blue); }
.tag.rust { background: #f2e7df; color: var(--rust); }
.tag.violet { background: #ece9f2; color: var(--violet); }
.tag.gold { background: #f5edd8; color: #7a6020; }
.tag.status {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--muted);
  font-weight: 600;
}

/* ── Article Layout (sidebar TOC + content) ── */
.article-layout {
  display: grid;
  grid-template-columns: 240px minmax(0, 1fr);
  gap: 52px;
  align-items: start;
}

.toc {
  position: sticky;
  top: 90px;
  border-left: 3px solid var(--forest);
  padding-left: 16px;
  color: var(--muted);
  font-size: 0.88rem;
}
.toc strong { display: block; margin-bottom: 8px; color: var(--ink); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em; }
.toc a { display: block; margin: 6px 0; color: var(--muted); text-decoration: none; }
.toc a:hover { color: var(--ink); }
.toc .toc-sub { padding-left: 12px; font-size: 0.84rem; }

.article {
  max-width: 820px;
  width: 100%;
  min-width: 0;
}
.article section { scroll-margin-top: 90px; }
.article h2 {
  margin: 0 0 8px;
  padding-top: 8px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.85rem;
  line-height: 1.2;
  font-weight: 500;
}
.article h2 + .lead { margin-top: 0; }
.article h3 {
  margin: 32px 0 10px;
  font-size: 1.15rem;
  line-height: 1.3;
}
.article p { margin: 14px 0; }

.lead { color: var(--muted); font-size: 1.05rem; }

.divider {
  border: 0;
  border-top: 1px solid var(--line);
  margin: 48px 0;
}

/* ── Quote ── */
.quote {
  margin: 26px 0;
  padding: 22px 24px;
  border-left: 4px solid var(--gold);
  background: var(--white);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(23, 33, 29, 0.05);
}
.quote p {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.15rem;
  line-height: 1.55;
  color: var(--ink);
}

/* ── KPI Grid ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin: 28px 0;
}
.kpi {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--white);
  padding: 18px;
}
.kpi strong {
  display: block;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.8rem;
  line-height: 1;
  font-weight: 500;
  color: var(--forest);
}
.kpi span {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 0.88rem;
}

/* ── Method / Result Grids ── */
.method-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin: 26px 0;
}
.method-box,
.result-box {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--white);
  padding: 22px;
}
.method-box h3,
.result-box h3 { margin-top: 0; }
.result-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin: 26px 0;
}
.result-box.good { border-top: 4px solid var(--forest); }
.result-box.caution { border-top: 4px solid var(--rust); }

/* ── Data Tables ── */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin: 22px 0;
  border-radius: 8px;
  background: var(--white);
  box-shadow: 0 0 0 1px var(--line);
  font-size: 0.92rem;
  overflow: hidden;
}
.data-table th,
.data-table td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}
.data-table th {
  color: var(--muted);
  font-size: 0.78rem;
  text-transform: uppercase;
}
.data-table tr:last-child td { border-bottom: 0; }

/* ── Figures ── */
.figure-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin: 28px 0;
}
.figure {
  margin: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: var(--white);
}
.figure img { width: 100%; object-fit: contain; background: #fafafa; }
.figure.wide { grid-column: 1 / -1; }
.figure figcaption {
  padding: 12px 16px;
  color: var(--muted);
  font-size: 0.88rem;
}

/* ── Artifacts ── */
.artifact-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 22px;
}
.artifact {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--white);
  padding: 16px;
}
.artifact a { font-weight: 700; }
.artifact p { margin: 6px 0 0; color: var(--muted); font-size: 0.9rem; }

/* ── Note ── */
.note {
  padding: 16px 18px;
  border: 1px solid #e5d6c8;
  border-radius: 8px;
  background: #fff8f3;
  color: #5a3b2b;
  font-size: 0.95rem;
  margin: 22px 0;
}

/* ── Research Journey (timeline) ── */
.journey-step {
  padding: 22px 0;
  border-top: 1px solid var(--line);
}
.journey-step:first-of-type { border-top: 0; padding-top: 8px; }
.journey-step h3 { margin-top: 0; }

/* ── About page ── */
.about-grid {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 52px;
  align-items: start;
}
.about-sidebar {
  position: sticky;
  top: 90px;
}
.about-sidebar .contact-block {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  font-size: 0.92rem;
  color: var(--muted);
}
.about-sidebar .contact-block a { display: block; margin: 4px 0; }

.about-content { max-width: 720px; }
.about-content h2 {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.6rem;
  font-weight: 500;
  margin: 48px 0 12px;
}
.about-content h2:first-child { margin-top: 0; }
.about-content p { margin: 14px 0; }

/* ── CV Embed ── */
.cv-embed {
  width: 100%;
  height: 85vh;
  border: 1px solid var(--line);
  border-radius: 8px;
}

/* ── Home Timeline ── */
.home-timeline {
  position: relative;
  padding-left: 28px;
  border-left: 2px solid var(--line);
}
.home-timeline .tl-item {
  position: relative;
  padding: 0 0 36px;
}
.home-timeline .tl-item:last-child { padding-bottom: 0; }
.home-timeline .tl-dot {
  position: absolute;
  left: -35px;
  top: 4px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--forest);
  border: 2px solid var(--paper);
}
.home-timeline .tl-year {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--rust);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.home-timeline .tl-title {
  font-weight: 700;
  margin: 4px 0 2px;
}
.home-timeline .tl-title a { color: var(--ink); text-decoration: none; }
.home-timeline .tl-title a:hover { color: var(--blue); }
.home-timeline .tl-desc {
  color: var(--muted);
  font-size: 0.92rem;
  margin: 0;
}

/* ── Minor timeline node ── */
.home-timeline .tl-item.minor { padding-bottom: 28px; }
.home-timeline .tl-item.minor .tl-dot {
  width: 8px; height: 8px;
  left: -33px; top: 5px;
  background: var(--muted);
  border-color: var(--paper);
}
.home-timeline .tl-item.minor .tl-title { font-size: 0.88rem; font-weight: 600; }
.home-timeline .tl-item.minor .tl-desc { font-size: 0.84rem; }

/* ── Footer ── */
.site-footer {
  border-top: 1px solid var(--line);
  padding: 32px 0;
  color: var(--muted);
  font-size: 0.9rem;
}
.site-footer .container {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.site-footer a { color: var(--muted); }

/* ── Card with gradient image ── */
.card-image-wrap {
  position: relative;
  height: 180px;
  overflow: hidden;
}
.card-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}
.card-image-wrap::after {
  content: "";
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 70px;
  background: linear-gradient(to top, var(--white) 0%, transparent 100%);
  pointer-events: none;
}

/* ── Project hero with background image ── */
.hero-img {
  background-size: cover;
  background-position: center;
}
.hero-img::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(15, 30, 22, 0.58);
  backdrop-filter: blur(4px);
}

/* ── Pilot cities layout ── */
.pilot-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin: 28px 0;
  align-items: start;
}
.city-list { list-style: none; padding: 0; margin: 0; }
.city-list li {
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
  font-size: 0.95rem;
}
.city-list li:last-child { border-bottom: 0; }
.city-list .city-name { font-weight: 700; }
.city-list .city-info { color: var(--muted); font-size: 0.88rem; }
#china-map {
  width: 100%;
  height: 420px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f0f4f8;
}

/* ── Vertical data boxes ── */
.data-stack {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin: 26px 0;
}

/* ── Responsive ── */
@media (max-width: 920px) {
  .projects-grid,
  .article-layout,
  .about-grid,
  .method-grid,
  .result-grid,
  .figure-grid,
  .artifact-list { grid-template-columns: 1fr; }

  .toc {
    position: static;
    border-left: 0;
    border-top: 3px solid var(--forest);
    padding: 14px 0 0;
    margin-bottom: 32px;
  }
  .about-sidebar { position: static; }
  .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 700px) {
  body { font-size: 16px; }
  .nav {
    width: min(100% - 28px, 1120px);
    min-height: 56px;
    flex-direction: column;
    align-items: flex-start;
    padding: 12px 0;
    gap: 6px;
  }
  .nav-links { gap: 12px; }
  .hero { min-height: 440px; }
  .hero-content { width: min(100% - 28px, 1120px); padding: 100px 0 56px; }
  .hero h1 { font-size: 2.4rem; }
  .section { padding: 52px 0; }
  .section-heading h2,
  .article h2 { font-size: 1.6rem; }
  .kpi-grid { grid-template-columns: 1fr; }
  .data-table { display: block; overflow-x: auto; white-space: nowrap; }
  .container,
  .hero-content { width: min(100% - 28px, 1120px); }
}


/* ── Genealogy custom layer ── */
:root {
  --gene-paper-warm: #fbfbf8;
}
body { background: var(--paper); }
.lang-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 34px;
  padding: 4px 14px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--white);
  color: var(--ink);
  font-size: 0.84rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.lang-toggle:hover { border-color: var(--rust); color: var(--rust); }
.view { display: none; }
.view.active { display: block; }
.hero.compact { min-height: 0; display: block; }
.hero.compact .hero-content { padding: var(--hero-pad-top) 0 var(--hero-pad-bottom); }
@media (max-width: 700px) { .hero.compact .hero-content { padding-top: var(--hero-pad-top-mobile); } }
.hero .meta-line {
  display:flex; flex-wrap:wrap; gap:8px;
  margin-top:24px;
}
.hero .meta-line:empty { display:none; }
/* ── homepage hero unified to the IR course homepage (width + type scale) ── */
.hero.compact .breadcrumb { font-size: 0.86rem; color: rgba(255,255,255,.66); margin: 0 0 18px; }
.hero.compact .breadcrumb a { color: rgba(255,255,255,.86); }
.hero.compact .eyebrow { font-size: 0.78rem; }
.hero.compact h1 { font-size: 2.9rem; line-height: 1.1; max-width: 900px; }
.hero.compact #heroLead { max-width: 760px; font-size: 1.05rem; }
@media (max-width: 700px) { .hero.compact h1 { font-size: 2.1rem; } }
.meta-pill {
  display:inline-flex;
  align-items:center;
  min-height:28px;
  padding:3px 10px;
  border:1px solid rgba(255,255,255,.35);
  border-radius:8px;
  color:rgba(255,255,255,.84);
  font-size:.78rem;
  font-weight:700;
}
.overview-grid {
  display:grid;
  grid-template-columns: 1.1fr .9fr;
  gap: 26px;
  align-items:start;
}
.reading-card {
  border:1px solid var(--line);
  background:var(--white);
  border-radius:8px;
  padding:22px;
  box-shadow:0 8px 24px rgba(23,33,29,.05);
}
.reading-card h3 {
  margin:0 0 10px;
  font-family: Georgia, "Times New Roman", serif;
  font-weight:500;
  font-size:1.35rem;
}
.reading-card p { color:var(--muted); margin:10px 0; }
.reading-card p:empty { display:none; }
.tree-shell {
  margin-top: 26px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(rgba(255,255,255,.82), rgba(255,255,255,.82)),
    linear-gradient(rgba(217,223,216,.55) 1px, transparent 1px),
    linear-gradient(90deg, rgba(217,223,216,.45) 1px, transparent 1px);
  background-size: auto, 34px 34px, 34px 34px;
  overflow: auto;
  box-shadow: inset 0 0 60px rgba(23,33,29,.04);
}
.tree-canvas {
  position: relative;
  min-width: 2400px;
  height: 2250px;
}
#treeSvg {
  position:absolute; inset:0;
  width:100%; height:100%;
  z-index:1;
}
.tl-rail {
  position:absolute;
  left:90px;
  top:70px;
  bottom:80px;
  border-left:2px solid var(--line);
  z-index:1;
}
.tl-label {
  position:absolute;
  left:22px;
  width:120px;
  transform:translateY(-50%);
  color:var(--rust);
  font-weight:700;
  font-size:.78rem;
  letter-spacing:.03em;
}
.g-node {
  position:absolute;
  width:176px;
  transform:translate(-50%, -50%);
  z-index:3;
  border:1px solid var(--line);
  background:var(--white);
  border-radius:8px;
  padding:12px 14px;
  box-shadow:0 10px 24px rgba(23,33,29,.08);
  cursor:pointer;
  transition:transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
}
.g-node:hover {
  transform:translate(-50%, -50%) translateY(-3px);
  box-shadow:var(--shadow);
  border-color:rgba(154,87,55,.55);
}
.g-node.trunk { border-left:4px solid var(--forest); }
.g-node.left { border-left:4px solid var(--blue); }

  <script id="payload" type="application/json">{"nodes":[{"id":"what-is","trunk":"para","x":0,"y":0,"era":{"zh":"导论","en":"Intro"},"title":{"zh":"什么是政治人类学","en":"What Is Political Anthropology"},"tag":{"zh":"整体论 · 田野民族志 · 折射式对照","en":"holism · ethnography · refractive comparison"},"core":{"zh":["政治人类学是一个跨学科领域，用人类学的理论与方法研究政治与人类社会的关系，关注政治权力、行为、组织和制度在不同文化与社会环境中的形成、演变和影响。","它有四个关键特征：不严格区分“社会”与“政治”的整体论（holism）取向；对权力、权威、现代性与自我（自反性 reflexivity）等根本问题的关怀；以田野民族志为核心的方法；以及偏向小型社会、地方政治的研究取向，用对小范围的聚焦来折射式地审视更大的问题。","整体论的含义在于：政治人类学最初研究的地方往往没有国家、政府，家族、亲属关系和宗教仪式承担着维持社会秩序、分配资源、做出共同体决策的功能。政治因此被理解为人们修改、维系社会一般规则的活动，而不只是国家机器的运转。"],"en":["Political anthropology is an interdisciplinary field that uses anthropological theory and method to study the relationship between politics and human society, focusing on how political power, behavior, organization, and institutions form, evolve, and act across cultures and social settings.","It has four key features: a holistic orientation that does not sharply separate “the social” from “the political”; a concern with fundamental questions of power, authority, modernity, and the self (reflexivity); a method centered on ethnographic fieldwork; and an orientation toward small-scale societies and local politics, using a tight focus on the small to refract larger questions.","Holism means that the societies political anthropology first studied often had no state or government; kinship, lineage, and ritual carried the functions of maintaining order, allocating resources, and making collective decisions. Politics is therefore understood as the activity of revising and maintaining the general rules of social life, beyond the work of a state machine."]},"relation":{"zh":"这是范式线的树干。政治人类学的整体论与田野方法，奠定了它后来对进化论、结构功能主义、过程论乃至后殖民批判的回应方式。","en":"This is the trunk of the paradigm axis. Holism and fieldwork set up how political anthropology would later respond to evolutionism, structural functionalism, processualism, and postcolonial critique."},"works":{"zh":["Steven Gregory（1998）对“政治”的定义：人们协商权力关系的各种社会实践","《非洲的政治制度》（Fortes & Evans-Pritchard, 1940）"],"en":["Steven Gregory (1998): politics as the social practices through which people negotiate power relations","African Political Systems (Fortes & Evans-Pritchard, 1940)"]},"strengths":{"zh":["把政治放回完整的社会与文化语境，避免只盯着正式国家机构。","以田野和文化比较为方法，强调研究者视角的切换与自我反思。"],"en":["Returns politics to the full social and cultural context instead of fixating on formal state institutions.","Uses fieldwork and cross-cultural comparison, stressing the shift of the researcher’s standpoint and self-reflection."]},"limits":{"zh":["小型社会取向使它在面对大规模现代国家时方法受限。","整体论若被推到极端，容易把一切都说成“功能”，失去具体机制。"],"en":["The small-scale orientation limits its methods when facing large modern states.","Pushed to an extreme, holism risks calling everything a “function” and losing concrete mechanism."]},"personal":{"zh":["折射式对照是这门课最核心的方法论提醒：研究一个村落或仪式，目的不是村落本身，而是借它照见权力、现代性这些更大的问题。"],"en":["Refractive comparison is the course’s central methodological reminder: studying a village or ritual is not about the village itself, but about using it to illuminate larger questions of power and modernity."]},"reflection":{"zh":["原笔记强调政治人类学“不主要依赖文献”，这抓住了民族志田野的核心，但若表述为方法边界则过窄。历史人类学、殖民档案研究、法律人类学、发展研究和后殖民研究都大量使用档案、政策文本、传教士记录、法院材料与口述史。更准确的说法是：政治人类学不把文献视为唯一材料，而是把文献、田野观察、访谈和历史语境共同放进关系网络中解释。","“研究小型社会/低政治”也应被理解为学科形成史上的方法取向，而不是今天政治人类学的对象边界。现在的政治人类学同样研究国家、资本主义、官僚制、边疆、国际组织与全球治理，只是常常从地方场景进入这些大问题。"],"en":["The note says political anthropology “does not mainly rely on documents”. This captures the centrality of ethnographic fieldwork, but it is too narrow if taken as a boundary of method. Historical anthropology, colonial archive studies, legal anthropology, development studies, and postcolonial research all use archives, policy texts, missionary records, court files, and oral history. A more accurate statement is: political anthropology does not treat documents as the only source; it reads documents together with field observation, interviews, and historical context.","The focus on “small-scale society / low politics” should also be read as a method shaped by the field’s history, not as the present boundary of political anthropology. Political anthropologists now also study the state, capitalism, bureaucracy, frontiers, international organizations, and global governance, often by entering these large questions through local sites."]},"noteSection":"第一周 9月6日 导论","noteBlocks":[{"kind":"p","text":"政治人类学是一个跨学科的领域，以人类学的理论与方法旨在研究政治与人类社会之间的关系。它主要关注政治权力、行为、组织和制度在不同文化和社会环境中的形成、演变和影响。"},{"kind":"p","text":"关键特征：1) “社会”与“政治”不做严格区分——整体论 holism；2) 对人类根本性问题的深切关怀——如何理解权力和权威在人类社会的运作、如何认识现代性、如何认识自我（自反性 reflexivity）；3) 基于田野民族志的研究方法，依靠观察、体验和参与，强调文化间的比较、文化多样性与文化相对论；4) 研究小型社会／低政治的取向，关注地方政治、社会的结构功能和民众自身历史的书写，以折射式的学术对照来审视更大范围。"},{"kind":"p","text":"史蒂文·格雷戈里（1998，第13页）：政治是指人们通过其协商权力关系的各种社会实践。政治实践既涉及社会关系的产生和运用，也涉及支持或破坏这些关系的社会意义的文化建构。"},{"kind":"p","text":"什么是整体论：政治人类学最开始研究的地方，国家、政府是不存在的，家族、亲属关系、宗教仪式等起着对应的作用，实现社会秩序、维护领土、分配权力和资源、共同体决策；当代政治仪式有与宗教相像的部分，前工业社会的宗教仪式也有政治面向。“现代国家”对很多社会来说都很新奇，没有整合、没有发展出爱国主义，可能正因为本来就没有国家传统。政治是修改、维系社会一般规则的活动。"},{"kind":"p","text":"政治镶嵌于社会中，这一观点并非政治人类学独有；理性组织是技术体系，在实际运作中不可能是封闭系统，一定受所处环境影响，正式组织一定是制度化的组织。制度化：一个组织要超越技术化手段，将历史、文化的价值判断渗入组织（文化化即制度化的过程）；制度中行为体的行为受组织之外的历史文化价值因素影响，使组织运行有了价值取向——与整体论是一回事，即文化的涵化。"},{"kind":"p","text":"政治人类学主要不依赖文献，而强调研究者与研究对象之间的接触；深度田野调查不仅是为获得翔实信息，更重要的是视角的切换——要认识自我，要了解别人、差异性。折射式的学术对照，对小范围的聚焦用以审视更大范围。"}],"noteBlocksEn":[{"kind":"p","text":"Political anthropology is an interdisciplinary field that uses anthropological theory and method to study the relationship between politics and human society, focusing on how power, behavior, organization, and institutions form, evolve, and act across different cultures and social settings."},{"kind":"p","text":"Key features: (1) holism, refusing a sharp split between 'the social' and 'the political'; (2) concern with fundamental human questions; how power and authority work, how to understand modernity, and how to understand the self (reflexivity); (3) a method grounded in ethnographic fieldwork, observation, participation, and cross-cultural comparison, with cultural relativism; (4) an orientation toward small-scale societies and local politics, using a refractive focus on the small to examine the large."},{"kind":"p","text":"Gregory (1998, p.13): politics refers to the various social practices through which people negotiate power relations. Political practice involves both the production and use of social relations and the cultural construction of social meanings that support or undermine them."},{"kind":"p","text":"Holism: the places political anthropology first studied had no state or government; family, kinship, and ritual performed the corresponding functions of maintaining order, defending territory, allocating power and resources, and making collective decisions. Modern contemporary political ritual resembles religion in part, and pre-industrial religious ritual has a political dimension. The 'modern state' is novel for many societies; the absence of integration or patriotism may simply reflect the absence of a state tradition. Politics is the activity of revising and maintaining the general rules of social life."},{"kind":"p","text":"That politics is embedded in society is not unique to political anthropology. A rational organization is a technical system that can never operate as a closed system; it is always affected by its environment, and a formal organization is always an institutionalized organization. Institutionalization means infusing an organization with historical and cultural value-judgments beyond mere technical means; cultural enculturation, which is the same point as holism."},{"kind":"p","text":"Political anthropology relies less on documents than on contact between researcher and researched. Deep fieldwork is for rich information and for a shift of standpoint: knowing the self by encountering others and difference. The refractive comparison uses a tight focus on the small to examine the large."}]},{"id":"deep-theory","trunk":"para","x":0,"y":1,"era":{"zh":"循环论 → 进化论","en":"Cycle → Evolution"},"title":{"zh":"深层社会理论的范式变迁","en":"Paradigm Shifts in Deep Social Theory"},"tag":{"zh":"循环论 · 线性进步观 · 范式（Kuhn / Foucault）","en":"cyclical view · linear progress · paradigm (Kuhn / Foucault)"},"core":{"zh":["政治人类学范式的变迁，是更深层的社会理论在历史上变迁的一部分。前现代普遍是循环论；近代出现线性进步观，把社会从落后到先进分类；19 世纪进化论兴起，政治人类学正萌芽于此。","这门课用库恩（Thomas Kuhn）和福柯（Foucault）来框定“范式”概念：科学不是对真理的单线追求，而是一组组不断变化的、彼此锁合的信念，范式既定义可接受的问题，也定义可接受的答案。福柯的 episteme（知识型）是一套“认知的方式”。","由此得出两个判断：范式的转变由更大的社会—历史—经济变迁带来；具体学科的理论范式变迁，属于深层理论变迁的一部分。深层理论本身就是一套对因果的解释、一整套具有内在自洽性的意识形态。"],"en":["The shifts in political-anthropology paradigms are part of deeper historical shifts in social theory. Pre-modern thought was broadly cyclical; modernity produced a linear view of progress that ranked societies from backward to advanced; in the 19th century evolutionism rose, and political anthropology was born within it.","The course frames “paradigm” through Kuhn and Foucault: science is not a single-track pursuit of truth but a changing set of interlocking beliefs; a paradigm defines both the acceptable questions and the acceptable answers. Foucault’s episteme is a “system of knowing.”","Two conclusions follow: paradigm shifts are driven by larger social, historical, and economic change; and the shift of a single discipline’s paradigm is part of the shift of deeper theory. Deep theory is itself an account of causation; a self-consistent ideology."]},"relation":{"zh":"这是范式线的元理论入口。它告诉读者：后面每一次流派更替，都不是“谁对谁错”，而是深层社会理论与社会经济条件一同变迁的产物。","en":"This is the meta-theoretical gateway of the paradigm axis. It tells the reader that each later turn is not “who is right”, but a product of deep social theory shifting together with socioeconomic conditions."},"works":{"zh":["Thomas Kuhn，《科学革命的结构》：paradigm 概念","Michel Foucault，《知识考古学》：episteme"],"en":["Thomas Kuhn, The Structure of Scientific Revolutions: the concept of paradigm","Michel Foucault, The Archaeology of Knowledge: episteme"]},"strengths":{"zh":["把学科史放进社会理论史，避免把流派更替读成简单的对错纠正。","用库恩与福柯提供了一种反辉格史观的视角。"],"en":["Places disciplinary history inside the history of social theory, avoiding a reading of schools as simple error-correction.","Offers an anti-Whig perspective via Kuhn and Foucault."]},"limits":{"zh":["若把“一切都是范式/意识形态”推到极端，会滑向相对主义，难以判断哪些经验主张确实被证伪。","库恩与福柯的框架本身也有内部争论，不宜当作定论使用。"],"en":["Pushed to an extreme, “everything is a paradigm/ideology” slides into relativism and makes it hard to say which empirical claims were genuinely falsified.","The Kuhn and Foucault frameworks are themselves internally contested and should not be used as settled doctrine."]},"personal":{"zh":["把范式变迁挂在社会经济变迁上，是这门课的核心解释策略；但要小心：这种“深层理论决定论”本身也是一种范式，需要为反例留出空间。"],"en":["Hanging paradigm shifts on socioeconomic change is the course’s core explanatory strategy; but beware that this “deep-theory determinism” is itself a paradigm and must leave room for counter-cases."]},"reflection":{"zh":["把范式更替完全归因于“更大的社会—历史—经济变迁”，是一种强结构决定论。科学社会学内部对此有争论：默顿传统强调学科内部的规范与竞争，拉图尔等行动者网络理论强调具体实验室、仪器与人际网络的偶然性。更稳妥的表述是：社会经济条件提供了约束与机会，但范式内部的经验异常、关键人物与制度竞争同样是变迁的原因，二者是交互而非单向决定。","把库恩的 paradigm 与福柯的 episteme 直接等同也需谨慎：库恩谈的是科学共同体的具体范例与常规科学，福柯谈的是某一历史时期一切知识的隐性条件，二者的尺度与对象并不完全一致。"],"en":["Attributing paradigm change entirely to “larger social-historical-economic change” is strong structural determinism. The sociology of science contests this: the Mertonian tradition stresses intra-disciplinary norms and competition, while actor-network theory (Latour) stresses the contingency of specific labs, instruments, and human networks. A safer formulation: socioeconomic conditions provide constraints and opportunities, but empirical anomalies, key figures, and institutional competition inside a paradigm are equally causes; the relation is interactive, not one-way.","Equating Kuhn’s paradigm with Foucault’s episteme also needs care: Kuhn means the concrete exemplars and normal science of a scientific community, whereas Foucault means the hidden conditions of all knowledge in a historical period. Their scale and object are not identical."]},"noteSection":"第一周 9月6日 / 第二周 9月13日","noteBlocks":[{"kind":"p","text":"政治人类学是怎么产生的、具体研究什么——其发展、范式的变迁，是深层的社会理论在历史上变迁的一部分。"},{"kind":"p","text":"深层理论范式的变迁：循环论（前现代）→ 线性进步观 → 进化论 → 结构功能主义 → 过程论。线性进步观之前一般为循环论，落后到先进的分类。"},{"kind":"p","text":"Thomas Kuhn：科学并不是对真理的追求，而是在不断变化中的一组组信念，范式定义了要问什么问题，也定义了答案。Paradigm：a set of interlocking ideas that define questions and answers that are acceptable。"},{"kind":"p","text":"福柯：episteme，the science of knowing，a system of knowing。"},{"kind":"p","text":"1）范式的转变由更大的社会历史经济变迁带来；2）具体学科理论范式的转变属于深层理论变迁的一部分。深层理论本身就是意识形态，对因果的解释，不同的对事物之间变化关系的看法，但都是一整套意识形态，内在具有自洽性。《知识考古学》。"}],"noteBlocksEn":[{"kind":"p","text":"How political anthropology arose and what it studies; its development and paradigm shifts are part of the historical shifts of deep social theory."},{"kind":"p","text":"Deep paradigm shifts: cyclical view (pre-modern) → linear progress → evolutionism → structural functionalism → processualism. Before the linear view of progress, thought was generally cyclical, classifying societies from backward to advanced."},{"kind":"p","text":"Kuhn: science is not a pursuit of truth but a changing set of interlocking beliefs; a paradigm defines which questions and which answers are acceptable."},{"kind":"p","text":"Foucault: episteme, a system of knowing."},{"kind":"p","text":"(1) Paradigm shifts are brought about by larger social-historical-economic change; (2) the shift of a discipline's paradigm is part of the shift of deeper theory. Deep theory is itself an ideology; an account of causation, internally self-consistent (The Archaeology of Knowledge)."}]},{"id":"evolutionism","trunk":"para","x":-1.4,"y":2.1,"era":{"zh":"19c","en":"19c"},"title":{"zh":"进化论","en":"Evolutionism"},"tag":{"zh":"梅因 · 摩尔根 · 蒙昧—野蛮—文明","en":"Maine · Morgan · savagery–barbarism–civilization"},"core":{"zh":["19 世纪左右，进化论成为政治人类学萌芽的母体。它原本认为没有国家的社会就没有文明。梅因《古代法》提出质疑：完全蒙昧的社会连禁忌也没有，禁忌是法律最初的胚胎，是文明初步的标志。","摩尔根《古代社会》受孟德斯鸠分类法启发，建立人类生活的三阶段顺序：蒙昧（没有禁忌）→ 野蛮（治理主要依靠暴力而非软性冲突管理）→ 文明。摩尔根的图式后来成为恩格斯和马克思主义的思想资源之一，影响其国家理论，并经由苏联化为社会主义五阶段进化论。","课后补充：19 世纪进化论之后，美国人类学内部出现了两条重要分支。博厄斯（Franz Boas）的历史特殊论与文化相对主义反对把各文化放进一条单线等级序列，强调每个文化都有自己的历史路径；怀特（Leslie White）和斯图尔特（Julian Steward）则在 20 世纪中叶发展新进化论/文化生态学，把技术、能量利用、生态适应与社会复杂化联系起来。新进化论并不等于回到摩尔根式单线进步论，而是在比较中寻找有条件的、非线性的规律。","课后补充：萨林斯（Marshall Sahlins）、塞维斯（Elman Service）和弗里德（Morton Fried）把“游群—部落—酋邦—国家”等类型用于前工业政治制度分类。这套类型学在国家起源研究中很有用，但应被当作理想型，而不是所有社会都必经的阶梯。"],"en":["Around the 19th century, evolutionism was the matrix in which political anthropology was born. It originally held that a society without a state had no civilization. Maine’s Ancient Law challenged this: a fully savage society would lack even taboo, and taboo is the earliest embryo of law, the first mark of civilization.","Morgan’s Ancient Society, inspired by Montesquieu’s typology, built a three-stage sequence of human life: savagery (no taboo) → barbarism (governance by force rather than soft conflict management) → civilization. Morgan’s scheme later became one of the intellectual sources for Engels and Marxism, shaping the theory of the state, and through the USSR became the five-stage evolutionary scheme of socialism.","Post-class supplement: after 19th-century evolutionism, American anthropology developed two important lines. Franz Boas’s historical particularism and cultural relativism rejected placing cultures on one single ranked ladder and stressed that each culture has its own historical path. Leslie White and Julian Steward later developed neo-evolutionism / cultural ecology, linking technology, energy use, ecological adaptation, and social complexity. Neo-evolutionism is not simply a return to Morgan’s unilineal progress; it looks for conditional and non-linear patterns through comparison.","Post-class supplement: Marshall Sahlins, Elman Service, and Morton Fried used types such as “band–tribe–chiefdom–state” to classify pre-industrial political systems. This typology is useful for studying state origins, but it should be treated as a set of ideal types, not as a ladder every society must climb."]},"relation":{"zh":"进化论是政治人类学的起点，也是后来结构功能主义、过程论要反对的对象：它的单线进步与西方优越预设，正是 20 世纪人类学反思的靶子。","en":"Evolutionism is both the starting point of political anthropology and the target later schools react against: its single-line progress and assumption of Western superiority are exactly what 20th-century anthropology came to question."},"works":{"zh":["Henry Maine，《古代法》（Ancient Law, 1861）","Lewis H. Morgan，《古代社会》（Ancient Society, 1877）","Engels，《家庭、私有制与国家起源》（受摩尔根影响）","Franz Boas：历史特殊论、文化相对主义","Leslie White / Julian Steward：新进化论与文化生态学","Marshall Sahlins / Elman Service / Morton Fried：前工业政治制度分类"],"en":["Henry Maine, Ancient Law (1861)","Lewis H. Morgan, Ancient Society (1877)","Engels, The Origin of the Family, Private Property and the State (influenced by Morgan)","Franz Boas: historical particularism and cultural relativism","Leslie White / Julian Steward: neo-evolutionism and cultural ecology","Marshall Sahlins / Elman Service / Morton Fried: typologies of pre-industrial political systems"]},"strengths":{"zh":["第一次把政治制度纳入跨文化、长时段的系统比较。","梅因关于“禁忌即法律胚胎”的洞见，至今对法律人类学有价值。"],"en":["For the first time placed political institutions in systematic cross-cultural, long-run comparison.","Maine’s insight that taboo is the embryo of law still matters for legal anthropology."]},"limits":{"zh":["单线进化预设社会必然从“落后”走向“先进”，带有强烈西方中心与殖民色彩。","“蒙昧阶段没有禁忌”是一种想象出的、对东方的推测，与考古证据相矛盾。"],"en":["Single-line evolution assumes societies must move from “backward” to “advanced”, carrying strong Eurocentric and colonial bias.","The claim that “the savage stage had no taboo” is an imagined speculation about the East, contradicted by archaeology."]},"personal":{"zh":["进化论的真正遗产是双面的：它既提供了比较政治制度的第一个框架，又把“没有国家＝没有文明”的偏见制度化，成为殖民知识的一部分。"],"en":["Evolutionism’s real legacy is double-edged: it gave the first framework for comparing political institutions, yet it institutionalized the prejudice that “no state means no civilization” as part of colonial knowledge."]},"reflection":{"zh":["原笔记把“蒙昧阶段没有禁忌”直接判为“错误的、东方之的推测、偏见想法”。这一判断方向正确，但需要更精细：摩尔根的具体经验排序（如某些亲属制度的演化次序）确实被后来的考古与民族志证伪，但他对“技术—生产方式—社会组织相互关联”的整体直觉，反而被后来的新进化论（怀特、斯图尔特）和文化生态学部分继承并改造。把摩尔根整体当作“偏见”会遮蔽这一连续性。","更公允的表述是：进化论的“单线、目的论、西方为顶点”的框架应被批判，但其“制度可比较、可放入时间序列”的方法论冲动，是政治人类学得以成立的前提。批判进化论不等于否定一切阶段性比较。","原笔记中“萨林斯（David Graeber）”一处应更正为 Marshall Sahlins；David Graeber 是另一位人类学家，与《人类新史》等有关。这个小错误值得保留在课后反思中，因为它会影响读者对新进化论谱系的理解。","新进化论也不宜被简单归入旧式进化论。怀特、斯图尔特、萨林斯、塞维斯、弗里德都保留比较与类型学，但他们已经比摩尔根更重视生态条件、能量、技术和具体历史路径。"],"en":["The original note flags “the savage stage had no taboo” as “an erroneous, Orientalist speculation, a prejudice”. The direction is right but needs refinement: Morgan’s specific empirical orderings (e.g., the evolutionary sequence of certain kinship systems) were indeed falsified by later archaeology and ethnography, yet his holistic intuition that “technology, mode of production, and social organization are interlinked” was partly inherited and reworked by later neo-evolutionism (White, Steward) and cultural ecology. Treating Morgan wholesale as “prejudice” obscures this continuity.","A fairer statement: the “single-line, teleological, West-as-summit” frame of evolutionism deserves critique, but its methodological impulse; that institutions can be compared and placed in a temporal sequence; is the very precondition of political anthropology. Criticizing evolutionism is not the same as rejecting all staged comparison.","The original note’s “Sahlins (David Graeber)” should be corrected to Marshall Sahlins. David Graeber is another anthropologist, known for work such as The Dawn of Everything. This small correction matters because it changes how readers understand the genealogy of neo-evolutionism.","Neo-evolutionism should not be folded back into old evolutionism. White, Steward, Sahlins, Service, and Fried kept comparison and typology, but they paid much more attention than Morgan did to ecology, energy, technology, and specific historical paths."]},"noteSection":"第二周 9月13日 进化论","noteBlocks":[{"kind":"p","text":"进化论——政治人类学的萌芽正在这个时期，19c左右；原本认为没有国家的社会没有文明，梅因《古代法》提出质疑，完全蒙昧的社会是连禁忌也没有的，禁忌部分是法律的原初的胚胎，禁忌就是文明初步的标志。"},{"kind":"p","text":"摩尔根《古代社会》受到孟德斯鸠分类法的启发，建立人生活的三个阶段顺序：蒙昧阶段（没有禁忌）→野蛮（社会运行、治理主要依靠暴力而非软性的冲突管理方式）→文明。"},{"kind":"p","text":"（原笔记按语）这是假想出的、对东方的推测，是错误的；考古学证明，人类社会一开始就有禁忌了，认为原始社会处于蒙昧阶段是偏见想法。"},{"kind":"p","text":"摩尔根影响了恩格斯，是马克思主义的思想资源之一，影响其国家理论；苏联据此构建社会主义的五阶段进化论。"},{"kind":"p","text":"在 20 世纪的政治人类学发展脉络中，美国和英法人类学家之间存在很深的鸿沟。英国人类学研究很出色，尤其曼城学派，与早期殖民需要有关，结构功能主义；美国盛行的是博厄斯的历史主义／历史特殊论／文化相对主义。Boas 是德国裔美国人类学家，被称为美国人类学之父，他的学生包括 Edward Sapir、Margaret Mead、Ruth Benedict。Boas 反对系统的比较方法和进化论。"},{"kind":"p","text":"随着 Leslie White 和 Julian Steward 发表一系列进化论著作，一种新进化论思潮在美国流行起来，走向生态学和唯物论的思路，认为政治进化的基本法则是技术提高和能量投入，进化遵照着集约农业到私有财产、分工、阶级进化、政治集中这样一个过程。1960 年代，怀特和斯图尔特的学生萨林斯（David Graeber）和塞维斯、Fried 又根据线性进化顺序进行政治体制分类，采用游群、部落、酋邦和国家的概念建立起一套序列。"},{"kind":"p","text":"但需要注意的是，进化实际上一定是不规则和不连续的，而非从一种进步类型到更进步类型的直线发展。某形态不一定引发下一个阶段，所以现在仍有很多社会停留在部落和酋邦阶段。一般进化和特殊进化的概念，主张文化有一个一般进化过程，但也有许多具体情况，目的是在各种文化差异中看到有规律的共性，并分辨其时间和功能上的因果关系、规律和通则。酋邦概念在国内常被认为不适用，因为很难和中国考古一一对号入座；这反映了规律性学科和史学研究之间的差异。历史是对时空关联事件的叙述，进化是根据时间序列研究功能上相关形态的转变。"}],"noteBlocksEn":[{"kind":"p","text":"Evolutionism; political anthropology germinated here, around the 19th century. It originally held that societies without a state had no civilization. Maine's Ancient Law challenged this: a fully savage society lacks even taboo, and taboo is the embryo of law, the first mark of civilization."},{"kind":"p","text":"Morgan's Ancient Society, inspired by Montesquieu's typology, built a three-stage sequence: savagery (no taboo) → barbarism (governance mainly by force rather than soft conflict management) → civilization."},{"kind":"p","text":"(Original marginal note) This is an imagined, Orientalist speculation and is mistaken; archaeology shows human society had taboo from the start, and treating early society as a 'savage stage' is a prejudice."},{"kind":"p","text":"Morgan influenced Engels and is one source of Marxism, shaping its theory of the state; the USSR built from it the five-stage evolutionary scheme of socialism."},{"kind":"p","text":"In the twentieth-century development of political anthropology, there was a deep gap between American and British/French anthropology. British anthropology was strong, especially the Manchester School, and was tied to early colonial needs and structural functionalism. In the United States, Boas's historicism / historical particularism / cultural relativism was dominant. Boas was a German-born American anthropologist, often called the father of American anthropology. His students included Edward Sapir, Margaret Mead, and Ruth Benedict. Boas opposed systematic comparison and evolutionism."},{"kind":"p","text":"As Leslie White and Julian Steward published a series of evolutionary works, a new evolutionary current became influential in the United States. It moved toward ecology and materialism, arguing that the basic law of political evolution lies in technical improvement and energy use, and that evolution moves through intensive agriculture, private property, division of labor, class formation, and political centralization. In the 1960s, students of White and Steward; Sahlins (David Graeber), Service, and Fried; classified political systems through a linear evolutionary sequence and used the concepts band, tribe, chiefdom, and state."},{"kind":"p","text":"But evolution is necessarily irregular and discontinuous, not a straight line from one more “advanced” type to the next. A form does not always produce the next stage, which is why many societies today remain tribal or chiefdom-like. The concepts of general evolution and specific evolution hold that cultures have a general evolutionary process but also many specific paths. The aim is to find patterned commonalities across cultural difference and to distinguish causal relations, patterns, and general rules in time and function. In China the chiefdom concept is often said not to fit, because it does not map neatly onto Chinese archaeology; this reflects the difference between a rule-seeking discipline and historical narrative. History narrates events linked in time and space; evolution studies the transformation of functionally related forms through time."}]},{"id":"structfunc","trunk":"para","x":0,"y":3.0,"era":{"zh":"一战后","en":"Post-WWI"},"title":{"zh":"结构功能主义","en":"Structural Functionalism"},"tag":{"zh":"功能对照 · 无国家治理 · 《非洲的政治制度》","en":"functional analogy · stateless governance · African Political Systems"},"core":{"zh":["一战后，许多西方人类学家认识到西方的理性与文明优越并没有那么强，结构功能主义逐渐取代进化论。它的核心判断是：人类社会要解决的问题是类似的，只是用不同方式解决，因此不能对其他社会抱有优越感。","方法上，它追问某一现象在体系中承担什么功能、在另一个社会对应什么现象。部落的炫耀仪式在功能上部分类似现代国家的阅兵。《非洲的政治制度》是现代人类学的集大成之作，研究在没有现代政府时，人们如何管理较大人口规模的社会。","课后补充：结构功能主义的基本假设是把社会理解为由相互关联的制度组成的整体，某一制度的意义要从它对社会秩序、整合与再生产的功能中理解。拉德克利夫-布朗更强调社会结构及其维持，马林诺夫斯基更强调制度如何满足人的需要；政治人类学中的“分支谱系/段系”（segmentary lineage）、无国家社会的秩序、仪式的整合功能，都与这一范式密切相关。"],"en":["After World War I, many Western anthropologists realized that Western rational and civilizational superiority was not so strong, and structural functionalism gradually replaced evolutionism. Its core claim: human societies face similar problems and merely solve them differently, so one cannot feel superior to other societies.","Methodologically it asks what function a phenomenon performs in a system and what it corresponds to in another society. A tribe’s display ritual is functionally akin in part to a modern state’s military parade. African Political Systems is a landmark of modern anthropology, studying how people govern populous societies without a modern government.","Post-class supplement: structural functionalism treats society as a whole made of interrelated institutions. The meaning of an institution is understood through its function in social order, integration, and reproduction. Radcliffe-Brown stresses social structure and its maintenance; Malinowski stresses how institutions meet human needs. In political anthropology, segmentary lineage, order in stateless societies, and the integrative function of ritual are closely tied to this paradigm."]},"relation":{"zh":"结构功能主义是对进化论西方中心的纠正，但它的“系统维持”取向又会被过程论批评为太静态、无法解释冲突与变迁。","en":"Structural functionalism corrects the Eurocentrism of evolutionism, but its “system-maintenance” orientation is later criticized by processualism as too static to explain conflict and change."},"works":{"zh":["Fortes & Evans-Pritchard 编，《非洲的政治制度》（1940）","Radcliffe-Brown / Malinowski 的功能主义传统"],"en":["Fortes & Evans-Pritchard (eds.), African Political Systems (1940)","The functionalist tradition of Radcliffe-Brown / Malinowski"]},"strengths":{"zh":["以平等态度对待异文化，为跨文化比较奠定伦理与方法基础。","揭示了无国家社会如何通过亲属、仪式维持秩序。"],"en":["Treats other cultures as equals, grounding the ethics and method of cross-cultural comparison.","Shows how stateless societies maintain order through kinship and ritual."]},"limits":{"zh":["偏向系统平衡与稳定，难以解释内部冲突、权力不平等与历史变迁。","功能对照容易变成事后贴标签，缺乏因果机制。"],"en":["Biased toward equilibrium and stability, it struggles to explain internal conflict, inequality, and historical change.","Functional analogy can become post-hoc labeling without causal mechanism."]},"personal":{"zh":["结构功能主义最有价值的是它的“反优越感”伦理：在判断别人的制度有没有用之前，先问它在自己语境里做了什么。"],"en":["The most valuable thing in structural functionalism is its anti-superiority ethic: before judging whether another’s institution “works”, first ask what it does in its own context."]},"reflection":{"zh":["原笔记把结构功能主义说成是一战后对西方文明优越感的反思，这一解释有道理，但不完整。英国结构功能主义也深受殖民治理场景影响：许多关于非洲政治制度、亲属制度、法律与秩序的研究，确实为殖民政府理解和管理当地社会提供了知识。也就是说，它既有反进化论、反优越感的一面，也嵌在殖民知识生产之中。","“部落炫耀仪式功能上类似现代国家阅兵”是有启发的功能类比，但需要避免把不同制度的历史语境抹平。类比只能说明它们都可能整合集体、展示权威，不能推出二者的意义、暴力技术和国家能力相同。"],"en":["The note explains structural functionalism as a post-WWI reflection on Western civilizational superiority. This is reasonable but incomplete. British structural functionalism was also shaped by colonial administration: many studies of African political systems, kinship, law, and order supplied knowledge that helped colonial governments understand and manage local societies. It was both anti-evolutionist / anti-superiority and part of colonial knowledge production.","The analogy between tribal display rituals and modern military parades is useful, but it should not erase historical context. The analogy can show that both may integrate a group and display authority; it does not mean they have the same meaning, techniques of violence, or state capacity."]},"noteSection":"第二周 9月13日 结构功能主义","noteBlocks":[{"kind":"p","text":"一战后，很多西方人类学家认识到西方国家的理性、文明优越没有那么强，结构功能主义逐渐取代了进化论；认识到人类社会想解决的问题是类似的，只是在运用不同的方式解决，不能对其他社会抱有优越感。"},{"kind":"p","text":"部落中的炫耀仪式，功能上部分就类似于现代国家的阅兵；一个体系中的某现象，在另一个社会对应什么现象，如何在体系中各自发挥作用。《非洲的政治制度》，现代人类学集大成，在没有现代政府时，人们如何管理有较大人口规模的社会。"}],"noteBlocksEn":[{"kind":"p","text":"After WWI, many Western anthropologists realized that Western rational and civilizational superiority was not so strong; structural functionalism gradually replaced evolutionism. They recognized that human societies face similar problems and merely solve them differently, so one should not feel superior to other societies."},{"kind":"p","text":"A tribe's display ritual is functionally similar in part to a modern state's military parade. One asks what a phenomenon in one system corresponds to in another, and how each functions in its system. African Political Systems, a landmark of modern anthropology, asks how people govern large populations without a modern government."}]},{"id":"processual","trunk":"para","x":0,"y":4.0,"era":{"zh":"二战后","en":"Post-WWII"},"title":{"zh":"过程论","en":"Processualism"},"tag":{"zh":"动态均衡 · 冲突 · 《缅甸高地的政治体系》","en":"dynamic equilibrium · conflict · Political Systems of Highland Burma"},"core":{"zh":["过程论与二战及之后殖民体系解体相关。前殖民地要发展成现代民族国家，对当地社会是巨大冲击，要求居民适应现代国家与现代化。此时结构功能主义的静态平衡已不能很好解释，研究逐步转向过程论，以利奇《缅甸高地的政治体系》问世为标志。","过程论认为社会内部的平衡是动态的、很容易被打破。社会中存在政治权力的不平等，相对弱势的群体会试图挑战既得利益者；长期看可能是均衡的，但拿出任一小段时间，往往充满冲突。","课后补充：过程论/行动论不仅来自去殖民化背景，也与曼彻斯特学派、情境分析（situational analysis）、社会戏剧（Victor Turner）、交易与策略、边界建构（Fredrik Barth）等研究有关。它把政治看成行动者在具体情境中围绕资源、身份、联盟与规则进行策略互动的过程，而不只是结构的功能表现。"],"en":["Processualism is tied to the breakup of colonial systems during and after WWII. Former colonies were pushed to become modern nation-states, a huge shock that demanded adaptation to the modern state and modernization. The static equilibrium of structural functionalism no longer explained this well, and research turned toward processualism, marked by Leach’s Political Systems of Highland Burma.","Processualism holds that the internal balance of a society is dynamic and easily disrupted. Political power is unequal; relatively weaker groups try to challenge the entrenched; over the long run a society may look balanced, but any short stretch is often full of conflict.","Post-class supplement: processualism / action theory was more than a response to decolonization. It is also linked to the Manchester School, situational analysis, social drama (Victor Turner), transaction and strategy, and boundary-making (Fredrik Barth). It treats politics as a process in which actors strategically interact over resources, identities, alliances, and rules in specific situations, rather than only as the functional expression of a structure."]},"relation":{"zh":"过程论把“冲突与变迁”重新带回政治人类学，是从结构功能主义静态平衡向后来的权力—实践研究（福柯、斯科特）过渡的关键一环。","en":"Processualism brings “conflict and change” back into political anthropology and is a key bridge from the static equilibrium of structural functionalism to later power-and-practice studies (Foucault, Scott)."},"works":{"zh":["Edmund Leach，《缅甸高地的政治体系》（Political Systems of Highland Burma, 1954）","Max Gluckman 与曼彻斯特学派；Victor Turner 的社会戏剧；Fredrik Barth 的边界理论"],"en":["Edmund Leach, Political Systems of Highland Burma (1954)","Max Gluckman and the Manchester School; Victor Turner’s social drama; Fredrik Barth’s boundary theory"]},"strengths":{"zh":["把时间、冲突、权力不平等纳入分析，弥补结构功能主义的静态盲点。","与去殖民化的现实经验紧密结合。"],"en":["Brings time, conflict, and inequality into analysis, repairing the static blind spot of functionalism.","Tightly connected to the lived experience of decolonization."]},"limits":{"zh":["“动态均衡”有时仍预设系统终将回到平衡，可能低估根本性断裂。","个案依赖性强，理论的可推广性受限。"],"en":["“Dynamic equilibrium” still sometimes assumes a return to balance, possibly underestimating fundamental ruptures.","Heavily case-dependent, limiting generalization."]},"personal":{"zh":["过程论的洞见是：均衡是叙事尺度的产物。把时间窗口拉长看似稳定，拉短就看见冲突——这提醒我们“稳定”本身是一个被选择的观察框架。"],"en":["The insight of processualism is that equilibrium is an artifact of narrative scale. Long windows look stable, short ones reveal conflict; a reminder that “stability” is itself a chosen frame of observation."]},"reflection":{"zh":["原笔记把过程论的兴起主要放在二战后殖民体系解体的背景下，这抓住了历史环境，但容易把理论变迁讲成外部事件的直接结果。过程论还来自民族志内部的问题：结构功能主义很难解释冲突、裂变、联盟转换、个人策略和短期事件。利奇、格拉克曼、特纳等人正是通过具体案例指出，所谓“结构”常常是在行动过程中被临时维持、挑战和重组的。","“长期看均衡、短期看冲突”的说法有用，但也可能保留了结构功能主义的均衡预设。更开放的表达是：有些冲突被重新吸收到结构中，有些则会产生不可逆的制度断裂。"],"en":["The note places the rise of processualism mainly in the post-WWII breakup of colonial systems. This captures the historical setting, but it can make theory change look like a direct result of external events. Processualism also came from problems inside ethnography: structural functionalism struggled to explain conflict, fission, shifting alliances, personal strategy, and short-term events. Leach, Gluckman, Turner, and others showed through cases that “structure” is often temporarily maintained, challenged, and reorganized in action.","The phrase “long-term equilibrium, short-term conflict” is useful, but it may still keep a functionalist assumption of equilibrium. A more open formulation is: some conflicts are reabsorbed into structure, while others produce irreversible institutional breaks."]},"noteSection":"第二周 9月13日 过程论","noteBlocks":[{"kind":"p","text":"过程论——与二战及之后殖民主义强加的虚假繁荣的解体有关，前殖民地要去发展成现代民族国家，对当地社会是一个巨大冲击，要求居民适应现代国家、现代化，这样的情况下，结构功能主义不能再很好地解释，于是逐步到了过程论，以《缅甸高地的政治体系》问世为标志。"},{"kind":"p","text":"社会内部是平衡的，平衡是动态的、很容易被打破，社会中有政治权力不平等，相对弱势群体会试图挑战既得利益者，长期来看可能是均衡的但拿出一小部分可能都充满冲突。"}],"noteBlocksEn":[{"kind":"p","text":"Processualism is tied to the breakup of the false prosperity imposed by colonialism during and after WWII. Former colonies had to become modern nation-states; a huge shock demanding adaptation to the modern state. Structural functionalism could no longer explain this well, so research moved toward processualism, marked by Political Systems of Highland Burma."},{"kind":"p","text":"The internal balance of society is dynamic and easily broken. Political power is unequal; weaker groups challenge the entrenched. Over the long run a society may look balanced, but any short stretch can be full of conflict."}]},{"id":"power","trunk":"subst","x":3.0,"y":2.0,"era":{"zh":"第二讲","en":"Lecture 2"},"title":{"zh":"权力与政治","en":"Power and Politics"},"tag":{"zh":"资源控制 · 三种范式 · 权力四特征","en":"control over resources · three paradigms · four features of power"},"core":{"zh":["政治是人们制定、维系和修正其生活一般规则的社会活动，涉及资源的生产、分配和使用；政治的本质是权力的取得、运用和维护。人类学不像传统政治学那样把权力锁定在政府内部，而把它理解为对资源（物质性与观念性）施加控制和影响的能力。","权力有三种范式理论：韦伯的法理权力（物化论）、马克思的经济权力（工具论）、福柯的结构权力（结构论）——但课程提醒，很多议题并不适合套用福柯。","权力有四个内在特征：不对等性（不平等才是常态，绝对均衡的互惠不存在）；必要性（人口增长、亲属关系疏远带来竞争，必须有权力维持对内对外的秩序）；限制性（合法性——没有完全专断的权力，权威是披着合法性外衣的权力）；不确定性（权力始终面对挑战）。这三/四个面向又对应古希腊 polis 的三重含义：政体（government）、公共事务（policy）、竞争（politics）。"],"en":["Politics is the social activity of making, maintaining, and revising the general rules of life, involving the production, distribution, and use of resources; its essence is the acquisition, exercise, and preservation of power. Unlike traditional political science, which locates power inside government, anthropology understands it as the ability to control and influence resources; both material and ideational.","Three paradigms of power: Weber’s legal-rational power (a “thing-like” view), Marx’s economic power (an instrumental view), and Foucault’s structural power; though the course warns that many topics do not fit Foucault.","Power has four intrinsic features: asymmetry (inequality is the norm; perfectly balanced reciprocity does not exist); necessity (population growth and weakened kinship breed competition, so power is needed to maintain order, internally and externally); constraint (legitimacy; no power is wholly arbitrary; authority is power cloaked in legitimacy); and uncertainty (power always faces challenge). These map onto the triple sense of the Greek polis: government, policy, and politics."]},"relation":{"zh":"这是实质线的概念地基。后面关于不平等、酋邦、国家的所有讨论，都建立在“权力＝对资源的控制”以及权力四特征之上。","en":"This is the conceptual bedrock of the substantive axis. Everything later about inequality, chiefdom, and the state rests on “power = control over resources” and the four features of power."},"works":{"zh":["Weber：权力是社会关系中一个行为者排除阻力实现自身意志的概率","M.G. Smith / Beattie / Nicholas 等对权力的人类学定义","Hobbes：对权力的欲望无极无终，至死方休","Lucy Mair（1962）；Raymond Firth（1964）；Postero & Elinoff（2019）"],"en":["Weber: power is the probability that an actor in a social relation can carry out his own will despite resistance","Anthropological definitions of power by M.G. Smith, Beattie, Nicholas","Hobbes: the desire for power is restless, ceasing only in death","Lucy Mair (1962); Raymond Firth (1964); Postero & Elinoff (2019)"]},"strengths":{"zh":["把权力从“政府内部”扩展到一切资源控制关系，使无国家社会也可分析。","“权力四特征 + polis 三义”提供了一个紧凑、可操作的分析框架。"],"en":["Expands power from “inside government” to all resource-control relations, making stateless societies analyzable.","“Four features + the three senses of polis” provides a compact, operational framework."]},"limits":{"zh":["把权力欲望部分诉诸灵长类与进化心理，存在过度自然化的风险。","三范式（韦伯/马克思/福柯）并非互斥，硬性归类可能简化各自理论。"],"en":["Grounding the desire for power partly in primatology and evolutionary psychology risks over-naturalizing it.","The three paradigms (Weber/Marx/Foucault) are not mutually exclusive; rigid sorting can simplify each."]},"personal":{"zh":["“权威是披着合法性外衣的权力”是一句很锋利的总结，但要小心别滑成纯粹的犬儒：合法性不只是伪装，它也真实地约束统治者、改变其可行动空间。"],"en":["“Authority is power cloaked in legitimacy” is a sharp summary, but beware sliding into pure cynicism: legitimacy is more than disguise; it genuinely constrains rulers and reshapes what they can do."]},"reflection":{"zh":["笔记用马斯洛的自尊理论、猴子“追求统治力”、倭黑猩猩与黑猩猩的对比，把人对权力的欲望追溯到灵长类与进化。这种类比有启发性，但在学理上需加界限：从“灵长类存在支配等级”推不出“人类政治不平等是自然且必然的”——这是自然主义谬误（is 推 ought，事实推规范）的常见形式。倭黑猩猩恰恰提供了反例（相对平等、雌性联盟），说明灵长类社会本身就高度多样，无法支撑单一的“权力天性”结论。","更稳妥的表述：进化与生物因素提供了人类行为的某些倾向与约束，但政治不平等的具体形式、程度和合法化方式，是由生态、技术、制度与文化共同塑造的历史产物，而非生物学直接决定。"],"en":["The notes trace the human desire for power to primates and evolution via Maslow’s self-esteem theory, monkeys “seeking dominance”, and the bonobo–chimpanzee contrast. The analogy is suggestive but needs limits: from “primates have dominance hierarchies” one cannot derive “human political inequality is natural and inevitable”; a classic naturalistic fallacy (deriving ought from is). Bonobos are themselves a counter-example (relative equality, female coalitions), showing that primate societies are highly varied and cannot support a single “nature of power” conclusion.","A safer formulation: evolution and biology provide certain tendencies and constraints, but the specific form, degree, and legitimation of political inequality are historical products shaped jointly by ecology, technology, institutions, and culture, not directly determined by biology."]},"noteSection":"第二讲 政治人类学研究中的基本概念：权力与政治","noteBlocks":[{"kind":"p","text":"政治是人们制定、维系和修正其生活一般规则的社会活动，涉及到社会生活过程中资源的生产、分配和使用。政治的本质：权力的取得、运用和维护。"},{"kind":"p","text":"霍布斯：窃以为，大多数人类的欲望就是对权力的追求，无极无终，至死方休。"},{"kind":"p","text":"猿性和人性的共通之处：权力欲望。马斯洛的自尊理论，猴子“追求统治力”，人具有自尊，权力必定内在于我们的社会；从进化角度，人对统治力的追求、对资源的控制意识，在灵长类中广泛存在；倭黑猩猩与黑猩猩。"},{"kind":"p","text":"传统政治学，政治权力高度集中在政府组织内部；人类学，获得资源、控制秩序。人类学视野下“权力”的简洁定义：对资源施加控制和影响的能力。物质（material）资源：人、水源、金钱；观念性（ideational）资源：意识形态、象征、信息。"},{"kind":"p","text":"Smith：权力是指使用从说服到强制等各种手段对人和事物采取有效行动的能力。Beattie：权力是社会关系的一种特殊类别，意味着在个人之间和群体之间限制他人的可能性。Nicholas：权力是对资源的控制。Weber：社会关系中一个行为者尽管有阻力仍能执行自己意愿的概率。"},{"kind":"p","text":"关于权力的三种范式理论：韦伯——法理权力（物化论）；马克思——经济权力（工具论）；福柯——结构权力（结构论）。很多议题不适合运用福柯的理论。"},{"kind":"p","text":"权力的内在特征：不对等性（不平等广泛存在，绝对均衡的互惠不存在，不平等才是常态；二态性生物中总会广泛存在性别不平等；“初级社会相对平等”也是有等级，只是正式等级制度在早期国家形成后才显而易见）。"},{"kind":"p","text":"必要性：维持秩序（对内&对外）。Lucy Mair（1962, p.18）：There is no society where rules are automatically obeyed。社会规模超出血亲关系规范后，人口增长带来竞争、亲属关系疏远，必须有权力维持社会秩序；政治是社会关系扩大的产物；权威是披着合法性外衣的权力。努尔人的政治秩序有血统婚姻关系、部落间关系、努尔人与非努尔人等表达层次，社会系统完整性也通过外部疆域确定。"},{"kind":"p","text":"限制性：合法性。Raymond Firth（1964）：Power cannot be entirely autocratic。权力受制度环境制约，追求社会认可，必有软性管制的一面，政治权力的有效实行要合乎社会期待。"},{"kind":"p","text":"不确定性：对权力的挑战。Postero & Elinoff（2019）：Politics as a practice of world-making that proceeds through the formulation of constellations of critique, disagreement, difference, and conflict。"},{"kind":"p","text":"政治的主要方面：政体（polity）【功能】——政治源于对社会秩序的控制；公共事务管理（policy）【目的】——政治的维持依靠合法性的获取；竞争（politics）【过程】——政治也是权力斗争。古希腊 polis 对应 government、policy、politics。"}],"noteBlocksEn":[{"kind":"p","text":"Politics is the social activity of making, maintaining, and revising the general rules of life, involving the production, distribution, and use of resources. Its essence is the acquisition, exercise, and preservation of power."},{"kind":"p","text":"Hobbes: most human desire is the pursuit of power, restless and ceasing only in death."},{"kind":"p","text":"The shared ground of ape and human nature is the desire for power. Via Maslow's self-esteem theory and monkeys 'seeking dominance', the note traces the human drive for dominance and resource control to primates, contrasting bonobos and chimpanzees."},{"kind":"p","text":"Traditional political science concentrates power inside government; anthropology defines power as the ability to control and influence resources; material (people, water, money) and ideational (ideology, symbols, information)."},{"kind":"p","text":"Smith: power is effective action over people and things by means from persuasion to coercion. Beattie: power is a special category of social relations implying the possibility of constraining others. Nicholas: power is control over resources. Weber: the probability of carrying out one's will despite resistance."},{"kind":"p","text":"Three paradigms of power: Weber; legal-rational power; Marx; economic power; Foucault; structural power. Many topics do not fit Foucault."},{"kind":"p","text":"Features of power. Asymmetry: inequality is pervasive; perfectly balanced reciprocity does not exist; inequality is the norm. Early societies are not truly equal but have hierarchy that only becomes visible once formal rank appears with the early state."},{"kind":"p","text":"Necessity: maintaining order (internal and external). Lucy Mair (1962): there is no society where rules are automatically obeyed. Once population exceeds kin-norms, competition and weakened kinship require power to maintain order. Among the Nuer, political order is expressed through lineage and marriage relations, inter-tribal relations, and Nuer vs non-Nuer; system integrity is also fixed by external territory."},{"kind":"p","text":"Constraint: legitimacy. Raymond Firth (1964): power cannot be entirely autocratic. Power is constrained by its institutional environment and seeks social recognition; effective power must meet social expectations."},{"kind":"p","text":"Uncertainty: power is always challenged. Postero & Elinoff (2019): politics as a practice of world-making proceeding through constellations of critique, disagreement, difference, and conflict."},{"kind":"p","text":"Main aspects of politics: polity (function; order); policy (purpose; legitimacy); politics (process; power struggle). The Greek polis corresponds to government, policy, and politics."}]},{"id":"inequality","trunk":"subst","x":3.0,"y":3.0,"era":{"zh":"第二讲","en":"Lecture 2"},"title":{"zh":"不平等与统治支配的起源","en":"The Origins of Inequality and Domination"},"tag":{"zh":"天然属性 vs 后天身份 · 排名社会 · 庇护制","en":"ascribed vs achieved · ranked society · patron–client"},"core":{"zh":["原始社会只在个人天然属性（性别、年龄、长幼、能力）上存在不平等，这些不平等广泛存在于早期狩猎采集社会（旧石器时代，约 250 万年至 1.2 万年前）。但家庭之外，狩猎采集社会基本是互助平等的。","约 7000–8000 年前，人类进入更稳定的等级社会并延续至今。当人们从狩猎采集转入农业定居，支配统治关系开始出现，出现了天然属性之外的、由出身/血缘/谱系赋予的身份与权力（ascribed status / power，准确说是“先赋地位”，不是后天挣得的 achieved status）。酋邦发展出来时，早期国家的雏形形成，集权型政治体制出现——但此时不平等还不是“层化”，而是“排名社会”（ranked society，尚未出现真正的阶级）。","政治不平等的归因在生态环境与农业生产方式的变化，这些变化进一步导致社会分工与分配制度的变化，最终导致庇护制（patron–client）的出现——下位者为上位者提供支持、服务、劳动，后者提供保护。庇护制是人类最原始的统治／支配形式。"],"en":["In early small-scale society, inequality exists mainly along natural attributes (sex, age, seniority, ability), widespread in early hunter-gatherer societies (the Paleolithic, roughly 2.5 million to 12,000 years ago). Yet outside the family, hunter-gatherer society is basically mutual-aid and egalitarian.","Around 7,000–8,000 years ago, humans entered more stable hierarchical societies, which have persisted in many forms. As people moved from foraging to settled agriculture, relations of domination appeared, producing status and power assigned by birth, descent, or lineage (ascribed status / power; more accurately “assigned status”, not achieved status). When chiefdoms developed, the embryo of the early state formed and centralized polities appeared; but this was not yet full “stratification”; it was a “ranked society”, with no true classes yet.","Political inequality is attributed to changes in ecology and the mode of agricultural production, which in turn change the division of labor and distribution, finally producing the patron–client system: subordinates supply support, service, and labor, while superiors supply protection. Patronage is presented here as one of the earliest forms of human domination."]},"relation":{"zh":"这是从“权力”到“酋邦／国家”的过渡节点：它确立了一条因果链——生态与农业 → 社会分工 → 庇护制 → 制度化的不平等。","en":"This is the transition from “power” to “chiefdom/state”: it sets up a causal chain; ecology and agriculture → division of labor → patronage → institutionalized inequality."},"works":{"zh":["Elman Service：游群—部落—酋邦—国家序列","ascribed status / achieved status 的人类学区分"],"en":["Elman Service: the band–tribe–chiefdom–state sequence","The anthropological distinction of ascribed vs achieved status"]},"strengths":{"zh":["区分“天然不平等”与“制度化不平等”，为讨论国家起源提供清晰起点。","把庇护制识别为最早的统治形式，连接经济结构与政治支配。"],"en":["Distinguishes “natural inequality” from “institutionalized inequality”, giving a clear starting point for state origins.","Identifies patronage as the earliest form of domination, linking economic structure to political dominance."]},"limits":{"zh":["把“平等狩猎采集 → 不平等农业”讲得过于线性，近年考古（如《人类新史》）显示早期社会形态高度多样、可逆。","具体时间数字（7000–8000 年）只是粗略尺度，不应当作精确断代。"],"en":["The “egalitarian foraging → unequal agriculture” story is told too linearly; recent archaeology (e.g., The Dawn of Everything) shows early forms were highly varied and reversible.","The specific dates (7,000–8,000 years) are rough scales, not precise dating."]},"personal":{"zh":["“排名社会／层化社会”的区分很有用：它提醒我们“不平等”与“阶级”不是一回事，很多社会有等级却没有世袭的、制度化的阶级。"],"en":["The “ranked vs stratified” distinction is useful: it reminds us that “inequality” and “class” are not the same; many societies have rank without a hereditary, institutionalized class."]},"reflection":{"zh":["从狩猎采集的平等到农业定居的不平等，笔记呈现为一条较强的单线因果。近年人类学/考古学（如 Graeber & Wengrow《人类新史》）对此提出有力质疑：不少前农业社会已有显著的季节性等级，不少早期农业社会长期维持相对平等，甚至有社会在等级与平等之间反复切换。换言之，农业是不平等的“必要条件之一”更稳妥，把它当作“充分原因”则过强。","保留这条因果链作为课程的解释主轴是合理的，但应意识到它属于“进化—生态”传统的一种强假设，存在系统性的反例，不宜当作定论。","术语上需要更正：原笔记把 ascribed status/power 解释为“后天获得的身份和权力”，这与社会学/人类学常规定义相反。ascribed status 是先赋地位，通常由出生、血缘、性别、年龄、谱系或族群身份赋予；achieved status 才是通过个人努力、能力或成就获得的地位。若不更正，会把“世袭等级如何出现”这一问题讲反。"],"en":["The move from egalitarian foraging to unequal settled agriculture is presented as a fairly strong single-line causation. Recent anthropology/archaeology (e.g., Graeber & Wengrow, The Dawn of Everything) challenges this forcefully: many pre-agricultural societies already had marked seasonal hierarchy, many early agricultural societies long stayed relatively equal, and some oscillated between hierarchy and equality. It is safer to call agriculture “one necessary condition” of inequality than a “sufficient cause”.","Keeping this causal chain as the course’s explanatory spine is reasonable, but it belongs to a strong assumption of the evolutionary-ecological tradition, has systematic counter-examples, and should not be treated as settled.","The terminology needs correction: the original note glosses ascribed status/power as “acquired later”, which is the opposite of the standard sociological / anthropological usage. Ascribed status is assigned by birth, descent, sex, age, lineage, or ethnic identity; achieved status is gained through effort, ability, or accomplishment. Without this correction, the question of how hereditary hierarchy emerged is inverted."]},"noteSection":"第三周 9月20日 / 第二讲 不平等与统治支配的起源","noteBlocks":[{"kind":"p","text":"父母和子女的权威关系是无需别的什么东西来合法化的，但家庭之外就不是这样了；家庭之外的冲突调解就是原初的政治活动，即使是很小范围，也是公共权力的使用；公共组织功能就是维护秩序。调解、领导、强化既和权力的三大特性对应，也与古希腊的“政治”对应：Polis 对应 government、policy、politics。"},{"kind":"p","text":"原始社会只就个人的天然属性存在不平等，如二态性生物。早期狩猎采集社会（旧石器时代距今250万年到1.2万年前），社会规模小，没有形成绝对权力，家庭之外基本是互助平等社会。"},{"kind":"p","text":"更新世开始，1.2万年后、约7000-8000年前，人类进入等级社会并一直持续到现在；酋邦发展出来时，早期国家的雏形形成，集权型政治体制出现，但不平等不是层化的，而是排名社会（没有真正出现阶级），出现政治、经济的不平等；后来发展出贵族封建制。"},{"kind":"p","text":"人类社会的阶级不平等起源是什么（ascribed status）？领导权是怎么出现和演化的？A. 生态环境和农业生产方式；B. 社会分工和分配制度。最后出现“庇护制”——人类社会最原始的统治／支配形式，下位者为上位者提供支持、服务、劳动，后者提供保护。"},{"kind":"p","text":"当人们从狩猎采集进入农业定居，支配统治关系开始出现，出现天然属性之外的等级秩序，有些人因出身高贵获得特权和权力，这种后天获得的身份和权力叫 ascribed status/power；权利和威望被特定人群（阶级或贵族宗支）控制，形成政治不平等，即集权型政治制度，也就是“王侯将相，宁有种乎”所质疑的。政治不平等归因于生态环境和农业生产方式的变化，进而导致社会分工和分配制度的变化，进而导致庇护制度的出现。"}],"noteBlocksEn":[{"kind":"p","text":"The authority of parents over children needs no further legitimation, but outside the family it does. Conflict mediation beyond the family is one of the earliest political activities; even on a tiny scale it is a use of public power, and the function of public organization is to maintain order. Mediation, leadership, and reinforcement correspond both to the three features of power and to the triple sense of the Greek polis: government, policy, politics."},{"kind":"p","text":"In early small-scale society, inequality exists mainly along natural attributes, as in dimorphic species. Early hunter-gatherer societies (Paleolithic, 2.5 million to 12,000 years ago) were small, without absolute power, and basically egalitarian beyond the family."},{"kind":"p","text":"From the Pleistocene onward, after about 12,000 years and especially 7,000–8,000 years ago, humans entered hierarchical society that persists today. When chiefdoms developed, the early state's embryo formed and centralized polity appeared; yet inequality was not stratification but a ranked society (no true class). Aristocratic feudalism developed later."},{"kind":"p","text":"What is the origin of class inequality (ascribed status)? How did leadership arise and evolve? A. ecology and the mode of agricultural production; B. division of labor and distribution. Finally patronage appears; one of the earliest forms of domination: subordinates give support, service, and labor; superiors give protection."},{"kind":"p","text":"As people moved from foraging to settled agriculture, domination emerged and an order beyond natural attributes appeared; some gained privilege by birth; ascribed status/power. Rights and prestige controlled by a class or noble lineage form political inequality, i.e., centralized polity. This is attributed to ecological and agricultural change, leading to changes in the division of labor and distribution, and then to patronage."}]},{"id":"egalitarian","trunk":"subst","x":3.0,"y":4.0,"era":{"zh":"第三讲","en":"Lecture 3"},"title":{"zh":"自然状态下的平等社会","en":"The Egalitarian Society in the State of Nature"},"tag":{"zh":"游群 · 部落 · 习俗结块 · 有序的无政府","en":"bands · tribes · the weight of custom · ordered anarchy"},"core":{"zh":["莱恩斯基（Lenski）指出，生存技术限制人提取和使用自然资源的能力，影响生态位的构建与转变；质的技术转变带来人口增长与生存质量的飞跃。塞维斯（Service）按组织活动形态把社会划分为游群、部落、酋邦、国家。","游群按季节流动、规模很小，很难形成实际的等级权力，家庭之外的领导地位无足轻重；随着简单工具出现，人可以栽培植物，进入园艺社会（游耕、刀耕火种），犁大大提高生产效率。部落仍是一个基本不可分割的世界，今天属于国家的功能由亲属、宗教等非正式组织行使；部落之间存在同年龄组社群与泛部落联盟，这是游群所没有的。","平等社会的政治组织就是平等主义／民主的；社会复杂化才伴随专制到来，是后者带来了前者。领袖地位主要由年龄、才智、性格决定，没有法定权力和资源。“习俗结块”——文化规范的力量压倒人，制度通过人思考；这种“有序的无政府”（ordered anarchy）回应了霍布斯：无政府不靠法律制裁，而靠公共舆论与习俗，违规最极端的惩罚是放逐，而非肉体折磨。无政府形式不是“自由”状态。"],"en":["Lenski argues that subsistence technology limits the ability to extract and use natural resources and shapes niche construction; a qualitative technological shift brings population growth and a leap in living standards. Service classifies societies by their form of organized activity into bands, tribes, chiefdoms, and states.","Bands move seasonally and are very small, can hardly form real rank, and leadership beyond the family is negligible. With simple tools, people cultivate plants and enter horticultural society (swidden, slash-and-burn); the plow greatly raises productivity. The tribe is still a basically indivisible world where functions now belonging to the state are carried by kinship and religion; tribes also have age-set communities and pan-tribal alliances, which bands lack.","An egalitarian society’s political organization is egalitarian/democratic; complexity, not equality, brings despotism; the former produces the latter. Leadership rests on age, ability, and character, with no statutory power or resources. “The weight of custom”; cultural norms overpower the person, and institutions think through people; this “ordered anarchy” answers Hobbes: anarchy relies not on legal sanction but on public opinion and custom, where the harshest punishment is banishment, not bodily torture. Anarchy is not a state of “freedom.”"]},"relation":{"zh":"平等社会是“不平等起源”问题的对照基线。它说明：等级不是自然必然，而是社会复杂化与定居农业的产物，由此引出酋邦这一“转型平等社会”。","en":"The egalitarian society is the baseline against which “the origin of inequality” is posed. It shows that hierarchy is not natural necessity but a product of complexity and settled agriculture, leading into the chiefdom as a “transegalitarian society.”"},"works":{"zh":["Gerhard Lenski（1974）；Elman Service，《原始社会组织》（1962）","努尔人民族志：典型部落社会，以“牛”理解世界"],"en":["Gerhard Lenski (1974); Elman Service, Primitive Social Organization (1962)","Nuer ethnography: a typical tribal society that understands the world through cattle"]},"strengths":{"zh":["把“平等”具体化为一组制度特征（无永久权威、互助、习俗约束），可操作。","“有序的无政府”对霍布斯式自然状态做了有力反驳。"],"en":["Concretizes “equality” into a set of institutional features (no permanent authority, mutual aid, customary constraint).","“Ordered anarchy” powerfully rebuts the Hobbesian state of nature."]},"limits":{"zh":["把游群—部落—酋邦—国家当作整齐序列，可能掩盖大量不规则与回退的实例。","“习俗结块”的制度决定论若过强，会低估个体能动性。"],"en":["Treating band–tribe–chiefdom–state as a tidy sequence can hide many irregular and reversed cases.","If “the weight of custom” is overstated as determinism, it underestimates individual agency."]},"personal":{"zh":["“社会复杂化带来专制，而非专制带来复杂化”是个重要的因果方向判断：它把不平等的根源放在规模与分工，而不是某个野心家。"],"en":["“Complexity brings despotism, not despotism complexity” is a key claim about causal direction: it locates inequality’s root in scale and division of labor rather than in some ambitious individual."]},"reflection":{"zh":["“平等社会＝民主的”这一说法需要谨慎。无国家社会中的协商、同侪压力和公共舆论，确实可被看作反专制的秩序机制；但“民主”是带有城邦/现代国家语境的概念，直接套用到游群和部落社会容易产生时代错置。更稳妥的说法是：它们具有平等主义、协商式、低强制的政治机制，但不一定是现代意义的民主。","“习俗结块”强调文化规范对个人的塑造很有解释力，但也可能把人说成制度的被动载体。过程论和实践理论会提醒我们：行动者会利用、解释、绕开甚至重写习俗；习俗不是自动运行的机器，而是在具体冲突中被不断再生产。"],"en":["The phrase “egalitarian society = democratic” needs care. Negotiation, peer pressure, and public opinion in stateless societies can indeed be read as anti-despotic mechanisms of order. But “democracy” carries the context of the polis and the modern state, so applying it directly to bands and tribes can be anachronistic. A safer wording is: they have egalitarian, deliberative, low-coercion political mechanisms, but they are not necessarily democratic in the modern sense.","“The weight of custom” is useful for explaining how norms shape people, but it can make people look like passive carriers of institutions. Processual and practice theories remind us that actors use, interpret, evade, and even rewrite custom. Custom is not an automatic machine; it is reproduced in concrete conflicts."]},"noteSection":"第三周/第四周 自然状态下的人——平等社会","noteBlocks":[{"kind":"p","text":"前工业政治制度（Lenski 1974；Service 1962；Fried 1967）。有“前工业”这个词，就说明讲的是技术和生产方式。Lenski：生存技术限制人提取和使用自然资源的能力，影响生态位的构建与转变，质的转变带来人口增长、生存质量的飞跃。"},{"kind":"p","text":"塞维斯：依据人采取的组织活动形态划分——游群社会、部落、酋邦、国家。游群按季节流动，规模很小，很难形成实际的等级权力，家庭之外的领导地位无足轻重，很多地方没有首领甚至没有村庄，除了萨满。延迟返回的狩猎与即时返回的狩猎，前者说明有一定基础进行财富积累。"},{"kind":"p","text":"随着简单工具出现，人可以栽培植物，有了园艺社会（游耕、刀耕火种），发明犁大大提高生产效率。部落形式基本上还是一个不可分割的世界，但今天属于国家的功能由亲属关系、宗教等非正式组织行使。努尔人对世界的理解通过“牛”来实现，典型部落社会，园艺、放牧同时不放弃狩猎采集。"},{"kind":"p","text":"部落与部落存在同年龄组社群、泛部落的联盟，是游群与部落的差异，而游群没有。平等社会，政治组织就是平等主义的／民主的；社会复杂化伴随专制到来，是后者带来了前者。领袖地位主要由年龄、才智、性格决定，没有法定的权力和资源。"},{"kind":"p","text":"习俗结块，文化规范的力量压倒人的 ordered anarchy（回应霍布斯的理论），无政府形式时依靠公共舆论、习俗等，而非法律的制裁，公共舆论就是法律的具体形式，违反规则的常见惩罚很少是肉体折磨，最极端是放逐；无政府形式不是“自由”状态。制度主义强调的不是人通过制度思考，而是制度通过人思考；原始社会最基本的习俗就是禁忌。"},{"kind":"p","text":"简单总结——自然状态下的人（平等社会）：社会主要生产依靠狩猎采集、粗放农业和游牧业，以互助性制度为基础，不鼓励财富囤积，个人几乎没有财产，土地和牲畜共有；家庭关系之外不存在永久的权威和制度化的不平等，同侪之间地位平等；领导人是临时的，没有职位个数限制，主要依靠个人能力和禀赋，依靠影响力行事；社会维持主要依靠习俗、道德、文化的约束（习俗结块）；群伙和部落大致能归入平等社会的范畴。"}],"noteBlocksEn":[{"kind":"p","text":"Pre-industrial political systems (Lenski 1974; Service 1962; Fried 1967). The word 'pre-industrial' signals a focus on technology and mode of production. Lenski: subsistence technology limits the ability to extract resources and shapes niche construction; a qualitative shift brings population growth and a leap in living standards."},{"kind":"p","text":"Service classifies by form of organized activity: bands, tribes, chiefdoms, states. Bands move seasonally, are very small, can hardly form real rank, and leadership beyond the family is negligible; many have no chief or even village, only a shaman. Delayed-return vs immediate-return foraging: the former allows some wealth accumulation."},{"kind":"p","text":"With simple tools people cultivate plants, entering horticultural society (swidden); the plow greatly raises productivity. The tribe is still an indivisible world where state-like functions are carried by kinship and religion. The Nuer understand the world through cattle; a typical tribal society practicing horticulture and herding while not abandoning foraging."},{"kind":"p","text":"Tribes have age-set communities and pan-tribal alliances, which bands lack. In egalitarian society the political organization is egalitarian/democratic; complexity brings despotism; the former produces the latter. Leadership rests on age, ability, and character, with no statutory power or resources."},{"kind":"p","text":"The weight of custom: cultural norms overpower the person ('ordered anarchy', answering Hobbes). Anarchy relies on public opinion and custom, not legal sanction; public opinion is the concrete form of law; the harshest common punishment is banishment, not torture. Anarchy is not freedom. Institutionalism stresses not that people think through institutions but that institutions think through people; the most basic custom of early society is taboo."},{"kind":"p","text":"Summary; humans in the state of nature (egalitarian society): production rests on foraging, extensive agriculture, and herding, grounded in mutual-aid institutions; wealth hoarding is discouraged, individuals own almost nothing, land and livestock are communal; outside family there is no permanent authority or institutionalized inequality, and peers are equal; leaders are temporary, unlimited in number, lead by ability and influence; society is held by custom, morality, and culture. Bands and tribes fall roughly within egalitarian society."}]},{"id":"chiefdom","trunk":"subst","x":3.0,"y":5.2,"era":{"zh":"第四讲","en":"Lecture 4"},"title":{"zh":"大转型与酋邦","en":"The Great Transition and the Chiefdom"},"tag":{"zh":"转型平等社会 · 再分配 · 战争·宴飨·聘礼","en":"transegalitarian · redistribution · war, feasting, bridewealth"},"core":{"zh":["酋邦是“转型平等社会”（transegalitarian society）：比部落更复杂、但不及国家复杂。其上限标志着聚落自治的结束，下限标志着
