（逊尼派，比较世俗化），反而采取了比过去更严格的宗教形式以区分豪萨人和非豪萨人，豪萨人的认同感就政治化了、成了维护商业垄断地位的武器。现代化反而使得族群认同更激进，不是真正意义上的文化复归也不是传统的延续，而是旧结构功能变化、旧瓶装新酒。"},{"kind":"p","text":"如何理解现代社会中的正式政治体制？一组重要的二元对立：现代工业组织和个人式管理形式；结构功能主义和个人能动性之间的矛盾。人类学家的任务：1）观察非正式群体；2）解释组织、形成组织的个人和更广泛的社会环境三者之间的关系。"},{"kind":"p","text":"怀特（Martin King Whyte，怀默霆）对现代中国的国家行政体系和反官僚主义的研究：官僚制度如何与官方的反官僚运动保持平衡。nation-state 要保证中央对地方的管制能力，采取经济措施，才能不让地方分散中央的权力。秉承着社会主义信念如何处理官僚主义、官僚与人民的对立？毛泽东定期政治运动、干部定期离职学习——是行政体系的完善而非对立。在有平等化理想的社会中官僚主义很危险，官僚随时替代被推翻的阶级成为统治者，违背社会主义民主的初衷。"},{"kind":"personal","text":"延申：官僚制度是一种结构性愚蠢。"}],"noteBlocksEn":[{"kind":"p","text":"The boundaries between several research fields blur. Political anthropology traditionally studied pre-industrial, relatively closed political structures and stressed participant observation; once the focus shifts to developing countries it is hard to gather material by traditional methods, holism cannot be applied mechanically, most villages and communities are already integrated into formal political institutions, and studying the politics of industrial society means new problems and methodological challenges; large populations cannot be handled qualitatively. Politics is not a problem that can be studied alone but must be set in a broader historical-cultural context."},{"kind":"p","text":"The modernization process: unilineal evolutionism and its critics. The classic theory is Rostow's take-off model / stages of economic growth; differences in national development are not due to structural historical or cultural causes, and the route to modernity is unilineal; but there is the problem of the historical opportunity of development: countries whose development began a century apart will not share similar internal and external environments."},{"kind":"p","text":"Eisenstadt's (S. N. Eisenstadt) modernization theory: modernity developed internally within Christian European civilization; Europe's modernization set off a second Axial Age, bringing multiple modernities. How to understand the relation between older social forms and modernization? For Eisenstadt the core of modernization is social differentiation and social mobilization. This connects to a Gnostic impulse of revolt; the belief that humans can shape the world through conscious activity and resist the existing establishment; seeing inequality and exploitation, one can manufacture a utopia through social movements."},{"kind":"p","text":"Europe's modernization, the arrival of a second Axial Age, is a plural path of modernization; its meta-ideology is liberalism, the basis of liberal-democratic representative institutions, and as it expands globally it inevitably provokes many alternative political programs: national-independence movements, fascist movements (a backlash against liberalism, anti-establishment); other societies keep reinterpreting and re-articulating, building new modernization programs that stress different elements, with an ambivalent attitude toward modernity and the West, accompanied by protest movements and the construction of collective identity. Social differentiation means separating religion from other domains; social mobilization means setting new goals for old organizations, and centralizing management is the key factor of modernization; constructing symbols; the flag, a narrative of national origin; political loyalty shifts from the local to the center and a national identity forms; only then is modernization a success."},{"kind":"p","text":"Political ethnicity and re-tribalization: the Hausa case (Custom and Politics in Urban Africa, Cohen, 1969). Their place of residence becomes a big city, new populations and Hausa influence pour in; after WWII Nigeria becomes independent, the central government takes up party politics, condemns tribalism, and weakens the authority of traditional chiefs, the young turn to exogamy, and the Hausa group faces the threat of dissolution. But the young abroad find that success outside depends on in-group cohesion; other groups' trading traditions cannot match the Hausa; and so they re-recognize the ties of homeland and Hausa-ness and re-emphasize unity in the face of economic challenge. Many Muslims have brotherhoods, and amid pan-Islamization the Hausa, originally a relatively secular Sunni 'fellowship of the same sect', adopt stricter religious forms to distinguish Hausa from non-Hausa; Hausa identity becomes politicized and a weapon for protecting their commercial monopoly. Modernization thus makes ethnic identity more radical; not a genuine cultural return nor a continuity of tradition, but a change in the function of an old structure, new wine in an old bottle."},{"kind":"p","text":"How to understand formal political institutions in modern society? An important binary: modern industrial organization vs personalized forms of management; the contradiction between structural functionalism and individual agency. The anthropologist's task: 1) observe informal groups; 2) explain the relations among the organization, the individuals who form it, and the wider social environment."},{"kind":"p","text":"Martin King Whyte's research on modern China's state administrative system and anti-bureaucratism: how bureaucracy stays in balance with official anti-bureaucracy campaigns. A nation-state must secure central control over localities and take economic measures so that localities do not disperse central power. Holding socialist convictions, how does one handle bureaucratism and the opposition between bureaucrats and the people? Mao's periodic political campaigns and the rotation of cadres out to study were meant to perfect the administrative system rather than antagonize it. In a society with egalitarian ideals bureaucratism is dangerous; bureaucrats may at any time replace the overthrown class as rulers, betraying the original aim of socialist democracy."},{"kind":"personal","text":"Extension: bureaucracy is a form of structural stupidity."}]},{"id":"colonialism","trunk":"subst","x":3.0,"y":12.6,"era":{"zh":"第十三周 12月6日","en":"Lecture: Colonialism"},"title":{"zh":"殖民主义与欧洲中心传播主义","en":"Colonialism and Eurocentric Diffusionism"},"tag":{"zh":"殖民者的世界模式 · 欧洲奇迹 · 内层—外层 · 原始主义 vs 东方主义","en":"colonizer’s model of the world · the European miracle · inner–outer · primitivism vs Orientalism"},"core":{"zh":["课程把殖民主义的意识形态内核界定为欧洲中心主义／欧洲优越论，更确切地说是“欧洲中心传播主义”，即布劳特（J. M. Blaut, 2002）所说的“殖民者的世界模式”。其最重要的信条是“欧洲自身崛起论”，有时更冠冕堂皇地表述为“欧洲奇迹”：欧洲被视为历史的唯一创造者、永远进步，而其他地区停滞不前；在与他者发生强烈互动之前，欧洲就已经更先进——于是发展被想象成内生的，殖民主义与欧洲现代化“无关”（实则错误），其他地区不是被掠夺、文化被摧毁，而是被动接受了欧洲文化。","布劳特强调，欧洲中心主义真正要害的不是价值层面的偏见，而是一整套被当作“科学”与“史实”的系统理论（新石器革命、最早的城市与文字、铁器、民主、纯科学、阶级社会、第一个伟大帝国都被安放在中东—希腊—罗马—欧洲一线），它以不带偏见的姿态让人相信，从而不断再生产——知识就是权力。文化传播主义的两条基础原理是：①大多数人群不具备发明创造力；②少数人群（或地点、文化）才是文化变革与进步的永久中心——这本质上是否定人类同一性的种族主义。它配套一个“内层—外层”的空间想象：文明由内层（欧洲）扩散到外层。","贬低“外层”有两种民族中心主义风格：对可被殖民、被动物化的人群施以原始主义，对拥有复杂文明与等级制、不能完全统治的他者（其他帝国）施以东方主义（Said, 1979）——把对方再现为专制、腐朽。布劳特进一步区分传播主义的两个阶段：19世纪经典期制造了“非欧洲人没有私有财产概念”与“空洞神话（空地神话）”这类理论，为剥夺殖民地土地提供道德依据；1940年代后期它换上“现代化”的皮（如罗斯托阶段论）继续存在——产业革命并未扩散到所有地区，第三世界并未如发达国家般起飞，于是有了依附理论的回应。"],"en":["The course locates the ideological core of colonialism in Eurocentrism / European superiority; more precisely “Eurocentric diffusionism”, what J. M. Blaut (2002) calls “the colonizer’s model of the world”. Its most important tenet is the “autonomous rise of Europe”, sometimes grandly phrased as “the European miracle”: Europe is cast as the sole maker of history, forever progressive, while other regions stagnate; Europe was already more advanced before any strong interaction with others; so development is imagined as endogenous and colonialism is held to be “unrelated” to European modernization (which is in fact false), and others are not plundered, their cultures not destroyed, but simply passive recipients of European culture.","Blaut stresses that the real crux of Eurocentrism is not bias at the level of values but a whole system of theory treated as “science” and “historical fact” (the Neolithic revolution, the earliest cities and writing, iron, democracy, pure science, class society, the first great empire all placed on a Middle East–Greece–Rome–Europe line), which persuades in an apparently unbiased manner and so keeps reproducing itself; knowledge is power. Diffusionism rests on two principles: (1) most peoples lack inventive creativity; (2) only a few peoples (or places, cultures) are the permanent centers of cultural change and progress; which is at bottom a racism denying the unity of humankind. It comes with an “inner–outer” spatial imagination: civilization diffuses from the inner core (Europe) to the outer periphery.","Denigrating the “outer” takes two ethnocentric styles: primitivism toward peoples who can be colonized and animalized, and Orientalism (Said, 1979) toward others who possess complex civilizations and hierarchies and cannot be fully governed (other empires); representing them as despotic and decadent. Blaut further distinguishes two stages of diffusionism: the classic 19th-century phase manufactured theories such as “non-Europeans have no concept of private property” and the “empty-land myth”, providing a moral basis for seizing colonial land; from the late 1940s it changed its skin to “modernization” (e.g., Rostow’s stages) and carried on; the industrial revolution did not diffuse to all regions, the third world did not take off like the developed countries, and dependency theory arose in response."]},"relation":{"zh":"殖民主义是上一节“现代化”批判的延伸与激进化：它揭示了单线进化论与“欧洲奇迹”如何为剥夺与统治提供“科学”依据，并把萨义德的原始主义／东方主义引入，直接为下一节后殖民主义与庶民研究铺路。它也回收了民族主义一节中的“零和博弈”与诺斯替式思维。","en":"Colonialism extends and radicalizes the previous node’s critique of modernization: it shows how unilineal evolutionism and “the European miracle” supplied a “scientific” basis for dispossession and rule, introduces Said’s primitivism / Orientalism, and lays the ground directly for the next node on postcolonialism and subaltern studies. It also reclaims the “zero-sum” and Gnostic thinking from the nationalism node."},"works":{"zh":["J. M. 布劳特（Blaut），《殖民者的世界模式》（The Colonizer's Model of the World, 2002 中译；原著 1993）","Edward Said，《东方学》（Orientalism, 1978/1979）——原始主义 vs 东方主义","Rostow 的发展阶段论（被布劳特归为“现代文化传播主义”）","L. H. 摩尔根的人类社会阶段论（被殖民人类学借用）；Boas 的历史主义方法（文化相对主义起点）","Max Weber，清教伦理与资本主义（被读作一种文化传播主义）","Kenneth Pomeranz：《大分流》","Immanuel Wallerstein：世界体系理论","Andre Gunder Frank / Janet Abu-Lughod：多中心世界体系与全球史","Dipesh Chakrabarty：《欧洲的地方化》"],"en":["J. M. Blaut, The Colonizer’s Model of the World (1993; the course cites the 2002 edition)","Edward Said, Orientalism (1978/1979); primitivism vs Orientalism","Rostow’s stages-of-development theory (classed by Blaut as “modern diffusionism”)","L. H. Morgan’s stages of human society (borrowed by colonial anthropology); Boas’s historicist method (a starting point of cultural relativism)","Max Weber, the Protestant ethic and capitalism (read as a form of cultural diffusionism)","Kenneth Pomeranz, The Great Divergence","Immanuel Wallerstein: world-systems theory","Andre Gunder Frank / Janet Abu-Lughod: multi-centered world systems and global history","Dipesh Chakrabarty, Provincializing Europe"]},"strengths":{"zh":["布劳特把欧洲中心主义从“态度偏见”重新界定为一套可被检验、并与考古证据相矛盾的“科学史实”系统，使批判更有杀伤力。","原始主义／东方主义的双重区分，解释了为何欧洲对“无文明的他者”与“有文明的帝国他者”的再现策略截然不同。"],"en":["Blaut redefines Eurocentrism from “attitudinal bias” into a testable system of “scientific facts” that contradicts archaeological evidence, sharpening the critique.","The twin distinction of primitivism / Orientalism explains why Europe’s representational strategies differ so sharply between the “civilization-less other” and the “imperial other with civilization”."]},"limits":{"zh":["把如此多样的现代史几乎全部解释为“传播主义意识形态”的产物，存在以单一框架统摄一切的过度化风险，容易低估非西方社会自身的能动性与内部动力。","“殖民主义不是铁板一块”与“传播主义贯穿始终”两个判断之间存在张力，笔记未充分处理殖民实践内部的差异与矛盾。","布劳特的反欧洲中心主义很有力，但若把近代世界史几乎全部解释为传播主义意识形态，就会滑向反向单因论。"],"en":["Explaining so much of modern history almost entirely as a product of “diffusionist ideology” risks over-totalizing through a single frame and tends to understate non-Western societies’ own agency and internal dynamics.","There is tension between “colonialism is not monolithic” and “diffusionism runs throughout”; the note does not fully address the internal differences and contradictions of colonial practice.","Blaut’s anti-Eurocentrism is powerful, but if modern world history is explained almost entirely through diffusionist ideology, it slides into a reverse mono-causal account."]},"personal":{"zh":["最值得带走的一点：“空洞神话”与“非欧洲人没有私有财产概念”不是无心的误解，而是有明确功能——为掠夺土地提供道德与法律的合理化。把意识形态当作“工具”而非“偏见”来读，才能看清知识与权力如何彼此供养。"],"en":["The point worth taking away: the “empty-land myth” and “non-Europeans have no concept of private property” were not innocent misunderstandings but had a clear function; to morally and legally rationalize land seizure. Reading ideology as a “tool” rather than a “bias” is what makes visible how knowledge and power feed each other."]},"reflection":{"zh":["殖民主义是全篇争议密度最高的部分。原笔记主要沿用布劳特（J. M. Blaut）的批判，把欧洲中心主义理解为“殖民者的世界模式”，并把许多现代史叙述解释为欧洲中心传播主义的再生产。布劳特的贡献在于有力拆解“欧洲自身崛起/欧洲奇迹”的自明性，指出殖民掠夺、世界市场、奴隶制、白银、种植园和知识生产如何参与塑造欧洲现代性。但这也是一家之言；学界对他的批评之一，正是其解释有时过度总体化（over-totalizing），容易把非常不同的历史问题都压进“传播主义意识形态”这一个框架。","尤其要谨慎处理笔记列出的七条“欧洲中心史实”。把它们整体判为“未经证实/与考古矛盾”过于粗糙。更好的做法是逐条区分：近东新石器农业和早期城市/书写有相当强的考古证据，但这不等于证明欧洲优越；希腊民主确是某种城邦公民制度的重要案例，但民主、议事、合议和公共决策并非只可从希腊传统理解；数学、天文、地理、医学和技术创新一直是两河、埃及、印度、中国、伊斯兰世界、地中海世界等多中心互动的结果；罗马当然不是“第一个伟大帝国”，阿卡德、亚述、波斯、秦汉等都提醒我们不能把帝国史收束到罗马。也就是说，这七条中有些是事实被欧洲中心解释法过度占有，有些是事实本身就错误或选择性叙述；二者不能混为一谈。","关于“欧洲崛起”，除布劳特外还有多条竞争性解释：世界体系与依附理论强调殖民掠夺和中心—外围；彭慕兰的“大分流”强调煤、殖民地和生态约束；阿布-卢格霍德、弗兰克等强调近代以前欧亚世界体系中的多中心互动；制度学派强调产权、议会、财政国家和法治；军事财政国家研究强调战争、税收和国家能力；文化/知识史研究强调科学革命、实验文化与启蒙公共领域。它们都不应被简单并入“传播主义”。更稳妥的写法是：欧洲中心传播主义是一种强大的意识形态框架，但欧洲现代性的形成还需要政治经济、制度、军事、能源、生态、全球贸易和知识制度等多重机制来解释。","还要区分“批判欧洲中心主义”与“反向本质化”。如果把欧洲一切成就都解释为掠夺或意识形态，把非西方社会只描写成被动受害者，也会遮蔽非西方行动者的创造性、选择、抵抗、合作与内部不平等。后殖民与全球史更有力的方向，是把欧洲从唯一中心降格为全球互动网络中的一个节点，而不是把所有因果简单倒置。","布劳特式批判可以作为有启发的强框架保留，但它也是一种有争议、可能过度总体化的理论框架。更稳妥的读法是把它与大分流、世界体系、制度史、全球史和后殖民研究并置，而不是把它当作殖民主义研究的唯一解释。"],"en":["Colonialism is the most contested part of the notes. The original note mainly follows J. M. Blaut’s critique: Eurocentrism is treated as “the colonizer’s model of the world”, and many modern historical narratives are read as reproductions of Eurocentric diffusionism. Blaut’s contribution is powerful: he unsettles the self-evidence of the “autonomous rise of Europe / European miracle” and shows how colonial plunder, world markets, slavery, silver, plantations, and knowledge production helped shape European modernity. But this is one position. A common criticism is that his explanation can be over-totalizing: it tends to press very different historical problems into one frame, “diffusionist ideology”.","The seven “Eurocentric historical facts” listed in the note need especially careful handling. It is too crude to reject them all as “unproven / contradicted by archaeology”. A better approach is to distinguish them one by one. Near Eastern Neolithic agriculture and early cities / writing have strong archaeological support, but that does not prove European superiority. Greek democracy is an important case of a citizen polis, but democracy, deliberation, councils, and public decision-making cannot be understood only through Greece. Mathematics, astronomy, geography, medicine, and technical innovation have long been produced through multi-centered interaction among Mesopotamia, Egypt, India, China, the Islamic world, and the Mediterranean. Rome was not “the first great empire”: Akkad, Assyria, Persia, Qin-Han China, and others make that clear. So, in the seven items, some facts are real but captured by a Eurocentric interpretation, while others are simply wrong or selective. These are different problems.","There are also many competing explanations for “the rise of Europe”. World-systems and dependency theory stress colonial extraction and the center–periphery structure. Pomeranz’s “Great Divergence” stresses coal, colonies, and ecological constraints. Abu-Lughod and Frank stress multi-centered interaction in the premodern Eurasian world system. Institutional approaches stress property rights, parliaments, fiscal states, and the rule of law. Military-fiscal state research stresses war, taxation, and state capacity. Cultural and intellectual history stresses the scientific revolution, experimental culture, and the public sphere of the Enlightenment. These should not all be collapsed into “diffusionism”. A safer formulation is: Eurocentric diffusionism is a powerful ideological frame, but European modernity also needs political-economic, institutional, military, energy, ecological, global-trade, and knowledge-system mechanisms to be explained.","It is also important to distinguish “critiquing Eurocentrism” from reverse essentialism. If every European achievement is explained only as plunder or ideology, and non-Western societies are shown only as passive victims, the creativity, choice, resistance, cooperation, and internal inequality of non-Western actors disappear. The stronger direction in postcolonial and global history is to demote Europe from the only center to one node in a network of global interaction, not simply to reverse all causal arrows.","The Blaut-style critique is worth keeping as an illuminating strong framework, but it is also contested and may over-totalize. It is best read alongside the Great Divergence debate, world-systems theory, institutional history, global history, and postcolonial studies, rather than as the only explanation of colonialism."]},"noteSection":"第十三周 12月6日 殖民主义","noteBlocks":[{"kind":"p","text":"关键词：殖民主义、民族主义的病灶、诺斯替主义、零和博弈的思维方式。殖民主义不是铁板一块的，没有主导性的；后殖民主义对此有反思。殖民主义的信仰或意识形态就是欧洲中心主义或欧洲优越论，更确切地说，是欧洲中心传播主义，是“殖民者的世界模式”（布劳特，2002）。大航海初期可能没有殖民主义，而是探险、含有不平等的贸易；但很快发展成对其他地区政治经济的全面控制。"},{"kind":"p","text":"文化传播论的最重要信条是“欧洲自身崛起论”，有时（更冠冕堂皇地）表述为“欧洲奇迹”的思想。欧洲被视为历史的创造者、永远是进步的，而其他地区停滞不前；这样的观点被相信、并被实践，就不断再生产；近年来部分受到怀疑，但还是没有根除，基本上没有被削弱。在殖民主义时代之前、欧洲与其他地区有强烈相互作用之前，欧洲就已经更先进了；于是会导致认为欧洲的发展是其内部人群的素质带来的，而不是与其他地区相互作用的结果，发展是内生的，殖民主义与欧洲现代化没关系（实际是错误的）；因此其他地区不是被掠夺、不是文化被摧毁，而是被动接受了欧洲文化，欧洲是文化的传播者。"},{"kind":"p","text":"“欧洲中心主义”真正重要的部分并不是在价值观或偏见意义上的态度问题，而是一个科学问题。考虑以下被当作“史实”的信条：①新石器时代革命——农业的发明、人类定居生活的开始——在中东（或基督教圣地）发生，1930 年前没有人反对，且多数人今天仍持此见；②文化演变走向现代文明的第二个重要步骤（最早的公国、城市、有组织的宗教、书写系统、分工等）发生在中东；③铁器时代在中东开始，“铁器时代”最早出现在欧洲；④民主首先在欧洲（古希腊）发明；⑤大多数纯科学、数学、物理、历史和地理也是一样；⑥阶级社会和阶级斗争首先发生在希腊—罗马时期和地区；⑦罗马帝国是第一个伟大的帝国，罗马人发明了官僚体制、法律等。知识就是权力，知识和权力不断再生产；其实很多事没有完全得到证实，或与考古学证据相矛盾。为什么这套阐述一代又一代、一个世纪又一个世纪被欧洲历史思想界接受、存活下来并成为被接受的信条，人们又很少提出疑问？"},{"kind":"p","text":"殖民者的世界模式：文化传播主义。传播主义的基础包括两条原理：①大多数人群不具有发明创造力；②少数人群（或者地点、或者文化）具有创造力，因此他们是文化变革和进步的永久中心。这是种族主义，否定人类的同一性；智商测试本身是很片面的。文化传播主义包含一个内层—外层的地理空间概念：文明／现代化由内层扩散至外层。"},{"kind":"p","text":"大航海带来的财富是保证欧洲精英权力的条件。1492 年作为一种重要的时间点：摩尔人入侵西班牙，几乎征服伊比利亚半岛，独立的穆斯林国家相继建立，长达七百年都是穆斯林控制，漫长的收复失地运动；1492 年基督徒攻取格林纳达（格拉纳达），收复失地运动宣告成功，伊比利亚半岛形成众多基督教王国，西班牙基督教帝国兴起（而今格拉纳达很多古建筑是伊斯兰风格）；同一年哥伦布开始寻找新大陆；异端裁判所建立，不愿改宗的天主教徒和犹太人被驱逐（民族主义之前的清洗）。传播主义认为独立的发明其实不多见，大多数人是模仿者，传播是主要的变革机制，而且是从欧洲传播到其他地方。"},{"kind":"p","text":"19 世纪后半期的人类学研究都把重点放在基督教圣地，学术著作没有表现出接受宗教假设的思想，但也并非捏造，而是选择性地收集事实；距今 9000—10000 年前很多地方都有文明的痕迹，但研究者不相信其他地方有文明，因而仍以近东为重。文化传播主义起源可追溯到 16、17 世纪的西部欧洲，在那里构造了一种思想体系，把欧洲内部现实的变化和殖民主义在欧洲以外的扩张联系起来。发展上，中世纪以后科技革命、理性进步观念出现，“内层总是进步”的命题（即欧洲理性／欧洲优越论）出现了；外层概念的形成则经历了更复杂的过程。"},{"kind":"p","text":"将其他种群动物化：如果承认对方也与自己一样是人，就不能心安理得地支配和屠杀。认为东方文明缺乏道德理性。韦伯的清教思想与资本主义，也是一种文化传播主义。贬低外层的两种不同的民族中心主义风格：原始主义与东方主义（Said，1979）。得以被殖民的地区和人被施以原始主义；不能完全统治、也有复杂文明与等级制为标志的文化和地区（其他帝国）则被视为东方专制主义（精英腐朽罪恶、普通人被剥削）。这两种不同的他者、外层，欧洲对他们的再现很不一样。不管是“中国崩溃论”还是“中国将超越美国”，都是东方主义，其实不关心中国到底会怎么发展，观照的是自己。"},{"kind":"p","text":"文化传播主义的两个发展阶段（Blaut，2002）。经典文化传播主义出现在 19 世纪殖民主义的经典时期，举例：1）非欧洲人没有形成私有财产的概念；2）空洞神话。欧洲殖民主义以公司的形式在殖民地活动，殖民公司、办事处律师、行政管理人员制造出“非欧洲人没有形成私有财产的概念”这种理论，最早以学术研究描述当地人，目的是剥夺被殖民者的土地、提供道德基础——因为他们没有形成财产概念，因而可以被剥夺。这几乎在 19 世纪成为普遍接受的“公理”，在马克思关于资本主义起源、财产制兴起的理论中也有体现，来自摩尔根。"},{"kind":"p","text":"空洞神话：殖民地没有“人”，或者说人没有固定住所，对领土自然没有要求，没有政治主权、经济财产概念。但例如努尔人，部分时期放牧、部分时期固定，且考古学发现很早就有私有的概念；很多非西方人表现为没有土地财产观念，其实是因为认为这片区域都是自己可以使用的，在此地和彼地都一样，这一广泛区域都是家园，但可能没有明确的领土概念；其实他们也有基本领土概念，不同族群不可以去对方领地上打猎等，不能因为领土观念不同就出于利益目的强行称其没有领土概念。"},{"kind":"p","text":"现代文化传播主义在 1940 年代后期至 1950 年代出现，这时一般称为“现代化”或“现代化传播”，举例：罗斯托的发展阶段论。1945 年日本投降后殖民地独立，解放力量非常强大；殖民主义不可能维持时，勉强用和平方式给予独立；民族独立、现代化成为政治正确话语后，文化传播主义相当于换了张皮还在那里。即使是“理中客”的话语真的有用吗？产业革命没有从欧洲扩散到其他所有地区，第三世界没有如发达国家一样发展起来，产业发展阶段论没有实现，于是有了依附理论。进化论被普遍接受，只是与不同说法结合；演化心理学把工业视为心灵、智力进化的产物（认为在工业化环境生活智力会进化，至今仍有人持此论并做研究；智商测试是谁发明的？没有客观的）。"},{"kind":"p","text":"殖民主义与人类学：早期人类学研究与殖民主义的关系，是对殖民地进行文化、社会和语言的记录，满足殖民者对信息的需求和控制，举例摩尔根的人类社会阶段论。19 世纪末二十世纪初的文化反思和文化相对主义，为后来对权力关系和社会正义的关注奠定了基础，举例 Boas 的历史主义方法。文化反思一路发展，形成了后殖民主义人类学研究。"}],"noteBlocksEn":[{"kind":"p","text":"Keywords: colonialism, the pathology of nationalism, Gnosticism, zero-sum thinking. Colonialism is not monolithic and has no single dominant form; postcolonialism reflects on this. The faith or ideology of colonialism is Eurocentrism or European superiority; more precisely Eurocentric diffusionism, 'the colonizer's model of the world' (Blaut, 2002). The early age of exploration may not yet have been colonialism but exploration and unequal trade; but it quickly grew into total control over the politics and economy of other regions."},{"kind":"p","text":"The central tenet of cultural diffusionism is the 'autonomous rise of Europe', sometimes phrased more grandly as 'the European miracle'. Europe is seen as the maker of history, forever progressive, while other regions stagnate; once such a view is believed and practiced it keeps being reproduced; in recent years it has been partly doubted but not eradicated and basically not weakened. Before the colonial era, before Europe had strong interaction with other regions, Europe was already more advanced; this leads to the belief that Europe's development came from the quality of its internal population rather than from interaction with others; that development is endogenous and colonialism is unrelated to European modernization (which is in fact false); and so other regions were not plundered, their cultures not destroyed, but passively received European culture, with Europe as the diffuser of culture."},{"kind":"p","text":"The central part of 'Eurocentrism' is not a matter of attitude in the sense of values or bias but a scientific question. Consider the following creeds treated as 'historical fact': (1) the Neolithic revolution; the invention of agriculture, the start of human sedentary life; occurred in the Middle East (or the Christian holy land); before 1930 no one opposed this, and most still hold it today; (2) the second important step in cultural evolution toward modern civilization (the earliest principalities, cities, organized religion, writing systems, division of labor) occurred in the Middle East; (3) the Iron Age began in the Middle East, yet the 'Iron Age' is said to appear first in Europe; (4) democracy was first invented in Europe (ancient Greece); (5) the same for most pure science, mathematics, physics, history, and geography; (6) class society and class struggle first occurred in the Greco-Roman period and region; (7) the Roman Empire was the first great empire, and the Romans invented bureaucracy, law, and so on. Knowledge is power, and knowledge and power keep reproducing each other; in fact much of this is unproven or contradicts archaeology. Why, generation after generation and century after century, has this account been accepted by European historical thought, survived, and become an accepted creed that is rarely questioned?"},{"kind":"p","text":"The colonizer's model of the world: cultural diffusionism. Diffusionism rests on two principles: (1) most peoples have no inventive creativity; (2) a few peoples (or places or cultures) have creativity and so are the permanent centers of cultural change and progress. This is racism, a denial of the unity of humankind; IQ tests are themselves one-sided. Cultural diffusionism contains an inner–outer geographic-spatial concept: civilization / modernization diffuses from the inner core to the outer periphery."},{"kind":"p","text":"The wealth brought by the age of exploration was the condition securing the power of European elites. 1492 is a key time point: the Moors invaded Spain and nearly conquered the Iberian Peninsula, independent Muslim states were established, and for some seven hundred years the peninsula was under Muslim control, with a long Reconquista; in 1492 Christians took Granada and the Reconquista was declared a success, many Christian kingdoms formed in Iberia, and the Spanish Christian Empire rose (today many old buildings in Granada are in Islamic style); in the same year Columbus set out to find the New World; the Inquisition was established, and Catholics and Jews unwilling to convert were expelled (a cleansing before nationalism). Diffusionism holds that independent invention is in fact rare, that most people are imitators, and that diffusion; from Europe to elsewhere; is the main mechanism of change."},{"kind":"p","text":"Anthropology in the late 19th century placed its focus on the Christian holy land; the scholarship did not display an explicit acceptance of religious assumptions, but neither was it fabricated; it selectively collected facts; 9,000–10,000 years ago many places bore traces of civilization, but researchers did not believe civilization existed elsewhere and so still centered the Near East. The origin of cultural diffusionism can be traced to 16th- and 17th-century Western Europe, where a system of thought was constructed linking changes in Europe's internal reality with colonialism's expansion outside Europe. In its development, after the Middle Ages the scientific revolution and the idea of rational progress appeared, and the thesis that 'the inner is always progressing'; i.e., European rationality / European superiority; emerged; the formation of the concept of the outer went through a more complex process."},{"kind":"p","text":"Animalizing other peoples: if one admits the other is human just like oneself, one cannot comfortably dominate and slaughter them. Eastern civilization is held to lack moral rationality. Weber's Puritanism-and-capitalism thesis is also a form of cultural diffusionism. Two different ethnocentric styles denigrate the outer: primitivism and Orientalism (Said, 1979). Regions and peoples that could be colonized were given primitivism; cultures and regions that could not be fully governed but were marked by complex civilization and hierarchy (other empires) were treated as Oriental despotism (a corrupt and evil elite, exploited commoners). Europe's representation of these two different others / outers is very different. Whether 'China collapse theory' or 'China will surpass the US', both are Orientalism; they are not really concerned with how China will actually develop but reflect upon the self."},{"kind":"p","text":"Two developmental stages of cultural diffusionism (Blaut, 2002). Classic diffusionism appeared in the classic period of 19th-century colonialism; examples: (1) non-Europeans never formed a concept of private property; (2) the empty-land myth. European colonialism operated in the colonies through companies; colonial companies, office lawyers, and administrators produced the theory that 'non-Europeans never formed a concept of private property', the earliest academic descriptions of local people, with the aim of depriving the colonized of their land and providing a moral basis; because they had no concept of property, they could be dispossessed. This became an almost universally accepted 'axiom' in the 19th century, and figures even in Marx's account of the origin of capitalism and the rise of property, derived from Morgan."},{"kind":"p","text":"The empty-land myth: the colony has no 'people', or its people have no fixed residence and so naturally make no claim to territory, with no notion of political sovereignty or economic property. But the Nuer, for example, herd part of the time and settle part of the time, and archaeology has found a notion of the private early on; many non-Westerners appear to lack a notion of land property in fact because they regard the whole region as theirs to use; here and there are the same, this broad region is all home; though they may have no clear territorial concept; yet they do have a basic territorial concept, since different groups may not hunt on each other's land, and one cannot claim they have no territorial concept, for profit, just because their notion of territory differs."},{"kind":"p","text":"Modern cultural diffusionism appeared from the late 1940s into the 1950s, generally called 'modernization' or 'modernization diffusion'; example: Rostow's stages of development. After Japan's surrender in 1945 the colonies became independent and liberation forces were very strong; when colonialism could no longer be maintained, independence was granted reluctantly by peaceful means; once national independence and modernization became politically correct discourse, cultural diffusionism essentially changed its skin and remained. Is even the 'reasonable, neutral, objective' discourse really useful? The industrial revolution did not diffuse from Europe to all regions, the third world did not develop like the developed countries, the stages theory was not realized, and so dependency theory arose. Evolutionism is widely accepted, merely combined with different claims; evolutionary psychology treats industry as a product of the evolution of mind and intelligence (the claim that living in an industrialized environment evolves intelligence is still held and researched today; who invented the IQ test? there is nothing objective about it)."},{"kind":"p","text":"Colonialism and anthropology: early anthropology's relation to colonialism lay in recording the culture, society, and language of the colonies to satisfy the colonizer's need for information and control; for example, Morgan's stages of human society. The cultural reflection and cultural relativism of the late 19th and early 20th centuries laid the foundation for later attention to power relations and social justice; for example, Boas's historicist method. Cultural reflection developed all the way into postcolonial anthropology."}]},{"id":"postcolonial","trunk":"subst","x":3.0,"y":13.8,"era":{"zh":"第十四—十五周","en":"Lectures 14–15: Postcolonialism"},"title":{"zh":"后殖民主义与庶民研究","en":"Postcolonialism and Subaltern Studies"},"tag":{"zh":"东方主义 · 庶民能否发声 · 庶民是处境而非身份 · 依附理论","en":"Orientalism · can the subaltern speak · subalternity as condition not identity · dependency theory"},"core":{"zh":["1960、70 年代起，人类学开始更批判地审视自己所用的研究方法。后殖民主义是 1970 至 1980 年代产生的思潮与学术理论，主要目的是反思殖民主义，尤其强调在文化、知识领域内对殖民主义、新殖民主义、西方中心主义的反思与批判，通常以萨义德《东方学》（1978）的出版为缘起标志。对“后”有两种理解：一种认为殖民主义已经结束、现在是新阶段；另一种认为我们仍处在殖民主义的阴影下，殖民主义换汤不换药地压迫着非西方地区与人民。后结构主义、后现代主义、后殖民主义都是一系列反体系运动的产物。","萨义德的东方主义指出，西方对地中海以东各社会的再现，无一例外地以对象化、本质化、刻板印象的方式处理，并以两种对立化策略呈现：“敌视”专注于他者的威胁性与可憎性（暴君、原教旨主义、恐怖主义，东方男性被妖魔化），“异域”关注他者的吸引力（后宫、闺房、面纱，东方女性被描绘为放荡、顺从而具异域风情）。斯皮瓦克则以《庶民能发声吗？》追问：庶民更多是一种视角——从弱势位置看支配关系，借此拆解支配所依赖的霸权论述。关键在于，庶民不是一种身份认同，而是一种被排除在社会流动性之外的处境／状况；不是特定的人，而是“庶民性”本身。她还致力于重建第三世界自身历史的新叙述逻辑，并把第三世界妇女作为具有个性与多样性的、有性别的主体。","在政治经济维度上，新殖民主义指二战后多数殖民地形式上独立却并未真正摆脱依附。拉美学者的依附理论把中心—外围理论一般化：阿明（Samir Amin）的“不平等发展”强调全球体系中富国与穷国关系的结构性不平等并主张自主发展；埃斯科瓦尔（Escobar）认为“发展”是二战后西方为管理第三世界而做的发明，发展话语同时在构造关于第三世界的“真相”；弗格森（Ferguson）的“反政治机器”指出，发展话语把贫穷化约为抽离政治文化语境的技术问题，技术方案注定失败，其真正后果是国家控制的延伸而非地方经济的改善。后殖民女性主义则批评第一世界女性主义把非西方女性当作同质群体、以霸权式知识实践指定“第三世界”为研究对象。","课后补充：霍米·巴巴的核心概念包括杂糅性（hybridity）、模拟/拟态（mimicry）和暧昧性（ambivalence）。它们提醒我们，殖民关系不是单向灌输：被殖民者会模仿殖民者，但这种模仿常常“不完全相同”，从而制造裂缝和讽刺空间。后殖民研究由此既批判支配话语，也关注被支配者如何在支配语言内部挪用、扭转和制造新的主体位置。"],"en":["From the 1960s and 70s, anthropology began to examine its own research methods more critically. Postcolonialism is a current of thought and body of theory arising in the 1970s and 80s, whose main aim is to reflect on colonialism, with special emphasis on reflecting upon and critiquing colonialism, neocolonialism, and Western-centrism in the cultural and knowledge domains; it is usually dated from the publication of Said’s Orientalism (1978). There are two readings of “post”: one holds that colonialism has ended and we are in a new stage; the other holds that we remain in colonialism’s shadow, with colonialism oppressing non-Western regions and peoples under a new guise. Poststructuralism, postmodernism, and postcolonialism are all products of a series of anti-systemic movements.","Said’s Orientalism argues that the West’s representation of the societies east of the Mediterranean invariably objectifies, essentializes, and stereotypes, and presents them through two strategies of opposition: “hostility” fixes on the other’s threat and detestability (tyrants, fundamentalism, terrorism; the Eastern man demonized), and “exoticism” fixes on the other’s allure (the harem, the boudoir, the veil; the Eastern woman painted as licentious, submissive, and exotic). Spivak, in “Can the Subaltern Speak?”, asks a different question: the subaltern is more a perspective; viewing relations of domination from a position of weakness to dismantle the hegemonic discourse on which domination depends. The important point is that the subaltern is not an identity but a condition of exclusion from social mobility; not a specific group of people but “subalternity” itself. She also works to rebuild a new narrative logic for the third world’s own history, and treats third-world women as gendered subjects with individuality and diversity.","On the political-economic axis, neocolonialism names how most colonies became formally independent after WWII yet did not truly escape dependency. Latin American scholars’ dependency theory generalizes the center–periphery model: Samir Amin’s “unequal development” stresses the structural inequality between rich and poor countries in the global system and argues for autonomous development; Escobar holds that “development” was a post-WWII Western invention for managing the third world, with development discourse simultaneously constructing a “truth” about the third world; Ferguson’s “anti-politics machine” shows that development discourse reduces poverty to a technical problem abstracted from its political and cultural context, that the technical solutions are bound to fail, and that their real effect is the extension of state control rather than the improvement of local economies. Postcolonial feminism, finally, criticizes first-world feminism for treating non-Western women as a homogeneous group and using a hegemonic knowledge practice to designate “the third world” as its object of study.","Post-class supplement: Homi Bhabha’s key concepts include hybridity, mimicry, and ambivalence. They remind us that colonial relations are not one-way imposition. The colonized may imitate the colonizer, but the imitation is often “not quite the same”, producing cracks and ironic space. Postcolonial studies therefore critique dominant discourse while also asking how the dominated appropriate, turn, and create new subject positions inside the language of domination."]},"relation":{"zh":"后殖民主义是整条右干的收束与反转：它把殖民主义一节揭示的“欧洲中心传播主义”翻转为批判的对象，用东方主义、庶民、依附理论回应权力—知识问题，并与民族主义一节形成复杂对话（民族主义既是反殖民的最有力工具，又与帝国主义共享零和逻辑）。它也呼应左干过程论对“能动性”的强调，把被排除者重新读作有策略的主体。","en":"Postcolonialism closes and reverses the whole right trunk: it turns the “Eurocentric diffusionism” exposed in the colonialism node into the object of critique, answers the power–knowledge problem through Orientalism, the subaltern, and dependency theory, and enters a complex dialogue with the nationalism node (nationalism is both the most powerful tool against colonialism and a sharer of imperialism’s zero-sum logic). It also echoes the processual node’s stress on agency, re-reading the excluded as strategic subjects."},"works":{"zh":["Edward Said（萨义德），《东方学》（1978）、《世界、文本与批评家》、《文化与帝国主义》","Gayatri C. Spivak（斯皮瓦克），《庶民能发声吗？》（Can the Subaltern Speak?）","Homi K. Bhabha（霍米·巴巴）","Samir Amin（萨米尔·阿明），不平等发展与依附理论","Arturo Escobar, “Power and Visibility: Development and the Invention and Management of the Third World”","James Ferguson, The Anti-Politics Machine（莱索托的“发展”、去政治化与官僚权力）","Foucault（权力—话语）；Gramsci（文化霸权）；J. A. Hobson,《帝国主义：一项研究》"],"en":["Edward Said, Orientalism (1978), The World, the Text, and the Critic, Culture and Imperialism","Gayatri C. Spivak, “Can the Subaltern Speak?”","Homi K. Bhabha","Samir Amin, unequal development and dependency theory","Arturo Escobar, “Power and Visibility: Development and the Invention and Management of the Third World”","James Ferguson, The Anti-Politics Machine: “Development”, Depoliticization, and Bureaucratic Power in Lesotho","Foucault (power–discourse); Gramsci (cultural hegemony); J. A. Hobson, Imperialism: A Study"]},"strengths":{"zh":["把“庶民”从身份认同重新界定为“被排除的处境”，避免了本质主义，使分析对准支配关系本身而非某一群体。","依附理论与“发展即发明”（Escobar、Ferguson）把后殖民批判从文本扩展到政治经济与官僚实践，弥补了纯文化分析的不足。"],"en":["Redefining the “subaltern” from an identity into an “excluded condition” avoids essentialism and trains the analysis on the relation of domination itself rather than on a particular group.","Dependency theory and “development as invention” (Escobar, Ferguson) extend postcolonial critique from text to political economy and bureaucratic practice, supplementing a purely cultural analysis."]},"limits":{"zh":["后殖民理论常被批评为文本化、精英化、术语繁难，“庶民能否发声”本身也面临“代言悖论”：由学院精英替无法发声者发声，是否再生产了它所批判的支配。","若把后殖民简化为后现代式的“解构一切宏大叙事”，可能淡化殖民／新殖民社会受压迫的物质面向，失去国际批判与再分配的着力点（笔记自身已对此提出警惕）。"],"en":["Postcolonial theory is often criticized as textualist, elitist, and jargon-heavy; “can the subaltern speak” itself faces a “paradox of representation”: academic elites speaking for those who cannot speak may reproduce the very domination it critiques.","Reducing postcolonialism to a postmodern “deconstruction of all grand narratives” can dilute the material dimension of oppression in colonial/neocolonial societies and lose the leverage for international critique and redistribution (a danger the note itself flags)."]},"personal":{"zh":["斯皮瓦克“庶民是一种状况而非身份”的提法最值得记：它把分析从“谁是庶民”转向“什么样的关系把人推入庶民处境”，因此可以避免把受压迫者浪漫化或固化为标签。","依附理论与发展话语批判提醒我：“帮助”与“发展”本身可能是一种治理技术，去政治化地延伸控制——这与上一节殖民主义“换皮的传播主义”是同一逻辑的当代版本。"],"en":["Spivak’s formulation that “the subaltern is a condition, not an identity” is the most worth keeping: it shifts the analysis from “who is the subaltern” to “what kind of relation pushes people into subalternity”, and so avoids romanticizing the oppressed or freezing them into a label.","Dependency theory and the critique of development discourse remind me that “help” and “development” may themselves be a technology of governance, extending control in a depoliticized way; the contemporary version of the previous node’s “diffusionism that merely changed its skin”."]},"reflection":{"zh":["这一节大量借用了萨义德、斯皮瓦克与依附理论，叙述本身是批判性的；但有两处值得在课后稍作平衡，以免把后殖民主义读成无可置疑的定论。","（1）“代言／发声”的内在张力。斯皮瓦克的本意恰恰是警告：当学院用理论替庶民“发声”时，很容易把异质的、矛盾的庶民经验整理成一个顺滑的他者形象，从而再次抹去其声音。把“庶民能否发声”当作一个已被理论解决的口号来用，反而违背了它的初衷——它是一个需要不断自我警惕的问题，而非一个答案。","（2）笔记提到的新清史“带有反华色彩”是一个有争议的判断。新清史既包含借后殖民／边疆视角解构单一民族叙事的学术取向，也确实在公共领域被政治化地使用；把它整体定性为“反华”，与本节自己倡导的“破除本质化、对宏大叙事保持警惕”的方法存在张力。更稳妥的处理是：区分作为史学方法的新清史与其被政治挪用的部分，而不是一概否定。","（3）后殖民主义与民族主义的关系，笔记已正确指出其“双刃剑”性质（民族主义既是反殖民最有力的工具，又与帝国主义共享零和逻辑、可能压抑少数族群）。这一辩证恰恰说明：后殖民批判最有力时，是把它的怀疑也用在自己珍视的范畴（民族、庶民、真实历史）之上，而非只用于批判西方。","补充一个事实层面的提醒：原笔记中关于斯皮瓦克任职“匹兹堡大学”的说法与常见资料不符；斯皮瓦克长期任教于哥伦比亚大学。课程笔记记录可保留，但应同时作事实校正。"],"en":["This node draws heavily on Said, Spivak, and dependency theory, and its narrative is itself critical; but two points are worth balancing afterward, so that postcolonialism is not read as an unquestionable settled doctrine.","(1) The internal tension of “speaking for / giving voice”. Spivak’s very point is a warning: when the academy uses theory to “give voice” to the subaltern, it easily tidies heterogeneous, contradictory subaltern experience into a smooth image of the other, and so erasing that voice again. Using “can the subaltern speak” as a slogan already solved by theory betrays its intent; it is a question demanding constant self-suspicion, not an answer.","(2) The note’s claim that the New Qing History “has an anti-China color” is a contested judgment. The New Qing History includes a scholarly orientation that uses postcolonial / frontier perspectives to deconstruct a single-nation narrative, and it is indeed put to politicized use in the public sphere; characterizing it wholesale as “anti-China” is in tension with this very node’s call to “dispel essentialism and stay suspicious of grand narratives”. A safer treatment distinguishes the New Qing History as a historiographical method from its political appropriation, rather than rejecting it altogether.","(3) On the relation between postcolonialism and nationalism, the note rightly notes its “double-edged” character (nationalism is both the most powerful tool against colonialism and a sharer of imperialism’s zero-sum logic that may suppress minorities). This dialectic shows precisely that postcolonial critique is strongest when it turns its suspicion onto the categories it cherishes (nation, subaltern, true history) as well as onto the West.","A factual note: the original course note says Spivak is at the University of Pittsburgh, but common references identify her with Columbia University. The course-note record can be kept, but it needs this factual correction."]},"noteSection":"第十四—十五周 后殖民主义与庶民研究","noteBlocks":[{"kind":"p","text":"20 世纪 60、70 年代，人类学开始更批判地审视自己所用的研究方法。后殖民主义（Postcolonialism）是 1970 至 1980 年代产生的一种思潮和学术理论，主要目的是反思殖民主义，特别强调文化、知识领域内对殖民主义、新殖民主义、西方中心主义等现象的反思与批判。不能使用西方的逻辑和话语；对“后”的理解有分歧：一种认为殖民主义已经结束、现在是新阶段，另一种认为我们仍旧在殖民主义阴影下、殖民主义换汤不换药依旧在压迫着非西方的地区和人民。批判研究中，后结构主义、后现代主义、后殖民主义应运而生，是一系列反体系运动的产物；后殖民主义的缘起以萨义德《东方学》出版为标志。代表人物：萨义德（Edward Said）、斯皮瓦克（Gayatri Chakravorty Spivak）、霍米·巴巴（Homi K. Bhabha）。"},{"kind":"p","text":"葛兰西文化霸权：工人阶级难以动员，痛苦已经被资本主义大众文化消解了，而在农村可能还有希望，领导革命应该注意打破文化霸权。新清史研究带有反华色彩，解构作为一个民族；重要的是它是书写历史的一种方式，被历史学、社会学、政治学都借鉴使用，关注被压迫者的主体身份认同——被压迫者本身就是有主体性的 agency，而且可以通过各种策略表达自己的主体性，打破传统的大叙事。"},{"kind":"p","text":"1968 法国五月风暴，70s—80s 美国民权运动。“后 XX 主义”是解构性的，对本质主义叙述的批判。文化研究：研究文化政治，文化作品的再现对性别、民族、种族的描述反映的权力关系，进行文本分析。影响最大的是福柯的权力—话语理论；葛兰西讲被洗脑的庶民；还有马克思—列宁。霍布森《帝国主义：一项研究》认为帝国主义的扩张不是文化的输入，而是贪婪、是财富的单向流动；但很少有人能站在被殖民地立场看问题。"},{"kind":"p","text":"新殖民主义：二战后大多数殖民地形式上获得独立，但实际上并未摆脱，在发展学中比较常见；主要是拉美学者的依附理论，将中心—外围理论转化为普遍的社会发展理论。萨米尔·阿明的主要观点：1）不平等发展——强调全球体系中富国和穷国之间的不平等关系，认为国际经济体系导致贫富差距不断扩大；2）依附理论——发展中国家在全球体系中处于次要和依赖地位，其经济结构和发展模式由国际资本主义体系主导；3）全球化批判——认为全球化主要由富裕国家推动、加剧贫富差距；4）社会主义与反帝国主义；5）自主发展——主张发展中国家通过自主、民主的发展战略摆脱对国际市场和外部力量的过度依赖。"},{"kind":"p","text":"Escobar，“Power and Visibility: Development and the Invention and Management of the Third World”：所谓发展是二战之后西方大国在寻求解决世界难题和管理第三世界方法时的一大发明，发展本身在经济较发达地区成为必要而强有力的话语体系，其结果是发展行业高度专业化和机构化；发展话语不但是一种管理发展中国家的机制，同时还有着构建甚至制造有关第三世界真相的功能。Ferguson，The Anti-Politics Machine（莱索托）：“发展”话语将贫穷这一错综复杂的现象纳入完全抽离政治和文化语境的技术问题范畴；由于贫穷并非简单的技术性难题，发展组织提供的技术方案注定行不通；试图提供技术方案的结果之一便是国家控制得以延伸，而非地方经济状况的好转；“发展”话语在实践中的渗透和弥漫，为寻找下一步技术性方案提出了需求，也强化了贫困问题的非政治化趋势。"},{"kind":"p","text":"内部殖民主义；内部东方主义。多元文化主义？它只是讨论自由主义能否容忍少数族群的利益，还是站在多数的立场；少数话语理论则以少数为主体。对于评判事物价值的标准是模糊的——对宏大叙事的解构，消解帝国中心的话语。但后殖民主义不是一种简单的后现代政治（后现代政治强调进步、启蒙、自由、真理都不存在，历史碎片化，出现很多讽刺、黑色幽默，不太关注殖民／新殖民社会受到压迫的面向，没有国际共产主义的一面，不太批判西方中心，在文化产业里有很多具体表现，比如建筑、周星驰电影中的无厘头讽刺，目的就是消解叙事）。"},{"kind":"p","text":"后殖民女性主义：关注非白人／非西方女性的经验。使用“女性”、把她们都视为同质性群体，忽略了种族等高度异质性；西方女性主义要出去工作、争取性权利（生育、结婚等），却没关注到殖民地女性；后殖民女性主义将性别问题与种族联结。民族主义与后殖民主义的关系很复杂：民族主义是反抗殖民主义最有力的工具，后殖民主义与从前的反殖民思想超越了将民族主义与殖民主义视为对立的看法——争取独立时民族主义尚有价值，但逻辑上帝国主义和民族主义是一致的，都建立在零和博弈的基础上（要么属于民族，要么不属于）；宣传同一性叙事反而会压抑少数族群；民族主义这把双刃剑要小心使用。"},{"kind":"p","text":"萨义德与东方主义：萨义德的《东方学》《世界、文本、批评家》《文化与帝国主义》三部书影响最大。东方主义的描述性表达无一例外地将欧亚大陆上地中海以东各国家社会的多种生活进行了对象化、本质化和刻板印象的处理。对立化的表现有：敌视——专注于他者的威胁性和可憎性（如暴君、原教旨主义、恐怖主义等，东方男性成为堕落无耻且被妖魔化的对象）；异域——关注他者具有吸引力的一面（如后宫、闺房、面纱等，东方女性被描绘成放荡、顺从且颇具异域风情）。总之，在萨义德看来，西方为自己的经济、政治、文化利益而编造了一整套重构东方的战术，并规定了西方对东方的理解，通过文学、历史、学术著作描写的东方形象为其帝国主义的政治、军事、统治服务。"},{"kind":"p","text":"斯皮瓦克与庶民研究：斯皮瓦克（Gayatri Chakravorty Spivak，1942—）。她生于印度加尔各答市，1963 年移居美国。现为美国匹兹堡大学英语与文化研究系教授。斯皮瓦克并非是将自己局限于某一学科狭窄领域的专家，而是打破专业界限、横跨多学科、多流派的思想型学者。她将后殖民主义理论与她的女权主义、解构主义、西方马克思主义、心理分析学理论紧密相联，并将自己的“边缘”姿态和“权力”分析的策略施于当代理论和批判领域。她的代表作：“庶民能发声吗”（Can the subaltern speak?）。“庶民”更多是一种视角，从弱势的位置来看支配关系，借此拆解支配关系所依靠的霸权论述。新庶民：庶民现在面对新的状况，即全球化主导文化的渗透。"},{"kind":"p","text":"斯皮瓦克：殖民化记忆与重书身份。斯皮瓦克要重建真实的历史叙述，她反对帝国主义的历史描述和将历史叙事虚构化的“策略”，致力于建构第三世界自身历史的新的叙述逻辑。具体策略：解构主义去中心化；用西方马克思主义的批判理论解释帝国主义殖民史的歪曲虚构；强调后殖民批评的人文话语；强调第三世界妇女的声音。"},{"kind":"personal","text":"斯皮瓦克与后殖民女性主义：承认第三世界妇女作为一种具有性别的主体，是具有个体“个性”和“多样性”的主体。长期以来，美国女性主义者将“历史”看作一种贬低理论的实证经验，因而对其自身的历史视而不见，却以第一世界霸权式的知识实践指定“第三世界”作为美国女性主义的研究对象。最关键的一点：庶民不是一种身份认同，而是一种状况，被排除在社会流动性之外；不是特定的人，而是庶民性、庶民处境。"}],"noteBlocksEn":[{"kind":"p","text":"In the 1960s and 70s, anthropology began to examine its own research methods more critically. Postcolonialism is a current of thought and academic theory arising in the 1970s–80s whose main aim is to reflect on colonialism, with special emphasis on reflecting upon and critiquing colonialism, neocolonialism, and Western-centrism in the cultural and knowledge domains. One must not use Western logic and discourse; readings of 'post' differ: one holds that colonialism has ended and we are in a new stage, the other that we remain in colonialism's shadow, with colonialism still oppressing non-Western regions and peoples under a new guise. Within critical scholarship, poststructuralism, postmodernism, and postcolonialism arose as products of a series of anti-systemic movements; postcolonialism is dated from the publication of Said's Orientalism. Key figures: Edward Said, Gayatri Chakravorty Spivak, Homi K. Bhabha."},{"kind":"p","text":"Gramsci's cultural hegemony: the working class is hard to mobilize because its suffering has been dissolved by capitalist mass culture, while hope may remain in the countryside, so leading a revolution must attend to breaking cultural hegemony. The New Qing History is said to carry an anti-China color, deconstructing the nation as a single entity; what matters is that it is a way of writing history, borrowed by history, sociology, and political science, attending to the subject-identity of the oppressed; the oppressed are themselves agency with subjectivity and can express their subjectivity through various strategies, breaking the traditional grand narrative."},{"kind":"p","text":"1968, the French May; the 1970s–80s US civil-rights movement. The 'post-isms' are deconstructive, a critique of essentialist narratives. Cultural studies: studying cultural politics, how the representation in cultural works of gender, nation, and race reflects power relations, through textual analysis. The most influential is Foucault's power–discourse theory; Gramsci speaks of the brainwashed subaltern; and there is Marx–Lenin. Hobson's Imperialism: A Study holds that imperialism's expansion is not the import of culture but greed, a one-way flow of wealth; yet few can view the question from the standpoint of the colonized."},{"kind":"p","text":"Neocolonialism: after WWII most colonies gained formal independence but did not in fact escape, a theme common in development studies; mainly the dependency theory of Latin American scholars, which turned center–periphery theory into a general theory of social development. Samir Amin's main views: (1) unequal development; stressing the unequal relationship between rich and poor countries in the global system and holding that the international economic system keeps widening the gap; (2) dependency theory; developing countries occupy a secondary, dependent position in the global system, their economic structure and development model dominated by the international capitalist system; (3) a critique of globalization; driven mainly by wealthy countries and widening inequality; (4) socialism and anti-imperialism; (5) autonomous development; developing countries should escape over-dependence on the international market and external forces through autonomous, democratic development strategies."},{"kind":"p","text":"Escobar, 'Power and Visibility: Development and the Invention and Management of the Third World': development is a great invention of the Western powers after WWII as they sought ways to solve world problems and manage the third world; development itself became a necessary and powerful discourse in the more economically developed regions, with the result that the development industry became highly specialized and institutionalized; development discourse both manages developing countries and constructs, even manufactures, a 'truth' about the third world. Ferguson, The Anti-Politics Machine (Lesotho): development discourse places poverty; an intricate phenomenon; into the category of technical problems wholly abstracted from political and cultural context; since poverty is no simple technical problem, the technical solutions offered by development organizations are bound not to work; one result of attempting technical solutions is the extension of state control rather than the improvement of local economic conditions; the penetration and pervasiveness of development discourse in practice creates demand for the next technical solution and reinforces the depoliticization of poverty."},{"kind":"p","text":"Internal colonialism; internal Orientalism. Multiculturalism? It merely debates whether liberalism can tolerate the interests of minorities, still standing on the majority's position; minority-discourse theory, by contrast, takes the minority as subject. The standard for judging the value of things is vague; a deconstruction of grand narratives, a dissolving of empire-centered discourse. But postcolonialism is not a simple postmodern politics (postmodern politics stresses that progress, enlightenment, freedom, and truth do not exist, that history is fragmented, with much irony and black humor, little attention to the oppressed dimension of colonial/neocolonial societies, no international-communist side, and little critique of Western-centrism, finding concrete expression in the culture industry, such as architecture or the nonsensical irony of Stephen Chow's films, whose purpose is to dissolve narrative)."},{"kind":"p","text":"Postcolonial feminism: attends to the experience of non-white / non-Western women. Using 'women' and treating them all as a homogeneous group ignores race and other high heterogeneity; Western feminism wanted to go out to work and win sexual rights (childbirth, marriage, and so on) but did not attend to colonized women; postcolonial feminism links the question of gender with race. The relation between nationalism and postcolonialism is complex: nationalism is the most powerful tool against colonialism, and postcolonialism, together with earlier anti-colonial thought, transcends the view that nationalism and colonialism are simply opposed; nationalism still has value while fighting for independence, but logically imperialism and nationalism are consistent, both built on zero-sum (either you belong to the nation or you do not); promoting a narrative of sameness in fact suppresses minorities; nationalism is a double-edged sword to be used with care."},{"kind":"p","text":"Said and Orientalism: Said's three most influential books are Orientalism, The World, the Text, and the Critic, and Culture and Imperialism. The descriptive expression of Orientalism invariably handles the diverse life of the societies east of the Mediterranean in Eurasia through objectification, essentialization, and stereotype. Its strategies of opposition: hostility; fixing on the other's threat and detestability (tyrants, fundamentalism, terrorism, with the Eastern man made a depraved, shameless, demonized object); exoticism; fixing on the other's attractive side (the harem, the boudoir, the veil, with the Eastern woman painted as licentious, submissive, and exotic). In sum, for Said the West fabricated a whole set of tactics to reconstruct the East for its own economic, political, and cultural interests, and prescribed the West's understanding of the East, with the image of the East depicted through literature, history, and scholarship serving its imperialist politics, military, and rule."},{"kind":"p","text":"Spivak and subaltern studies: Spivak (Gayatri Chakravorty Spivak, 1942– ) was born in Calcutta, India, and moved to the United States in 1963. She is now a professor in the Department of English and Cultural Studies at the University of Pittsburgh. She is not a specialist confined to one narrow discipline, but a thinker who crosses disciplinary boundaries and moves across many fields and schools. She links postcolonial theory closely with feminism, deconstruction, Western Marxism, and psychoanalysis, and applies her “marginal” stance and her strategy of power analysis to contemporary theory and critique. Her representative work is “Can the Subaltern Speak?”. The “subaltern” is more a perspective: it views relations of domination from a weak position and uses this view to dismantle the hegemonic discourse on which domination relies. The new subaltern faces a new condition: the penetration of global dominant culture."},{"kind":"p","text":"Spivak: colonized memory and rewriting identity. Spivak wants to rebuild a true historical narrative; she opposes imperialist historical description and the 'strategy' of fictionalizing historical narrative, and devotes herself to constructing a new narrative logic for the third world's own history. Concrete strategies: deconstructive decentering; using Western-Marxist critical theory to explain the distortion and fabrication of imperialist colonial history; emphasizing the humanistic discourse of postcolonial criticism; emphasizing the voice of third-world women."},{"kind":"personal","text":"Spivak and postcolonial feminism: recognizing third-world women as gendered subjects, subjects with individual 'personality' and 'diversity'. For a long time US feminists treated 'history' as an empirical experience that degrades theory, and so were blind to their own history, yet used a first-world hegemonic knowledge practice to designate the 'third world' as the object of US feminism. The key point: the subaltern is a condition, an exclusion from social mobility, rather than a fixed identity or a specific group of people."}]}],"edges":[{"from":"what-is","to":"deep-theory","type":"extend","kw":{"zh":"奠基问题","en":"founding question"},"tip":{"zh":"从“政治人类学研究什么、用什么方法”走向对历史变迁的深层理论（循环论与进化论）。","en":"From “what does political anthropology study, and how” to a deep theory of historical change (cyclical and evolutionary)."}},{"from":"deep-theory","to":"evolutionism","type":"extend","kw":{"zh":"循环→进化","en":"cycle→evolution"},"tip":{"zh":"循环史观让位于 19 世纪的单线进化论，进步被想象为一道普遍的阶梯。","en":"Cyclical history gives way to 19th-century unilineal evolutionism, with progress imagined as a universal ladder."}},{"from":"evolutionism","to":"structfunc","type":"react","kw":{"zh":"反臆测史","en":"against conjectural history"},"tip":{"zh":"结构功能主义反对进化论的臆测历史，转向共时的功能与结构分析。","en":"Structural functionalism rejects evolutionism’s conjectural history, turning to synchronic function and structure."}},{"from":"structfunc","to":"processual","type":"react","kw":{"zh":"找回能动性","en":"bringing agency back"},"tip":{"zh":"过程论不满结构功能主义的静态均衡，把冲突、策略与个人能动性带回分析。","en":"Processual analysis, dissatisfied with static equilibrium, brings conflict, strategy, and agency back in."}},{"from":"power","to":"inequality","type":"extend","kw":{"zh":"权力→不平等","en":"power→inequality"},"tip":{"zh":"对权力本质的追问，延伸为对社会不平等如何产生的追问。","en":"The question of the nature of power extends into how social inequality arises."}},{"from":"inequality","to":"egalitarian","type":"extend","kw":{"zh":"不平等的反面","en":"the egalitarian counter-case"},"tip":{"zh":"以平等的狩猎采集社会作为衡量不平等起源的对照基线。","en":"Egalitarian hunter-gatherer societies serve as the baseline against which inequality’s origin is measured."}},{"from":"egalitarian","to":"chiefdom","type":"extend","kw":{"zh":"等级浮现","en":"hierarchy emerges"},"tip":{"zh":"从平等到酋邦，制度化的等级与再分配中心开始出现。","en":"From equality to the chiefdom, institutionalized hierarchy and redistributive centers begin to appear."}},{"from":"chiefdom","to":"state-origin","type":"extend","kw":{"zh":"通向国家","en":"toward the state"},"tip":{"zh":"酋邦的集权逻辑推进为国家起源问题——强制、合法性与社会禁闭。","en":"The chiefdom’s centralizing logic advances into the question of state origins; coercion, legitimacy, circumscription."}},{"from":"state-origin","to":"leadership","type":"extend","kw":{"zh":"国家中的人","en":"persons within the state"},"tip":{"zh":"从国家的结构，转向具体的领导、继承与强人动员。","en":"From the structure of the state to concrete leadership, succession, and strongman mobilization."}},{"from":"leadership","to":"religion","type":"extend","kw":{"zh":"权威的神圣化","en":"sacralizing authority"},"tip":{"zh":"领导的合法性问题接入宗教——神圣性如何为权威背书。","en":"The legitimacy of leadership connects to religion; how the sacred underwrites authority."}},{"from":"religion","to":"nationalism","type":"extend","kw":{"zh":"认同的零和化","en":"zero-sum identity"},"tip":{"zh":"宗教式的零和认同，被近代政治改造为民族主义。","en":"Religion’s zero-sum identity is reworked by modern politics into nationalism."}},{"from":"nationalism","to":"modernization","type":"extend","kw":{"zh":"国族与发展","en":"nation & development"},"tip":{"zh":"民族建构汇入现代化叙事——社会动员、管理集权与国族符号。","en":"Nation-building flows into the modernization narrative; social mobilization, centralization, national symbols."}},{"from":"modernization","to":"colonialism","type":"extend","kw":{"zh":"现代化的暗面","en":"the underside of modernization"},"tip":{"zh":"现代化的单线模型，被揭示为殖民主义的“欧洲中心传播主义”。","en":"Modernization’s unilineal model is exposed as colonialism’s “Eurocentric diffusionism”."}},{"from":"colonialism","to":"postcolonial","type":"extend","kw":{"zh":"批判的反转","en":"the critical reversal"},"tip":{"zh":"殖民话语成为后殖民批判的对象——东方主义、庶民与依附理论。","en":"Colonial discourse becomes the object of postcolonial critique; Orientalism, the subaltern, dependency theory."}},{"from":"deep-theory","to":"modernization","type":"parallel","kw":{"zh":"进化论的两端","en":"two ends of evolutionism"},"tip":{"zh":"19 世纪的循环／进化深层理论，在 20 世纪以罗斯托单线现代化的形式复现，又被多元现代性批判。","en":"The 19th-century cyclical/evolutionary deep theory reappears in the 20th century as Rostow’s unilineal modernization, then critiqued by multiple modernities."}},{"from":"evolutionism","to":"state-origin","type":"parallel","kw":{"zh":"阶段论的应用","en":"stage theory applied"},"tip":{"zh":"进化论的阶段图式，被直接用来解释国家起源（摩尔根式的序列）。","en":"Evolutionism’s stage schema is applied directly to explain state origins (a Morgan-style sequence)."}},{"from":"structfunc","to":"chiefdom","type":"parallel","kw":{"zh":"功能与再分配","en":"function & redistribution"},"tip":{"zh":"结构功能主义的均衡视角，塑造了对酋邦再分配与整合功能的解读。","en":"The equilibrium view of structural functionalism shapes how the chiefdom’s redistribution and integration are read."}},{"from":"processual","to":"power","type":"parallel","kw":{"zh":"策略与权力","en":"strategy & power"},"tip":{"zh":"过程论对策略与能动性的关注，与实质轴对权力本质的追问相互呼应。","en":"Processual attention to strategy and agency resonates with the substantive axis’s inquiry into the nature of power."}},{"from":"leadership","to":"restorative-justice","type":"parallel","kw":{"zh":"法与调解","en":"law & mediation"},"tip":{"zh":"领导与权威之后，课程插入恢复性司法专题，展示冲突如何不经国家惩罚而被调解、修复和治理。","en":"After leadership and authority, the course inserts restorative justice, showing how conflict can be mediated, repaired, and governed without relying only on state punishment."}},{"from":"restorative-justice","to":"religion","type":"parallel","kw":{"zh":"规范与共同体","en":"norms & community"},"tip":{"zh":"恢复性司法关心关系修复、共同体与规范，这与宗教如何建立共同体规范形成呼应。","en":"Restorative justice is concerned with relational repair, community, and norms, echoing how religion builds communal norms."}}],"overview":{"zh":["这棵谱系树来自复旦大学《政治人类学导论》课程笔记，把一学期的内容重排为两条主干。左干是“范式演变”——政治人类学如何提问、用什么方法（导论 → 深层史观 → 进化论 → 结构功能主义 → 过程论）；右干是“实质历史”——它用这些范式去叙述一部从权力、不平等、平等社会、酋邦、国家起源，到领导、宗教、民族主义、现代化、殖民主义与后殖民的长程史。","中间的虚线表示两干之间的交叉影响：范式不是悬空的方法，而总是在解释某段实质历史时被锻造、检验与修正；实质叙事也反过来逼迫范式自我更新。例如进化论的阶段图式被用来讲国家起源，过程论对能动性的强调又呼应着对权力本质的追问。","部分节点包含“课后反思”框：课程笔记照录，但对其中学理上可商榷、不够公允之处，另起一个高亮框写出问题与替代视角——尤其在进化论、国家起源、民族主义、现代化与后殖民这些争议最重的地方。这里呈现的既是知识，也是对“知识如何被生产”的反思。"],"en":["This genealogy is based on lecture notes from Fudan University’s course “Introduction to Political Anthropology”. It rearranges the semester into two trunks. The left trunk is “paradigm change”: how political anthropology asks questions and what methods it uses (introduction → deep views of history → evolutionism → structural functionalism → processualism). The right trunk is “substantive history”: it uses these paradigms to tell a long history from power, inequality, egalitarian society, chiefdoms, and state origins to leadership, religion, nationalism, modernization, colonialism, and the postcolonial.","The dashed lines in the middle show cross-influences between the two trunks. A paradigm is not a method floating above history; it is forged, tested, and revised while it explains a part of substantive history. Substantive narrative also pushes paradigms to renew themselves. For example, evolutionist stage schemes are used to discuss state origins, while processualism’s stress on agency speaks to the question of what power is.","Some nodes include a “Reflection” box. The course notes are kept as notes, but where a claim is contestable or one-sided, a separate reflection box explains the problem and gives alternative views, especially in heavily debated areas such as evolutionism, state origins, nationalism, modernization, and the postcolonial. This page presents knowledge, but also reflects on how knowledge is produced."]},"refs":{"zh":["L. H. 摩尔根，《古代社会》——进化论的阶段序列（蒙昧—野蛮—文明）","涂尔干、拉德克利夫-布朗、马林诺夫斯基——结构功能主义","维克多·特纳、弗雷德里克·巴特、马克斯·格拉克曼——过程论与行动理论","Elman Service / Morton Fried——游团—部落—酋邦—国家 的政治演化序列","Robert Carneiro——国家起源的“社会禁闭”理论","David Graeber & David Wengrow,《人类新史》（The Dawn of Everything）——对单线不平等叙事的质疑","赵鼎新，《帝国政治和主导性意识形态：民族运动的起源、发展和未来》","W. W. Rostow, The Stages of Economic Growth；S. N. Eisenstadt——多元现代性、第二轴心时代","Abner Cohen, Custom and Politics in Urban Africa (1969)——豪萨人的再部落化","J. M. Blaut, The Colonizer's Model of the World——欧洲中心传播主义","Edward Said,《东方学》(Orientalism, 1978)——原始主义与东方主义","Gayatri C. Spivak, “Can the Subaltern Speak?”——庶民研究","Samir Amin（不平等发展）；Arturo Escobar（发展即发明）；James Ferguson, The Anti-Politics Machine","Michel Foucault（权力—话语）；Antonio Gramsci（文化霸权）；J. A. Hobson, Imperialism: A Study","Franz Boas：历史特殊论与文化相对主义；Leslie White / Julian Steward：新进化论与文化生态学","Marshall Sahlins, Elman Service, Morton Fried：前工业政治类型学","Max Gluckman、Victor Turner、Fredrik Barth：过程论、社会戏剧与边界理论","Robert Bellah：公民宗教；Peter Berger：神圣帷幕；Max Weber：宗教、合法性与科层制","Ernest Gellner, Nations and Nationalism；Benedict Anderson, Imagined Communities；Eric Hobsbawm, The Invention of Tradition；John Breuilly, Nationalism and the State","Kenneth Pomeranz, The Great Divergence；Janet Abu-Lughod, Before European Hegemony；Andre Gunder Frank, ReORIENT；Immanuel Wallerstein：世界体系理论","Dipesh Chakrabarty, Provincializing Europe；Partha Chatterjee, The Nation and Its Fragments；Homi K. Bhabha, The Location of Culture","John Braithwaite：Restorative Justice and Responsive Regulation；Marshall（1996）与 Walgrave（2012）关于恢复性司法的定义"],"en":["L. H. Morgan, Ancient Society; the evolutionist stage sequence (savagery–barbarism–civilization)","Durkheim, Radcliffe-Brown, Malinowski; structural functionalism","Victor Turner, Fredrik Barth, Max Gluckman; processual and action theory","Elman Service / Morton Fried; the band–tribe–chiefdom–state sequence of political evolution","Robert Carneiro; the “circumscription” theory of state origins","David Graeber & David Wengrow, The Dawn of Everything; questioning the unilineal narrative of inequality","Zhao Dingxin, Imperial Politics and Dominant Ideology: The Origin, Development, and Future of National Movements","W. W. Rostow, The Stages of Economic Growth; S. N. Eisenstadt; multiple modernities, the second Axial Age","Abner Cohen, Custom and Politics in Urban Africa (1969); Hausa re-tribalization","J. M. Blaut, The Colonizer’s Model of the World; Eurocentric diffusionism","Edward Said, Orientalism (1978); primitivism and Orientalism","Gayatri C. Spivak, “Can the Subaltern Speak?”; subaltern studies","Samir Amin (unequal development); Arturo Escobar (development as invention); James Ferguson, The Anti-Politics Machine","Michel Foucault (power–discourse); Antonio Gramsci (cultural hegemony); J. A. Hobson, Imperialism: A Study","Franz Boas: historical particularism and cultural relativism; Leslie White / Julian Steward: neo-evolutionism and cultural ecology","Marshall Sahlins, Elman Service, Morton Fried: typologies of pre-industrial politics","Max Gluckman, Victor Turner, Fredrik Barth: processualism, social drama, and boundary theory","Robert Bellah: civil religion; Peter Berger: the sacred canopy; Max Weber: religion, legitimacy, and bureaucracy","Ernest Gellner, Nations and Nationalism; Benedict Anderson, Imagined Communities; Eric Hobsbawm, The Invention of Tradition; John Breuilly, Nationalism and the State","Kenneth Pomeranz, The Great Divergence; Janet Abu-Lughod, Before European Hegemony; Andre Gunder Frank, ReORIENT; Immanuel Wallerstein: world-systems theory","Dipesh Chakrabarty, Provincializing Europe; Partha Chatterjee, The Nation and Its Fragments; Homi K. Bhabha, The Location of Culture","John Braithwaite, Restorative Justice and Responsive Regulation; Marshall (1996) and Walgrave (2012) on definitions of restorative justice"]},"timeline":[{"y":0.0,"zh":"导论 / 范式起点","en":"Intro / where paradigms begin"},{"y":2.1,"zh":"进化论 · 权力与不平等","en":"Evolutionism · power & inequality"},{"y":4.0,"zh":"过程论 · 平等社会","en":"Processual · egalitarian society"},{"y":5.9,"zh":"酋邦 · 国家起源","en":"Chiefdom · state origins"},{"y":8.4,"zh":"领导 · 宗教","en":"Leadership · religion"},{"y":8.4,"zh":"恢复性司法（插入讲座）","en":"Restorative justice (guest lecture)"},{"y":10.2,"zh":"民族主义","en":"Nationalism"},{"y":11.4,"zh":"现代化","en":"Modernization"},{"y":12.6,"zh":"殖民主义","en":"Colonialism"},{"y":13.8,"zh":"后殖民 · 庶民研究","en":"Postcolonial · subaltern studies"}]}</script>

  const L = {"zh":{"eyebrow":"复旦大学 · 政治学本科课程笔记 · 政治人类学导论","title":"政治人类学谱系","lead":"基于复旦大学《政治人类学导论》课程笔记，重排为一棵双主干的树：左干是范式如何分叉、反驳、继承与重组，右干是它们叙述的一部从权力到后殖民的长程史。","pills":[],"readTitle":"如何阅读这棵树","readP1":"两条主干并行：左干“范式演变”、右干“实质历史”。纵向位置大致对应课程推进，连线上的关键词说明流派之间为何继承或反驳——实线是同干内部的演化，虚线是两干之间的交叉影响，悬停可读更详细的内容。","readP2":"部分节点带有“课后反思”高亮框：原笔记照录，对其中可商榷之处另作辨析。","jumpTree":"查看谱系图","treeTitle":"谱系图","treeHint":"鼠标悬停连线可读流派关系（虚线为跨干交叉影响）；点击节点进入详情页。进入详情页后，可用键盘左右键切换上一/下一节点。","refsTitle":"参考文献","refsLead":"这里是本页用来补充课程笔记的学术锚点。","toc":"本页目录","core":"核心理论","relation":"它在谱系中的位置","works":"代表人物与文献","strengths":"贡献","limits":"局限","personal":"个人笔记","reflection":"课后反思","notes":"按课程笔记保留的细节","notesHint":"以下是原课程笔记的内容。","refs":"参考文献","back":"← 返回谱系图","prev":"上一节点","next":"下一节点","footer":"据复旦大学《政治人类学导论》课程笔记重构","home":"返回导论"},"en":{"eyebrow":"Fudan University · Political Science undergraduate course notes · Introduction to Political Anthropology","title":"A Genealogy of Political Anthropology","lead":"Built from lecture notes for Fudan University’s “Introduction to Political Anthropology”, rearranged as a two-trunk tree: the left trunk traces how paradigms branch, react, inherit, and recombine; the right trunk is the long history, from power to the postcolonial, that they narrate.","pills":[],"readTitle":"How to read the tree","readP1":"Two trunks run in parallel: the left trunk is “paradigm change”, and the right trunk is “substantive history”. Vertical position roughly follows the course progression. Keywords on the connecting lines explain why one school inherits from or reacts against another: solid lines show evolution within a trunk, dashed lines show cross-trunk influence, and hover text gives more detail.","readP2":"Some nodes carry a “Reflection” box: the course-note section is kept as notes, while contestable points are discussed separately.","jumpTree":"Open genealogy map","treeTitle":"Genealogy Map","treeHint":"Hover a line for the relation between schools (dashed lines are cross-trunk influence
